(function(){
  if (typeof CURRICULUM === 'undefined' || !CURRICULUM.modules) return;
  var ENR = {"py1l1": {"theory": "<p>Python exécute tes instructions <b>de haut en bas</b>, une ligne après l'autre. La toute première chose à savoir faire : <b>afficher</b> quelque chose à l'écran, avec la fonction <code>print(...)</code>.</p><pre><code>print(\"Bonjour\")        # affiche : Bonjour</code></pre><div class=\"section-label\">Texte, guillemets et nombres</div><p>Un <b>texte</b> (une « chaîne de caractères ») se met entre guillemets, doubles <code>\"…\"</code> ou simples <code>'…'</code>. Un <b>nombre</b> s'écrit sans guillemets. La différence est essentielle : <code>\"2 + 2\"</code> est du texte (affiché tel quel), <code>2 + 2</code> est un calcul.</p><pre><code>print(\"2 + 2\")   # affiche : 2 + 2  (du texte)\nprint(2 + 2)     # affiche : 4      (un calcul)</code></pre><div class=\"section-label\">Les commentaires</div><p>Une ligne qui commence par <code>#</code> est un <b>commentaire</b> : Python l'ignore complètement. C'est une note pour toi (et pour ceux qui reliront ton code).</p><pre><code># Ceci explique la ligne suivante\nprint(\"Salut !\")</code></pre><div class=\"note\"><code>print()</code> ajoute automatiquement un retour à la ligne après chaque appel. Deux <code>print</code> afficheront donc sur deux lignes différentes. C'est ce comportement qui compte pour valider les exercices : le texte attendu doit être exact, à la ligne près.</div>", "minutes": 7}, "py1l2": {"theory": "<p>Une <b>variable</b> est une étiquette posée sur une valeur, pour la réutiliser. On la crée avec <code>=</code> : à gauche le nom, à droite la valeur.</p><pre><code>prix = 3\nquantite = 4\ntotal = prix * quantite\nprint(total)        # affiche : 12</code></pre><div class=\"section-label\">Les types de base</div><p>Chaque valeur a un <b>type</b>. Les quatre fondamentaux :</p><ul><li><code>int</code> : un entier (<code>3</code>, <code>-7</code>).</li><li><code>float</code> : un nombre à virgule (<code>3.5</code>, <code>13.5</code>).</li><li><code>str</code> : du texte (<code>\"Sofia\"</code>).</li><li><code>bool</code> : vrai ou faux (<code>True</code> / <code>False</code>).</li></ul><p>La fonction <code>type(x)</code> révèle le type d'une valeur. Le type change ce qu'on peut faire : on additionne des nombres, on assemble du texte.</p><pre><code>age = 30\nnom = \"Sofia\"\nprint(type(age))    # &lt;class 'int'&gt;\nprint(type(nom))    # &lt;class 'str'&gt;</code></pre><div class=\"section-label\">Une variable, ça change</div><p>On peut réaffecter une variable à tout moment ; elle garde la dernière valeur reçue. Choisis des noms <b>parlants</b> (<code>quantite</code>, pas <code>q</code>) : c'est la première règle d'un code lisible.</p><pre><code>score = 10\nscore = score + 5\nprint(score)        # affiche : 15</code></pre><div class=\"note\">Mélanger les types fait souvent planter : <code>\"Age : \" + 30</code> lève une erreur (texte + nombre). Il faut convertir : <code>\"Age : \" + str(30)</code>, ou mieux, utiliser une f-string (leçon sur les chaînes).</div>", "minutes": 8}, "py2l1": {"theory": "<p>Python est une calculatrice puissante. Les opérations de base : <code>+</code>, <code>-</code>, <code>*</code> (multiplier), <code>/</code> (diviser).</p><pre><code>print(10 + 3)    # 13\nprint(10 * 3)    # 30\nprint(10 / 3)    # 3.333...</code></pre><div class=\"section-label\">Trois opérateurs très utiles</div><ul><li><code>//</code> : division <b>entière</b> (quotient sans la virgule). <code>17 // 5</code> → <code>3</code>.</li><li><code>%</code> : le <b>modulo</b>, c'est-à-dire le <b>reste</b> de la division. <code>17 % 5</code> → <code>2</code>.</li><li><code>**</code> : la <b>puissance</b>. <code>2 ** 10</code> → <code>1024</code>.</li></ul><pre><code>print(17 // 5)   # 3  (quotient)\nprint(17 % 5)    # 2  (reste)\nprint(2 ** 3)    # 8</code></pre><p>Le modulo est partout en pratique : tester si un nombre est pair (<code>n % 2 == 0</code>), faire « tourner » un compteur, regrouper par paquets.</p><div class=\"section-label\">Priorité des opérations et types</div><p>Python respecte la priorité mathématique : <code>*</code> et <code>/</code> avant <code>+</code> et <code>-</code>. Les <b>parenthèses</b> imposent l'ordre voulu. Et attention : <code>/</code> donne toujours un <code>float</code> (<code>10 / 2</code> → <code>5.0</code>), tandis que <code>//</code> reste entier.</p><pre><code>print(2 + 3 * 4)     # 14\nprint((2 + 3) * 4)   # 20</code></pre><div class=\"note\">Pour arrondir un résultat décimal, <code>round(valeur, n)</code> garde <code>n</code> décimales : <code>round(3.14159, 2)</code> → <code>3.14</code>. On s'en sert pour afficher des moyennes proprement.</div>", "minutes": 7}, "py2l2": {"theory": "<p>Les <b>chaînes de caractères</b> (texte) se manipulent autant que les nombres. On peut les <b>assembler</b> avec <code>+</code> (concaténation) et mesurer leur longueur avec <code>len()</code>.</p><pre><code>prenom = \"Sofia\"\nprint(prenom + \" !\")     # Sofia !\nprint(len(prenom))        # 5</code></pre><div class=\"section-label\">Les f-strings : la bonne façon d'assembler</div><p>Coller texte et variables avec des <code>+</code> et des <code>str(...)</code> devient vite illisible. La <b>f-string</b> (un <code>f</code> devant les guillemets) insère directement des variables entre accolades <code>{…}</code> — y compris des calculs.</p><pre><code>prenom = \"Sofia\"\nprint(f\"Bonjour {prenom}, ton prénom contient {len(prenom)} lettres.\")\n# Bonjour Sofia, ton prénom contient 5 lettres.</code></pre><div class=\"section-label\">Quelques méthodes utiles</div><p>Une chaîne possède des <b>méthodes</b>, appelées avec un point : <code>.upper()</code> (majuscules), <code>.lower()</code> (minuscules), <code>.strip()</code> (enlève les espaces autour), <code>.replace(a, b)</code>.</p><pre><code>ville = \"  Paris  \"\nprint(ville.strip().upper())   # PARIS</code></pre><div class=\"section-label\">Accéder aux caractères</div><p>Comme une liste, une chaîne s'indexe à partir de <b>0</b> ; <code>-1</code> désigne le dernier caractère.</p><pre><code>mot = \"data\"\nprint(mot[0], mot[-1])    # d a</code></pre><div class=\"note\">La f-string est aujourd'hui la méthode recommandée pour tout affichage mêlant texte et valeurs : lisible, sans conversion manuelle, et elle accepte le formatage (ex. <code>{prix:.2f}</code> pour deux décimales).</div>", "minutes": 8}, "py3l1": {"theory": "<p>Une <b>liste</b> range plusieurs valeurs dans un ordre précis, entre crochets <code>[…]</code>, séparées par des virgules. C'est la structure la plus courante pour stocker une collection.</p><pre><code>notes = [12, 15, 9, 18]\nprint(notes)        # [12, 15, 9, 18]\nprint(len(notes))   # 4</code></pre><div class=\"section-label\">Accéder par position (l'index)</div><p>Chaque élément a une <b>position</b>, appelée index, qui commence à <b>0</b>. Les index négatifs comptent depuis la fin : <code>-1</code> est le dernier.</p><pre><code>notes = [12, 15, 9, 18]\nprint(notes[0])     # 12  (premier)\nprint(notes[-1])    # 18  (dernier)\nprint(notes[0], notes[-1])   # 12 18</code></pre><div class=\"note\">Demander un index qui n'existe pas (<code>notes[10]</code>) lève une erreur « list index out of range ». Le dernier index valide est toujours <code>len(liste) - 1</code>.</div><div class=\"section-label\">Modifier une liste</div><p>Une liste est <b>modifiable</b> : on change un élément par son index, on en ajoute à la fin avec <code>.append()</code>, on en retire avec <code>.remove()</code> ou <code>.pop()</code>.</p><pre><code>notes = [12, 15, 9, 18]\nnotes[2] = 11        # remplace 9 par 11\nnotes.append(20)     # ajoute à la fin\nprint(notes)         # [12, 15, 11, 18, 20]</code></pre><div class=\"callout\">Une liste peut contenir n'importe quels types, et même mélangés — mais en pratique on y range des éléments de même nature (toutes des notes, tous des noms). C'est la base des données « en mémoire » qu'on manipulera au chapitre final.</div>", "minutes": 8}, "py3l2": {"theory": "<p>Le vrai pouvoir d'une liste : la <b>parcourir</b> pour traiter chaque élément. La boucle <code>for</code> prend les éléments un par un.</p><pre><code>notes = [12, 15, 9, 18]\nfor note in notes:\n    print(note)        # affiche chaque note sur sa ligne</code></pre><p>À chaque tour, la variable (<code>note</code>) prend la valeur de l'élément courant. Le bloc <b>indenté</b> (décalé de 4 espaces) est ce qui se répète : l'indentation, en Python, <b>fait partie de la syntaxe</b>.</p><div class=\"section-label\">Accumuler un résultat</div><p>Schéma très fréquent : on part d'un total à 0 et on l'enrichit à chaque tour. Pour une moyenne, on additionne puis on divise par le nombre d'éléments.</p><pre><code>notes = [12, 15, 9, 18]\ntotal = 0\nfor note in notes:\n    total = total + note\nmoyenne = total / len(notes)\nprint(moyenne)        # 13.5</code></pre><div class=\"section-label\">Les raccourcis sum() et len()</div><p>Python fournit des fonctions toutes prêtes : <code>sum()</code> additionne, <code>len()</code> compte, <code>min()</code>/<code>max()</code> trouvent les extrêmes. La moyenne tient alors en une ligne.</p><pre><code>notes = [12, 15, 9, 18]\nprint(sum(notes) / len(notes))   # 13.5</code></pre><div class=\"note\">La boucle <code>for</code> sait aussi parcourir une plage de nombres avec <code>range(début, fin)</code> (fin exclue) — pratique pour répéter un nombre de fois. On l'utilise dans la leçon sur les boucles.</div>", "minutes": 8}, "py4l1": {"theory": "<p>Une <b>liste</b> repère ses éléments par position ; un <b>dictionnaire</b> les repère par <b>nom</b>. On y range des paires <code>clé : valeur</code>, entre accolades <code>{…}</code>. Idéal pour décrire un objet — un film, un client.</p><pre><code>film = {\"titre\": \"Dune\", \"annee\": 2021}\nprint(film[\"titre\"])    # Dune\nprint(film[\"annee\"])    # 2021</code></pre><div class=\"section-label\">Lire, ajouter, modifier</div><p>On accède à une valeur par sa clé entre crochets. Affecter une clé existante la <b>modifie</b> ; une clé nouvelle l'<b>ajoute</b>.</p><pre><code>film = {\"titre\": \"Dune\", \"annee\": 2021}\nfilm[\"note\"] = 8.0       # ajoute une clé\nfilm[\"annee\"] = 2024     # modifie une clé existante\nprint(film)</code></pre><div class=\"section-label\">Assembler avec une f-string</div><p>Combiné aux f-strings, le dictionnaire produit des libellés propres :</p><pre><code>film = {\"titre\": \"Dune\", \"annee\": 2021}\nprint(f'{film[\"titre\"]} ({film[\"annee\"]})')   # Dune (2021)</code></pre><div class=\"note\">Accéder à une clé absente (<code>film[\"realisateur\"]</code>) lève une erreur <code>KeyError</code>. Pour éviter le plantage, <code>film.get(\"realisateur\")</code> renvoie <code>None</code> si la clé manque — utile quand une information peut être absente.</div><div class=\"callout\">Le dictionnaire est la brique du « monde réel » : un enregistrement = un dictionnaire, et une table = une liste de dictionnaires. C'est exactement ce qu'on assemblera au dernier chapitre.</div>", "minutes": 8}, "py4l2": {"theory": "<p>Au-delà de la lecture, on veut souvent <b>résumer</b> un dictionnaire : additionner ses valeurs, les compter, les parcourir. Trois méthodes l'ouvrent : <code>.keys()</code> (les clés), <code>.values()</code> (les valeurs), <code>.items()</code> (les paires).</p><pre><code>stock = {\"pomme\": 5, \"banane\": 0, \"poire\": 3}\nprint(sum(stock.values()))   # 8  (5 + 0 + 3)\nprint(len(stock))            # 3  (nombre de clés)</code></pre><div class=\"section-label\">Parcourir un dictionnaire</div><p>Une boucle <code>for</code> sur <code>.items()</code> donne, à chaque tour, la clé <b>et</b> la valeur — la façon idiomatique de tout traiter.</p><pre><code>stock = {\"pomme\": 5, \"banane\": 0, \"poire\": 3}\nfor produit, qte in stock.items():\n    print(f\"{produit} : {qte}\")</code></pre><div class=\"section-label\">Filtrer pendant le parcours</div><p>Combiné à une condition (vue juste après), on isole facilement des cas — par exemple les produits en rupture (<code>qte == 0</code>).</p><pre><code>for produit, qte in stock.items():\n    if qte == 0:\n        print(f\"Rupture : {produit}\")   # Rupture : banane</code></pre><div class=\"note\"><code>sum(stock.values())</code> n'a de sens que si les valeurs sont des nombres. Sur des valeurs textuelles, on compterait plutôt (<code>len</code>) ou on assemblerait. Toujours se demander : « mes valeurs sont-elles additionnables ? »</div>", "minutes": 8}, "py5l1": {"theory": "<p>Un programme utile <b>prend des décisions</b>. Le mot-clé <code>if</code> exécute un bloc seulement si une condition est vraie ; <code>else</code> couvre le cas contraire ; <code>elif</code> teste d'autres cas au milieu.</p><pre><code>note = 14\nif note &gt;= 10:\n    print(\"Admis\")\nelse:\n    print(\"Recalé\")        # ici : Admis</code></pre><div class=\"section-label\">Les comparaisons</div><p>Une condition est une expression qui vaut <code>True</code> ou <code>False</code>. Les opérateurs : <code>==</code> (égal — deux signes !), <code>!=</code> (différent), <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>.</p><div class=\"note\">Ne confonds pas <code>=</code> (affecter une variable) et <code>==</code> (comparer). <code>note = 10</code> change la variable ; <code>note == 10</code> pose une question.</div><div class=\"section-label\">Plusieurs cas : elif</div><p>Pour classer en plusieurs niveaux, on enchaîne les <code>elif</code> : Python prend la <b>première</b> condition vraie et ignore le reste.</p><pre><code>note = 14\nif note &gt;= 16:\n    print(\"Très bien\")\nelif note &gt;= 10:\n    print(\"Admis\")\nelse:\n    print(\"Recalé\")</code></pre><div class=\"section-label\">Combiner des conditions</div><p><code>and</code> exige que tout soit vrai, <code>or</code> qu'au moins une le soit, <code>not</code> inverse.</p><pre><code>age = 20\nif age &gt;= 18 and age &lt; 26:\n    print(\"Tarif jeune\")</code></pre><div class=\"callout\">L'indentation délimite le bloc conditionnel, comme pour les boucles. Un bloc mal indenté change le sens du programme — c'est l'erreur n°1 du débutant en Python.</div>", "minutes": 8}, "py5l2": {"theory": "<p>Pour <b>répéter</b> une action, on utilise une boucle. La boucle <code>for</code> sur <code>range()</code> est la plus courante : <code>range(1, 11)</code> produit les entiers de 1 à 10 (la borne de fin est <b>exclue</b>).</p><pre><code>for i in range(1, 11):\n    print(i)        # affiche 1, 2, … 10</code></pre><div class=\"section-label\">Le motif « accumulateur »</div><p>Pour une somme, un compte, un produit : on initialise une variable avant la boucle, puis on la met à jour à chaque tour. Somme des entiers de 1 à 10 :</p><pre><code>total = 0\nfor i in range(1, 11):\n    total = total + i\nprint(total)        # 55</code></pre><p>Et avec le raccourci : <code>print(sum(range(1, 11)))</code> donne aussi <code>55</code>.</p><div class=\"section-label\">La boucle while</div><p>Quand on ne connaît pas le nombre de tours d'avance, <code>while</code> répète <b>tant qu'</b>une condition reste vraie. Il faut veiller à ce que la condition finisse par devenir fausse, sinon la boucle tourne sans fin.</p><pre><code>n = 1\nwhile n &lt;= 3:\n    print(n)\n    n = n + 1        # sans cette ligne : boucle infinie !</code></pre><div class=\"note\"><code>range</code> accepte un pas : <code>range(0, 20, 5)</code> → 0, 5, 10, 15. Et <code>range(n)</code> tout court va de 0 à n-1 — pratique pour « répéter n fois ».</div>", "minutes": 8}, "py6l1": {"theory": "<p>Une <b>fonction</b> est un bloc de code réutilisable, qu'on nomme une fois et qu'on appelle ensuite autant de fois qu'on veut. On la définit avec <code>def</code>, et <code>return</code> renvoie le résultat.</p><pre><code>def carre(x):\n    return x * x\n\nprint(carre(7))     # 49\nprint(carre(3))     # 9</code></pre><div class=\"section-label\">Définir vs appeler</div><p>La <b>définition</b> (<code>def carre(x): …</code>) décrit ce que fait la fonction, sans l'exécuter. L'<b>appel</b> (<code>carre(7)</code>) la déclenche avec une valeur concrète : <code>x</code> vaut alors 7. Le code de la fonction est indenté sous le <code>def</code>.</p><div class=\"section-label\">return n'est pas print</div><p>Distinction clé : <code>return</code> <b>renvoie</b> une valeur à celui qui appelle (on peut la stocker, la réutiliser) ; <code>print</code> ne fait qu'<b>afficher</b>. Une fonction sans <code>return</code> renvoie <code>None</code>.</p><pre><code>def double(x):\n    return x * 2\n\nresultat = double(10)    # on récupère la valeur\nprint(resultat + 1)      # 21</code></pre><div class=\"callout\">Pourquoi des fonctions ? Pour ne pas répéter le même code (« DRY » : Don't Repeat Yourself), nommer une intention, et tester un morceau isolément. C'est le premier pas vers un code organisé.</div>", "minutes": 8}, "py6l2": {"theory": "<p>Une fonction peut prendre <b>plusieurs paramètres</b>, dans l'ordre. On peut aussi donner une <b>valeur par défaut</b> : le paramètre devient optionnel à l'appel.</p><pre><code>def saluer(nom, fin=\"!\"):\n    return \"Bonjour \" + nom + fin\n\nprint(saluer(\"Sofia\"))         # Bonjour Sofia!\nprint(saluer(\"Leo\", \".\"))      # Bonjour Leo.</code></pre><div class=\"section-label\">Comment ça marche</div><p>Quand on n'a pas précisé <code>fin</code>, la fonction utilise sa valeur par défaut <code>\"!\"</code>. Dès qu'on la fournit (<code>\".\"</code>), elle remplace la valeur par défaut. Les paramètres avec défaut se placent <b>après</b> ceux sans défaut.</p><div class=\"section-label\">Arguments nommés</div><p>Pour lever toute ambiguïté, on peut nommer les arguments à l'appel — l'ordre n'a alors plus d'importance et le code se lit mieux.</p><pre><code>print(saluer(nom=\"Mia\", fin=\"?\"))   # Bonjour Mia?</code></pre><div class=\"note\">Une valeur par défaut rend une fonction souple sans la compliquer : le cas courant est simple à appeler, le cas particulier reste possible. C'est un réflexe de conception très utile.</div>", "minutes": 8}, "py7l1": {"theory": "<p>On assemble tout ce qu'on a appris pour bâtir une <b>mini-base en mémoire</b> : une <b>liste de dictionnaires</b>, où chaque dictionnaire est un enregistrement (un film) et chaque clé une colonne (titre, note).</p><pre><code>films = [\n    {\"titre\": \"Parasite\", \"note\": 8.5},\n    {\"titre\": \"Barbie\",   \"note\": 7.0},\n    {\"titre\": \"Dune\",     \"note\": 8.0},\n    {\"titre\": \"Totoro\",   \"note\": 8.2},\n]</code></pre><div class=\"section-label\">Parcourir les enregistrements</div><p>Une boucle <code>for</code> donne chaque film (un dictionnaire) à son tour ; on accède aux champs par leur clé.</p><pre><code>for film in films:\n    print(film[\"titre\"], \"-\", film[\"note\"])</code></pre><div class=\"section-label\">Filtrer (l'équivalent du WHERE)</div><p>En combinant boucle et <code>if</code>, on ne garde que les enregistrements voulus — par exemple les films bien notés. C'est exactement la logique d'un filtre SQL, écrite à la main.</p><pre><code>for film in films:\n    if film[\"note\"] &gt;= 8:\n        print(film[\"titre\"])   # Parasite, Dune, Totoro</code></pre><div class=\"callout\">Liste de dictionnaires = table ; boucle = balayage des lignes ; <code>if</code> = filtre. Tu manipules déjà des données structurées en pur Python — la passerelle naturelle vers pandas et SQL.</div>", "minutes": 9}, "py7l2": {"theory": "<p>Sur cette mini-base, on calcule des <b>statistiques</b> comme le ferait une requête d'agrégation : compter les enregistrements, faire une moyenne, et présenter le résultat proprement.</p><pre><code>films = [\n    {\"titre\": \"Parasite\", \"note\": 8.5},\n    {\"titre\": \"Barbie\",   \"note\": 7.0},\n    {\"titre\": \"Dune\",     \"note\": 8.0},\n    {\"titre\": \"Totoro\",   \"note\": 8.2},\n]</code></pre><div class=\"section-label\">Compter et additionner</div><p><code>len(films)</code> compte les films. Pour la somme des notes, on accumule dans une boucle (ou on utilise une compréhension de liste).</p><pre><code>nb = len(films)\ntotal = 0\nfor film in films:\n    total = total + film[\"note\"]\nmoyenne = total / nb\nprint(nb, \"films, note moyenne\", round(moyenne, 2))\n# 4 films, note moyenne 7.92</code></pre><div class=\"section-label\">La version compacte</div><p>Une <b>compréhension de liste</b> extrait toutes les notes en une expression ; combinée à <code>sum</code>, la moyenne tient en une ligne.</p><pre><code>notes = [film[\"note\"] for film in films]\nprint(round(sum(notes) / len(notes), 2))   # 7.92</code></pre><p>Pour l'affichage, <code>round(x, 2)</code> garde deux décimales, et la f-string assemble le tout : <code>f\"{nb} films, note moyenne {moyenne:.2f}\"</code>.</p><div class=\"note\">Tu viens de reproduire, en Python pur, ce que font <code>COUNT</code> et <code>AVG</code> en SQL. Comprendre cette mécanique « à la main » rend ensuite l'usage des outils (pandas, SQL) beaucoup plus clair — c'est tout l'objet de la formation Data QA.</div>", "minutes": 9}};

  pj1: ['agrégation', 'NULL'],
  pj2: ['unicité', 'validité', 'intégrité référentielle'],
  m7: ['pipeline de données', 'ETL', 'ELT', 'anomalie']
}

/* ---------- Glossaire ---------- */
const GLOSSARY = [
  { term: 'donnée', def: 'Une information enregistrée (un nom, un prix, une date…) que l\u2019on peut stocker, lire et analyser.' },
  { term: 'table', def: 'Un tableau de données organisé en colonnes (les champs) et en lignes (les enregistrements).' },
  { term: 'ligne', def: 'Un enregistrement d\u2019une table : par exemple un client, une commande ou un produit.' },
  { term: 'colonne', def: 'Un champ d\u2019une table décrivant une caractéristique (ex. nom, prix), avec un type de données associé.' },
  { term: 'clé primaire', def: 'Colonne (ou ensemble) qui identifie de façon unique chaque ligne d\u2019une table.' },
  { term: 'requête', def: 'Une instruction SQL qui interroge ou manipule les données d\u2019une base.' },
  { term: 'SELECT', def: 'Mot-clé SQL qui sélectionne et renvoie des colonnes depuis une ou plusieurs tables.' },
  { term: 'WHERE', def: 'Clause SQL qui filtre les lignes selon une condition (ex. WHERE prix > 1).' },
  { term: 'ORDER BY', def: 'Clause SQL qui trie le résultat selon une ou plusieurs colonnes (ASC par défaut, DESC pour décroissant).' },
  { term: 'GROUP BY', def: 'Clause SQL qui regroupe les lignes par valeur afin d\u2019appliquer un calcul à chaque groupe.' },
  { term: 'agrégation', def: 'Calcul résumant plusieurs lignes en une valeur : COUNT, SUM, AVG, MIN, MAX.' },
  { term: 'NULL', def: 'Marqueur d\u2019absence de valeur (donnée manquante). Se teste avec IS NULL / IS NOT NULL, jamais avec =.' },
  { term: 'JOIN', def: 'Opération qui combine les lignes de deux tables sur une condition de correspondance (souvent une clé).' },
  { term: 'doublon', def: 'Enregistrement répété qui ne devrait apparaître qu\u2019une fois ; problème d\u2019unicité.' },
  { term: 'profiling', def: 'Exploration statistique d\u2019un jeu de données (volumes, valeurs distinctes, manquants) pour en évaluer la qualité.' },
  { term: 'qualité des données', def: 'Mesure de l\u2019aptitude des données à servir un usage : exactes, complètes, cohérentes, à jour.' },
  { term: 'dimensions de la qualité', def: 'Axes d\u2019évaluation de la qualité : complétude, exactitude, validité, unicité, cohérence, fraîcheur.' },
  { term: 'complétude', def: 'Part des valeurs attendues réellement présentes (l\u2019inverse des valeurs manquantes).' },
  { term: 'exactitude', def: 'Degré auquel une donnée reflète correctement la réalité qu\u2019elle décrit.' },
  { term: 'validité', def: 'Conformité d\u2019une valeur à une règle : format, plage autorisée ou liste de valeurs admises.' },
  { term: 'unicité', def: 'Propriété garantissant qu\u2019une entité n\u2019est représentée qu\u2019une seule fois (pas de doublon).' },
  { term: 'intégrité référentielle', def: 'Cohérence des liens entre tables : toute clé étrangère doit pointer vers une ligne existante.' },
  { term: 'pandas', def: 'Bibliothèque Python de référence pour charger, nettoyer et analyser des données tabulaires.' },
  { term: 'DataFrame', def: 'Structure de données de pandas : un tableau en mémoire, avec colonnes typées et un index.' },
  { term: 'assertion', def: 'Vérification qui doit être vraie ; sinon le programme signale une erreur. Sert à tester des règles de données.' },
  { term: 'test de données', def: 'Contrôle automatisé vérifiant une règle de qualité (non-nullité, unicité, plage…) sur une table.' },
  { term: 'dbt', def: 'Outil qui transforme les données en SQL et permet d\u2019y attacher des tests et de la documentation.' },
  { term: 'Great Expectations', def: 'Bibliothèque Python qui exprime des "attentes" sur les données et produit des rapports de validation.' },
  { term: 'schéma', def: 'Structure d\u2019une table ou base : noms des colonnes, types et contraintes.' },
  { term: 'observabilité', def: 'Capacité à comprendre l\u2019état et la santé des données via fraîcheur, volumes, schéma, distribution et lineage.' },
  { term: 'data downtime', def: 'Période où des données sont manquantes, erronées ou en retard, et donc non fiables.' },
  { term: 'SLA', def: 'Service Level Agreement : engagement sur un niveau de service (ex. fraîcheur des données).' },
  { term: 'SLO', def: 'Service Level Objective : objectif chiffré associé à un SLA (ex. < 1 % de lignes invalides).' },
  { term: 'lineage', def: 'Traçabilité : la cartographie des dépendances entre sources, transformations et tables finales.' },
  { term: 'anomalie', def: 'Écart inattendu par rapport au comportement normal des données (pic, chute, valeur aberrante).' },
  { term: 'gouvernance des données', def: 'Ensemble des rôles, règles et processus garantissant des données fiables, sécurisées et bien documentées.' },
  { term: 'data contract', def: 'Accord explicite entre producteur et consommateur sur le schéma et la qualité d\u2019un jeu de données.' },
  { term: 'catalogue de données', def: 'Inventaire documenté des jeux de données : description, propriétaire, schéma, qualité.' },
  { term: 'pipeline de données', def: 'Chaîne automatisée qui déplace et transforme les données d\u2019une source vers une destination.' },
  { term: 'ETL', def: 'Extract-Transform-Load : on transforme les données avant de les charger dans la cible.' },
  { term: 'ELT', def: 'Extract-Load-Transform : on charge d\u2019abord les données brutes, puis on les transforme dans l\u2019entrepôt.' }
]

if (typeof module !== 'undefined') { module.exports = { FORMATIONS, RESOURCES, RES_GROUPS, GLOSSARY, MODULE_RESOURCES, MODULE_TERMS } }

</script>
<script>
/* ============================================================
   QA Data Academy — logique applicative (vanilla JS)

/* ---------- État persistant ---------- */
const STORE_KEY = "qa-academy-v1";
function defaultState(){ return { completed:{}, quiz:{}, drafts:{}, exDone:{}, last:null }; }
function loadState(){
  try { return Object.assign(defaultState(), JSON.parse(localStorage.getItem(STORE_KEY)) || {}); }
  catch(e){ return defaultState(); }
}
let state = loadState();
function save(){ try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e){} }

/* ---------- Helpers programme ---------- */
const MODULES = CURRICULUM.modules;
const ALL = MODULES.flatMap(m => m.lessons.map(l => ({ ...l, moduleId:m.id, moduleTitle:m.title })));
const lessonById = id => ALL.find(l => l.id === id);
const moduleById = id => MODULES.find(m => m.id === id);
const totalLessons = () => ALL.length;
const completedCount = () => ALL.filter(l => state.completed[l.id]).length;
const overallPct = () => Math.round((completedCount() / totalLessons()) * 100);
function moduleProg(m){ const done = m.lessons.filter(l => state.completed[l.id]).length; return { done, total:m.lessons.length, pct: Math.round(done/m.lessons.length*100) }; }
const moduleDone = m => m.lessons.every(l => state.completed[l.id]);
function nextIncomplete(){ return ALL.find(l => !state.completed[l.id]) || ALL[0]; }
function quizCount(){ let t=0; ALL.forEach(l => (l.quiz||[]).forEach((_,i)=>t++)); return t; }
function quizPassed(){ return Object.keys(state.quiz).filter(k=>state.quiz[k]).length; }

/* ---------- Parcours (tracks) ---------- */
const TRACKS = [
  { id:"debutant",  label:"Parcours Débutant" },
  { id:"principal", label:"Parcours principal" },
  { id:"projets",   label:"Projets" },
];
function trackLabel(id){ const t=TRACKS.find(x=>x.id===id); return t?t.label:"Modules"; }
const MOD_NUM = {};
(function(){ const c={}; MODULES.forEach(m=>{ const t=m.track||"principal"; c[t]=(c[t]||0)+1; MOD_NUM[m.id]=c[t]; }); })();

/* ---------- DOM utils ---------- */
const $ = sel => document.querySelector(sel);
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
let toastTimer=null;
function toast(msg){
  let t=$(".toast"); if(!t){ t=document.createElement("div"); t.className="toast"; document.body.appendChild(t); }
  t.innerHTML = '<span>✓</span>'+esc(msg); t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ---------- Coloration syntaxique ---------- */
const KW = {
  sql:["SELECT","FROM","WHERE","GROUP","BY","ORDER","HAVING","COUNT","DISTINCT","AS","AND","OR","NOT","NULL","IS","IN","JOIN","LEFT","RIGHT","INNER","ON","INSERT","INTO","VALUES","CREATE","TABLE","UPDATE","SET","DELETE","DESC","ASC","SUM","AVG","MIN","MAX","CASE","WHEN","THEN","ELSE","END","LIMIT","OVER","PARTITION","ROWS","BETWEEN","PRECEDING","CURRENT","ROW","INTERVAL","LIKE","WITH"],
  python:["import","from","as","def","return","if","elif","else","for","while","in","not","and","or","None","True","False","class","with","try","except","finally","lambda","print","len","range","int","float","str","sum"]
};
function tkspan(cls,txt){ return '<span class="'+cls+'">'+esc(txt)+'</span>'; }
function highlight(src, lang){
  const set = new Set(KW[lang]||[]); const n=src.length; let i=0, out="";
  const word = c => /[A-Za-z0-9_]/.test(c);
  while(i<n){
    const c=src[i];
    if(lang==="sql" && c==="-" && src[i+1]==="-"){ let j=i; while(j<n&&src[j]!=="\n")j++; out+=tkspan("tk-com",src.slice(i,j)); i=j; continue; }
    if(lang==="python" && c==="#"){ let j=i; while(j<n&&src[j]!=="\n")j++; out+=tkspan("tk-com",src.slice(i,j)); i=j; continue; }
    if(lang==="python" && (src.startsWith('"""',i)||src.startsWith("'''",i))){ const q=src.substr(i,3); let j=i+3; while(j<n&&!src.startsWith(q,j))j++; j=Math.min(n,j+3); out+=tkspan("tk-str",src.slice(i,j)); i=j; continue; }
    if(c==='"'||c==="'"){ let j=i+1; while(j<n&&src[j]!==c){ if(src[j]==="\\")j++; j++; } j=Math.min(n,j+1); out+=tkspan("tk-str",src.slice(i,j)); i=j; continue; }
    if(/[0-9]/.test(c)){ let j=i; while(j<n&&/[0-9._]/.test(src[j]))j++; out+=tkspan("tk-num",src.slice(i,j)); i=j; continue; }
    if(word(c)){ let j=i; while(j<n&&word(src[j]))j++; const w=src.slice(i,j);
      if(set.has(w)||set.has(w.toUpperCase()) && lang==="sql") out+=tkspan("tk-kw",w); else out+=esc(w); i=j; continue; }
    out+=esc(c); i++;
  }
  return out;
}

/* ---------- Éditeur léger ---------- */
function buildEditor(lang, initial, draftKey){
  const wrap=document.createElement("div"); wrap.className="editor-wrap";
  const gutter=document.createElement("div"); gutter.className="gutter";
  const stack=document.createElement("div"); stack.className="editor-stack";
  const pre=document.createElement("pre"); pre.className="hl"; const code=document.createElement("code"); pre.appendChild(code);
  const ta=document.createElement("textarea"); ta.spellcheck=false; ta.value=initial;
  stack.appendChild(pre); stack.appendChild(ta); wrap.appendChild(gutter); wrap.appendChild(stack);
  function render(){
    code.innerHTML = highlight(ta.value, lang) + "\n";
    const lines = ta.value.split("\n").length;
    let g=""; for(let k=1;k<=lines;k++) g+="<span>"+k+"</span>";
    gutter.innerHTML=g;
  }
  ta.addEventListener("input", ()=>{ render(); state.drafts[draftKey]=ta.value; save(); });
  ta.addEventListener("scroll", ()=>{ pre.scrollTop=ta.scrollTop; pre.scrollLeft=ta.scrollLeft; gutter.scrollTop=ta.scrollTop; });
  ta.addEventListener("keydown", e=>{
    if(e.key==="Tab"){ e.preventDefault(); const s=ta.selectionStart, en=ta.selectionEnd;
      ta.value=ta.value.slice(0,s)+"  "+ta.value.slice(en); ta.selectionStart=ta.selectionEnd=s+2; render();
      state.drafts[draftKey]=ta.value; save(); }
  });
  render();
  return { el:wrap, get:()=>ta.value, set:v=>{ ta.value=v; render(); }, ta };
}

/* ---------- Chargeurs moteurs (lazy, CDN) ---------- */
let _sql=null;
function loadSql(){
  if(_sql) return _sql;
  _sql=new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js";
    s.onload=()=>{ try{ initSqlJs({locateFile:f=>"https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/"+f}).then(resolve).catch(reject);}catch(e){reject(e);} };
    s.onerror=()=>reject(new Error("offline"));
    document.head.appendChild(s);
  });
  return _sql;
}
let _py=null;
function loadPy(){
  if(_py) return _py;
  _py=new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js";
    s.onload=async()=>{ try{ const py=await loadPyodide(); resolve(py);}catch(e){reject(e);} };
    s.onerror=()=>reject(new Error("offline"));
    document.head.appendChild(s);
  });
  return _py;
}

/* ---------- Comparaison résultats ---------- */
function normRows(values){
  return values.map(r=>r.map(v=> v===null?"\u2205":String(v)).join("\u00A7")).sort();
}
function sameTable(a,b){
  if(!a||!b) return false;
  const A=normRows(a), B=normRows(b);
  if(A.length!==B.length) return false;
  return A.every((x,i)=>x===B[i]);
}
function normText(t){
  return String(t).split("\n").map(l=>l.replace(/\s+$/,"")).join("\n").replace(/\n+$/,"").trim();
}

/* ---------- Exécution SQL ---------- */
async function runSQL(code, ex, consoleEl, statusEl){
  setStatus(statusEl,"loading","Chargement du moteur SQL…");
  let SQL;
  try { SQL = await loadSql(); }
  catch(e){ setStatus(statusEl,"",""); offlineFallback(consoleEl,ex,"SQL"); return; }
  setStatus(statusEl,"","");
  let db;
  try {
    db=new SQL.Database(); db.run(CURRICULUM.sqlSeed);
    const res=db.exec(code);
    const last=res.length?res[res.length-1]:null;
    let html="";
    if(last){ html+=renderTable(last.columns,last.values); }
    else { html+='<pre>Requête exécutée — aucun résultat tabulaire.</pre>'; }
    const ok = ex && ex.expected ? (last && sameTable(last.values, ex.expected.values)) : null;
    showConsole(consoleEl, ok, html, ex);
    if(ok===true) markExercise(ex);
    db.close();
  } catch(err){
    if(db) try{db.close();}catch(_){}
    showConsole(consoleEl, false, '<pre class="err">'+esc(err.message||String(err))+'</pre>', ex);
  }
}
function renderTable(cols, values){
  let h='<table class="res"><tr>'+cols.map(c=>"<th>"+esc(c)+"</th>").join("")+"</tr>";
  values.forEach(r=>{ h+="<tr>"+r.map(v=>"<td>"+esc(v===null?"NULL":v)+"</td>").join("")+"</tr>"; });
  return h+"</table>";
}

/* ---------- Bac à sable SQL (exécution libre, sans notation) ---------- */
async function runSandboxSQL(code, consoleEl, statusEl){
  setStatus(statusEl,"loading","Chargement du moteur SQL…");
  let SQL;
  try { SQL = await loadSql(); }
  catch(e){ setStatus(statusEl,"",""); consoleEl.innerHTML='<pre class="err">Moteur SQL indisponible (une connexion est nécessaire la première fois).</pre>'; consoleEl.classList.add("show"); return; }
  setStatus(statusEl,"","");
  let db;
  try {
    db=new SQL.Database(); db.run(CURRICULUM.sqlSeed);
    const res=db.exec(code);
    let html="";
    if(res && res.length){ res.forEach(r=>{ html+=renderTable(r.columns,r.values); }); }
    else html='<pre>Requête exécutée — aucune ligne renvoyée.</pre>';
    consoleEl.innerHTML='<div class="verdict ok">✓ Exécutée</div>'+html;
    consoleEl.classList.add("show");
    db.close();
  } catch(err){
    if(db) try{db.close();}catch(_){}
    consoleEl.innerHTML='<pre class="err">'+esc(err.message||String(err))+'</pre>';
    consoleEl.classList.add("show");
  }
}

/* ---------- Exécution Python ---------- */
async function runPython(code, ex, consoleEl, statusEl){
  setStatus(statusEl,"loading","Téléchargement de Python… (≈ 25 Mo la 1re fois, instantané ensuite)");
  let py;
  try { py = await loadPy(); }
  catch(e){ setStatus(statusEl,"",""); offlineFallback(consoleEl,ex,"Python"); return; }
  try {
    if(/pandas/.test(code)){ setStatus(statusEl,"loading","Chargement de pandas…"); await py.loadPackage(["pandas"]); }
    else if(/numpy/.test(code)){ setStatus(statusEl,"loading","Chargement de numpy…"); await py.loadPackage(["numpy"]); }
  } catch(e){}
  setStatus(statusEl,"","");
  py.runPython("import sys, io\n_buf = io.StringIO()\nsys.stdout = _buf\nsys.stderr = _buf");
  let runErr=null;
  try { await py.runPythonAsync(code); }
  catch(e){ runErr=e; }
  let output="";
  try { output = py.runPython("sys.stdout = sys.__stdout__\nsys.stderr = sys.__stderr__\n_buf.getvalue()"); } catch(e){}
  if(runErr){
    const msg=(runErr.message||String(runErr)).split("\n").slice(-4).join("\n");
    showConsole(consoleEl,false,'<pre>'+esc(output)+'</pre><pre class="err">'+esc(msg)+'</pre>',ex);
    return;
  }
  const ok = ex && ex.expectedOutput ? (normText(output)===normText(ex.expectedOutput)) : null;
  showConsole(consoleEl, ok, '<pre>'+esc(output||"(aucune sortie)")+'</pre>', ex);
  if(ok===true) markExercise(ex);
}

/* ---------- Console & verdict ---------- */
function setStatus(el,kind,txt){
  if(!el) return;
  el.innerHTML = kind==="loading" ? '<span class="spin"></span>'+esc(txt) : esc(txt);
}
function showConsole(consoleEl, ok, bodyHtml, ex){
  let verdict="";
  if(ok===true) verdict='<div class="verdict ok">✓ Réussi — la sortie correspond au résultat attendu.</div>';
  else if(ok===false) verdict='<div class="verdict ko">✗ Pas encore — compare ta sortie au résultat attendu.</div>';
  consoleEl.innerHTML = verdict + bodyHtml;
  consoleEl.classList.add("show");
}
function offlineFallback(consoleEl, ex, kind){
  let exp="";
  if(ex && ex.expected){ exp=renderTable(ex.expected.columns, ex.expected.values); }
  else if(ex && ex.expectedOutput){ exp='<pre>'+esc(ex.expectedOutput)+'</pre>'; }
  consoleEl.innerHTML =
    '<div class="verdict ko">Moteur '+kind+' indisponible (hors ligne)</div>'+
    '<pre>L\'exécution en direct nécessite une connexion la première fois.\n'+
    'Compare ta réponse au résultat attendu ci-dessous, ou utilise « Voir la solution ».</pre>'+
    '<div style="margin-top:8px;font-family:var(--sans);font-size:12px;color:var(--muted)">Résultat attendu :</div>'+exp;
  consoleEl.classList.add("show");
}
function markExercise(ex){
  if(!ex || !ex._key) return;
  if(!state.exDone[ex._key]){ state.exDone[ex._key]=true; save(); toast("Exercice validé !"); }
}

/* ---------- Examen final (condition de délivrance du certificat) ---------- */

function examPassed(fid) { const e = examFor(fid); if (!e) return true; const s = examState(fid); return !!(s && s.best >= (e.passMark || PASS_MARK)) }
function trackComplete(fid, tid) { const ms = formModules(fid).filter((m) => m.track === tid); return ms.length > 0 && ms.every((m) => m.lessons.every((l) => state.completed[l.id])) }
function certDone(c) {
  const base = c.track ? trackComplete(c.formation, c.track) : (function () { const ls = formLessons(c.formation); return ls.length > 0 && ls.every((l) => state.completed[l.id]) })()
  if (!base) return false
  if (c.examFormation) return examPassed(c.examFormation)
  return true
}
function checkCerts() {
  const earned = []
  CERTS.forEach((c) => {
    if (!state.certs.some((x) => x.id === c.id) && certDone(c)) {
      state.certs.push({ id: c.id, title: c.title, emoji: c.emoji, date: Date.now() })
      recordEvent("cert", "Certificat obtenu : " + c.title); earned.push(c)
    }
  })
  if (earned.length) { save(); celebrate(earned) }
}

    '<stop offset="0" stop-color="#5B4BE8"/><stop offset="1" stop-color="#9b7bff"/></linearGradient></defs>' +

function setRing(elId, r, pct) { const c = document.getElementById(elId); if (!c) return; const C = 2 * Math.PI * r; c.style.strokeDasharray = C; c.style.strokeDashoffset = C; requestAnimationFrame(() => { c.style.strokeDashoffset = C * (1 - pct / 100) }) }
function countTo(el, target, suffix) { if (!el) return; const dur = 900, t0 = performance.now(); (function s(t) { const k = Math.min(1, (t - t0) / dur); el.textContent = Math.round(target * (1 - Math.pow(1 - k, 3))) + (suffix || ""); if (k < 1) requestAnimationFrame(s) })(performance.now()) }

/* ---------- Leçon ---------- */
function renderLesson(id) {
  const l = lessonById(id), m = moduleById(l.moduleId), t = trackMeta(m.track || "principal"); const fid = formOf(m); lastFormation = fid
  const idx = ALL.findIndex((x) => x.id === id); const prev = idx > 0 ? ALL[idx - 1] : null, next = idx < ALL.length - 1 ? ALL[idx + 1] : null
  const hasLab = !!(l.sandbox || l.exercise); if (l.exercise) l.exercise._key = l.id + ":ex"
  const terms = (MODULE_TERMS[m.id] || []).map(glossByTerm).filter(Boolean)
  const res = (MODULE_RESOURCES[m.id] || []).map(resById).filter(Boolean)

  let h = '<div class="lesson" style="--tc:' + t.color + '"><button class="back" data-formation>← Programme</button>'
  h += '<div class="lesson-head"><span class="chip">' + t.icon + ' ' + esc(t.label) + '</span><span class="chip ghost">' + esc(m.title) + '</span><span class="chip ghost">' + l.minutes + ' min</span>'
  if (terms.length) h += '<button class="help-btn" data-jump="defsPanel">Définitions</button>'
  if (res.length) h += '<button class="help-btn" data-jump="morePanel">En savoir plus</button>'
  h += '</div><h1 class="lesson-title">' + esc(l.title) + '</h1>'
  h += '<div class="lesson-grid' + (hasLab ? "" : " single") + '"><div class="reading"><div class="prose">' + l.theory + '</div>'
  if (l.quiz && l.quiz.length) {
    h += '<div class="section-label">Quiz de validation</div>'
    l.quiz.forEach((q, qi) => {
      const passed = state.quiz[l.id + ":" + qi]
      h += '<div class="quiz" data-qi="' + qi + '"><div class="q">' + q.q + '</div>'
      q.options.forEach((opt, oi) => { h += '<button class="opt' + (passed && oi === q.answer ? " correct" : "") + '" data-opt="' + oi + '"' + (passed ? " disabled" : "") + '><span class="dot">' + (passed && oi === q.answer ? "✓" : "") + '</span><span>' + esc(opt) + '</span></button>' })
      h += '<div class="explain' + (passed ? " show" : "") + '" id="exp-' + qi + '"><b>Explication.</b> ' + q.explain + '</div></div>'
    })
  }

function confetti() {
  const c = document.createElement("canvas"); c.className = "confetti"; document.body.appendChild(c)
  const ctx = c.getContext("2d"); const W = c.width = innerWidth, H = c.height = innerHeight
  const cols = ["#5B4BE8", "#F0613F", "#0EA672", "#C99A2E", "#E5489A"]; const P = []
  for (let i = 0; i < 150; i++) P.push({ x: Math.random() * W, y: -20 - Math.random() * H * 0.4, r: 4 + Math.random() * 6, c: cols[i % cols.length], vy: 2 + Math.random() * 3.5, vx: -2 + Math.random() * 4, a: Math.random() * 6.28, va: -0.2 + Math.random() * 0.4 })
  const t0 = performance.now()
  function frame(t) { const el = t - t0; ctx.clearRect(0, 0, W, H); P.forEach((p) => { p.y += p.vy; p.x += p.vx; p.a += p.va; ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.a); ctx.fillStyle = p.c; ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6); ctx.restore() }); if (el < 2600) requestAnimationFrame(frame); else c.remove() }
  requestAnimationFrame(frame)
}

let EX = { fid: null, answers: {}, result: null }
function renderExam(fid) {
  const e = examFor(fid)
  if (!e) { go({ type: "formation", id: fid }); return }
  if (EX.fid !== fid) EX = { fid: fid, answers: {}, result: null }
  const qs = e.questions, N = qs.length, pm = e.passMark || PASS_MARK

    h += '<div class="exam-progress"><span id="exProg">0 / ' + N + ' répondues</span><button class="btn primary" id="exSubmit" disabled>Valider l\'examen →</button></div>'
    qs.forEach((q, qi) => {
      h += '<div class="exam-q" data-qi="' + qi + '"><div class="qn">Question ' + (qi + 1) + ' / ' + N + '</div><div class="q">' + esc(q.q) + '</div>'

      h += '</div>'
    })
  } else {
    const r = EX.result
    h += '<div class="exam-banner ' + (r.passed ? "pass" : "fail") + '"><span class="score">' + r.pct + '%</span><span>' + (r.passed ? "Réussi — vous atteignez le seuil de " + Math.round(pm * 100) + " %. " : "Non atteint — il faut au moins " + Math.round(pm * 100) + " %. ") + r.correct + " / " + r.total + ' bonnes réponses.</span></div>'
    if (r.passed) {
      const prereq = trackComplete(fid, "projets")
      h += prereq
        ? '<div class="callout">Examen validé <b>et</b> projets terminés : le certificat est débloqué.</div>'
        : '<div class="note">Examen validé. Terminez toutes les leçons du parcours <b>Projets</b> pour débloquer le certificat.</div>'
    }
    h += '<div class="section-label">Correction détaillée</div>'
    qs.forEach((q, qi) => {
      const ua = EX.answers[qi]
      h += '<div class="exam-q"><div class="qn">Question ' + (qi + 1) + (ua === q.answer ? ' · ✓ correcte' : ' · ✗ à revoir') + '</div><div class="q">' + esc(q.q) + '</div>'
      q.options.forEach((opt, oi) => {
        let cls = "opt"; let dot = ""
        if (oi === q.answer) { cls += " correct"; dot = "✓" }
        else if (oi === ua) { cls += " wrong"; dot = "✗" }
        h += '<button class="' + cls + '" disabled><span class="dot">' + dot + '</span><span>' + esc(opt) + '</span></button>'
      })
      h += '<div class="explain show"><b>Explication.</b> ' + esc(q.explain) + '</div></div>'
    })
    h += '<div class="lesson-foot"><button class="btn" id="exRetry">↺ Recommencer l\'examen</button>'
    h += r.passed && trackComplete(fid, "projets") ? '<button class="btn primary" data-cert="cert-projets">Voir le certificat →</button>' : '<button class="btn primary" data-formation>Retour au programme</button>'
    h += '</div>'
  }
  h += '</div>'

  $("#view").querySelectorAll("[data-cert]").forEach((b) => b.onclick = () => go({ type: "certificate", id: b.dataset.cert }))
  const rt = $("#exRetry"); if (rt) rt.onclick = () => { EX = { fid: fid, answers: {}, result: null }; renderExam(fid) }

  if (!EX.result) {
    const prog = $("#exProg"), sub = $("#exSubmit")
    const refresh = () => { const n = Object.keys(EX.answers).length; prog.textContent = n + " / " + N + " répondues"; sub.disabled = n < N }

      EX.result = { correct: correct, total: N, pct: Math.round(score * 100), passed: passed }
      if (!state.exams) state.exams = {}
      const prev = state.exams[fid] || { best: 0, attempts: 0, passedAt: null }
      const best = Math.max(prev.best || 0, score)
      state.exams[fid] = { best: best, last: score, attempts: (prev.attempts || 0) + 1, lastDate: Date.now(), passedAt: prev.passedAt || (best >= pm ? Date.now() : null) }
      recordEvent("exam", "Examen final — " + EX.result.pct + " %" + (passed ? " (réussi)" : ""))
      save(); checkCerts(); updateTop(); renderExam(fid)
    }
  }
}

function go(view, isBack) {
  if (!isBack) pushNav()
  current = view; closeMenu()
  if (view.type === "login") renderLogin()
  else if (view.type === "create") renderCreate()
  else if (view.type === "hub") renderHub()
  else if (view.type === "formation") renderFormation(view.id)
  else if (view.type === "lesson") renderLesson(view.id)
  else if (view.type === "resources") renderResources()
  else if (view.type === "glossary") renderGlossary()
  else if (view.type === "profile") renderProfile()
  else if (view.type === "certificate") renderCertificate(view.id)
  else if (view.type === "exam") renderExam(view.id)
  if (view.type !== "lesson") window.scrollTo({ top: 0, behavior: "auto" })
}
function openLesson(id) { pushNav(); const l = lessonById(id); state.last = id; save(); current = { type: "lesson", id: id, moduleId: l.moduleId }; renderLesson(id) }
function renderSidebarActive() { updateTop() }
function refreshDashStatIfNeeded() {}

/* ---------- Boot ---------- */
function boot() {
  state = blankState()
  document.getElementById("brand").onclick = () => { if (CURRENT) go({ type: "hub" }) }
  document.querySelectorAll(".pill").forEach((p) => p.onclick = () => {
    if (!CURRENT) return; const n = p.dataset.nav
    if (n === "hub") go({ type: "hub" }); else if (n === "programme") go({ type: "formation", id: lastFormation }); else if (n === "resources") go({ type: "resources" }); else if (n === "glossary") go({ type: "glossary" })
  })
  const users = loadUsers(); const lastId = localStorage.getItem(CUR_KEY); const u = lastId && users.find((x) => x.id === lastId)
  if (u) { CURRENT = u; state = loadUserState(u.id); go({ type: "hub" }) } else go({ type: "login" })
}
document.addEventListener("DOMContentLoaded", boot)

</script>
