(function(){
  if (typeof CURRICULUM === 'undefined' || !CURRICULUM.modules) return;
  var ENR = {"m4l1": {"theory": "<p>« Tester ses données » n'a rien de vague : c'est appliquer des contrôles précis, chacun répondant à une question. Le piège classique d'une équipe immature est de ne tester que le facile (les NULL) et de laisser des angles morts béants ailleurs. Ce module donne la grille complète.</p><h3>Le mécanisme universel d'un test</h3><p>Quel que soit l'outil, un test de données repose sur le même principe : une <strong>requête qui sélectionne les lignes en infraction</strong>. Si elle ne renvoie rien, tout va bien ; sinon, le nombre de lignes mesure l'ampleur du problème. Garde ce schéma en tête, il est partout.</p><div class=\"diagram\"><svg viewBox=\"0 0 770 190\" width=\"770\" height=\"190\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"60\" width=\"120\" height=\"56\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"80\" y=\"83.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">Données</text><text x=\"80\" y=\"100.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"600\">(une table)</text><line x1=\"140\" y1=\"88\" x2=\"200\" y2=\"88\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"200\" y=\"52\" width=\"200\" height=\"72\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"300\" y=\"76.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">Requête de contrôle</text><text x=\"300\" y=\"92.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"600\">qui remonte les</text><text x=\"300\" y=\"108.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"600\">lignes fautives</text><line x1=\"400\" y1=\"88\" x2=\"460\" y2=\"88\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"460\" y=\"40\" width=\"110\" height=\"44\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"515\" y=\"66.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">0 ligne ?</text><line x1=\"515\" y1=\"84\" x2=\"515\" y2=\"110\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"515\" y1=\"110\" x2=\"380\" y2=\"110\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><line x1=\"380\" y1=\"110\" x2=\"380\" y2=\"150\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><line x1=\"380\" y1=\"150\" x2=\"430\" y2=\"150\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"430\" y=\"132\" width=\"150\" height=\"40\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"505\" y=\"156.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0A7355\" font-weight=\"700\">✓ Test au vert</text><line x1=\"515\" y1=\"110\" x2=\"650\" y2=\"110\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><line x1=\"650\" y1=\"110\" x2=\"650\" y2=\"150\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><line x1=\"650\" y1=\"150\" x2=\"620\" y2=\"150\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"600\" y=\"132\" width=\"150\" height=\"40\" rx=\"11\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.6\"/><text x=\"675\" y=\"156.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#B23036\" font-weight=\"700\">✗ n lignes = gravité</text><text x=\"360\" y=\"124\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0EA672\" font-weight=\"700\">oui</text><text x=\"700\" y=\"124\" text-anchor=\"middle\" font-size=\"11\" fill=\"#E5484D\" font-weight=\"700\">non</text></svg><div class=\"cap\">L'anatomie d'un test de données : un contrôle = une requête qui ne doit rien renvoyer.</div></div><h3>Les grandes familles de tests</h3><p>On les regroupe par ce qu'elles vérifient. Avoir cette liste sous les yeux évite les oublis lorsqu'on fiabilise une nouvelle table.</p><table><tr><th>Famille</th><th>Vérifie</th><th>Exemple concret</th></tr><tr><td><strong>Schéma</strong></td><td>la structure</td><td>la colonne <code>email</code> existe, en texte</td></tr><tr><td><strong>Non-nullité</strong></td><td>la complétude obligatoire</td><td><code>order_id</code> jamais NULL</td></tr><tr><td><strong>Unicité</strong></td><td>l'absence de doublon</td><td>une clé primaire unique</td></tr><tr><td><strong>Valeurs admises</strong></td><td>la validité catégorielle</td><td><code>statut ∈ {payee, annulee}</code></td></tr><tr><td><strong>Plages</strong></td><td>la validité numérique</td><td>un montant ≥ 0</td></tr><tr><td><strong>Relations</strong></td><td>l'intégrité référentielle</td><td>toute commande pointe vers un client existant</td></tr><tr><td><strong>Fraîcheur</strong></td><td>l'actualité</td><td>donnée de moins de 6 h</td></tr><tr><td><strong>Volume</strong></td><td>la cohérence du flux</td><td>nb de lignes dans une fourchette</td></tr><tr><td><strong>Réconciliation</strong></td><td>la cohérence inter-systèmes</td><td>somme des ventes = total comptable</td></tr></table><h3>Génériques vs spécifiques</h3><p>Un test <strong>générique</strong> est réutilisable tel quel sur n'importe quelle colonne : <code>not_null</code>, <code>unique</code>, <code>accepted_values</code>, <code>relationships</code>. Un test <strong>spécifique</strong> (dit <em>singular</em>) encode une règle métier propre, souvent une requête SQL « qui renvoie les lignes fautives ». La règle pratique : commence par couvrir l'essentiel avec des génériques, puis ajoute des spécifiques là où le métier l'exige.</p><h3>Où placer ses tests ?</h3><p>À deux endroits complémentaires : à la <strong>source</strong> (attraper tôt les problèmes d'entrée — schéma, volume, fraîcheur) et sur les tables <strong>transformées</strong> (garantir le résultat livré — unicité, relations, règles métier). Mieux vaut dix tests bien placés que cent tests redondants qui ralentissent le pipeline.</p><div class=\"callout\">Boussole du module : le <strong>shift-left</strong>. Une erreur attrapée à l'ingestion coûte dix fois moins cher qu'au niveau d'un tableau de bord — et évite de propager la corruption dans tout l'aval.</div>", "minutes": 10}, "m4l2": {"theory": "<p><strong>dbt</strong> (data build tool) est devenu le standard de la transformation analytique. Son idée : écrire ses transformations en SQL <em>versionné</em>, et attacher juste à côté la <strong>documentation</strong> et les <strong>tests</strong>. Tests, code et doc vivent dans le même dépôt Git, relus en <em>pull request</em> comme du code applicatif.</p><div class=\"diagram\"><svg viewBox=\"0 0 720 205\" width=\"720\" height=\"205\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"30\" width=\"120\" height=\"46\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"90\" y=\"57.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">Sources</text><line x1=\"150\" y1=\"53\" x2=\"210\" y2=\"53\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"210\" y=\"30\" width=\"150\" height=\"46\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"285\" y=\"57.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">Modèles (SQL)</text><line x1=\"360\" y1=\"53\" x2=\"420\" y2=\"53\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"420\" y=\"30\" width=\"150\" height=\"46\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"495\" y=\"57.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">Tables livrées</text><line x1=\"285\" y1=\"76\" x2=\"285\" y2=\"110\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><rect x=\"150\" y=\"110\" width=\"270\" height=\"44\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"285\" y=\"128.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"700\">schema.yml — tests génériques</text><text x=\"285\" y=\"143.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"600\">(unique, not_null, relationships…)</text><line x1=\"495\" y1=\"76\" x2=\"495\" y2=\"110\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><rect x=\"440\" y=\"110\" width=\"250\" height=\"44\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"565\" y=\"128.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#B23E22\" font-weight=\"700\">tests/*.sql — tests singuliers</text><text x=\"565\" y=\"143.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#B23E22\" font-weight=\"600\">(règle métier en SQL)</text><text x=\"345\" y=\"184\" text-anchor=\"middle\" font-size=\"12\" fill=\"#56535F\" font-weight=\"700\">dbt build  →  construit les modèles  →  dbt test  →  exécute tous les tests</text></svg><div class=\"cap\">Dans un projet dbt, les tests s'accrochent aux modèles : génériques en YAML, spécifiques en SQL.</div></div><h3>Les tests génériques (déclaratifs, en YAML)</h3><p>On les déclare colonne par colonne dans un fichier <code>.yml</code>. En quelques lignes, on couvre l'unicité, la non-nullité, les valeurs admises et l'intégrité référentielle.</p><pre><code>models:\n  - name: orders\n    columns:\n      - name: order_id\n        tests: [unique, not_null]\n      - name: status\n        tests:\n          - accepted_values:\n              values: ['payee','annulee','remboursee']\n      - name: customer_id\n        tests:\n          - relationships:\n              to: ref('customers')\n              field: customer_id</code></pre><h3>Les tests spécifiques (singular)</h3><p>Pour une règle métier, on écrit dans <code>tests/</code> une requête qui <strong>remonte les lignes en erreur</strong> (le mécanisme universel vu en m4l1). Le test échoue si elle renvoie au moins une ligne.</p><pre><code>-- tests/montants_positifs.sql\nSELECT order_id, amount_ttc\nFROM {{ ref('orders') }}\nWHERE amount_ttc &lt; 0</code></pre><h3>Exécuter et investiguer</h3><pre><code>dbt test                       # tous les tests\ndbt test --select orders       # un seul modèle\n# option store_failures: true  -&gt; conserve les lignes fautives\n#   dans une table, pour les analyser après coup</code></pre><h3>Ne pas réinventer la roue</h3><p>Les packages <strong>dbt_utils</strong> et <strong>dbt_expectations</strong> ajoutent des dizaines de tests prêts à l'emploi : unicité combinée sur plusieurs colonnes, fraîcheur, valeurs dans une plage, distribution, expressions… On précise aussi une <strong>sévérité</strong> par test, sujet de la leçon suivante.</p><div class=\"note\">L'atout décisif de dbt : la qualité n'est plus un script isolé qu'on oublie, mais une partie du code, versionnée, relue et rejouée automatiquement à chaque changement.</div>", "minutes": 12}, "m4l3": {"theory": "<p>Avoir des tests ne suffit pas : il faut une <strong>stratégie</strong>. Trop d'alertes bruyantes et l'équipe finit par toutes les ignorer — c'est l'<em>alert fatigue</em>, l'ennemi n°1 de la qualité. Trop peu, et les incidents passent. L'art consiste à doser.</p><h3>La sévérité : tout test n'a pas le même poids</h3><p>On distingue deux niveaux. Un <strong>error</strong> bloque le pipeline : on refuse de livrer des données fausses (ex. clé primaire en double). Un <strong>warn</strong> signale sans bloquer : utile pour surveiller une dérive naissante sans tout arrêter (ex. légère hausse des NULL sur une colonne secondaire).</p><div class=\"diagram\"><svg viewBox=\"0 0 680 185\" width=\"680\" height=\"185\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"40\" width=\"150\" height=\"56\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"105\" y=\"63.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">Mesure du contrôle</text><text x=\"105\" y=\"80.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"600\">(ex. nb de NULL)</text><line x1=\"180\" y1=\"68\" x2=\"240\" y2=\"68\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"240\" y=\"40\" width=\"130\" height=\"56\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"305\" y=\"63.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">Comparaison</text><text x=\"305\" y=\"80.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"600\">aux seuils</text><line x1=\"370\" y1=\"68\" x2=\"430\" y2=\"50\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"370\" y1=\"68\" x2=\"430\" y2=\"86\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"370\" y1=\"68\" x2=\"430\" y2=\"122\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"430\" y=\"30\" width=\"150\" height=\"38\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"505\" y=\"53.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0A7355\" font-weight=\"700\">OK</text><rect x=\"430\" y=\"78\" width=\"220\" height=\"38\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"540\" y=\"101.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#8A6A1E\" font-weight=\"700\">WARN  (warn_if : &gt; 10)</text><rect x=\"430\" y=\"126\" width=\"220\" height=\"38\" rx=\"11\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.6\"/><text x=\"540\" y=\"149.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#B23036\" font-weight=\"700\">ERROR (error_if : &gt; 100)  → bloque</text></svg><div class=\"cap\">On mesure, on compare à des seuils, et la sévérité décide : laisser passer, avertir, ou bloquer.</div></div><pre><code># dbt : seuils de sévérité sur un test\ntests:\n  - not_null:\n      config:\n        severity: warn        # n'arrête pas le pipeline…\n        warn_if: \"&gt;10\"        # …mais avertit au-delà de 10\n        error_if: \"&gt;100\"      # et bloque au-delà de 100</code></pre><h3>Formaliser des engagements : SLA et SLO</h3><p>Pour sortir du « au cas par cas », on contractualise la qualité avec des indicateurs de service, exactement comme pour la disponibilité d'une application.</p><table><tr><th>Notion</th><th>Définition</th><th>Exemple</th></tr><tr><td><strong>SLA</strong></td><td>la promesse de service</td><td>« la table commandes est fraîche chaque matin avant 8 h »</td></tr><tr><td><strong>SLO</strong></td><td>l'objectif chiffré associé</td><td>« &lt; 1 % de lignes invalides », « fraîcheur &lt; 3 h dans 99 % des cas »</td></tr></table><h3>Prioriser par l'impact</h3><p>Concentre les tests <strong>bloquants</strong> là où l'impact est maximal : clés, jointures, colonnes financières, tables qui alimentent des décisions. Le reste peut rester en avertissement. Et chaque test bloquant doit avoir un <strong>propriétaire</strong> et une conduite à tenir quand il casse.</p><div class=\"callout\">Test d'or : un contrôle qui ne déclenche jamais d'action est du bruit. Avant d'ajouter un test, demande-toi : « si ça casse, qui fait quoi ? ». Sans réponse, ne l'ajoute pas en bloquant.</div>", "minutes": 10}, "m4l4": {"theory": "<p>La qualité se joue aussi dans l'<strong>intégration continue</strong> (CI/CD) : on vérifie les transformations et les données <em>avant</em> qu'un changement n'atteigne la production. C'est le prolongement naturel du <em>shift-left</em>.</p><h3>Tester à chaque changement</h3><p>À chaque <strong>pull request</strong>, un pipeline reconstruit les modèles impactés et lance les tests. Si un test bloquant échoue, la fusion est refusée : on n'introduit jamais une régression en production sans s'en apercevoir.</p><div class=\"diagram\"><svg viewBox=\"0 0 730 185\" width=\"730\" height=\"185\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"50\" width=\"120\" height=\"48\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"80\" y=\"69.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">Pull Request</text><text x=\"80\" y=\"86.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"600\">(changement)</text><line x1=\"140\" y1=\"74\" x2=\"195\" y2=\"74\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"195\" y=\"50\" width=\"165\" height=\"48\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"277.5\" y=\"70.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">build modified+</text><text x=\"277.5\" y=\"86.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"600\">(modèles impactés)</text><line x1=\"360\" y1=\"74\" x2=\"415\" y2=\"74\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"415\" y=\"50\" width=\"110\" height=\"48\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"470\" y=\"78.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">dbt test</text><line x1=\"525\" y1=\"74\" x2=\"560\" y2=\"56\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"525\" y1=\"74\" x2=\"560\" y2=\"100\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"560\" y=\"38\" width=\"150\" height=\"36\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"635\" y=\"60.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0A7355\" font-weight=\"700\">✓ Merge autorisé</text><rect x=\"560\" y=\"84\" width=\"150\" height=\"36\" rx=\"11\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.6\"/><text x=\"635\" y=\"106.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#B23036\" font-weight=\"700\">✗ Fusion bloquée</text><line x1=\"360\" y1=\"150\" x2=\"715\" y2=\"150\" stroke=\"#D7D2C4\" stroke-width=\"1.6\" stroke-dasharray=\"4 3\"/><rect x=\"20\" y=\"128\" width=\"230\" height=\"44\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"135\" y=\"146.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"700\">Production (planifié)</text><text x=\"135\" y=\"161.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"600\">→ monitoring des données réelles</text></svg><div class=\"cap\">Deux moments distincts : la CI protège des régressions ; le monitoring surveille les données qui changent seules.</div></div><pre><code># Étape de CI (pseudo-YAML)\nsteps:\n  - run: dbt build --select state:modified+   # modèles modifiés + descendants\n  - run: dbt test  --select state:modified+</code></pre><h3>Le « slim CI »</h3><p>Rejouer tout le projet à chaque PR serait lent. Le <strong>slim CI</strong> ne reconstruit et ne teste que ce qui a changé (et ses dépendances), en comparant à l'état de production grâce à <code>state:modified+</code>. Résultat : des vérifications rapides et ciblées, même sur de gros projets.</p><h3>Deux moments, deux objectifs</h3><p>Ne confonds pas les deux : la <strong>CI</strong> (avant fusion) répond à « <em>mon code casse-t-il les données ?</em> » avec des tests bloquants stricts. Le <strong>monitoring en production</strong> (planifié) répond à « <em>les données se cassent-elles toutes seules ?</em> » — car elles changent chaque jour même sans modification de code. C'est tout l'objet du module Observabilité qui suit.</p><h3>Des environnements séparés</h3><p>On isole <strong>dev</strong> (bac à sable), <strong>staging</strong> (pré-production, proche du réel) et <strong>prod</strong>. Les exigences de contrôle montent à mesure qu'on se rapproche de la production : on expérimente librement en dev, on verrouille en prod.</p><div class=\"note\">CI = « le code ne casse pas les données ». Monitoring = « les données ne se cassent pas seules ». Les deux sont indispensables et complémentaires — l'un sans l'autre laisse une faille.</div>", "minutes": 9}, "m5l1": {"theory": "<p>Les tests vérifient ce qu'on <strong>sait</strong> devoir contrôler. Mais une grande partie des pannes vient de l'<em>inconnu</em> : une source qui se tarit, un schéma modifié en amont sans prévenir, une distribution qui dérive lentement. C'est le rôle de l'<strong>observabilité</strong> : surveiller en continu la <em>santé</em> des données pour détecter les surprises, pas seulement les violations connues.</p><h3>Tests vs observabilité : la distinction clé</h3><table><tr><th>&nbsp;</th><th>Tests</th><th>Observabilité</th></tr><tr><td>Couvre</td><td>les <em>connus</em> (règles explicites)</td><td>les <em>inconnus</em> (comportement anormal)</td></tr><tr><td>Question</td><td>« Est-ce conforme à ma règle ? »</td><td>« Est-ce normal par rapport à d'habitude ? »</td></tr><tr><td>Quand</td><td>à chaque exécution / pull request</td><td>en continu, en production</td></tr><tr><td>Analogie</td><td>garde-fous à des endroits précis</td><td>caméra qui filme tout</td></tr></table><h3>Le data downtime</h3><p>On nomme <strong>data downtime</strong> toute période où des données sont manquantes, erronées ou en retard — donc non fiables. L'objectif de l'observabilité est de le <strong>réduire</strong> : détecter vite, diagnostiquer, réparer. C'est l'équivalent, côté données, de la disponibilité d'un service en ligne.</p><h3>Les 5 piliers</h3><p>L'observabilité des données se structure autour de cinq signaux. Surveiller ces cinq axes couvre l'immense majorité des incidents réels.</p><div class=\"diagram\"><svg viewBox=\"0 0 720 300\" width=\"720\" height=\"300\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><circle cx=\"360\" cy=\"150\" r=\"62\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"2\"/><text x=\"360\" y=\"144\" text-anchor=\"middle\" font-size=\"15\" fill=\"#3A2DB0\" font-weight=\"700\">Santé</text><text x=\"360\" y=\"164\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">des données</text><line x1=\"360\" y1=\"150\" x2=\"360\" y2=\"30\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><line x1=\"360\" y1=\"150\" x2=\"600\" y2=\"110\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><line x1=\"360\" y1=\"150\" x2=\"560\" y2=\"250\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><line x1=\"360\" y1=\"150\" x2=\"160\" y2=\"250\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><line x1=\"360\" y1=\"150\" x2=\"120\" y2=\"110\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><rect x=\"290\" y=\"8\" width=\"140\" height=\"44\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"360\" y=\"34.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0A7355\" font-weight=\"700\">Fraîcheur</text><rect x=\"530\" y=\"88\" width=\"140\" height=\"44\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"600\" y=\"114.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#8A6A1E\" font-weight=\"700\">Volume</text><rect x=\"490\" y=\"228\" width=\"140\" height=\"44\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"560\" y=\"254.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#B23E22\" font-weight=\"700\">Distribution</text><rect x=\"90\" y=\"228\" width=\"140\" height=\"44\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"160\" y=\"254.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#B23E22\" font-weight=\"700\">Schéma</text><rect x=\"50\" y=\"88\" width=\"140\" height=\"44\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"120\" y=\"114.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#8A6A1E\" font-weight=\"700\">Lineage</text></svg><div class=\"cap\">Les 5 piliers de l'observabilité, qui composent ensemble la « santé » d'un jeu de données.</div></div><ul><li><strong>Fraîcheur</strong> : les données sont-elles assez récentes pour l'usage ?</li><li><strong>Volume</strong> : le nombre de lignes est-il cohérent avec l'habitude ?</li><li><strong>Schéma</strong> : la structure (colonnes, types) a-t-elle changé ?</li><li><strong>Distribution</strong> : les valeurs ressemblent-elles à d'habitude (NULL, plages, catégories) ?</li><li><strong>Lineage</strong> : d'où viennent les données et qu'est-ce qui dépend d'elles ?</li></ul><div class=\"callout\">Tests et observabilité ne s'opposent pas, ils se complètent : les tests bloquent les erreurs connues ; l'observabilité révèle celles qu'on n'avait pas anticipées. Une équipe mûre fait les deux.</div>", "minutes": 10}, "m5l2": {"theory": "<p>Voyons concrètement comment surveiller chaque pilier. La bonne nouvelle : la plupart du temps, il suffit d'une requête exécutée régulièrement et comparée à une <strong>référence</strong> (la « normale »). On historise la mesure, jour après jour, et on alerte sur l'écart.</p><div class=\"diagram\"><svg viewBox=\"0 0 700 210\" width=\"700\" height=\"210\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><line x1=\"60\" y1=\"30\" x2=\"60\" y2=\"180\" stroke=\"#56535F\" stroke-width=\"1.6\"/><line x1=\"60\" y1=\"180\" x2=\"660\" y2=\"180\" stroke=\"#56535F\" stroke-width=\"1.6\"/><text x=\"40\" y=\"40\" text-anchor=\"middle\" font-size=\"11\" fill=\"#56535F\">valeur</text><text x=\"660\" y=\"196\" text-anchor=\"end\" font-size=\"11\" fill=\"#56535F\">temps</text><rect x=\"60\" y=\"80\" width=\"540\" height=\"50\" fill=\"#E7F7F0\" opacity=\"0.55\"/><text x=\"610\" y=\"100\" text-anchor=\"start\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">bande</text><text x=\"610\" y=\"114\" text-anchor=\"start\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">normale</text><path d=\"M90 115 L150 105 L210 118 L270 100 L330 110 L390 108 L450 112 L510 104\" fill=\"none\" stroke=\"#5B4BE8\" stroke-width=\"2.2\"/><circle cx=\"90\" cy=\"115\" r=\"3.2\" fill=\"#5B4BE8\"/><circle cx=\"150\" cy=\"105\" r=\"3.2\" fill=\"#5B4BE8\"/><circle cx=\"210\" cy=\"118\" r=\"3.2\" fill=\"#5B4BE8\"/><circle cx=\"270\" cy=\"100\" r=\"3.2\" fill=\"#5B4BE8\"/><circle cx=\"330\" cy=\"110\" r=\"3.2\" fill=\"#5B4BE8\"/><circle cx=\"390\" cy=\"108\" r=\"3.2\" fill=\"#5B4BE8\"/><circle cx=\"450\" cy=\"112\" r=\"3.2\" fill=\"#5B4BE8\"/><circle cx=\"510\" cy=\"104\" r=\"3.2\" fill=\"#5B4BE8\"/><line x1=\"510\" y1=\"104\" x2=\"570\" y2=\"40\" stroke=\"#E5484D\" stroke-width=\"2.2\"/><circle cx=\"570\" cy=\"40\" r=\"6\" fill=\"#E5484D\" stroke=\"#fff\" stroke-width=\"1.5\"/><text x=\"570\" y=\"26\" text-anchor=\"middle\" font-size=\"11\" fill=\"#E5484D\" font-weight=\"700\">anomalie → alerte</text></svg><div class=\"cap\">Principe commun à tous les piliers : suivre une métrique dans le temps, définir une bande normale, alerter hors bande.</div></div><h3>Fraîcheur</h3><p>On mesure l'âge de la donnée la plus récente et on alerte au-delà d'un seuil. C'est souvent le contrôle le plus rentable : une table « en retard » est la panne la plus fréquente.</p><pre><code>SELECT (julianday('now') - julianday(MAX(updated_at))) * 24 AS heures_depuis_maj\nFROM orders;          -- alerte si &gt; 6 h, par exemple</code></pre><h3>Volume</h3><p>On compte les lignes par jour et on compare à la moyenne récente (fenêtres glissantes, vues en m2l4). Une chute de 50 % ou un doublement soudain trahissent un problème d'amont, même si chaque ligne est, prise isolément, correcte.</p><h3>Distribution</h3><p>On suit dans le temps quelques métriques par colonne : taux de NULL, moyenne, part de chaque catégorie. Une <strong>dérive</strong> (le taux de NULL passe de 1 % à 30 % en une nuit) signale un changement en amont — sans qu'aucune règle stricte ne soit techniquement violée. C'est ce que les tests seuls ne voient pas.</p><pre><code>SELECT\n  ROUND(100.0*(COUNT(*)-COUNT(email))/COUNT(*),1) AS pct_email_null,\n  ROUND(AVG(amount_ttc),2)                        AS panier_moyen\nFROM orders;          -- historiser ces valeurs chaque jour</code></pre><h3>Schéma</h3><p>On compare la structure courante (noms et types des colonnes) à une référence. Une colonne supprimée ou renommée en amont casse les pipelines en aval — l'observabilité du schéma permet de l'apprendre <em>avant</em> les utilisateurs.</p><h3>Seuils fixes ou détection d'anomalies ?</h3><table><tr><th>Approche</th><th>Idée</th><th>Quand</th></tr><tr><td><strong>Seuils fixes</strong></td><td>règle explicite (« &lt; 6 h »)</td><td>quand la limite est connue</td></tr><tr><td><strong>Détection d'anomalies</strong></td><td>un modèle apprend la normale (saisonnalité incluse) et alerte sur l'écart</td><td>quand le « normal » varie ou est inconnu</td></tr></table><div class=\"note\">Conseil de mise en route : commence simple. Quelques seuils fixes bien choisis sur la <strong>fraîcheur</strong> et le <strong>volume</strong> attrapent déjà la majorité des incidents. La détection d'anomalies viendra ensuite.</div>", "minutes": 12}, "m5l3": {"theory": "<p>Détecter un incident n'est que le début. Ce qui distingue une équipe mûre, c'est sa façon de <strong>réagir</strong> : trier, communiquer, réparer, puis apprendre pour que ça ne se reproduise pas. On gère un incident de données comme un incident applicatif.</p><h3>Le cycle de vie d'un incident</h3><div class=\"diagram\"><svg viewBox=\"0 0 730 175\" width=\"730\" height=\"175\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"70\" width=\"122\" height=\"50\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"81\" y=\"99.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0A7355\" font-weight=\"700\">Détection</text><line x1=\"142\" y1=\"95\" x2=\"162\" y2=\"95\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"162\" y=\"70\" width=\"122\" height=\"50\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"223\" y=\"99.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">Triage</text><line x1=\"284\" y1=\"95\" x2=\"304\" y2=\"95\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"304\" y=\"70\" width=\"122\" height=\"50\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"365\" y=\"99.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">Communication</text><line x1=\"426\" y1=\"95\" x2=\"446\" y2=\"95\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"446\" y=\"70\" width=\"122\" height=\"50\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"507\" y=\"99.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#8A6A1E\" font-weight=\"700\">Résolution</text><line x1=\"568\" y1=\"95\" x2=\"588\" y2=\"95\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"588\" y=\"70\" width=\"122\" height=\"50\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"649\" y=\"99.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#B23E22\" font-weight=\"700\">Post-mortem</text><line x1=\"20\" y1=\"55\" x2=\"142\" y2=\"55\" stroke=\"#56535F\" stroke-width=\"1.6\"/><text x=\"81\" y=\"46\" text-anchor=\"middle\" font-size=\"10\" fill=\"#56535F\" font-weight=\"700\">MTTD (détecter)</text><line x1=\"20\" y1=\"140\" x2=\"568\" y2=\"140\" stroke=\"#56535F\" stroke-width=\"1.6\"/><text x=\"294\" y=\"158\" text-anchor=\"middle\" font-size=\"10\" fill=\"#56535F\" font-weight=\"700\">MTTR (résoudre)</text></svg><div class=\"cap\">De la détection au post-mortem : on mesure le MTTD (temps de détection) et le MTTR (temps de résolution).</div></div><ol><li><strong>Détection</strong> : une alerte se déclenche (monitoring) — ou, moins bien, un utilisateur signale le problème.</li><li><strong>Triage</strong> : évaluer la gravité et l'impact. Qui et quoi sont touchés ? Faut-il geler les données en aval ?</li><li><strong>Communication</strong> : prévenir <em>proactivement</em> les consommateurs concernés. Le silence détruit la confiance plus que l'incident lui-même.</li><li><strong>Résolution</strong> : corriger la cause, puis rejouer / réparer les données affectées.</li><li><strong>Post-mortem</strong> : comprendre et empêcher la récidive.</li></ol><h3>Mesurer pour progresser : MTTD et MTTR</h3><p>Deux indicateurs résument la maturité opérationnelle. Le <strong>MTTD</strong> (temps moyen de <em>détection</em>) : le réduire, c'est mieux surveiller. Le <strong>MTTR</strong> (temps moyen de <em>résolution</em>) : le réduire, c'est mieux s'outiller — le lineage pour trouver la cause vite, les runbooks pour agir sans hésiter.</p><h3>Le post-mortem « sans blâme »</h3><p>Un bon post-mortem cherche les <strong>causes systémiques</strong>, jamais un coupable. On y consigne : la chronologie, l'impact, la cause racine, et surtout des <strong>actions concrètes</strong> — un nouveau test, une alerte supplémentaire, une documentation — pour que l'incident ne puisse plus se reproduire de la même façon.</p><h3>Les runbooks</h3><p>Un <strong>runbook</strong> est une fiche d'action : « si l'alerte X se déclenche, vérifier A, puis B, contacter C ». Il transforme l'expérience accumulée en procédure reproductible, et fait gagner un temps précieux sous la pression d'un incident.</p><div class=\"callout\">La qualité n'est pas l'absence d'incident — c'est illusoire — mais la capacité à le détecter vite, à en limiter l'impact, et à en tirer une amélioration durable.</div>", "minutes": 11}, "m6l1": {"theory": "<p>Au-delà des contrôles techniques, la <strong>gouvernance</strong> organise la confiance à l'échelle de l'organisation : qui possède quelle donnée, ce qu'elle signifie, d'où elle vient et qui en dépend. Deux outils en forment le socle — le <strong>catalogue</strong> et le <strong>lineage</strong>.</p><h3>Le catalogue de données</h3><p>Un <strong>data catalog</strong> est l'inventaire documenté de tous les jeux de données de l'organisation. Pour chaque table, on veut idéalement :</p><ul><li>une <strong>description</strong> et la définition métier de chaque colonne ;</li><li>un <strong>propriétaire</strong> (data owner) clairement identifié ;</li><li>le <strong>schéma</strong>, la fraîcheur et des indicateurs de qualité ;</li><li>un <strong>glossaire</strong> partagé (qu'appelle-t-on exactement « client actif » ?).</li></ul><p>Son bénéfice premier est la <strong>découvrabilité</strong> : on trouve la bonne table, on en comprend le sens, on évite les ressaisies et les contresens qui naissent quand chacun recalcule « sa » version d'un indicateur.</p><h3>Le lineage (traçabilité)</h3><p>Le <strong>lineage</strong> cartographie les dépendances : quelle source alimente quelle transformation, qui alimente quel tableau de bord. Il existe au niveau table et, plus fin, au niveau colonne.</p><div class=\"diagram\"><svg viewBox=\"0 0 720 240\" width=\"720\" height=\"240\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"90\" width=\"130\" height=\"48\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"85\" y=\"110.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#211F2A\" font-weight=\"700\">Source</text><text x=\"85\" y=\"125.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#211F2A\" font-weight=\"600\">commandes_brutes</text><line x1=\"150\" y1=\"114\" x2=\"200\" y2=\"114\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"200\" y=\"90\" width=\"120\" height=\"48\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"260\" y=\"109.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">orders</text><text x=\"260\" y=\"126.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"600\">(nettoyé)</text><line x1=\"320\" y1=\"104\" x2=\"380\" y2=\"60\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"320\" y1=\"124\" x2=\"380\" y2=\"168\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"380\" y=\"38\" width=\"130\" height=\"44\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"445\" y=\"64.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">ca_mensuel</text><rect x=\"380\" y=\"150\" width=\"140\" height=\"44\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"450\" y=\"176.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">clients_actifs</text><line x1=\"510\" y1=\"60\" x2=\"560\" y2=\"60\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"560\" y=\"38\" width=\"140\" height=\"44\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"630\" y=\"56.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"700\">Dashboard</text><text x=\"630\" y=\"71.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"600\">« Revenus »</text><text x=\"360\" y=\"222\" text-anchor=\"middle\" font-size=\"11\" fill=\"#56535F\" font-weight=\"700\">← diagnostic (d'où vient l'erreur ?)        analyse d'impact (qu'est-ce qui casse ?) →</text></svg><div class=\"cap\">Le lineage se lit dans les deux sens : vers l'amont pour diagnostiquer, vers l'aval pour mesurer l'impact d'un changement.</div></div><p>Ses deux usages sont au cœur du quotidien : l'<strong>analyse d'impact</strong> (« si je modifie cette colonne, qu'est-ce qui casse en aval ? ») et le <strong>diagnostic</strong> (« cette valeur fausse dans le dashboard, d'où vient-elle en amont ? »). Sans lineage, chaque incident devient une enquête à l'aveugle.</p><h3>Les outils</h3><p>Des plateformes open source — <strong>DataHub</strong>, <strong>OpenMetadata</strong>, <strong>Amundsen</strong> — centralisent catalogue, lineage et indicateurs de qualité. dbt génère aussi automatiquement documentation et lineage à partir des <code>ref()</code> entre modèles.</p><div class=\"note\">Mémo : le <strong>catalogue</strong> répond à « <em>quoi et qui</em> » ; le <strong>lineage</strong> à « <em>d'où et vers où</em> ». Ensemble, ils rendent les données compréhensibles, traçables et donc gouvernables.</div>", "minutes": 11}, "m6l2": {"theory": "<p>Beaucoup d'incidents naissent d'un changement <strong>silencieux</strong> côté producteur : une colonne renommée, un type modifié, un champ qui devient parfois nul. Tant que l'attente reste implicite, ces changements cassent l'aval par surprise. Les <strong>contrats de données</strong> rendent ces attentes explicites — et vérifiables.</p><h3>Qu'est-ce qu'un data contract ?</h3><p>Un <strong>contrat de données</strong> est un accord formel entre le <em>producteur</em> et les <em>consommateurs</em> d'un jeu de données. Il décrit le <strong>schéma</strong> (colonnes, types, obligatoires), la <strong>sémantique</strong> (le sens de chaque champ, ses valeurs admises), les <strong>garanties</strong> (unicité, fraîcheur, SLA) et la <strong>politique d'évolution</strong> (comment et avec quel préavis le schéma peut changer).</p><div class=\"diagram\"><svg viewBox=\"0 0 780 205\" width=\"780\" height=\"205\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"80\" width=\"150\" height=\"56\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"95\" y=\"103.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">Producteur</text><text x=\"95\" y=\"120.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"600\">(équipe amont)</text><line x1=\"170\" y1=\"108\" x2=\"250\" y2=\"108\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"250\" y=\"56\" width=\"230\" height=\"104\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"365\" y=\"81.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">CONTRAT</text><text x=\"365\" y=\"96.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">schéma + types</text><text x=\"365\" y=\"111.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">valeurs admises</text><text x=\"365\" y=\"126.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">SLA (fraîcheur, qualité)</text><text x=\"365\" y=\"141.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">règles d'évolution</text><line x1=\"480\" y1=\"108\" x2=\"545\" y2=\"108\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"545\" y=\"56\" width=\"60\" height=\"104\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"575\" y=\"103.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0A7355\" font-weight=\"700\">✓</text><text x=\"575\" y=\"120.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0A7355\" font-weight=\"600\">garde</text><line x1=\"605\" y1=\"108\" x2=\"660\" y2=\"108\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"660\" y=\"80\" width=\"100\" height=\"56\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"710\" y=\"103.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">Consom-</text><text x=\"710\" y=\"120.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"600\">mateurs</text><text x=\"575\" y=\"188\" text-anchor=\"middle\" font-size=\"11\" fill=\"#56535F\" font-weight=\"700\">validation automatique à l'entrée</text></svg><div class=\"cap\">Le contrat s'interpose entre producteur et consommateurs, et se vérifie automatiquement à l'entrée du pipeline.</div></div><pre><code># contrat (extrait, format YAML)\ndataset: orders\nowner: equipe-commandes\nschema:\n  - name: order_id   type: integer  required: true  unique: true\n  - name: amount_ttc type: number   required: true  min: 0\n  - name: status     type: string   allowed: [payee, annulee, remboursee]\nsla:\n  freshness: \"&lt; 3h\"\n  max_null_rate: { email: 0.05 }</code></pre><h3>L'évolution de schéma : compatible ou cassante ?</h3><table><tr><th>Type de changement</th><th>Exemple</th><th>Impact</th></tr><tr><td><strong>Rétro-compatible</strong></td><td>ajouter une colonne optionnelle</td><td>sans danger</td></tr><tr><td><strong>Cassant</strong></td><td>supprimer / renommer / changer un type</td><td>versionnage + préavis obligatoires</td></tr></table><h3>Faire respecter le contrat</h3><p>Un contrat n'a de valeur que s'il est <strong>vérifié automatiquement</strong> : à l'entrée du pipeline, on valide les données reçues contre le contrat (souvent avec les mêmes outils de tests). C'est l'esprit <em>shift-left</em> appliqué aux frontières entre équipes : l'erreur casse <em>chez le producteur</em>, à la source, plutôt que trois étages plus bas dans un tableau de bord.</p><div class=\"callout\">Un data contract transforme un espoir (« pourvu que la colonne ne disparaisse pas ») en engagement testé. C'est l'outil de gouvernance le plus puissant pour fiabiliser les échanges entre équipes.</div>", "minutes": 10}, "m6l3": {"theory": "<p>Travailler la donnée, c'est aussi la traiter de façon <strong>responsable et conforme</strong>. En Europe, le <strong>RGPD</strong> encadre les <em>données à caractère personnel</em> — celles qui identifient une personne, directement ou indirectement. Ce n'est pas qu'une affaire de juristes : le Data QA manipule ces données au quotidien.</p><h3>Qu'est-ce qu'une donnée personnelle (PII) ?</h3><p>Nom, e-mail, téléphone, adresse, adresse IP, identifiant client… Certaines sont <strong>sensibles</strong> (santé, opinions, biométrie) et bénéficient d'une protection renforcée. Dans nos exemples, la colonne <code>email</code> est une donnée personnelle à part entière.</p><h3>Les grands principes</h3><ul><li><strong>Base légale</strong> : tout traitement doit être justifié (consentement, contrat, obligation légale…) ;</li><li><strong>Minimisation</strong> : ne collecter que le strict nécessaire ;</li><li><strong>Limitation de finalité</strong> : utiliser les données pour l'usage annoncé, pas un autre ;</li><li><strong>Limitation de conservation</strong> : définir une durée de rétention, puis purger ;</li><li><strong>Droits des personnes</strong> : accès, rectification, et <strong>droit à l'effacement</strong>.</li></ul><div class=\"diagram\"><svg viewBox=\"0 0 760 150\" width=\"760\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"16\" y=\"60\" width=\"132\" height=\"70\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"82\" y=\"91.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Collecte</text><text x=\"82\" y=\"106.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">minimisation</text><line x1=\"148\" y1=\"95\" x2=\"166\" y2=\"95\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"166\" y=\"60\" width=\"132\" height=\"70\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"232\" y=\"83.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Stockage</text><text x=\"232\" y=\"98.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">chiffrement /</text><text x=\"232\" y=\"113.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">pseudonymisation</text><line x1=\"298\" y1=\"95\" x2=\"316\" y2=\"95\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"316\" y=\"60\" width=\"132\" height=\"70\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"382\" y=\"91.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Accès</text><text x=\"382\" y=\"106.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">contrôle des droits</text><line x1=\"448\" y1=\"95\" x2=\"466\" y2=\"95\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"466\" y=\"60\" width=\"132\" height=\"70\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"532\" y=\"91.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Conservation</text><text x=\"532\" y=\"106.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">durée limitée</text><line x1=\"598\" y1=\"95\" x2=\"616\" y2=\"95\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"616\" y=\"60\" width=\"132\" height=\"70\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"682\" y=\"91.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Effacement</text><text x=\"682\" y=\"106.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">droit à l'oubli</text><text x=\"375\" y=\"36\" text-anchor=\"middle\" font-size=\"12\" fill=\"#56535F\" font-weight=\"700\">Cycle de vie d'une donnée personnelle — une protection à chaque étape</text></svg><div class=\"cap\">À chaque étape de vie de la donnée correspond une mesure de protection à mettre en place.</div></div><h3>Les techniques de protection</h3><table><tr><th>Technique</th><th>Idée</th><th>Réversible ?</th></tr><tr><td>Pseudonymisation</td><td>remplacer l'identifiant par un jeton (clé conservée à part)</td><td>oui</td></tr><tr><td>Anonymisation</td><td>rendre la ré-identification impossible</td><td>non</td></tr><tr><td>Chiffrement</td><td>illisible sans la clé</td><td>oui</td></tr><tr><td>Masquage</td><td>n'afficher qu'une partie (<code>j***@mail.com</code>)</td><td>selon le cas</td></tr></table><h3>Le lien direct avec la qualité</h3><p>Gouvernance, sécurité et qualité se rejoignent ici : le <strong>contrôle d'accès</strong> (qui voit quoi) limite les risques ; la <strong>traçabilité</strong> (le lineage du module précédent) permet d'honorer concrètement un droit à l'effacement ; et des données <strong>exactes et à jour</strong> sont une exigence réglementaire autant que technique — une adresse fausse, c'est aussi un courrier sensible envoyé au mauvais destinataire.</p><div class=\"callout\">Le Data QA n'est pas juriste, mais il est en première ligne : savoir reconnaître une donnée personnelle, appliquer la minimisation et le masquage, et tracer une donnée font pleinement partie du métier.</div>", "minutes": 11}};

  var DIAG = {"m1l1": "<div class=\"diagram\"><svg viewBox=\"0 0 640 230\" width=\"640\" height=\"230\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"60\" y=\"150\" width=\"120\" height=\"30\" rx=\"8\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.4\"/><text x=\"120\" y=\"170\" text-anchor=\"middle\" font-size=\"12\" fill=\"#0A7355\" font-weight=\"700\">Prévenir = 1</text><rect x=\"250\" y=\"110\" width=\"120\" height=\"70\" rx=\"8\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.4\"/><text x=\"310\" y=\"150\" text-anchor=\"middle\" font-size=\"12\" fill=\"#8A6A1E\" font-weight=\"700\">Corriger = 10</text><rect x=\"440\" y=\"40\" width=\"140\" height=\"140\" rx=\"8\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.4\"/><text x=\"510\" y=\"115\" text-anchor=\"middle\" font-size=\"13\" fill=\"#B23036\" font-weight=\"700\">Subir = 100</text><line x1=\"40\" y1=\"195\" x2=\"600\" y2=\"195\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"320\" y=\"214\" text-anchor=\"middle\" font-size=\"11\" fill=\"#56535F\" font-weight=\"700\">plus on attrape tard, plus le coût explose</text></svg><div class=\"cap\">La règle du 1-10-100 : prévenir coûte 1, corriger 10, subir 100.</div></div>", "m1l2": "<div class=\"diagram\"><svg viewBox=\"0 0 680 182\" width=\"680\" height=\"182\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"40\" width=\"190\" height=\"52\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"125\" y=\"70.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0A7355\" \">Soda : des contrôles déclaratifs en YAML, exécutés par un scan.</div></div>"};

<script>
/* Parcours Débutant approfondi (db1, db2) + schémas */
(function(){
  if (typeof CURRICULUM === 'undefined' || !CURRICULUM.modules) return;
  var ENR = {"db1l1": {"theory": "<p>Avant tout contrôle de qualité, il faut savoir <strong>lire</strong> les données. Et lire les données, c'est comprendre la structure dans laquelle elles vivent : la <strong>table</strong>.</p><div class=\"diagram\"><svg viewBox=\"0 0 680 185\" width=\"680\" height=\"185\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"150\" y=\"40\" width=\"360\" height=\"30\" rx=\"6\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.4\"/><text x=\"210\" y=\"60\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">customer_id</text><text x=\"330\" y=\"60\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">email</text><text x=\"450\" y=\"60\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">pays</text><rect x=\"150\" y=\"70\" width=\"360\" height=\"32\" rx=\"0\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"210\" y=\"91\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">1</text><text x=\"330\" y=\"91\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">alice@x.fr</text><text x=\"450\" y=\"91\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">FR</text><rect x=\"150\" y=\"102\" width=\"360\" height=\"32\" rx=\"0\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"210\" y=\"123\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">2</text><text x=\"330\" y=\"123\" text-anchor=\"middle\" font-size=\"12\" fill=\"#E5484D\">(NULL)</text><text x=\"450\" y=\"123\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">BE</text><rect x=\"150\" y=\"134\" width=\"360\" height=\"32\" rx=\"0\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"210\" y=\"155\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">3</text><text x=\"330\" y=\"155\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">bob@x.be</text><text x=\"450\" y=\"155\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">BE</text><text x=\"145\" y=\"90\" text-anchor=\"end\" font-size=\"10\" fill=\"#8C8995\">colonne</text><line x1=\"150\" y1=\"55\" x2=\"150\" y2=\"166\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"120\" y=\"150\" text-anchor=\"end\" font-size=\"10\" fill=\"#8C8995\">ligne →</text><rect x=\"150\" y=\"70\" width=\"120\" height=\"96\" fill=\"none\" stroke=\"#C99A2E\" stroke-width=\"1.6\" stroke-dasharray=\"4 3\"/><text x=\"530\" y=\"90\" text-anchor=\"start\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">clé primaire</text><text x=\"530\" y=\"104\" text-anchor=\"start\" font-size=\"10\" fill=\"#8A6A1E\">(identifiant unique)</text></svg><div class=\"cap\">L'anatomie d'une table : des colonnes (les champs), des lignes (les enregistrements), une clé primaire.</div></div><h3>Donnée, table, ligne, colonne</h3><p>Une <strong>donnée</strong> est une information enregistrée : un nom, un prix, une date. On range les données dans des <strong>tables</strong>, des tableaux organisés en :</p><ul><li><strong>colonnes</strong> (les <em>champs</em>) : chacune décrit une caractéristique (email, pays…) et possède un <strong>type</strong> ;</li><li><strong>lignes</strong> (les <em>enregistrements</em>) : chacune représente une entité — ici, un client.</li></ul><h3>Le type d'une colonne</h3><p>Chaque colonne a un <strong>type</strong> qui dit ce qu'elle peut contenir : un entier (<code>INTEGER</code>), un nombre à virgule (<code>REAL</code>), du texte (<code>TEXT</code>), une date… Le type est la première garantie de qualité : une colonne <code>prix</code> en nombre n'acceptera pas « gratuit ».</p><h3>La clé primaire</h3><p>La <strong>clé primaire</strong> est la colonne (ou combinaison) qui identifie de façon <em>unique</em> chaque ligne — ici <code>customer_id</code>. C'est elle qui empêche (en théorie) les doublons. Vérifier son unicité sera l'un de tes tout premiers contrôles.</p><h3>La valeur manquante : NULL</h3><p>Quand une information est absente, la base y inscrit <code>NULL</code> — un marqueur spécial, différent de zéro ou d'une chaîne vide. La part de NULL d'une colonne est la mesure de base de sa <strong>complétude</strong>.</p><div class=\"callout\">Tout le métier découle de cette structure : un contrôle de qualité, c'est une question posée à une table — « combien de lignes ? », « cette colonne est-elle remplie ? », « cette clé est-elle unique ? ».</div>", "minutes": 9}, "db1l2": {"theory": "<p>Pour interroger une table, on utilise <strong>SQL</strong>. La requête fondatrice se lit presque comme une phrase : « <code>SELECT</code> (sélectionne) telles colonnes <code>FROM</code> (depuis) telle table ».</p><div class=\"diagram\"><svg viewBox=\"0 0 520 150\" width=\"520\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"55\" width=\"260\" height=\"56\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"150\" y=\"79.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">SELECT email, pays</text><text x=\"150\" y=\"95.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"600\">FROM customers</text><line x1=\"280\" y1=\"83\" x2=\"345\" y2=\"83\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"312\" y=\"72\" text-anchor=\"middle\" font-size=\"10\" fill=\"#56535F\">renvoie</text><rect x=\"345\" y=\"40\" width=\"150\" height=\"86\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"420\" y=\"71.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"700\">email</text><text x=\"420\" y=\"87.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"600\">pays</text><text x=\"420\" y=\"103.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"600\">(2 colonnes)</text></svg><div class=\"cap\">SELECT choisit les colonnes, FROM désigne la table : le résultat est un nouveau tableau.</div></div><h3>Tout voir, ou choisir</h3><p>L'étoile <code>*</code> renvoie <strong>toutes</strong> les colonnes — pratique pour un premier coup d'œil. En contrôle qualité, on cible plutôt les colonnes utiles, ce qui rend le résultat lisible et la requête plus rapide.</p><pre><code>-- Tout voir (exploration rapide)\nSELECT * FROM customers;\n\n-- Cibler des colonnes (lecture ciblée)\nSELECT email, country_code FROM customers;</code></pre><h3>Le résultat est lui-même une table</h3><p>Une requête ne modifie pas les données : elle renvoie un <strong>nouveau tableau</strong>, calculé à la volée. Tu peux donc explorer sans crainte — c'est exactement ce que fait le bac à sable à droite.</p><h3>Pourquoi c'est central en qualité</h3><p>Lire, c'est déjà contrôler : un simple <code>SELECT</code> sur les premières lignes révèle souvent des surprises (formats incohérents, valeurs vides, colonnes mal nommées). C'est le réflexe n°1 face à une table inconnue.</p><div class=\"note\">Convention d'écriture : les mots-clés SQL (SELECT, FROM…) en MAJUSCULES, et une instruction se termine par un point-virgule <code>;</code>.</div>", "minutes": 10}, "db1l3": {"theory": "<p>Lire une table entière ne suffit pas : on veut souvent n'en garder qu'une <strong>partie</strong> — par exemple, uniquement les lignes suspectes. C'est le rôle de la clause <code>WHERE</code>.</p><div class=\"diagram\"><svg viewBox=\"0 0 460 180\" width=\"460\" height=\"180\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"40\" width=\"150\" height=\"120\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"95\" y=\"95.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">orders</text><text x=\"95\" y=\"112.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"600\">9 lignes</text><line x1=\"170\" y1=\"100\" x2=\"250\" y2=\"100\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"210\" y=\"88\" text-anchor=\"middle\" font-size=\"11\" fill=\"#F0613F\" font-weight=\"700\">WHERE</text><text x=\"210\" y=\"118\" text-anchor=\"middle\" font-size=\"10\" fill=\"#F0613F\">amount &lt; 0</text><rect x=\"250\" y=\"70\" width=\"180\" height=\"60\" rx=\"11\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.6\"/><text x=\"340\" y=\"96.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#B23036\" font-weight=\"700\">1 ligne</text><text x=\"340\" y=\"112.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#B23036\" font-weight=\"600\">(la commande fautive)</text></svg><div class=\"cap\">WHERE agit comme un filtre : il ne conserve que les lignes qui respectent la condition.</div></div><h3>La clause WHERE</h3><p><code>WHERE</code> garde les lignes pour lesquelles une condition est vraie. On compare une colonne avec <code>=</code>, <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code> ou <code>&lt;&gt;</code> (différent). Le texte se met entre guillemets simples.</p><pre><code>-- Les commandes au montant negatif : un cas d'erreur typique\nSELECT order_id, amount_ttc\nFROM orders\nWHERE amount_ttc &lt; 0;</code></pre><h3>Combiner les conditions</h3><p>On enchaîne les conditions avec <code>AND</code> (les deux) et <code>OR</code> (l'une ou l'autre), et on teste une liste avec <code>IN</code>.</p><pre><code>SELECT * FROM customers\nWHERE country_code = 'FR' AND email IS NOT NULL;</code></pre><h3>Le piège des valeurs manquantes</h3><p>On ne teste jamais un <code>NULL</code> avec <code>=</code> : <code>email = NULL</code> ne renvoie <em>rien</em>. On écrit <code>email IS NULL</code> ou <code>email IS NOT NULL</code>. C'est l'une des erreurs les plus fréquentes du débutant.</p><div class=\"callout\">En qualité, <code>WHERE</code> est l'outil qui isole les lignes fautives. Souviens-toi du patron du métier : un contrôle, c'est une requête <code>WHERE « c'est cassé »</code> qui ne devrait renvoyer aucune ligne.</div>", "minutes": 10}, "db2l1": {"theory": "<p>Une fois qu'on sait lire et filtrer, on veut <strong>organiser</strong> le résultat : le trier pour faire ressortir les extrêmes, et le limiter pour n'en garder que le haut du panier.</p><div class=\"diagram\"><svg viewBox=\"0 0 470 190\" width=\"470\" height=\"190\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><text x=\"70\" y=\"30\" text-anchor=\"middle\" font-size=\"11\" fill=\"#56535F\" font-weight=\"700\">non trié</text><rect x=\"30\" y=\"42\" width=\"90\" height=\"28\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"75\" y=\"60.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">120</text><rect x=\"30\" y=\"76\" width=\"90\" height=\"28\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"75\" y=\"94.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">50</text><rect x=\"30\" y=\"110\" width=\"90\" height=\"28\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"75\" y=\"128.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">300</text><rect x=\"30\" y=\"144\" width=\"90\" height=\"28\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"75\" y=\"162.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">75</text><line x1=\"125\" y1=\"110\" x2=\"175\" y2=\"110\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"150\" y=\"98\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5B4BE8\" font-weight=\"700\">ORDER BY</text><text x=\"150\" y=\"124\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5B4BE8\">DESC</text><text x=\"230\" y=\"30\" text-anchor=\"middle\" font-size=\"11\" fill=\"#56535F\" font-weight=\"700\">trié ↓</text><rect x=\"190\" y=\"42\" width=\"90\" height=\"28\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"235\" y=\"60.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">300</text><rect x=\"190\" y=\"76\" width=\"90\" height=\"28\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"235\" y=\"94.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">120</text><rect x=\"190\" y=\"110\" width=\"90\" height=\"28\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"235\" y=\"128.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">75</text><rect x=\"190\" y=\"144\" width=\"90\" height=\"28\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"235\" y=\"162.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\">50</text><rect x=\"184\" y=\"38\" width=\"102\" height=\"64\" fill=\"none\" stroke=\"#0EA672\" stroke-width=\"1.6\" stroke-dasharray=\"4 3\"/><text x=\"330\" y=\"70\" text-anchor=\"start\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"700\">LIMIT 2</text><text x=\"330\" y=\"86\" text-anchor=\"start\" font-size=\"10\" fill=\"#0A7355\">→ le top</text></svg><div class=\"cap\">ORDER BY trie le résultat ; LIMIT n'en conserve que les premières lignes (un « top N »).</div></div><h3>Trier avec ORDER BY</h3><p><code>ORDER BY</code> trie selon une colonne, croissant par défaut (<code>ASC</code>), ou décroissant avec <code>DESC</code>. Trier ne change pas les données, seulement l'affichage.</p><pre><code>SELECT email, amount_ttc\nFROM orders\nORDER BY amount_ttc DESC;   -- du plus gros au plus petit montant</code></pre><h3>Limiter avec LIMIT</h3><p><code>LIMIT n</code> ne garde que les n premières lignes. Combiné à un tri, il donne un « top N » — très utile pour repérer les valeurs extrêmes (souvent là que se cachent les anomalies).</p><pre><code>SELECT email, amount_ttc\nFROM orders\nORDER BY amount_ttc DESC\nLIMIT 5;            -- les 5 plus grosses commandes</code></pre><h3>Renommer avec AS</h3><p><code>AS</code> donne un nom d'affichage plus parlant à une colonne : <code>SELECT amount_ttc AS montant</code>. Indispensable dès qu'on calcule des colonnes.</p><div class=\"note\">Astuce qualité : trier sur une colonne par ordre croissant <em>et</em> décroissant fait apparaître d'un coup les valeurs aberrantes des deux côtés (montants négatifs en bas, valeurs démesurées en haut).</div>", "minutes": 9}, "db2l2": {"theory": "<p>Le contrôle qualité repose massivement sur une opération : <strong>compter par catégorie</strong>. Combien de clients par pays ? Combien de fois apparaît cet email ? C'est le rôle de <code>GROUP BY</code>, associé aux fonctions d'agrégation.</p><div class=\"diagram\"><svg viewBox=\"0 0 430 200\" width=\"430\" height=\"200\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"40\" width=\"120\" height=\"150\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"80\" y=\"103.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#211F2A\" font-weight=\"700\">clients</text><text x=\"80\" y=\"118.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#211F2A\" font-weight=\"600\">FR, BE, BE,</text><text x=\"80\" y=\"133.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#211F2A\" font-weight=\"600\">DE, FR, IT…</text><line x1=\"140\" y1=\"115\" x2=\"210\" y2=\"115\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"175\" y=\"103\" text-anchor=\"middle\" font-size=\"10\" fill=\"#5B4BE8\" font-weight=\"700\">GROUP BY</text><text x=\"175\" y=\"129\" text-anchor=\"middle\" font-size=\"10\" fill=\"#5B4BE8\">pays</text><rect x=\"220\" y=\"42\" width=\"180\" height=\"30\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"310\" y=\"61.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">FR  →  2</text><rect x=\"220\" y=\"80\" width=\"180\" height=\"30\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"310\" y=\"99.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">BE  →  2</text><rect x=\"220\" y=\"118\" width=\"180\" height=\"30\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"310\" y=\"137.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">DE  →  1</text><rect x=\"220\" y=\"156\" width=\"180\" height=\"30\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"310\" y=\"175.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">IT  →  1</text></svg><div class=\"cap\">GROUP BY rassemble les lignes par valeur, puis une fonction (COUNT…) calcule un résumé par groupe.</div></div><h3>Compter et résumer</h3><p>Les fonctions d'<strong>agrégation</strong> résument plusieurs lignes en une valeur : <code>COUNT(*)</code> (nombre de lignes), <code>AVG</code> (moyenne), <code>SUM</code> (somme), <code>MIN</code>/<code>MAX</code>.</p><pre><code>SELECT COUNT(*) AS nb_clients FROM customers;</code></pre><h3>Regrouper avec GROUP BY</h3><p><code>GROUP BY</code> calcule l'agrégat <strong>par groupe</strong> : une ligne de résultat par valeur distincte.</p><pre><code>SELECT country_code, COUNT(*) AS nb\nFROM customers\nGROUP BY country_code;</code></pre><h3>Le contrôle reine : trouver les doublons</h3><p>En regroupant sur une colonne censée être unique et en ne gardant que les groupes de plus d'une ligne (avec <code>HAVING</code>), on débusque les doublons — l'un des contrôles les plus utilisés du métier.</p><pre><code>SELECT email, COUNT(*) AS occurrences\nFROM customers\nWHERE email IS NOT NULL\nGROUP BY email\nHAVING COUNT(*) &gt; 1;</code></pre><h3>WHERE ou HAVING ?</h3><p><code>WHERE</code> filtre les lignes <em>avant</em> le regroupement ; <code>HAVING</code> filtre les groupes <em>après</em> (il peut donc porter sur un <code>COUNT</code>). Les confondre est une erreur classique.</p><div class=\"callout\">Avec <code>SELECT</code>, <code>WHERE</code>, <code>ORDER BY</code> et <code>GROUP BY</code>, tu disposes déjà de l'essentiel pour profiler une table et y traquer manquants et doublons. C'est le socle de tout le parcours.</div>", "minutes": 11}};
  CURRICULUM.modules.forEach(function(m){ m.lessons.forEach(function(l){ if (ENR[l.id]) { l.theory = ENR[l.id].theory; if (ENR[l.id].minutes) l.minutes = ENR[l.id].minutes; } }); });
