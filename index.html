(function(){
  if (typeof CURRICULUM === 'undefined' || !CURRICULUM.modules) return;
  var EX = {"pj1l1": {"prompt": "Profile le catalogue avant de juger : affiche le <b>nombre de lignes</b>, le <b>nombre de prix renseignés</b> (non NULL) et le <b>nombre de SKU distincts</b>. Colonnes attendues, dans l'ordre : <code>lignes</code>, <code>prix_renseignes</code>, <code>sku_distincts</code>.", "dataset": "catalogue(sku, nom, categorie, prix, stock, actif)", "starter": "-- Rappel : COUNT(*) compte les lignes, COUNT(col) ignore les NULL, COUNT(DISTINCT col) compte les valeurs uniques\nSELECT\n  COUNT(*) AS lignes\n  -- TODO : ajoute prix_renseignes (COUNT(prix)) et sku_distincts (COUNT(DISTINCT sku))\nFROM catalogue;", "solution": "SELECT COUNT(*) AS lignes,\n       COUNT(prix) AS prix_renseignes,\n       COUNT(DISTINCT sku) AS sku_distincts\nFROM catalogue;", "expected": {"columns": ["lignes", "prix_renseignes", "sku_distincts"], "values": [[18, 17, 17]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}, "pj1l2": {"prompt": "Compte le <b>nombre de lignes présentant au moins une anomalie</b> : nom, catégorie ou prix manquant, <b>OU</b> prix ≤ 0, <b>OU</b> prix &gt; 1000, <b>OU</b> stock &lt; 0, <b>OU</b> actif hors {0,1}. Colonne : <code>lignes_fautives</code>.", "dataset": "catalogue(sku, nom, categorie, prix, stock, actif)", "starter": "SELECT COUNT(*) AS lignes_fautives\nFROM catalogue\nWHERE nom IS NULL OR categorie IS NULL OR prix IS NULL\n  -- TODO : complète avec  OR prix <= 0  OR prix > 1000  OR stock < 0  OR actif NOT IN (0,1)\n;", "solution": "SELECT COUNT(*) AS lignes_fautives\nFROM catalogue\nWHERE nom IS NULL OR categorie IS NULL OR prix IS NULL\n   OR prix <= 0 OR prix > 1000 OR stock < 0 OR actif NOT IN (0,1);", "expected": {"columns": ["lignes_fautives"], "values": [[8]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}, "pj1l3": {"prompt": "Combien de produits sont en <b>rupture de stock</b> (stock = 0) dans le catalogue ? Colonne : <code>ruptures</code>.", "dataset": "catalogue(sku, nom, categorie, prix, stock, actif)", "starter": "-- Additionne 1 pour chaque ligne où stock vaut 0\nSELECT 0 AS ruptures   -- TODO : remplace 0 par SUM(CASE WHEN stock = 0 THEN 1 ELSE 0 END)\nFROM catalogue;", "solution": "SELECT SUM(CASE WHEN stock = 0 THEN 1 ELSE 0 END) AS ruptures\nFROM catalogue;", "expected": {"columns": ["ruptures"], "values": [[2]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}, "pj1l4": {"prompt": "Calcule le <b>taux de conformité</b> du catalogue : <code>total</code> des lignes, <code>conformes</code> (aucune anomalie) et <code>taux</code> en %. Une ligne est conforme si elle ne déclenche AUCUNE des règles de l'étape 2.", "dataset": "catalogue(sku, nom, categorie, prix, stock, actif)", "starter": "WITH defauts AS (\n  SELECT sku,\n    (nom IS NULL OR categorie IS NULL OR prix IS NULL\n     OR prix <= 0 OR prix > 1000 OR stock < 0 OR actif NOT IN (0,1)) AS ko\n  FROM catalogue\n)\nSELECT COUNT(*) AS total,\n       -- TODO : conformes = SUM(CASE WHEN ko THEN 0 ELSE 1 END)\n       -- TODO : taux = ROUND(100.0 * conformes / COUNT(*), 1)\n       0 AS conformes, 0.0 AS taux\nFROM defauts;", "solution": "WITH defauts AS (\n  SELECT sku,\n    (nom IS NULL OR categorie IS NULL OR prix IS NULL\n     OR prix <= 0 OR prix > 1000 OR stock < 0 OR actif NOT IN (0,1)) AS ko\n  FROM catalogue\n)\nSELECT COUNT(*) AS total,\n       SUM(CASE WHEN ko THEN 0 ELSE 1 END) AS conformes,\n       ROUND(100.0*SUM(CASE WHEN ko THEN 0 ELSE 1 END)/COUNT(*),1) AS taux\nFROM defauts;", "expected": {"columns": ["total", "conformes", "taux"], "values": [[18, 10, 55.6]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}, "pj2l1": {"prompt": "Mesure la <b>complétude des emails</b> clients : <code>clients</code> (total), <code>email_renseignes</code>, <code>pct_email</code> (%), <code>email_manquants</code>.", "dataset": "customers(customer_id, email, country_code)", "starter": "SELECT\n  COUNT(*) AS clients,\n  COUNT(email) AS email_renseignes,\n  -- TODO : pct_email = ROUND(100.0*COUNT(email)/COUNT(*),1)\n  -- TODO : email_manquants = SUM(CASE WHEN email IS NULL THEN 1 ELSE 0 END)\n  0.0 AS pct_email, 0 AS email_manquants\nFROM customers;", "solution": "SELECT COUNT(*) AS clients,\n       COUNT(email) AS email_renseignes,\n       ROUND(100.0*COUNT(email)/COUNT(*),1) AS pct_email,\n       SUM(CASE WHEN email IS NULL THEN 1 ELSE 0 END) AS email_manquants\nFROM customers;", "expected": {"columns": ["clients", "email_renseignes", "pct_email", "email_manquants"], "values": [[8, 6, 75.0, 2]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}, "pj2l2": {"prompt": "Trouve les <b>emails en double</b> (un même email rattaché à plusieurs clients). Colonnes : <code>email</code>, <code>occurrences</code>.", "dataset": "customers(customer_id, email, country_code)", "starter": "SELECT email, COUNT(*) AS occurrences\nFROM customers\nWHERE email IS NOT NULL\nGROUP BY email\n-- TODO : ne garde que les groupes de plus d'une occurrence (HAVING …)\n;", "solution": "SELECT email, COUNT(*) AS occurrences\nFROM customers\nWHERE email IS NOT NULL\nGROUP BY email\nHAVING COUNT(*) > 1;", "expected": {"columns": ["email", "occurrences"], "values": [["bob@example.com", 2]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}, "pj2l3": {"prompt": "Liste <b>toutes les valeurs invalides</b> en une requête (UNION ALL) : pays hors {FR,BE,DE,IT}, devises ≠ EUR, montants ≤ 0. Colonnes : <code>probleme</code>, <code>ref</code>, <code>valeur</code> (le montant converti en texte avec <code>CAST(... AS TEXT)</code>).", "dataset": "customers(customer_id, email, country_code) · orders(order_id, customer_id, amount_ttc, currency)", "starter": "SELECT 'pays invalide' AS probleme, customer_id AS ref, country_code AS valeur\nFROM customers WHERE country_code NOT IN ('FR','BE','DE','IT')\n-- TODO : UNION ALL pour les devises (orders.currency <> 'EUR')\n-- TODO : UNION ALL pour les montants (orders.amount_ttc <= 0), avec CAST(amount_ttc AS TEXT)\n;", "solution": "SELECT 'pays invalide' AS probleme, customer_id AS ref, country_code AS valeur\nFROM customers WHERE country_code NOT IN ('FR','BE','DE','IT')\nUNION ALL\nSELECT 'devise non EUR', order_id, currency\nFROM orders WHERE currency <> 'EUR'\nUNION ALL\nSELECT 'montant <= 0', order_id, CAST(amount_ttc AS TEXT)\nFROM orders WHERE amount_ttc <= 0;", "expected": {"columns": ["probleme", "ref", "valeur"], "values": [["pays invalide", 4, "XX"], ["devise non EUR", 4, "USD"], ["devise non EUR", 5, "XYZ"], ["montant <= 0", 2, "-5.0"], ["montant <= 0", 7, "0.0"]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}, "pj2l4": {"prompt": "Trouve les <b>commandes orphelines</b> (un <code>customer_id</code> absent de <code>customers</code>). Colonnes : <code>order_id</code>, <code>customer_id</code>, <code>amount_ttc</code>.", "dataset": "customers(customer_id, email, country_code) · orders(order_id, customer_id, amount_ttc, currency)", "starter": "SELECT o.order_id, o.customer_id, o.amount_ttc\nFROM orders o\nLEFT JOIN customers c ON c.customer_id = o.customer_id\n-- TODO : ne garde que les commandes SANS client correspondant (c.customer_id IS NULL)\n;", "solution": "SELECT o.order_id, o.customer_id, o.amount_ttc\nFROM orders o\nLEFT JOIN customers c ON c.customer_id = o.customer_id\nWHERE c.customer_id IS NULL;", "expected": {"columns": ["order_id", "customer_id", "amount_ttc"], "values": [[9, 99, 60.0]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}, "pj2l5": {"prompt": "Calcule le <b>taux de conformité clients</b> : un client est conforme s'il a un email présent <b>ET</b> un pays valide <b>ET</b> un email non dupliqué. Colonnes : <code>clients</code>, <code>conformes</code>, <code>taux</code>.", "dataset": "customers(customer_id, email, country_code)", "starter": "WITH dup AS (\n  SELECT email FROM customers WHERE email IS NOT NULL\n  GROUP BY email HAVING COUNT(*) > 1\n)\nSELECT COUNT(*) AS clients,\n       -- TODO : conformes = clients sans aucun défaut (email NULL, pays invalide, ou email dans dup)\n       0 AS conformes, 0.0 AS taux\nFROM customers;", "solution": "WITH dup AS (\n  SELECT email FROM customers WHERE email IS NOT NULL\n  GROUP BY email HAVING COUNT(*) > 1\n),\nflag AS (\n  SELECT customer_id,\n    (email IS NULL OR country_code NOT IN ('FR','BE','DE','IT') OR email IN (SELECT email FROM dup)) AS ko\n  FROM customers\n)\nSELECT COUNT(*) AS clients,\n       SUM(CASE WHEN ko THEN 0 ELSE 1 END) AS conformes,\n       ROUND(100.0*SUM(CASE WHEN ko THEN 0 ELSE 1 END)/COUNT(*),1) AS taux\nFROM flag;", "expected": {"columns": ["clients", "conformes", "taux"], "values": [[8, 3, 37.5]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}, "m7l2": {"prompt": "Reproduis la requête SQL que <b>compile</b> le test dbt <code>relationships</code> (orders.customer_id → customers.customer_id) : remonte les <code>customer_id</code> de commandes <b>sans client correspondant</b>, avec leur nombre. Colonnes : <code>customer_id</code>, <code>commandes_sans_client</code>. <i>Un test qui renvoie des lignes = échec.</i>", "dataset": "customers(customer_id, email, country_code) · orders(order_id, customer_id, amount_ttc, currency)", "starter": "SELECT o.customer_id, COUNT(*) AS commandes_sans_client\nFROM orders o\nLEFT JOIN customers c ON c.customer_id = o.customer_id\n-- TODO : garder les orphelines (c.customer_id IS NULL) puis GROUP BY o.customer_id\n;", "solution": "SELECT o.customer_id, COUNT(*) AS commandes_sans_client\nFROM orders o\nLEFT JOIN customers c ON c.customer_id = o.customer_id\nWHERE c.customer_id IS NULL\nGROUP BY o.customer_id;", "expected": {"columns": ["customer_id", "commandes_sans_client"], "values": [[99, 1]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}, "m7l3": {"prompt": "Produis l'<b>instantané de monitoring</b> des commandes : <code>volume</code>, <code>panier_moyen</code> (moyenne du montant, arrondie à 2 décimales), <code>pct_montant_invalide</code> (% de montants ≤ 0, 1 décimale) et <code>pct_devise_anormale</code> (% de devises ≠ EUR, 1 décimale), dans cet ordre.", "dataset": "orders(order_id, customer_id, amount_ttc, currency)", "starter": "SELECT\n  COUNT(*) AS volume,\n  ROUND(AVG(amount_ttc), 2) AS panier_moyen,\n  -- TODO : pct_montant_invalide = ROUND(100.0*SUM(CASE WHEN amount_ttc<=0 THEN 1 ELSE 0 END)/COUNT(*),1)\n  -- TODO : pct_devise_anormale = ROUND(100.0*SUM(CASE WHEN currency<>'EUR' THEN 1 ELSE 0 END)/COUNT(*),1)\n  0.0 AS pct_montant_invalide, 0.0 AS pct_devise_anormale\nFROM orders;", "solution": "SELECT\n  COUNT(*) AS volume,\n  ROUND(AVG(amount_ttc),2) AS panier_moyen,\n  ROUND(100.0*SUM(CASE WHEN amount_ttc <= 0 THEN 1 ELSE 0 END)/COUNT(*),1) AS pct_montant_invalide,\n  ROUND(100.0*SUM(CASE WHEN currency <> 'EUR' THEN 1 ELSE 0 END)/COUNT(*),1) AS pct_devise_anormale\nFROM orders;", "expected": {"columns": ["volume", "panier_moyen", "pct_montant_invalide", "pct_devise_anormale"], "values": [[9, 97.83, 22.2, 22.2]]}, "lang": "sql", "datasetTitle": "Tables disponibles"}};

  var SQL_MODULES = [{"formation": "sql", "track": "sql-bases", "id": "sq1", "title": "Premiers pas en SQL", "desc": "Ce qu'est une base, lire une table, choisir ses colonnes.", "lessons": [{"id": "sq1l1", "title": "Une base, des tables", "minutes": 9, "theory": "<p>Une <strong>base de données</strong> range l'information dans des <strong>tables</strong> : des grilles où chaque <strong>ligne</strong> est un enregistrement (ici, un film) et chaque <strong>colonne</strong> une information (titre, année, note…).</p><p><strong>SQL</strong> est le langage qui sert à <em>interroger</em> ces tables. La requête de base se lit presque comme une phrase : « <code>SELECT</code> (sélectionne) telles colonnes <code>FROM</code> (depuis) telle table ». L'étoile <code>*</code> veut dire « toutes les colonnes ».</p><div class=\"section-label\">Exemple</div><pre><code>SELECT * FROM realisateurs;</code></pre><p>Cette requête renvoie toutes les colonnes et toutes les lignes de la table des réalisateurs.</p><div class=\"note\">Le bac à sable ci-contre est libre : tape une requête, exécute, observe. Tu ne peux rien casser.</div>", "quiz": [{"q": "Que renvoie <code>SELECT *</code> ?", "options": ["Une seule colonne", "Toutes les colonnes", "Le nombre de lignes", "Rien"], "answer": 1, "explain": "L'étoile sélectionne l'ensemble des colonnes de la table."}], "exercise": {"lang": "sql", "prompt": "Affiche <strong>toutes les colonnes</strong> de <strong>tous les films</strong> de la table <code>films</code>.", "starter": "SELECT  FROM films;", "solution": "SELECT * FROM films;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [[1, "Parasite", 2019, "Thriller", 132, 8.5, 2], [2, "Le Voyage de Chihiro", 2001, "Animation", 125, 8.6, 3], [3, "Dune", 2021, "Science-fiction", 155, 8.0, 4], [4, "Barbie", 2023, "Comédie", 114, 7.0, 1], [5, "Portrait de la jeune fille en feu", 2019, "Drame", 122, 8.1, 5], [6, "Interstellar", 2014, "Science-fiction", 169, 8.7, 6], [7, "Mon voisin Totoro", 1988, "Animation", 86, 8.2, 3], [8, "Oppenheimer", 2023, "Drame", 180, 8.4, 6], [9, "Les Filles du Docteur March", 2019, "Drame", 135, 7.8, 1], [10, "Memories of Murder", 2003, "Thriller", 132, 8.1, 2], [11, "Princesse Mononoke", 1997, "Animation", 134, 8.3, 3], [12, "Premier Contact", 2016, "Science-fiction", 116, 7.9, 4], [13, "Tenet", 2020, "Science-fiction", 150, null, 6]]}}, "sandbox": {"starter": "SELECT * FROM films;"}}, {"id": "sq1l2", "title": "Choisir ses colonnes", "minutes": 8, "theory": "<p>Le plus souvent on ne veut pas tout : on <strong>liste les colonnes</strong> voulues, séparées par des virgules, dans l'ordre où on veut les voir.</p><p>Sélectionner peu de colonnes rend le résultat plus lisible et la requête plus rapide sur de grandes tables.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT nom, pays FROM realisateurs;</code></pre><p>On obtient deux colonnes seulement : le nom et le pays de chaque réalisateur.</p>", "quiz": [{"q": "Comment choisir plusieurs colonnes précises ?", "options": ["Les séparer par des virgules", "Les séparer par des points", "Utiliser *", "Impossible"], "answer": 0, "explain": "On liste les colonnes séparées par des virgules après SELECT."}], "exercise": {"lang": "sql", "prompt": "Affiche le <strong>titre</strong> et l'<strong>année</strong> de chaque film, dans cet ordre.", "starter": "SELECT  FROM films;", "solution": "SELECT titre, annee FROM films;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Parasite", 2019], ["Le Voyage de Chihiro", 2001], ["Dune", 2021], ["Barbie", 2023], ["Portrait de la jeune fille en feu", 2019], ["Interstellar", 2014], ["Mon voisin Totoro", 1988], ["Oppenheimer", 2023], ["Les Filles du Docteur March", 2019], ["Memories of Murder", 2003], ["Princesse Mononoke", 1997], ["Premier Contact", 2016], ["Tenet", 2020]]}}}]}, {"formation": "sql", "track": "sql-bases", "id": "sq2", "title": "Trier et limiter", "desc": "Ranger les résultats et n'en garder qu'une partie.", "lessons": [{"id": "sq2l1", "title": "Trier avec ORDER BY", "minutes": 9, "theory": "<p><code>ORDER BY</code> trie le résultat selon une colonne. Par défaut le tri est croissant (<code>ASC</code>) ; on ajoute <code>DESC</code> pour l'ordre décroissant.</p><p>Le tri ne change pas les données, seulement l'affichage.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT titre, annee FROM films ORDER BY annee DESC;</code></pre><p>Les films s'affichent du plus récent au plus ancien.</p>", "quiz": [{"q": "Que fait <code>DESC</code> dans un ORDER BY ?", "options": ["Trie du plus petit au plus grand", "Trie du plus grand au plus petit", "Supprime des lignes", "Compte les lignes"], "answer": 1, "explain": "DESC = ordre décroissant (du plus grand au plus petit)."}], "exercise": {"lang": "sql", "prompt": "Affiche le <strong>titre</strong> et la <strong>note</strong> de chaque film, des <strong>mieux notés</strong> aux moins bien notés.", "starter": "SELECT titre, note FROM films ORDER BY ... ;", "solution": "SELECT titre, note FROM films ORDER BY note DESC;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Interstellar", 8.7], ["Le Voyage de Chihiro", 8.6], ["Parasite", 8.5], ["Oppenheimer", 8.4], ["Princesse Mononoke", 8.3], ["Mon voisin Totoro", 8.2], ["Portrait de la jeune fille en feu", 8.1], ["Memories of Murder", 8.1], ["Dune", 8.0], ["Premier Contact", 7.9], ["Les Filles du Docteur March", 7.8], ["Barbie", 7.0], ["Tenet", null]]}}}, {"id": "sq2l2", "title": "Limiter et renommer (LIMIT, AS)", "minutes": 9, "theory": "<p><code>LIMIT n</code> ne garde que les n premières lignes du résultat — pratique pour un « top 5 ».</p><p><code>AS</code> donne un <strong>alias</strong> à une colonne, c'est-à-dire un nom d'affichage plus parlant.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT titre, note AS evaluation FROM films ORDER BY note DESC LIMIT 5;</code></pre><p>On obtient les 5 meilleurs films, avec la colonne note affichée sous le nom « evaluation ».</p>", "quiz": [{"q": "À quoi sert <code>LIMIT 3</code> ?", "options": ["Garder 3 colonnes", "Garder les 3 premières lignes", "Trier par 3", "Rien"], "answer": 1, "explain": "LIMIT borne le nombre de lignes renvoyées."}], "exercise": {"lang": "sql", "prompt": "Affiche les <strong>3 films les plus longs</strong> : le <strong>titre</strong> et la <strong>durée</strong>, en renommant la durée <code>minutes</code>.", "starter": "SELECT titre, duree_min AS minutes FROM films ORDER BY ... LIMIT 3;", "solution": "SELECT titre, duree_min AS minutes FROM films ORDER BY duree_min DESC LIMIT 3;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Oppenheimer", 180], ["Interstellar", 169], ["Dune", 155]]}}}]}, {"formation": "sql", "track": "sql-bases", "id": "sq3", "title": "Filtrer les lignes", "desc": "Ne garder que les lignes qui respectent une condition.", "lessons": [{"id": "sq3l1", "title": "La clause WHERE", "minutes": 9, "theory": "<p><code>WHERE</code> filtre les lignes selon une condition. On compare une colonne avec <code>=</code>, <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code> ou <code>&lt;&gt;</code> (différent).</p><p>Le texte se met entre guillemets simples : <code>genre = 'Drame'</code>.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT titre, note FROM films WHERE note &amp;gt;= 8.3;</code></pre><p>Seuls les films notés 8,3 ou plus apparaissent.</p>", "quiz": [{"q": "Comment écrire « strictement supérieur à » ?", "options": ["&gt;=", "&gt;", "=", "&lt;"], "answer": 1, "explain": "Le signe &gt; signifie strictement supérieur ; &gt;= inclut l'égalité."}], "exercise": {"lang": "sql", "prompt": "Affiche le <strong>titre</strong> des films sortis <strong>après 2018</strong> (année strictement supérieure à 2018).", "starter": "SELECT titre FROM films WHERE annee ... ;", "solution": "SELECT titre FROM films WHERE annee > 2018;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Parasite"], ["Dune"], ["Barbie"], ["Portrait de la jeune fille en feu"], ["Oppenheimer"], ["Les Filles du Docteur March"], ["Tenet"]]}}}, {"id": "sq3l2", "title": "Combiner les conditions", "minutes": 10, "theory": "<p>On combine des conditions avec <code>AND</code> (les deux) et <code>OR</code> (l'une ou l'autre). <code>IN (…)</code> teste l'appartenance à une liste, <code>BETWEEN a AND b</code> un intervalle, et <code>LIKE</code> un motif de texte (<code>%</code> = n'importe quelle suite de caractères).</p><p>Attention aux valeurs vides : on les teste avec <code>IS NULL</code> ou <code>IS NOT NULL</code>, jamais avec <code>=</code>.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT titre FROM films WHERE annee BETWEEN 2000 AND 2010;</code></pre><p>On récupère les films sortis entre 2000 et 2010 inclus.</p><div class=\"note\"><code>genre IN ('Animation','Drame')</code> est plus court que <code>genre = 'Animation' OR genre = 'Drame'</code>.</div>", "quiz": [{"q": "Comment tester une valeur manquante ?", "options": ["= NULL", "IS NULL", "== NULL", "EMPTY"], "answer": 1, "explain": "On utilise IS NULL ; l'égalité avec NULL ne fonctionne pas en SQL."}], "exercise": {"lang": "sql", "prompt": "Affiche le <strong>titre</strong> et le <strong>genre</strong> des films dont le genre est <strong>Animation</strong> ou <strong>Thriller</strong>.", "starter": "SELECT titre, genre FROM films WHERE genre IN ( ... );", "solution": "SELECT titre, genre FROM films WHERE genre IN ('Animation','Thriller');", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Parasite", "Thriller"], ["Le Voyage de Chihiro", "Animation"], ["Mon voisin Totoro", "Animation"], ["Memories of Murder", "Thriller"], ["Princesse Mononoke", "Animation"]]}}}]}, {"formation": "sql", "track": "sql-inter", "id": "sq4", "title": "Calculer et transformer", "desc": "Créer des colonnes calculées et des étiquettes conditionnelles.", "lessons": [{"id": "sq4l1", "title": "Colonnes calculées & fonctions", "minutes": 10, "theory": "<p>On peut <strong>calculer</strong> de nouvelles colonnes : <code>duree_min / 60.0</code>, ou utiliser des fonctions comme <code>ROUND(x, 1)</code> (arrondi), <code>UPPER(t)</code> (majuscules), <code>LENGTH(t)</code> (longueur du texte).</p><p>On divise par <code>60.0</code> (et non <code>60</code>) pour forcer un résultat à virgule ; sinon SQL ferait une division entière.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT titre, UPPER(genre) AS genre_maj FROM films;</code></pre><p>Le genre s'affiche en majuscules, sans modifier la table d'origine.</p>", "quiz": [{"q": "Pourquoi diviser par <code>60.0</code> plutôt que <code>60</code> ?", "options": ["C'est pareil", "Pour forcer un résultat décimal", "Pour aller plus vite", "Pour arrondir"], "answer": 1, "explain": "Diviser par un nombre entier donne une division entière ; 60.0 force le calcul en virgule flottante."}], "exercise": {"lang": "sql", "prompt": "Pour chaque film, affiche le <strong>titre</strong> et sa <strong>durée en heures</strong> (<code>duree_min / 60.0</code>) <strong>arrondie à 1 décimale</strong>, dans une colonne <code>heures</code>.", "starter": "SELECT titre, ROUND( ... , 1) AS heures FROM films;", "solution": "SELECT titre, ROUND(duree_min / 60.0, 1) AS heures FROM films;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Parasite", 2.2], ["Le Voyage de Chihiro", 2.1], ["Dune", 2.6], ["Barbie", 1.9], ["Portrait de la jeune fille en feu", 2.0], ["Interstellar", 2.8], ["Mon voisin Totoro", 1.4], ["Oppenheimer", 3.0], ["Les Filles du Docteur March", 2.3], ["Memories of Murder", 2.2], ["Princesse Mononoke", 2.2], ["Premier Contact", 1.9], ["Tenet", 2.5]]}}}, {"id": "sq4l2", "title": "Conditions avec CASE", "minutes": 10, "theory": "<p><code>CASE WHEN condition THEN valeur ... ELSE autre END</code> crée une colonne dont la valeur dépend d'une condition — comme un « si… alors… sinon ».</p><p>C'est idéal pour transformer des nombres en étiquettes lisibles (catégories, verdicts, tranches).</p><div class=\"section-label\">Exemple</div><pre><code>SELECT titre,\n  CASE WHEN annee &amp;gt;= 2015 THEN 'Récent' ELSE 'Ancien' END AS epoque\nFROM films;</code></pre><p>Chaque film reçoit l'étiquette « Récent » ou « Ancien » selon son année.</p>", "quiz": [{"q": "Que renvoie un CASE quand aucune condition n'est vraie ?", "options": ["NULL ou la valeur du ELSE", "Une erreur", "0", "La première valeur"], "answer": 0, "explain": "Sans ELSE on obtient NULL ; avec ELSE, c'est sa valeur qui s'applique."}], "exercise": {"lang": "sql", "prompt": "Affiche le <strong>titre</strong> et une colonne <code>verdict</code> valant <strong>'Excellent'</strong> si la note est ≥ 8.3, sinon <strong>'Bien'</strong>.", "starter": "SELECT titre,\n  CASE WHEN note >= 8.3 THEN 'Excellent' ELSE 'Bien' END AS verdict\nFROM films;", "solution": "SELECT titre, CASE WHEN note >= 8.3 THEN 'Excellent' ELSE 'Bien' END AS verdict FROM films;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Parasite", "Excellent"], ["Le Voyage de Chihiro", "Excellent"], ["Dune", "Bien"], ["Barbie", "Bien"], ["Portrait de la jeune fille en feu", "Bien"], ["Interstellar", "Excellent"], ["Mon voisin Totoro", "Bien"], ["Oppenheimer", "Excellent"], ["Les Filles du Docteur March", "Bien"], ["Memories of Murder", "Bien"], ["Princesse Mononoke", "Excellent"], ["Premier Contact", "Bien"], ["Tenet", "Bien"]]}}}]}, {"formation": "sql", "track": "sql-inter", "id": "sq5", "title": "Agréger et regrouper", "desc": "Compter, résumer, et calculer par groupe.", "lessons": [{"id": "sq5l1", "title": "Compter et résumer", "minutes": 9, "theory": "<p>Les <strong>fonctions d'agrégation</strong> résument plusieurs lignes en une valeur : <code>COUNT(*)</code> (nombre de lignes), <code>AVG(x)</code> (moyenne), <code>SUM(x)</code> (somme), <code>MIN</code>/<code>MAX</code>.</p><p>Astuce : <code>AVG</code>, <code>SUM</code>, etc. <strong>ignorent les valeurs NULL</strong>.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT AVG(note) AS note_moyenne, MAX(duree_min) AS plus_long FROM films;</code></pre><p>Une seule ligne en sortie : la note moyenne et la durée maximale.</p>", "quiz": [{"q": "Que comptabilise <code>COUNT(*)</code> ?", "options": ["Les colonnes", "Le nombre de lignes", "Les valeurs NULL seulement", "Les tables"], "answer": 1, "explain": "COUNT(*) compte toutes les lignes du résultat."}], "exercise": {"lang": "sql", "prompt": "Combien y a-t-il de films dans la table ? Renvoie <strong>une seule valeur</strong>, dans une colonne <code>nb</code>.", "starter": "SELECT COUNT(*) AS nb FROM films;", "solution": "SELECT COUNT(*) AS nb FROM films;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [[13]]}}}, {"id": "sq5l2", "title": "Regrouper avec GROUP BY", "minutes": 11, "theory": "<p><code>GROUP BY</code> calcule une agrégation <strong>par groupe</strong> : une ligne de résultat par valeur distincte de la colonne de regroupement.</p><p>Pour filtrer <em>après</em> l'agrégation (sur le résultat d'un COUNT, par exemple), on utilise <code>HAVING</code> et non <code>WHERE</code>.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT genre, COUNT(*) AS nb FROM films GROUP BY genre;</code></pre><p>On obtient le nombre de films par genre.</p><div class=\"note\"><code>WHERE</code> filtre les lignes avant le regroupement ; <code>HAVING</code> filtre les groupes après.</div>", "quiz": [{"q": "Pour filtrer sur un COUNT, on utilise…", "options": ["WHERE", "HAVING", "ORDER BY", "LIMIT"], "answer": 1, "explain": "HAVING filtre après l'agrégation ; WHERE agit avant et ne connaît pas le COUNT."}], "exercise": {"lang": "sql", "prompt": "Pour chaque <strong>genre</strong>, affiche le genre et le <strong>nombre de films</strong> (colonne <code>nb</code>), en ne gardant que les genres comptant <strong>au moins 3 films</strong>.", "starter": "SELECT genre, COUNT(*) AS nb FROM films GROUP BY genre HAVING ... ;", "solution": "SELECT genre, COUNT(*) AS nb FROM films GROUP BY genre HAVING COUNT(*) >= 3;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Animation", 3], ["Drame", 3], ["Science-fiction", 4]]}}}]}, {"formation": "sql", "track": "sql-avance", "id": "sq6", "title": "Joindre des tables", "desc": "Relier les films à leurs réalisateurs.", "lessons": [{"id": "sq6l1", "title": "Relier deux tables (INNER JOIN)", "minutes": 11, "theory": "<p>Les données sont réparties dans plusieurs tables reliées par des <strong>clés</strong> : <code>films.real_id</code> pointe vers <code>realisateurs.real_id</code>.</p><p><code>JOIN ... ON</code> recompose l'information : on précise la condition de liaison. Les <strong>alias de table</strong> (<code>films f</code>) raccourcissent l'écriture.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT f.titre, r.pays\nFROM films f\nJOIN realisateurs r ON f.real_id = r.real_id;</code></pre><p>Chaque film est associé au pays de son réalisateur.</p>", "quiz": [{"q": "À quoi sert la condition <code>ON</code> d'un JOIN ?", "options": ["À trier", "À indiquer comment relier les deux tables", "À filtrer les NULL", "À limiter"], "answer": 1, "explain": "ON précise la correspondance entre les clés des deux tables."}], "exercise": {"lang": "sql", "prompt": "Affiche le <strong>titre</strong> de chaque film et le <strong>nom</strong> de son réalisateur (colonnes <code>titre</code> puis <code>nom</code>).", "starter": "SELECT f.titre, r.nom\nFROM films f\nJOIN realisateurs r ON ... ;", "solution": "SELECT f.titre, r.nom FROM films f JOIN realisateurs r ON f.real_id = r.real_id;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Parasite", "Bong Joon-ho"], ["Le Voyage de Chihiro", "Hayao Miyazaki"], ["Dune", "Denis Villeneuve"], ["Barbie", "Greta Gerwig"], ["Portrait de la jeune fille en feu", "Céline Sciamma"], ["Interstellar", "Christopher Nolan"], ["Mon voisin Totoro", "Hayao Miyazaki"], ["Oppenheimer", "Christopher Nolan"], ["Les Filles du Docteur March", "Greta Gerwig"], ["Memories of Murder", "Bong Joon-ho"], ["Princesse Mononoke", "Hayao Miyazaki"], ["Premier Contact", "Denis Villeneuve"], ["Tenet", "Christopher Nolan"]]}}}, {"id": "sq6l2", "title": "Tout garder à gauche (LEFT JOIN)", "minutes": 11, "theory": "<p>Un <code>JOIN</code> classique (INNER) ne garde que les lignes qui ont une correspondance des deux côtés. Un <code>LEFT JOIN</code> garde <strong>toutes</strong> les lignes de la table de gauche, même sans correspondance à droite (les colonnes de droite valent alors NULL).</p><p>C'est ainsi qu'on repère, par exemple, un réalisateur sans aucun film. On compte les correspondances avec <code>COUNT(colonne_de_droite)</code>, qui ignore les NULL.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT r.nom, f.titre\nFROM realisateurs r\nLEFT JOIN films f ON f.real_id = r.real_id;</code></pre><p>Tous les réalisateurs apparaissent, y compris ceux sans film (titre vide).</p>", "quiz": [{"q": "Que garde un <code>LEFT JOIN</code> ?", "options": ["Seulement les correspondances", "Toutes les lignes de gauche", "Toutes les lignes de droite", "Aucune"], "answer": 1, "explain": "Le LEFT JOIN conserve toutes les lignes de la table de gauche, complétées par NULL si rien à droite."}], "exercise": {"lang": "sql", "prompt": "Affiche le <strong>nom</strong> de chaque réalisateur et son <strong>nombre de films</strong> (colonne <code>nb</code>, 0 compris).", "starter": "SELECT r.nom, COUNT(f.film_id) AS nb\nFROM realisateurs r\nLEFT JOIN films f ON f.real_id = r.real_id\nGROUP BY r.real_id, r.nom;", "solution": "SELECT r.nom, COUNT(f.film_id) AS nb FROM realisateurs r LEFT JOIN films f ON f.real_id = r.real_id GROUP BY r.real_id, r.nom;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Greta Gerwig", 2], ["Bong Joon-ho", 2], ["Hayao Miyazaki", 3], ["Denis Villeneuve", 2], ["Céline Sciamma", 1], ["Christopher Nolan", 3], ["Agnès Varda", 0]]}}}]}, {"formation": "sql", "track": "sql-avance", "id": "sq7", "title": "Aller plus loin", "desc": "Doublons et sous-requêtes.", "lessons": [{"id": "sq7l1", "title": "Éliminer les doublons (DISTINCT)", "minutes": 8, "theory": "<p><code>DISTINCT</code> supprime les lignes en double du résultat : utile pour obtenir la liste des valeurs <em>uniques</em> d'une colonne.</p><p>Ici, plusieurs films partagent le même genre ; DISTINCT donne la liste des genres sans répétition.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT DISTINCT pays FROM realisateurs;</code></pre><p>On obtient la liste des pays distincts, sans doublon.</p>", "quiz": [{"q": "Que fait <code>DISTINCT</code> ?", "options": ["Trie le résultat", "Retire les doublons", "Compte les lignes", "Filtre les NULL"], "answer": 1, "explain": "DISTINCT renvoie les valeurs uniques en supprimant les répétitions."}], "exercise": {"lang": "sql", "prompt": "Affiche la liste des <strong>genres distincts</strong> présents dans la table <code>films</code>.", "starter": "SELECT DISTINCT ... FROM films;", "solution": "SELECT DISTINCT genre FROM films;", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Thriller"], ["Animation"], ["Science-fiction"], ["Comédie"], ["Drame"]]}}}, {"id": "sq7l2", "title": "Les sous-requêtes", "minutes": 12, "theory": "<p>Une <strong>sous-requête</strong> est une requête imbriquée entre parenthèses, dont le résultat sert à la requête principale. Elle permet de comparer à une valeur calculée — par exemple la moyenne.</p><p>Ici, <code>(SELECT AVG(note) FROM films)</code> calcule d'abord la note moyenne, puis on garde les films au-dessus.</p><div class=\"section-label\">Exemple</div><pre><code>SELECT titre, duree_min\nFROM films\nWHERE duree_min &amp;gt; (SELECT AVG(duree_min) FROM films);</code></pre><p>On affiche les films plus longs que la durée moyenne.</p><div class=\"note\">Le moteur exécute d'abord la sous-requête, puis l'utilise comme une valeur dans la requête principale.</div>", "quiz": [{"q": "Une sous-requête, c'est…", "options": ["Un commentaire", "Une requête imbriquée entre parenthèses", "Une table", "Un alias"], "answer": 1, "explain": "C'est une requête placée entre parenthèses dont le résultat alimente la requête englobante."}], "exercise": {"lang": "sql", "prompt": "Affiche le <strong>titre</strong> des films dont la note est <strong>supérieure à la note moyenne</strong> de tous les films.", "starter": "SELECT titre FROM films WHERE note > (SELECT AVG(note) FROM films);", "solution": "SELECT titre FROM films WHERE note > (SELECT AVG(note) FROM films);", "dataset": "films(film_id, titre, annee, genre, duree_min, note, real_id)\nrealisateurs(real_id, nom, pays)", "datasetTitle": "Voir les tables disponibles", "expected": {"values": [["Parasite"], ["Le Voyage de Chihiro"], ["Interstellar"], ["Mon voisin Totoro"], ["Oppenheimer"], ["Princesse Mononoke"]]}}, "sandbox": {"starter": "SELECT genre, ROUND(AVG(note),2) AS note_moy, COUNT(*) AS nb\nFROM films\nGROUP BY genre\nORDER BY note_moy DESC;"}}]}];
  CURRICULUM.modules.push.apply(CURRICULUM.modules, SQL_MODULES);
})();

<script>
/* Cours SQL — texte approfondi (sq1l1..sq7l2). Chargé après sql_course, avant course_schemas. */
(function(){
  if (typeof CURRICULUM === 'undefined' || !CURRICULUM.modules) return;
  var ENR = {"sq1l1": {"theory": "<p>Une <b>base de données</b> range l'information dans des <b>tables</b> : des grilles où chaque <b>ligne</b> est un enregistrement (ici, un film) et chaque <b>colonne</b> une information (titre, année, note…). Notre base contient deux tables : <code>films</code> et <code>realisateurs</code>.</p><div class=\"section-label\">Lire une table avec SELECT</div><p>SQL (<i>Structured Query Language</i>) est le langage pour interroger ces tables. La requête fondatrice se lit comme une phrase : <b>SELECT</b> (sélectionne) telles colonnes <b>FROM</b> (depuis) telle table. L'étoile <code>*</code> signifie « toutes les colonnes ».</p><pre><code>SELECT * FROM films;        -- toutes les colonnes, toutes les lignes</code></pre><p>Une requête ne modifie jamais les données : elle <b>renvoie un nouveau tableau</b>, calculé à la volée. Tu peux donc explorer sans rien casser.</p><div class=\"section-label\">Colonnes, types et clé</div><p>Chaque colonne a un <b>type</b> qui dit ce qu'elle accepte : un entier (<code>INTEGER</code>, ex. <code>annee</code>), du texte (<code>TEXT</code>, ex. <code>titre</code>), un nombre à virgule (<code>REAL</code>, ex. <code>note</code>). La table <code>films</code> a une <b>clé</b> <code>film_id</code> qui identifie chaque ligne de façon unique.</p><p>Quand une information manque, SQL inscrit <code>NULL</code> — un marqueur spécial, différent de 0 ou du texte vide. Le film « Tenet » a par exemple une <code>note</code> à <code>NULL</code> : on apprendra à le gérer.</p><div class=\"note\">Conventions : les mots-clés (SELECT, FROM…) s'écrivent en MAJUSCULES par lisibilité, et une requête se termine par un point-virgule <code>;</code>. Le bac à sable ci-contre est libre : tape, exécute, observe.</div>", "minutes": 8}, "sq1l2": {"theory": "<p>Afficher <code>*</code> est pratique pour explorer, mais en pratique on <b>cible les colonnes utiles</b> : la lecture est plus claire et la requête plus rapide. On liste simplement les colonnes voulues, séparées par des virgules.</p><pre><code>SELECT titre, annee, note\nFROM films;</code></pre><div class=\"section-label\">L'ordre que tu écris est l'ordre affiché</div><p>Les colonnes apparaissent dans l'<b>ordre du SELECT</b>, pas dans celui de la table. <code>SELECT annee, titre</code> et <code>SELECT titre, annee</code> renvoient les mêmes données, présentées différemment.</p><pre><code>SELECT annee, titre FROM films;   -- année d'abord</code></pre><div class=\"section-label\">Mélanger colonnes et calculs</div><p>Un SELECT peut contenir des colonnes <i>et</i> des expressions. On peut par exemple afficher la durée en heures (on verra les calculs en détail plus loin) :</p><pre><code>SELECT titre, duree_min, duree_min / 60.0 AS duree_h\nFROM films;</code></pre><div class=\"note\">Piège fréquent du débutant : une faute de frappe dans un nom de colonne (<code>tite</code> au lieu de <code>titre</code>) provoque une erreur « no such column ». Vérifie l'orthographe exacte des colonnes de la table.</div><div class=\"callout\">Bon réflexe d'analyste : commence par <code>SELECT * FROM table LIMIT 5;</code> pour découvrir une table inconnue, puis cible les colonnes dont tu as réellement besoin.</div>", "minutes": 8}, "sq2l1": {"theory": "<p>Par défaut, une table renvoie ses lignes dans un ordre quelconque. Pour les <b>trier</b>, on ajoute <code>ORDER BY</code> suivi de la colonne de tri. Trier ne change pas les données : seul l'affichage est réorganisé.</p><pre><code>SELECT titre, annee\nFROM films\nORDER BY annee;          -- du plus ancien au plus récent (croissant)</code></pre><div class=\"section-label\">Croissant (ASC) ou décroissant (DESC)</div><p>Le tri est <b>croissant par défaut</b> (<code>ASC</code>). Pour l'inverser, on précise <code>DESC</code> — indispensable pour faire ressortir les valeurs les plus élevées.</p><pre><code>SELECT titre, note\nFROM films\nORDER BY note DESC;      -- les mieux notés en premier</code></pre><div class=\"section-label\">Trier sur plusieurs colonnes</div><p>On peut enchaîner des critères : SQL trie d'abord sur le premier, puis départage les égalités avec le suivant.</p><pre><code>SELECT genre, titre, annee\nFROM films\nORDER BY genre, annee DESC;   -- par genre, puis du + récent au + ancien</code></pre><div class=\"note\">Les valeurs <code>NULL</code> ont un ordre de tri particulier (souvent regroupées au début ou à la fin selon le moteur). Le film « Tenet » (note NULL) le montre : ne sois pas surpris de le voir se ranger à une extrémité.</div>", "minutes": 8}, "sq2l2": {"theory": "<p>Trier, c'est bien ; n'afficher que le <b>haut du classement</b>, c'est mieux. <code>LIMIT n</code> ne garde que les <code>n</code> premières lignes du résultat. Combiné à <code>ORDER BY</code>, il produit un « top N ».</p><pre><code>SELECT titre, note\nFROM films\nORDER BY note DESC\nLIMIT 3;                 -- le podium des mieux notés</code></pre><div class=\"section-label\">Renommer une colonne avec AS</div><p>Les colonnes calculées ou peu parlantes méritent un nom d'affichage clair, donné par <code>AS</code>. C'est purement cosmétique (la table n'est pas modifiée) mais essentiel pour un résultat lisible.</p><pre><code>SELECT titre AS film, annee AS sortie\nFROM films\nLIMIT 5;</code></pre><div class=\"section-label\">Sauter des lignes : OFFSET</div><p>Pour la pagination, <code>OFFSET</code> ignore les premières lignes. « Les 3 films suivants après le top 3 » :</p><pre><code>SELECT titre, note FROM films\nORDER BY note DESC\nLIMIT 3 OFFSET 3;</code></pre><div class=\"callout\">Piège classique : <code>LIMIT</code> sans <code>ORDER BY</code> renvoie « 3 lignes au hasard ». Pour un vrai « top 3 », le tri est obligatoire — sinon le résultat n'a aucun sens stable.</div>", "minutes": 8}, "sq3l1": {"theory": "<p>On veut rarement toute la table : on cherche des lignes précises. La clause <b>WHERE</b> filtre — elle ne garde que les lignes pour lesquelles une condition est <b>vraie</b>.</p><pre><code>SELECT titre, annee\nFROM films\nWHERE annee &gt; 2010;        -- uniquement les films récents</code></pre><div class=\"section-label\">Les opérateurs de comparaison</div><p>On compare une colonne avec <code>=</code> (égal), <code>&lt;&gt;</code> (différent), <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>. Le texte se met entre <b>guillemets simples</b> ; les nombres, sans guillemets.</p><pre><code>SELECT titre FROM films WHERE genre = 'Animation';\nSELECT titre FROM films WHERE note &gt;= 8;</code></pre><div class=\"section-label\">Le cas des valeurs manquantes</div><p>Règle d'or : on ne teste <b>jamais</b> un <code>NULL</code> avec <code>=</code>. <code>note = NULL</code> ne renvoie rien (même pour « Tenet »). On écrit <code>IS NULL</code> ou <code>IS NOT NULL</code>.</p><pre><code>SELECT titre FROM films WHERE note IS NULL;       -- les films sans note\nSELECT titre FROM films WHERE note IS NOT NULL;</code></pre><div class=\"note\">Ordre des clauses (à mémoriser) : <code>SELECT … FROM … WHERE … ORDER BY …</code>. WHERE se place toujours après FROM et avant ORDER BY.</div>", "minutes": 9}, "sq3l2": {"theory": "<p>Une condition unique suffit rarement. On en <b>combine</b> plusieurs avec <code>AND</code> (toutes vraies) et <code>OR</code> (au moins une vraie).</p><pre><code>SELECT titre, annee, note\nFROM films\nWHERE annee &gt;= 2015 AND note &gt;= 8;   -- récents ET bien notés</code></pre><div class=\"section-label\">Les parenthèses, pour lever l'ambiguïté</div><p><code>AND</code> est prioritaire sur <code>OR</code>. Dès qu'on mélange les deux, on met des <b>parenthèses</b> pour exprimer exactement son intention.</p><pre><code>SELECT titre FROM films\nWHERE genre = 'Animation'\n   OR (genre = 'Thriller' AND note &gt;= 8);</code></pre><div class=\"section-label\">Trois raccourcis très utiles</div><ul><li><code>IN (…)</code> : appartenance à une liste. <code>WHERE genre IN ('Thriller','Animation')</code>.</li><li><code>BETWEEN a AND b</code> : un intervalle (bornes incluses). <code>WHERE annee BETWEEN 2010 AND 2020</code>.</li><li><code>LIKE</code> : un motif de texte, avec <code>%</code> (n'importe quels caractères) et <code>_</code> (un seul). <code>WHERE titre LIKE 'D%'</code> (commence par D).</li></ul><pre><code>SELECT titre FROM films\nWHERE annee BETWEEN 2018 AND 2023\n  AND titre LIKE '%a%';</code></pre><div class=\"note\"><code>NOT</code> inverse une condition : <code>WHERE genre NOT IN ('Comédie')</code>. Attention, avec des NULL, <code>NOT IN</code> peut surprendre — on y reviendra dans les sous-requêtes.</div>", "minutes": 9}, "sq4l1": {"theory": "<p>Une requête ne fait pas que lire : elle peut <b>calculer</b> de nouvelles colonnes à la volée, à partir des colonnes existantes. On combine opérations arithmétiques et fonctions, et on nomme le résultat avec <code>AS</code>.</p><pre><code>SELECT titre,\n       duree_min,\n       ROUND(duree_min / 60.0, 1) AS duree_heures\nFROM films;</code></pre><div class=\"section-label\">Quelques fonctions courantes</div><ul><li>Texte : <code>UPPER()</code>, <code>LOWER()</code>, <code>LENGTH()</code>, <code>SUBSTR()</code> ; concaténation avec <code>||</code>.</li><li>Nombres : <code>ROUND()</code>, <code>ABS()</code>, <code>MIN()/MAX()</code> entre valeurs.</li></ul><pre><code>SELECT UPPER(titre) AS titre_maj,\n       titre || ' (' || annee || ')' AS libelle\nFROM films\nLIMIT 5;</code></pre><div class=\"section-label\">Attention aux NULL et à la division entière</div><p>Deux pièges classiques. D'abord, tout calcul impliquant un <code>NULL</code> vaut <code>NULL</code> (le film « Tenet » sans note donnera <code>NULL</code> dans un calcul sur la note). Ensuite, en SQLite, <code>5 / 2</code> vaut <code>2</code> (division entière) : pour un résultat décimal, on écrit <code>5 / 2.0</code> ou <code>5 * 1.0 / 2</code>.</p><pre><code>SELECT duree_min / 60   AS heures_fausses,   -- division entière\n       duree_min / 60.0 AS heures_justes\nFROM films LIMIT 3;</code></pre><div class=\"callout\">Nomme toujours tes colonnes calculées avec <code>AS</code> : un résultat dont l'en-tête s'appelle <code>duree_min / 60.0</code> est illisible ; <code>duree_heures</code> parle de lui-même.</div>", "minutes": 9}, "sq4l2": {"theory": "<p>Comment afficher une valeur <b>selon des conditions</b> — par exemple classer les films en « excellent / bon / moyen » selon la note ? C'est le rôle de <code>CASE</code>, l'équivalent SQL du « si… alors… sinon ».</p><pre><code>SELECT titre, note,\n  CASE\n    WHEN note &gt;= 8.5 THEN 'excellent'\n    WHEN note &gt;= 7   THEN 'bon'\n    ELSE 'moyen'\n  END AS appreciation\nFROM films;</code></pre><div class=\"section-label\">Comment ça se lit</div><p>SQL évalue les <code>WHEN</code> <b>dans l'ordre</b> et s'arrête au premier vrai ; <code>ELSE</code> couvre tous les autres cas. Sans <code>ELSE</code>, les cas non prévus valent <code>NULL</code>. Ici, « Tenet » (note NULL) ne déclenche aucun <code>WHEN</code> et tombe donc dans <code>ELSE</code>.</p><div class=\"section-label\">CASE n'est pas réservé au SELECT</div><p>On peut s'en servir pour trier sur un ordre personnalisé, ou compter par catégorie (combiné aux agrégats, vu ensuite).</p><pre><code>-- Mettre les animations en tête, puis le reste\nSELECT titre, genre FROM films\nORDER BY CASE WHEN genre = 'Animation' THEN 0 ELSE 1 END, titre;</code></pre><div class=\"note\">CASE est l'outil de base pour créer des catégories, des drapeaux (0/1) et nettoyer des valeurs (« normaliser » des libellés). On le retrouve partout en qualité de données.</div>", "minutes": 8}, "sq5l1": {"theory": "<p>Jusqu'ici on listait des lignes. Les <b>fonctions d'agrégation</b> font l'inverse : elles <b>résument</b> plusieurs lignes en une seule valeur. Les cinq essentielles : <code>COUNT</code>, <code>SUM</code>, <code>AVG</code>, <code>MIN</code>, <code>MAX</code>.</p><pre><code>SELECT COUNT(*)        AS nb_films,\n       ROUND(AVG(note),2) AS note_moyenne,\n       MIN(annee)       AS plus_ancien,\n       MAX(annee)       AS plus_recent\nFROM films;</code></pre><div class=\"section-label\">COUNT(*) vs COUNT(colonne)</div><p>Distinction capitale : <code>COUNT(*)</code> compte <b>toutes les lignes</b> ; <code>COUNT(note)</code> compte les lignes où <code>note</code> n'est <b>pas NULL</b>. Leur différence donne le nombre de valeurs manquantes — la mesure de complétude la plus utilisée.</p><pre><code>SELECT COUNT(*)            AS lignes,\n       COUNT(note)        AS notes_renseignees,\n       COUNT(*) - COUNT(note) AS notes_manquantes  -- ici : 1 (Tenet)\nFROM films;</code></pre><div class=\"section-label\">Compter les valeurs distinctes</div><p><code>COUNT(DISTINCT col)</code> compte les valeurs <b>différentes</b> : utile pour savoir combien de genres existent, par exemple.</p><pre><code>SELECT COUNT(DISTINCT genre) AS nb_genres FROM films;</code></pre><div class=\"note\">Comme COUNT, les fonctions <code>AVG</code>, <code>SUM</code>, <code>MIN</code>, <code>MAX</code> <b>ignorent les NULL</b>. La moyenne des notes est donc calculée sur les films notés uniquement.</div>", "minutes": 9}, "sq5l2": {"theory": "<p>Un agrégat global, c'est utile ; un agrégat <b>par catégorie</b>, c'est l'analyse. <code>GROUP BY</code> rassemble les lignes par valeur, puis calcule un résumé <b>par groupe</b> : une ligne de résultat par valeur distincte.</p><pre><code>SELECT genre,\n       COUNT(*)        AS nb,\n       ROUND(AVG(note),2) AS note_moyenne\nFROM films\nGROUP BY genre\nORDER BY nb DESC;</code></pre><div class=\"section-label\">La règle d'or du GROUP BY</div><p>Dans le <code>SELECT</code>, on ne peut afficher que les colonnes du <code>GROUP BY</code> et des <b>agrégats</b>. Demander <code>titre</code> en plus de <code>genre</code> n'a pas de sens : un groupe contient plusieurs titres.</p><div class=\"section-label\">Filtrer les groupes : HAVING</div><p><code>WHERE</code> filtre les lignes <b>avant</b> le regroupement ; <code>HAVING</code> filtre les groupes <b>après</b> (il peut donc porter sur un agrégat). Exemple : les genres comptant au moins 2 films.</p><pre><code>SELECT genre, COUNT(*) AS nb\nFROM films\nWHERE annee &gt;= 2000       -- filtre les lignes\nGROUP BY genre\nHAVING COUNT(*) &gt;= 2       -- filtre les groupes\nORDER BY nb DESC;</code></pre><div class=\"note\">Ordre complet d'une requête : <code>SELECT … FROM … WHERE … GROUP BY … HAVING … ORDER BY … LIMIT …</code>. C'est la grammaire de base de presque toute analyse SQL.</div>", "minutes": 9}, "sq6l1": {"theory": "<p>L'information est répartie sur plusieurs tables pour éviter les redondances : <code>films</code> stocke <code>real_id</code>, et <code>realisateurs</code> détaille chaque réalisateur. Pour les <b>relier</b>, on utilise une jointure.</p><pre><code>SELECT f.titre, f.annee, r.nom AS realisateur\nFROM films AS f\nINNER JOIN realisateurs AS r\n  ON f.real_id = r.real_id;</code></pre><div class=\"section-label\">Comment lire une jointure</div><ul><li><code>FROM films AS f</code> : on part des films (alias <code>f</code> pour écrire court).</li><li><code>INNER JOIN realisateurs AS r</code> : on rapproche la table des réalisateurs.</li><li><code>ON f.real_id = r.real_id</code> : la <b>condition de rapprochement</b> — on relie via la clé commune.</li></ul><p>Les <b>alias</b> (<code>f</code>, <code>r</code>) évitent les répétitions et lèvent l'ambiguïté quand deux tables ont une colonne de même nom (<code>real_id</code>).</p><div class=\"section-label\">INNER = uniquement les correspondances</div><p>Un <code>INNER JOIN</code> ne garde que les lignes qui ont une correspondance <b>des deux côtés</b>. La réalisatrice « Agnès Varda », qui n'a aucun film dans la table, <b>n'apparaît pas</b> dans le résultat. Pour la voir quand même, il faudra un <code>LEFT JOIN</code> (leçon suivante).</p><div class=\"note\">Oublier la condition <code>ON</code> produit un « produit cartésien » : chaque film associé à chaque réalisateur, soit un résultat énorme et faux. La clause <code>ON</code> n'est pas optionnelle.</div>", "minutes": 10}, "sq6l2": {"theory": "<p>Le <code>INNER JOIN</code> masque les lignes sans correspondance. Quand on veut <b>tout garder d'un côté</b> — par exemple lister <i>tous</i> les réalisateurs, même ceux sans film — on utilise <code>LEFT JOIN</code>.</p><pre><code>SELECT r.nom, f.titre\nFROM realisateurs AS r\nLEFT JOIN films AS f\n  ON f.real_id = r.real_id;</code></pre><div class=\"section-label\">Ce que change le LEFT JOIN</div><p>Toutes les lignes de la table de <b>gauche</b> (<code>realisateurs</code>) sont conservées. Quand il n'y a pas de film correspondant, les colonnes de <code>films</code> valent <code>NULL</code>. « Agnès Varda » apparaît donc, avec un <code>titre</code> à <code>NULL</code>.</p><div class=\"section-label\">Un cas d'usage très courant : trouver les « orphelins »</div><p>En gardant uniquement les lignes sans correspondance (colonne de droite à <code>NULL</code>), on trouve les réalisateurs <b>sans film</b> — un contrôle d'intégrité classique.</p><pre><code>SELECT r.nom\nFROM realisateurs AS r\nLEFT JOIN films AS f ON f.real_id = r.real_id\nWHERE f.film_id IS NULL;     -- réalisateurs sans aucun film</code></pre><div class=\"callout\">À retenir : <code>INNER JOIN</code> = l'intersection (les correspondances) ; <code>LEFT JOIN</code> = tout à gauche + ce qui correspond à droite (le reste à NULL). Le <code>LEFT JOIN … IS NULL</code> est l'outil pour détecter les absences.</div>", "minutes": 10}, "sq7l1": {"theory": "<p>Une même valeur peut revenir sur plusieurs lignes (plusieurs films partagent un genre). <code>DISTINCT</code> élimine les répétitions et ne renvoie que les valeurs <b>uniques</b>.</p><pre><code>SELECT DISTINCT genre\nFROM films;          -- la liste des genres, sans répétition</code></pre><div class=\"section-label\">DISTINCT sur plusieurs colonnes</div><p>Placé juste après <code>SELECT</code>, <code>DISTINCT</code> porte sur <b>l'ensemble</b> des colonnes listées : il garde les combinaisons uniques.</p><pre><code>SELECT DISTINCT genre, annee FROM films;   -- couples (genre, année) uniques</code></pre><div class=\"section-label\">DISTINCT ou GROUP BY ?</div><p>Pour seulement <b>lister</b> les valeurs uniques, <code>DISTINCT</code> suffit. Dès qu'on veut <b>compter</b> ou <b>résumer</b> par valeur, on passe à <code>GROUP BY</code>. <code>COUNT(DISTINCT genre)</code> combine les deux idées : le nombre de genres différents.</p><pre><code>SELECT COUNT(DISTINCT genre) AS nb_genres FROM films;</code></pre><div class=\"note\">DISTINCT s'applique à tout le résultat, pas à une seule colonne au milieu : <code>SELECT titre, DISTINCT genre</code> est invalide. Pour dédoublonner sur une clé précise, on utilise GROUP BY ou des fonctions de fenêtrage (niveau avancé).</div>", "minutes": 7}, "sq7l2": {"theory": "<p>Une <b>sous-requête</b> est une requête imbriquée dans une autre. Elle permet de répondre à des questions en deux temps : « calcule d'abord ceci, puis utilise le résultat ». C'est l'outil qui débloque les analyses un peu fines.</p><div class=\"section-label\">Sous-requête qui renvoie une valeur</div><p>Quels films sont au-dessus de la <b>note moyenne</b> ? On calcule d'abord la moyenne (la sous-requête), puis on compare chaque film à cette valeur.</p><pre><code>SELECT titre, note\nFROM films\nWHERE note &gt; (SELECT AVG(note) FROM films)\nORDER BY note DESC;</code></pre><div class=\"section-label\">Sous-requête qui renvoie une liste (IN)</div><p>Quels films sont signés par un réalisateur français ? La sous-requête fournit la <b>liste</b> des <code>real_id</code> français ; la requête externe filtre dessus avec <code>IN</code>.</p><pre><code>SELECT titre\nFROM films\nWHERE real_id IN (\n  SELECT real_id FROM realisateurs WHERE pays = 'France'\n);</code></pre><div class=\"section-label\">Lisibilité : penser aux CTE</div><p>Quand les sous-requêtes s'empilent, on gagne en clarté avec une <b>CTE</b> (clause <code>WITH</code>) : on nomme un résultat intermédiaire et on le réutilise. C'est la même logique, en plus lisible.</p><pre><code>WITH francais AS (\n  SELECT real_id FROM realisateurs WHERE pays = 'France'\n)\nSELECT titre FROM films WHERE real_id IN (SELECT real_id FROM francais);</code></pre><div class=\"callout\">La sous-requête est évaluée <b>en premier</b> ; son résultat alimente la requête qui l'entoure. C'est la brique des analyses avancées — et le pont vers les CTE et les fonctions de fenêtrage de la formation Data QA.</div>", "minutes": 10}};
  CURRICULUM.modules.forEach(function(m){ m.lessons.forEach(function(l){ if (ENR[l.id]) { l.theory = ENR[l.id].theory; if (ENR[l.id].minutes) l.minutes = ENR[l.id].minutes; } }); });

  var PY_MODULES = [{"formation": "python", "track": "py-bases", "id": "py1", "title": "Premiers pas", "desc": "Afficher du texte et manipuler des variables.", "lessons": [{"id": "py1l1", "title": "Afficher avec print()", "minutes": 8, "theory": "<p>Python exécute tes instructions de haut en bas. La fonction <code>print(...)</code> <strong>affiche</strong> ce qu'on lui donne. Le texte (une <em>chaîne de caractères</em>) se met entre guillemets : <code>\"…\"</code> ou <code>'…'</code>.</p><p>Une ligne qui commence par <code>#</code> est un <strong>commentaire</strong> : Python l'ignore, c'est une note pour toi.</p><div class=\"section-label\">Exemple</div><pre><code>print(\"Salut !\")\nprint(2 + 2)</code></pre><p>La première ligne affiche le texte « Salut ! », la seconde affiche le résultat du calcul, soit 4.</p><div class=\"note\">Le labo à droite exécute vraiment ton code Python dans le navigateur.</div>", "quiz": [{"q": "À quoi sert <code>print()</code> ?", "options": ["À calculer", "À afficher quelque chose", "À créer une variable", "À commenter"], "answer": 1, "explain": "print affiche à l'écran la valeur qu'on lui passe."}], "exercise": {"lang": "python", "prompt": "Affiche <strong>exactement</strong> ce texte : <code>Bonjour, Python !</code>", "starter": "# Écris ton print ci-dessous\n", "solution": "print(\"Bonjour, Python !\")", "expectedOutput": "Bonjour, Python !\n"}}, {"id": "py1l2", "title": "Variables et types", "minutes": 9, "theory": "<p>Une <strong>variable</strong> est une étiquette qui retient une valeur : <code>age = 25</code>. On la réutilise ensuite par son nom.</p><p>Chaque valeur a un <strong>type</strong> : un entier (<code>int</code>, ex. 25), un nombre à virgule (<code>float</code>, ex. 3.14), du texte (<code>str</code>) ou un booléen (<code>bool</code> : True/False).</p><div class=\"section-label\">Exemple</div><pre><code>prix = 3\nquantite = 4\nprint(prix * quantite)</code></pre><p>On stocke deux nombres, puis on affiche leur produit : 12.</p>", "quiz": [{"q": "Quel est le type de <code>3.14</code> ?", "options": ["int", "float", "str", "bool"], "answer": 1, "explain": "Un nombre à virgule est un float ; 3 (sans virgule) serait un int."}], "exercise": {"lang": "python", "prompt": "Crée deux variables <code>prix = 3</code> et <code>quantite = 4</code>, puis affiche leur <strong>produit</strong>.", "starter": "prix = 3\nquantite = 4\n# affiche le produit\n", "solution": "prix = 3\nquantite = 4\nprint(prix * quantite)", "expectedOutput": "12\n"}}]}, {"formation": "python", "track": "py-bases", "id": "py2", "title": "Nombres et chaînes", "desc": "Calculer et composer du texte.", "lessons": [{"id": "py2l1", "title": "Calculer", "minutes": 9, "theory": "<p>Python calcule avec <code>+</code>, <code>-</code>, <code>*</code>, <code>/</code> (division), <code>//</code> (division entière), <code>%</code> (reste, le <em>modulo</em>) et <code>**</code> (puissance).</p><p><code>/</code> donne toujours un float (<code>7 / 2</code> → 3.5) ; <code>//</code> donne le quotient entier (<code>7 // 2</code> → 3).</p><div class=\"section-label\">Exemple</div><pre><code>print(7 // 2)\nprint(7 % 2)\nprint(2 ** 10)</code></pre><p>On affiche le quotient entier (3), le reste (1) puis 2 puissance 10 (1024).</p>", "quiz": [{"q": "Que calcule <code>%</code> ?", "options": ["La division", "Le reste de la division", "La puissance", "Le pourcentage"], "answer": 1, "explain": "L'opérateur % (modulo) renvoie le reste de la division entière."}], "exercise": {"lang": "python", "prompt": "Affiche le <strong>reste</strong> de la division de <code>17</code> par <code>5</code> (utilise le modulo).", "starter": "# le reste de 17 par 5\n", "solution": "print(17 % 5)", "expectedOutput": "2\n"}}, {"id": "py2l2", "title": "Les chaînes de caractères", "minutes": 10, "theory": "<p>On assemble du texte avec <code>+</code>, on mesure sa longueur avec <code>len(\"abc\")</code> (→ 3), et on transforme avec des méthodes comme <code>.upper()</code>.</p><p>Le plus pratique : les <strong>f-strings</strong>. En préfixant la chaîne par <code>f</code>, on insère des variables entre accolades : <code>f\"Bonjour {nom}\"</code>.</p><div class=\"section-label\">Exemple</div><pre><code>nom = \"Ada\"\nprint(f\"Bonjour {nom}, {len(nom)} lettres.\")</code></pre><p>L'f-string remplace {nom} et {len(nom)} par leurs valeurs : « Bonjour Ada, 3 lettres. »</p>", "quiz": [{"q": "Que renvoie <code>len(\"data\")</code> ?", "options": ["3", "4", "5", "data"], "answer": 1, "explain": "len compte les caractères : « data » en a 4."}], "exercise": {"lang": "python", "prompt": "On te donne <code>prenom = \"Sofia\"</code>. Affiche, avec une f-string : <code>Bonjour Sofia, ton prénom contient 5 lettres.</code> (calcule le nombre avec <code>len()</code>).", "starter": "prenom = \"Sofia\"\n# utilise une f-string et len()\n", "solution": "prenom = \"Sofia\"\nprint(f\"Bonjour {prenom}, ton prénom contient {len(prenom)} lettres.\")", "expectedOutput": "Bonjour Sofia, ton prénom contient 5 lettres.\n"}}]}, {"formation": "python", "track": "py-structures", "id": "py3", "title": "Les listes", "desc": "Ranger plusieurs valeurs et les parcourir.", "lessons": [{"id": "py3l1", "title": "Créer et accéder", "minutes": 10, "theory": "<p>Une <strong>liste</strong> range plusieurs valeurs dans l'ordre, entre crochets : <code>notes = [12, 15, 9]</code>.</p><p>On accède à un élément par sa <strong>position</strong>, qui commence à <code>0</code> : <code>notes[0]</code> est le premier. <code>notes[-1]</code> est le dernier. <code>len(notes)</code> donne le nombre d'éléments.</p><div class=\"section-label\">Exemple</div><pre><code>fruits = [\"pomme\", \"poire\", \"kiwi\"]\nprint(fruits[0])\nprint(fruits[-1])</code></pre><p>On affiche le premier élément (pomme) puis le dernier (kiwi).</p>", "quiz": [{"q": "Quel est l'indice du premier élément d'une liste ?", "options": ["1", "0", "-1", "premier"], "answer": 1, "explain": "En Python, l'indexation commence à 0."}], "exercise": {"lang": "python", "prompt": "On a <code>notes = [12, 15, 9, 18]</code>. Affiche la <strong>première</strong> et la <strong>dernière</strong> note, séparées par un espace, sur une seule ligne.", "starter": "notes = [12, 15, 9, 18]\n# print(... , ...)\n", "solution": "notes = [12, 15, 9, 18]\nprint(notes[0], notes[-1])", "expectedOutput": "12 18\n"}}, {"id": "py3l2", "title": "Parcourir une liste", "minutes": 10, "theory": "<p>La boucle <code>for x in liste:</code> répète un bloc pour chaque élément. Le bloc est <strong>indenté</strong> (décalé de 4 espaces).</p><p>Pour résumer une liste de nombres : <code>sum(liste)</code> (somme), <code>min</code>, <code>max</code>, et <code>round(x, n)</code> pour arrondir.</p><div class=\"section-label\">Exemple</div><pre><code>notes = [10, 20]\nfor n in notes:\n    print(n)\nprint(sum(notes))</code></pre><p>On affiche chaque note, puis la somme (30).</p>", "quiz": [{"q": "Que renvoie <code>sum([1, 2, 3])</code> ?", "options": ["123", "3", "6", "2"], "answer": 2, "explain": "sum additionne les éléments : 1 + 2 + 3 = 6."}], "exercise": {"lang": "python", "prompt": "On a <code>notes = [12, 15, 9, 18]</code>. Affiche la <strong>moyenne</strong> (somme ÷ nombre d'éléments), arrondie à <strong>1 décimale</strong>.", "starter": "notes = [12, 15, 9, 18]\n# moyenne arrondie à 1 décimale\n", "solution": "notes = [12, 15, 9, 18]\nprint(round(sum(notes) / len(notes), 1))", "expectedOutput": "13.5\n"}}]}, {"formation": "python", "track": "py-structures", "id": "py4", "title": "Les dictionnaires", "desc": "Associer des clés à des valeurs.", "lessons": [{"id": "py4l1", "title": "Clés et valeurs", "minutes": 10, "theory": "<p>Un <strong>dictionnaire</strong> associe des <em>clés</em> à des <em>valeurs</em>, entre accolades : <code>film = {\"titre\": \"Dune\", \"annee\": 2021}</code>.</p><p>On lit une valeur par sa clé : <code>film[\"titre\"]</code> renvoie <code>\"Dune\"</code>. Très pratique pour décrire un objet par ses attributs.</p><div class=\"section-label\">Exemple</div><pre><code>film = {\"titre\": \"Dune\", \"annee\": 2021}\nprint(film[\"annee\"])</code></pre><p>On accède à la valeur associée à la clé « annee » : 2021.</p>", "quiz": [{"q": "Comment lire la valeur de la clé <code>titre</code> ?", "options": ["film.titre", "film[\"titre\"]", "film(0)", "titre(film)"], "answer": 1, "explain": "On indexe le dictionnaire par sa clé : film[\"titre\"]."}], "exercise": {"lang": "python", "prompt": "On a <code>film = {\"titre\": \"Dune\", \"annee\": 2021}</code>. Affiche <code>Dune (2021)</code> (format <code>titre (annee)</code>, avec une f-string).", "starter": "film = {\"titre\": \"Dune\", \"annee\": 2021}\n# affiche \"Dune (2021)\"\n", "solution": "film = {\"titre\": \"Dune\", \"annee\": 2021}\nprint(f\"{film['titre']} ({film['annee']})\")", "expectedOutput": "Dune (2021)\n"}}, {"id": "py4l2", "title": "Résumer des valeurs", "minutes": 9, "theory": "<p><code>dico.values()</code> donne toutes les valeurs, <code>dico.keys()</code> toutes les clés. On peut les passer à <code>sum()</code>, <code>len()</code>, etc.</p><p>C'est idéal pour totaliser ou compter à partir d'un dictionnaire.</p><div class=\"section-label\">Exemple</div><pre><code>stock = {\"pomme\": 5, \"poire\": 3}\nprint(sum(stock.values()))</code></pre><p>On additionne les valeurs du dictionnaire : 8.</p>", "quiz": [{"q": "Que renvoie <code>.values()</code> ?", "options": ["Les clés", "Les valeurs", "Le nombre d'éléments", "Rien"], "answer": 1, "explain": ".values() renvoie l'ensemble des valeurs du dictionnaire."}], "exercise": {"lang": "python", "prompt": "On a <code>stock = {\"pomme\": 5, \"banane\": 0, \"poire\": 3}</code>. Affiche le <strong>nombre total</strong> d'articles (somme des valeurs).", "starter": "stock = {\"pomme\": 5, \"banane\": 0, \"poire\": 3}\n# somme des valeurs\n", "solution": "stock = {\"pomme\": 5, \"banane\": 0, \"poire\": 3}\nprint(sum(stock.values()))", "expectedOutput": "8\n"}}]}, {"formation": "python", "track": "py-logique", "id": "py5", "title": "Conditions et boucles", "desc": "Prendre des décisions et répéter des actions.", "lessons": [{"id": "py5l1", "title": "Prendre des décisions", "minutes": 10, "theory": "<p><code>if condition:</code> exécute un bloc <strong>si</strong> la condition est vraie ; <code>else:</code> sinon ; <code>elif</code> pour un cas intermédiaire. Le bloc est indenté.</p><p>Les conditions utilisent <code>==</code> (égal), <code>!=</code> (différent), <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>.</p><div class=\"section-label\">Exemple</div><pre><code>age = 20\nif age &gt;= 18:\n    print(\"Majeur\")\nelse:\n    print(\"Mineur\")</code></pre><p>Selon la valeur de age, on affiche « Majeur » ou « Mineur ».</p>", "quiz": [{"q": "Quel mot-clé introduit le cas « sinon » ?", "options": ["elif", "else", "otherwise", "end"], "answer": 1, "explain": "else couvre tous les cas où la condition du if est fausse."}], "exercise": {"lang": "python", "prompt": "On a <code>note = 14</code>. Affiche <code>Admis</code> si <code>note &gt;= 10</code>, sinon <code>Recale</code>.", "starter": "note = 14\n# if / else\n", "solution": "note = 14\nif note >= 10:\n    print(\"Admis\")\nelse:\n    print(\"Recale\")", "expectedOutput": "Admis\n"}}, {"id": "py5l2", "title": "Répéter avec une boucle", "minutes": 11, "theory": "<p><code>for i in range(a, b):</code> répète pour i allant de a à b-1. <code>range(1, 4)</code> produit 1, 2, 3.</p><p>On accumule souvent un résultat dans une variable : on l'initialise avant la boucle, puis on la met à jour à chaque tour avec <code>+=</code>.</p><div class=\"section-label\">Exemple</div><pre><code>total = 0\nfor i in range(1, 4):\n    total += i\nprint(total)</code></pre><p>On additionne 1 + 2 + 3 et on affiche 6.</p>", "quiz": [{"q": "Que produit <code>range(1, 4)</code> ?", "options": ["1, 2, 3, 4", "1, 2, 3", "0, 1, 2, 3", "1 à 4 inclus"], "answer": 1, "explain": "range(1, 4) va de 1 à 4 exclu, soit 1, 2, 3."}], "exercise": {"lang": "python", "prompt": "Affiche la <strong>somme des entiers de 1 à 10 inclus</strong> (utilise une boucle et un accumulateur).", "starter": "total = 0\nfor i in range(1, 11):\n    pass  # à compléter\n", "solution": "total = 0\nfor i in range(1, 11):\n    total += i\nprint(total)", "expectedOutput": "55\n"}}]}, {"formation": "python", "track": "py-logique", "id": "py6", "title": "Les fonctions", "desc": "Emballer du code réutilisable.", "lessons": [{"id": "py6l1", "title": "Définir une fonction", "minutes": 10, "theory": "<p>Une <strong>fonction</strong> regroupe des instructions sous un nom, pour les réutiliser. On la définit avec <code>def</code>, et <code>return</code> renvoie un résultat.</p><p>On l'<em>appelle</em> ensuite par son nom en passant des <strong>arguments</strong> entre parenthèses.</p><div class=\"section-label\">Exemple</div><pre><code>def double(x):\n    return x * 2\nprint(double(5))</code></pre><p>La fonction renvoie le double de son argument ; double(5) vaut 10.</p>", "quiz": [{"q": "Quel mot-clé renvoie une valeur depuis une fonction ?", "options": ["print", "return", "def", "yield"], "answer": 1, "explain": "return renvoie le résultat de la fonction à l'appelant."}], "exercise": {"lang": "python", "prompt": "Écris une fonction <code>carre(x)</code> qui renvoie <code>x</code> au carré, puis affiche <code>carre(7)</code>.", "starter": "def carre(x):\n    pass  # renvoie x * x\n\n# affiche carre(7)\n", "solution": "def carre(x):\n    return x * x\nprint(carre(7))", "expectedOutput": "49\n"}}, {"id": "py6l2", "title": "Paramètres et valeurs par défaut", "minutes": 11, "theory": "<p>Une fonction peut avoir plusieurs paramètres, et certains peuvent avoir une <strong>valeur par défaut</strong> : <code>def saluer(nom, fin=\"!\")</code>. Si on ne fournit pas <code>fin</code>, c'est <code>\"!\"</code> qui est utilisé.</p><p>Cela rend les fonctions souples : un usage simple par défaut, et la possibilité de personnaliser.</p><div class=\"section-label\">Exemple</div><pre><code>def saluer(nom, fin=\"!\"):\n    return \"Bonjour \" + nom + fin\nprint(saluer(\"Ada\"))</code></pre><p>Sans préciser fin, on obtient « Bonjour Ada! ».</p>", "quiz": [{"q": "Une valeur par défaut sert quand…", "options": ["L'argument n'est pas fourni", "La fonction échoue", "On utilise return", "Jamais"], "answer": 0, "explain": "Si l'appelant omet l'argument, la valeur par défaut s'applique."}], "exercise": {"lang": "python", "prompt": "Écris <code>saluer(nom, fin=\"!\")</code> qui renvoie <code>\"Bonjour \" + nom + fin</code>. Affiche <code>saluer(\"Sofia\")</code> puis <code>saluer(\"Leo\", \".\")</code> (chacun sur sa ligne).", "starter": "def saluer(nom, fin=\"!\"):\n    pass\n\n# deux appels\n", "solution": "def saluer(nom, fin=\"!\"):\n    return \"Bonjour \" + nom + fin\nprint(saluer(\"Sofia\"))\nprint(saluer(\"Leo\", \".\"))", "expectedOutput": "Bonjour Sofia!\nBonjour Leo.\n"}}]}, {"formation": "python", "track": "py-data", "id": "py7", "title": "Des données en Python", "desc": "Filtrer et résumer une mini-base.", "lessons": [{"id": "py7l1", "title": "Une mini-base en mémoire", "minutes": 11, "theory": "<p>On représente souvent un jeu de données par une <strong>liste de dictionnaires</strong> : chaque dictionnaire est une ligne, chaque clé une colonne.</p><p>On parcourt la liste avec une boucle <code>for</code>, et on lit les champs comme <code>film[\"note\"]</code>. Combiné à un <code>if</code>, on <strong>filtre</strong> les lignes.</p><div class=\"section-label\">Exemple</div><pre><code>for f in films:\n    if f[\"genre\"] == \"Animation\":\n        print(f[\"titre\"])</code></pre><p>On affiche le titre des films d'animation uniquement.</p>", "quiz": [{"q": "Comment lire la note d'un film <code>f</code> ?", "options": ["f.note", "f[\"note\"]", "note[f]", "f(note)"], "answer": 1, "explain": "f est un dictionnaire : on accède à la note par f[\"note\"]."}], "exercise": {"lang": "python", "prompt": "À partir de la liste <code>films</code> fournie, affiche le <strong>titre</strong> de chaque film dont la <strong>note est ≥ 8</strong> (un titre par ligne).", "starter": "films = [\n    {\"titre\": \"Parasite\", \"genre\": \"Thriller\", \"note\": 8.5},\n    {\"titre\": \"Barbie\", \"genre\": \"Comedie\", \"note\": 7.0},\n    {\"titre\": \"Dune\", \"genre\": \"SF\", \"note\": 8.0},\n    {\"titre\": \"Totoro\", \"genre\": \"Animation\", \"note\": 8.2},\n]\n\nfor f in films:\n    pass  # à compléter\n", "solution": "films = [\n    {\"titre\": \"Parasite\", \"genre\": \"Thriller\", \"note\": 8.5},\n    {\"titre\": \"Barbie\", \"genre\": \"Comedie\", \"note\": 7.0},\n    {\"titre\": \"Dune\", \"genre\": \"SF\", \"note\": 8.0},\n    {\"titre\": \"Totoro\", \"genre\": \"Animation\", \"note\": 8.2},\n]\n\nfor f in films:\n    if f[\"note\"] >= 8:\n        print(f[\"titre\"])", "expectedOutput": "Parasite\nDune\nTotoro\n", "dataset": "films = [\n    {\"titre\": \"Parasite\", \"genre\": \"Thriller\", \"note\": 8.5},\n    {\"titre\": \"Barbie\", \"genre\": \"Comedie\", \"note\": 7.0},\n    {\"titre\": \"Dune\", \"genre\": \"SF\", \"note\": 8.0},\n    {\"titre\": \"Totoro\", \"genre\": \"Animation\", \"note\": 8.2},\n]", "datasetTitle": "Voir le jeu de données (films)"}}, {"id": "py7l2", "title": "Compter et résumer", "minutes": 12, "theory": "<p>Pour résumer un jeu de données, on combine ce qu'on a vu : une boucle pour accumuler, <code>len()</code> pour compter, et une f-string pour présenter le résultat.</p><p>Ici on calcule le nombre de films et la note moyenne, puis on les affiche dans une phrase.</p><div class=\"section-label\">Exemple</div><pre><code>total = 0\nfor f in films:\n    total += f[\"note\"]\nprint(total)</code></pre><p>On additionne les notes de tous les films.</p>", "quiz": [{"q": "Quelle fonction compte le nombre d'éléments d'une liste ?", "options": ["count()", "len()", "sum()", "size()"], "answer": 1, "explain": "len(liste) renvoie le nombre d'éléments."}], "exercise": {"lang": "python", "prompt": "À partir de <code>films</code>, affiche le nombre de films et la note moyenne arrondie à 2 décimales, au format : <code>4 films, note moyenne 7.92</code>.", "starter": "films = [\n    {\"titre\": \"Parasite\", \"genre\": \"Thriller\", \"note\": 8.5},\n    {\"titre\": \"Barbie\", \"genre\": \"Comedie\", \"note\": 7.0},\n    {\"titre\": \"Dune\", \"genre\": \"SF\", \"note\": 8.0},\n    {\"titre\": \"Totoro\", \"genre\": \"Animation\", \"note\": 8.2},\n]\n\n# calcule le total des notes, puis la moyenne\n", "solution": "films = [\n    {\"titre\": \"Parasite\", \"genre\": \"Thriller\", \"note\": 8.5},\n    {\"titre\": \"Barbie\", \"genre\": \"Comedie\", \"note\": 7.0},\n    {\"titre\": \"Dune\", \"genre\": \"SF\", \"note\": 8.0},\n    {\"titre\": \"Totoro\", \"genre\": \"Animation\", \"note\": 8.2},\n]\n\ntotal = 0\nfor f in films:\n    total += f[\"note\"]\nmoyenne = round(total / len(films), 2)\nprint(f\"{len(films)} films, note moyenne {moyenne}\")", "expectedOutput": "4 films, note moyenne 7.92\n", "dataset": "films = [\n    {\"titre\": \"Parasite\", \"genre\": \"Thriller\", \"note\": 8.5},\n    {\"titre\": \"Barbie\", \"genre\": \"Comedie\", \"note\": 7.0},\n    {\"titre\": \"Dune\", \"genre\": \"SF\", \"note\": 8.0},\n    {\"titre\": \"Totoro\", \"genre\": \"Animation\", \"note\": 8.2},\n]", "datasetTitle": "Voir le jeu de données (films)"}}]}];
