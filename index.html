<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Donéa — l’atelier des données</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Data Academy — thème "Atelier" (clair, chaleureux, éditorial)
   ============================================================ */
*{ box-sizing:border-box; }
:root{
  --bg:#F5F3EC;
  --bg-2:#EEEBE1;
  --surface:#FFFFFF;
  --surface-2:#FBFAF6;
  --ink:#211F2A;
  --ink-2:#56535F;
  --muted:#8C8995;
  --faint:#B4B1AA;
  --line:#E7E3D8;
  --line-2:#D7D2C4;

  --primary:#5B4BE8;
  --primary-ink:#3A2DB0;
  --primary-soft:#ECEAFE;
  --deb:#0EA672;       /* débutant — émeraude */
  --prin:#5B4BE8;      /* principal — indigo  */
  --proj:#F0613F;      /* projets — corail    */
  --good:#0EA672;
  --bad:#E5484D;
  --gold:#C99A2E;

  --display:"Fraunces","Georgia",serif;
  --body:"Manrope",system-ui,-apple-system,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;

  --shadow:0 18px 44px -22px rgba(33,31,42,.30);
  --shadow-sm:0 8px 20px -12px rgba(33,31,42,.26);
  --r:16px; --r-lg:22px; --r-sm:11px;
}
html,body{ margin:0;padding:0; }
body{ background:var(--bg); color:var(--ink); font-family:var(--body); -webkit-font-smoothing:antialiased; min-height:100vh; }

.bg{ position:fixed; inset:0; z-index:-1; overflow:hidden;
  background:
   radial-gradient(820px 520px at 108% -8%, rgba(91,75,232,.10), transparent 60%),
   radial-gradient(720px 520px at -8% 108%, rgba(240,97,63,.09), transparent 60%),
   var(--bg); }
.bg::after{ content:""; position:absolute; inset:0; opacity:.5;
  background-image:radial-gradient(var(--line-2) .9px, transparent .9px); background-size:24px 24px;
  -webkit-mask-image:linear-gradient(180deg,transparent,#000 40%,transparent); mask-image:linear-gradient(180deg,transparent,#000 40%,transparent); }

/* ---------- Barre supérieure ---------- */
header.top{ position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:20px; padding:14px 30px;
  background:rgba(245,243,236,.82); backdrop-filter:blur(12px); border-bottom:1px solid var(--line); }
.brand{ display:flex; align-items:center; gap:11px; cursor:pointer; }
.brand .mark{ width:36px;height:36px;border-radius:11px;display:grid;place-items:center;color:#fff;
  font-family:var(--display); font-weight:800; font-size:19px; background:var(--primary); box-shadow:0 8px 18px -8px rgba(91,75,232,.7); transform:rotate(-4deg); }
.brand .bt{ font-family:var(--display); font-weight:700; font-size:17px; letter-spacing:-.01em; }
.brand .bt small{ display:block; font-family:var(--mono); font-size:9.5px; letter-spacing:.26em; color:var(--muted); text-transform:uppercase; margin-top:1px; }
.pills{ display:flex; gap:5px; margin-left:6px; flex-wrap:wrap; }
.pill{ font-family:var(--body); font-weight:600; font-size:13.5px; color:var(--ink-2); background:transparent; border:1px solid transparent;
  border-radius:999px; padding:8px 15px; cursor:pointer; transition:.15s; display:flex; align-items:center; gap:8px; }
.pill:hover{ background:var(--bg-2); color:var(--ink); }
.pill .pdot{ width:8px;height:8px;border-radius:50%;background:currentColor; }
.pill.active{ background:var(--primary-soft); color:var(--primary-ink); }
.top-right{ margin-left:auto; display:flex; align-items:center; gap:16px; }
.top-ring{ display:flex; align-items:center; gap:10px; }
.top-ring .lbl{ font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); text-align:right; line-height:1.5; }
.top-ring .lbl b{ color:var(--ink); font-size:13px; }
.ring{ width:44px;height:44px;transform:rotate(-90deg); }
.ring .bgc{ fill:none; stroke:var(--line-2); stroke-width:5; }
.ring .pgc{ fill:none; stroke:var(--primary); stroke-width:5; stroke-linecap:round; transition:stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1); }
.userbtn{ display:flex; align-items:center; gap:9px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:5px 12px 5px 5px; cursor:pointer; transition:.15s; }
.userbtn:hover{ border-color:var(--line-2); box-shadow:var(--shadow-sm); }
.userbtn .uname{ font-weight:700; font-size:13.5px; }
.avatar{ width:32px;height:32px;border-radius:50%; display:grid; place-items:center; color:#fff; font-weight:800; font-size:13px; font-family:var(--display); flex:0 0 auto; }

#view{ max-width:1180px; margin:0 auto; padding:40px 30px 90px; }

/* ---------- Écran de connexion ---------- */
.login{ max-width:880px; margin:0 auto; text-align:center; animation:fade .5s ease both; }
.login .eyebrow{ margin-top:14px; }
.login h1{ font-family:var(--display); font-weight:800; font-size:clamp(34px,5vw,54px); letter-spacing:-.02em; line-height:1.04; margin:8px 0 12px; }
.login p{ font-size:17px; color:var(--ink-2); max-width:56ch; margin:0 auto 34px; }
.profile-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:16px; }
.profile-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:24px 18px; cursor:pointer; transition:.18s; text-align:center; }
.profile-card:hover{ transform:translateY(-4px); box-shadow:var(--shadow); border-color:var(--line-2); }
.profile-card .avatar{ width:64px;height:64px;font-size:24px;margin:0 auto 12px; }
.profile-card .pn{ font-family:var(--display); font-weight:700; font-size:18px; }
.profile-card .pp{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:5px; }
.profile-card.create{ border-style:dashed; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--primary-ink); }
.profile-card.create .plus{ width:64px;height:64px;border-radius:50%;background:var(--primary-soft);display:grid;place-items:center;font-size:30px;margin:0 auto 12px;color:var(--primary); }

/* ---------- Formulaire (création de compte) ---------- */
.formbox{ max-width:420px; margin:0 auto; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:30px; box-shadow:var(--shadow); text-align:left; animation:rise .4s ease both; }
.formbox h2{ font-family:var(--display); font-weight:700; font-size:24px; margin:0 0 6px; text-align:center; }
.formbox .sub{ color:var(--ink-2); font-size:14px; text-align:center; margin:0 0 22px; }
.field{ margin-bottom:16px; }
.field label{ display:block; font-size:12.5px; font-weight:700; color:var(--ink-2); margin-bottom:6px; }
.field input{ width:100%; font-family:var(--body); font-size:15px; color:var(--ink); background:var(--surface-2); border:1px solid var(--line-2); border-radius:var(--r-sm); padding:11px 14px; outline:none; transition:.15s; }
.field input:focus{ border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); }
.field .hint{ font-size:11.5px; color:var(--muted); margin-top:5px; }
.avatar-pick{ display:flex; gap:8px; flex-wrap:wrap; }
.swatch{ width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent; }
.swatch.sel{ border-color:var(--ink); }
.form-actions{ display:flex; gap:10px; margin-top:8px; }
.form-err{ color:var(--bad); font-size:13px; margin-top:-6px; margin-bottom:10px; min-height:16px; }

/* ---------- Accueil / pages ---------- */
.eyebrow{ font-family:var(--mono); font-size:11px; letter-spacing:.26em; color:var(--primary); text-transform:uppercase; }
.hub, .page-head, .profile, .certificate{ animation:fade .5s ease both; }
.hub-h1{ font-family:var(--display); font-weight:800; font-size:clamp(30px,4.6vw,50px); letter-spacing:-.022em; line-height:1.04; margin:8px 0 14px; }
.hub-sub{ font-size:17px; color:var(--ink-2); line-height:1.6; max-width:64ch; margin:0 0 30px; }

.formation-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); gap:20px; }
.fcard{ text-align:left; cursor:pointer; position:relative; overflow:hidden; opacity:0; transform:translateY(16px);
  animation:rise .55s cubic-bezier(.22,1,.36,1) forwards; background:var(--surface); border:1px solid var(--line);
  border-radius:var(--r-lg); padding:26px; transition:.2s; color:var(--ink); box-shadow:var(--shadow-sm); }
.fcard::before{ content:""; position:absolute; left:0; top:0; height:5px; width:100%; background:var(--tc); }
.fcard:not(.soon):hover{ transform:translateY(-6px); box-shadow:0 22px 46px -22px color-mix(in srgb,var(--tc) 60%, #211f2a); border-color:color-mix(in srgb,var(--tc) 40%, var(--line)); }
.fcard.soon{ cursor:default; opacity:.6; }
.fc-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.fc-icon{ width:48px;height:48px;border-radius:13px; display:grid; place-items:center; font-size:23px; color:#fff; background:var(--tc); box-shadow:0 8px 16px -8px var(--tc); }
.fc-badge{ font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); border:1px solid var(--line-2); border-radius:999px; padding:4px 10px; }
.fc-badge.live{ color:#fff; background:var(--tc); border-color:transparent; }
.fcard h3{ font-family:var(--display); font-weight:700; font-size:22px; line-height:1.15; margin:0 0 4px; letter-spacing:-.01em; }
.fc-sub{ font-size:13.5px; color:var(--primary-ink); margin-bottom:12px; font-weight:600; }
.fcard p{ font-size:14px; color:var(--ink-2); line-height:1.55; margin:0 0 18px; }
.fc-foot{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.fc-foot .meter{ flex:1; }
.fc-foot span{ font-family:var(--mono); font-size:11px; color:var(--muted); }
.fc-go{ font-weight:800; color:var(--tc); font-size:14px; }

/* ---------- Hero (tableau de bord formation) ---------- */
.back{ font-family:var(--body); font-weight:600; font-size:13.5px; color:var(--ink-2); background:var(--surface); border:1px solid var(--line);
  border-radius:999px; padding:8px 16px; cursor:pointer; transition:.15s; margin-bottom:18px; }
.back:hover{ color:var(--ink); border-color:var(--line-2); box-shadow:var(--shadow-sm); }
.hero{ display:grid; grid-template-columns:1.4fr .9fr; gap:34px; align-items:center; margin-bottom:18px; }
.hero h1{ font-family:var(--display); font-weight:800; font-size:clamp(32px,5vw,50px); letter-spacing:-.025em; line-height:1.02; margin:8px 0 14px; }
.hero-sub{ font-size:17px; color:var(--ink-2); line-height:1.6; max-width:52ch; margin:0 0 24px; }
.mission{ display:block; width:100%; text-align:left; cursor:pointer; position:relative; overflow:hidden; background:var(--surface);
  border:1px solid var(--line); border-radius:var(--r-lg); padding:22px 24px; transition:.2s; box-shadow:var(--shadow-sm); }
.mission::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--primary); }
.mission:hover{ transform:translateY(-3px); box-shadow:var(--shadow); border-color:var(--line-2); }
.mission .m-meta{ font-family:var(--mono); font-size:10.5px; letter-spacing:.18em; color:var(--primary); text-transform:uppercase; }
.mission .m-title{ font-family:var(--display); font-weight:700; font-size:22px; margin:8px 0 4px; line-height:1.15; }
.mission .m-sub{ font-size:13px; color:var(--muted); font-family:var(--mono); }
.mission .m-go{ display:inline-block; margin-top:16px; font-weight:800; color:var(--primary); font-size:14px; }
.hero-right{ display:flex; flex-direction:column; align-items:center; gap:22px; }
.ring-big{ position:relative; width:200px; height:200px; }
.ring-big svg{ width:100%; height:100%; transform:rotate(-90deg); }
.ring-big .bgc{ fill:none; stroke:var(--line); stroke-width:13; }
.ring-big .pgc{ fill:none; stroke:url(#grad); stroke-width:13; stroke-linecap:round; transition:stroke-dashoffset 1.3s cubic-bezier(.22,1,.36,1); }
.ring-big .ctr{ position:absolute; inset:0; display:grid; place-items:center; text-align:center; }
.ring-big .ctr .big{ font-family:var(--display); font-weight:800; font-size:46px; line-height:1; }
.ring-big .ctr .cap{ font-family:var(--mono); font-size:10px; letter-spacing:.18em; color:var(--muted); text-transform:uppercase; margin-top:6px; }
.stat-chips{ display:flex; gap:10px; }
.chip-stat{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px 16px; text-align:center; min-width:80px; box-shadow:var(--shadow-sm); }
.chip-stat .v{ font-family:var(--display); font-weight:700; font-size:23px; }
.chip-stat .k{ font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-top:4px; }

/* ---------- Lanes ---------- */
.lane{ margin-top:46px; }
.lane-head{ display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.track-tag{ width:44px;height:44px;flex:0 0 44px;border-radius:13px; display:grid; place-items:center; font-size:21px; color:#fff; background:var(--tc); box-shadow:0 8px 16px -8px var(--tc); }
.lane-title{ font-family:var(--display); font-weight:700; font-size:22px; letter-spacing:-.01em; }
.lane-desc{ font-size:13px; color:var(--muted); margin-top:2px; }
.lane-prog{ margin-left:auto; text-align:right; min-width:140px; }
.lane-prog span{ font-family:var(--mono); font-size:12px; color:var(--ink-2); }
.lane-prog .meter{ margin-top:6px; }
.meter{ height:6px; background:var(--bg-2); border-radius:99px; overflow:hidden; }
.meter > i{ display:block; height:100%; width:0; border-radius:99px; background:var(--tc,var(--primary)); transition:width 1s cubic-bezier(.22,1,.36,1); }
.track-row{ display:flex; gap:16px; overflow-x:auto; padding:4px 4px 16px; scroll-snap-type:x proximity; }
.track-row::-webkit-scrollbar{ height:8px; }
.track-row::-webkit-scrollbar-thumb{ background:var(--line-2); border-radius:8px; }
.mcard{ flex:0 0 300px; scroll-snap-align:start; text-align:left; cursor:pointer; position:relative; background:var(--surface);
  border:1px solid var(--line); border-radius:var(--r-lg); padding:22px; transition:.2s; overflow:hidden; opacity:0; transform:translateY(16px);
  animation:rise .55s cubic-bezier(.22,1,.36,1) forwards; box-shadow:var(--shadow-sm); }
.mcard::before{ content:""; position:absolute; left:0; top:0; height:4px; width:100%; background:var(--tc); opacity:.85; }
.mcard:hover{ transform:translateY(-5px); box-shadow:0 22px 46px -24px color-mix(in srgb,var(--tc) 55%, #211f2a); border-color:color-mix(in srgb,var(--tc) 35%, var(--line)); }
.mc-top{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.mc-num{ width:34px;height:34px;border-radius:10px; display:grid; place-items:center; font-family:var(--display); font-weight:700; font-size:15px; color:var(--tc); background:color-mix(in srgb,var(--tc) 14%, #fff); }
.mcard.done .mc-num{ background:var(--tc); color:#fff; }
.mc-tag{ font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
.mcard h3{ font-family:var(--display); font-weight:700; font-size:18.5px; line-height:1.2; margin:0 0 8px; letter-spacing:-.01em; }
.mcard p{ font-size:13.5px; color:var(--ink-2); line-height:1.5; margin:0 0 18px; min-height:42px; }
.mc-foot{ display:flex; align-items:center; gap:12px; }
.mc-foot .meter{ flex:1; }
.mc-foot span{ font-family:var(--mono); font-size:11px; color:var(--muted); }

/* ---------- Leçon ---------- */
.lesson{ animation:fade .45s ease both; }
.lesson-head{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:6px 0 12px; }
.chip{ font-family:var(--mono); font-size:11px; letter-spacing:.04em; padding:6px 12px; border-radius:999px; background:color-mix(in srgb,var(--tc) 12%, #fff); color:var(--tc); border:1px solid color-mix(in srgb,var(--tc) 28%, var(--line)); }
.chip.ghost{ background:var(--surface); color:var(--ink-2); border-color:var(--line); }
.help-btn{ font-family:var(--body); font-weight:700; font-size:12px; color:var(--primary-ink); background:var(--primary-soft); border:1px solid transparent; border-radius:999px; padding:6px 13px; cursor:pointer; transition:.15s; }
.help-btn:hover{ background:#ded9fd; }
.lesson-title{ font-family:var(--display); font-weight:800; font-size:clamp(28px,4vw,42px); letter-spacing:-.022em; line-height:1.08; margin:0 0 26px; }
.lesson-grid{ display:grid; grid-template-columns:1fr 1fr; gap:30px; align-items:start; }
.lesson-grid.single{ grid-template-columns:1fr; max-width:760px; }
.lab{ position:sticky; top:88px; display:flex; flex-direction:column; gap:18px; }

/* ---------- Prose ---------- */
.prose{ font-size:16.5px; line-height:1.72; color:var(--ink-2); }
.prose h3{ font-family:var(--display); font-weight:700; font-size:20px; color:var(--ink); margin:28px 0 10px; letter-spacing:-.01em; }
.prose p{ margin:0 0 15px; }
.prose strong{ color:var(--ink); font-weight:800; }
.prose em{ color:var(--primary-ink); font-style:normal; font-weight:600; }
.prose ul{ margin:0 0 16px; padding-left:20px; } .prose li{ margin:6px 0; }
.prose ol{ margin:0 0 16px; padding-left:22px; } .prose ol li{ margin:7px 0; line-height:1.6; }
.prose ol li::marker{ color:var(--primary); font-family:var(--mono); font-size:13px; }
.prose code{ font-family:var(--mono); font-size:13px; color:var(--primary-ink); background:var(--primary-soft); border:1px solid #ddd8fb; padding:1px 6px; border-radius:6px; }
.prose pre{ background:#241f33; border:1px solid #322b48; border-radius:13px; padding:16px 18px; overflow-x:auto; margin:0 0 18px; }
.prose pre code{ background:none; border:0; padding:0; color:#e7e2f6; font-size:12.9px; line-height:1.65; }
.prose table{ width:100%; border-collapse:collapse; font-size:13.8px; margin:0 0 18px; }
.prose th{ background:var(--bg-2); text-align:left; padding:9px 12px; border:1px solid var(--line); font-weight:700; color:var(--ink); }
.prose td{ padding:9px 12px; border:1px solid var(--line); color:var(--ink-2); }
.prose .callout{ font-size:14.5px; background:#fff6ee; border:1px solid #f3ddc6; border-left:4px solid var(--proj); border-radius:11px; padding:14px 16px; margin:0 0 18px; color:var(--ink-2); }
.prose .note{ font-size:14px; background:var(--primary-soft); border:1px solid #ddd8fb; border-left:4px solid var(--primary); border-radius:11px; padding:13px 16px; margin:0 0 18px; color:var(--ink-2); }
.prose .diagram{ margin:4px 0 20px; padding:18px 16px; background:var(--surface-2); border:1px solid var(--line); border-radius:14px; overflow-x:auto; box-shadow:var(--shadow-sm); }
.prose .diagram svg{ display:block; margin:0 auto; max-width:100%; height:auto; }
.prose .diagram .cap{ text-align:center; font-family:var(--mono); font-size:11px; letter-spacing:.02em; color:var(--muted); margin-top:12px; }
/* ----- Examen final ----- */
.exam-card{ margin-top:26px; padding:22px; border:1px solid var(--line); border-radius:18px; background:linear-gradient(135deg,var(--gold-soft),var(--surface-2)); box-shadow:var(--shadow-sm); }
.exam-card .ec-top{ display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.exam-card .ec-badge{ width:42px; height:42px; border-radius:12px; display:grid; place-items:center; background:var(--gold); color:#fff; font-size:20px; flex:none; }
.exam-card h2{ font-family:var(--display); font-size:21px; margin:0; color:var(--ink); }
.exam-card .ec-sub{ font-size:13px; color:var(--ink-2); margin:2px 0 0; }
.exam-crit{ list-style:none; padding:0; margin:14px 0; display:grid; gap:7px; }
.exam-crit li{ font-size:13.5px; color:var(--ink-2); padding-left:24px; position:relative; }
.exam-crit li::before{ content:"◆"; position:absolute; left:0; color:var(--gold); font-size:11px; top:2px; }
.exam-status{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:14px 0; }
.exam-pill{ font-size:12.5px; font-weight:700; padding:6px 13px; border-radius:999px; border:1px solid var(--line); background:#fff; color:var(--ink-2); }
.exam-pill.pass{ background:var(--deb-soft); border-color:#bfe9d8; color:#0A7355; }
.exam-pill.fail{ background:var(--proj-soft); border-color:#f6cdbc; color:#B23E22; }
.exam-pill.lock{ background:var(--surface-2); color:var(--muted); }
.exam-banner{ padding:18px 20px; border-radius:14px; margin:6px 0 20px; font-weight:700; display:flex; align-items:center; gap:14px; }
.exam-banner .score{ font-family:var(--display); font-size:34px; line-height:1; }
.exam-banner.pass{ background:var(--deb-soft); border:1px solid #bfe9d8; color:#0A7355; }
.exam-banner.fail{ background:var(--proj-soft); border:1px solid #f6cdbc; color:#B23E22; }
.exam-q{ border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin:0 0 14px; background:#fff; }

.editor-stack{ position:relative; margin-left:42px; }

.editor-stack pre.hl{ position:absolute; inset:0; pointer-events:none; color:#e7e2f6; overflow:auto; }
.editor-stack textarea{ position:relative; width:100%; min-height:104px; max-height:300px; background:transparent; color:transparent; caret-color:#c9b6ff; resize:vertical; outline:none; overflow:auto; display:block; cursor:text; }
.editor-stack textarea::selection{ background:rgba(140,110,255,.32); }
.tk-kw{ color:#c79bff; font-weight:600; } .tk-str{ color:#ffc07a; } .tk-num{ color:#ff9bb0; } .tk-com{ color:#7d769b; font-style:italic; }
.ex-toolbar{ display:flex; align-items:center; gap:9px; padding:12px 16px; flex-wrap:wrap; background:var(--surface-2); border-top:1px solid var(--line); }

.run-status{ font-family:var(--mono); font-size:11.5px; margin-left:auto; color:var(--muted); display:flex; align-items:center; gap:7px; }
.spin{ width:13px;height:13px;border:2px solid var(--line-2);border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite; }
@keyframes sp{ to{ transform:rotate(360deg); } }
.console{ font-family:var(--mono); font-size:12px; line-height:1.6; background:#1c1828; border-top:1px solid #322b48; padding:0; max-height:0; overflow:hidden; transition:max-height .3s ease; color:#cdc7e0; }
.console.show{ max-height:480px; overflow:auto; padding:14px 16px; }
.console .verdict{ font-family:var(--body); font-weight:700; font-size:13px; margin-bottom:8px; }
.console .verdict.ok{ color:#5ff0b0; } .console .verdict.ko{ color:#ff8a8a; }
.console pre{ white-space:pre-wrap; color:#cdc7e0; margin:0; } .console .err{ color:#ff8a8a; }
.console table.res{ border-collapse:collapse; font-family:var(--mono); font-size:12px; margin-top:6px; }
.console table.res th{ background:#2a2440; border:1px solid #3a3356; padding:5px 10px; text-align:left; color:#e7e2f6; }
.console table.res td{ border:1px solid #322b48; padding:5px 10px; }

.lesson-foot{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:46px; padding-top:26px; border-top:1px solid var(--line); flex-wrap:wrap; }

/* ---------- Aide contextuelle ---------- */
.help-panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:18px 20px; margin-top:22px; box-shadow:var(--shadow-sm); }

@keyframes flashbg{ 0%{ box-shadow:0 0 0 3px var(--primary-soft); } 100%{ box-shadow:var(--shadow-sm); } }
.hp-head{ font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--primary); margin-bottom:14px; }
.hp-foot{ font-size:12.5px; color:var(--muted); margin-top:12px; } .hp-foot a{ color:var(--primary-ink); }
.def{ font-size:14.5px; color:var(--ink-2); line-height:1.55; padding:8px 0; border-top:1px solid var(--line); }

.reslink{ display:flex; align-items:center; gap:12px; text-decoration:none; padding:10px 12px; border-radius:11px; border:1px solid var(--line); margin:8px 0; transition:.15s; background:var(--surface-2); }

.rl-type{ font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; padding:3px 8px; border-radius:6px; flex:0 0 auto; color:#fff; }
.t-book{ background:var(--deb); } .t-doc{ background:var(--prin); } .t-practice{ background:var(--proj); } .t-article{ background:var(--muted); }
.rl-body{ display:flex; flex-direction:column; flex:1; min-width:0; }
.rl-title{ font-weight:700; color:var(--ink); font-size:14px; } .rl-by{ font-size:12px; color:var(--muted); } .rl-ext{ color:var(--muted); margin-left:auto; }

/* ---------- Bibliothèque ---------- */
.res-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:16px; margin-bottom:10px; }

.rc-top{ margin-bottom:10px; }

.rc-title:hover{ color:var(--primary-ink); }
.rc-by{ font-size:12.5px; color:var(--muted); margin:4px 0 10px; }
.rc-desc{ font-size:13.5px; color:var(--ink-2); line-height:1.55; margin:0 0 14px; }

.rc-mlabel{ font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); }
.modchip{ font-family:var(--body); font-size:12px; color:var(--ink-2); background:var(--surface-2); border:1px solid var(--line); border-radius:999px; padding:4px 10px; cursor:pointer; transition:.15s; }
.modchip:hover{ color:var(--primary-ink); border-color:var(--primary); }

/* ---------- Glossaire ---------- */
.gl-search{ width:100%; max-width:420px; font-family:var(--body); font-size:15px; color:var(--ink); background:var(--surface); border:1px solid var(--line-2); border-radius:12px; padding:11px 15px; outline:none; }
.gl-search:focus{ border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); }
.gl-list{ display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:12px; margin-top:8px; }
.gl-item{ background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:15px 17px; box-shadow:var(--shadow-sm); }
.gl-term{ font-family:var(--display); font-weight:700; font-size:16px; color:var(--ink); margin-bottom:5px; }
.gl-def{ font-size:14px; color:var(--ink-2); line-height:1.55; } .gl-empty{ color:var(--muted); font-size:14px; padding:20px 0; }

/* ---------- Profil / espace personnel ---------- */
.pf-head{ display:flex; align-items:center; gap:18px; margin-bottom:6px; }
.pf-head .avatar{ width:72px;height:72px;font-size:27px; }

.cert-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }

.cert-tools{ display:flex; justify-content:center; gap:10px; margin-top:22px; }

/* ---------- Menu utilisateur / modales / confetti ---------- */
.usermenu{ position:absolute; top:62px; right:30px; z-index:40; background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); padding:8px; min-width:200px; }
.usermenu button{ display:flex; align-items:center; gap:9px; width:100%; text-align:left; background:none; border:0; font-family:var(--body); font-size:14px; color:var(--ink); padding:10px 12px; border-radius:9px; cursor:pointer; }

}

          theory:`
            <p>Bienvenue ! Avant tout code, posons les bases. Une <strong>donnée</strong>, c'est simplement une information enregistrée : un nom, un prix, une date…</p>
            <p>En analyse, les données sont rangées dans des <strong>tables</strong>. Une table, c'est un tableau, comme une feuille Excel :</p>

            <ul>
              <li><strong>Décisions erronées</strong> : un KPI faux oriente mal le pilotage.</li>

              <li><strong>Non-conformité</strong> : RGPD, BCBS 239, etc. exigent une qualité auditable.</li>

            <h3>Exemple concret</h3>

          theory:`
<p><strong>Contexte.</strong> Un pipeline de ventes alimente trois tables — clients, produits, commandes — mais il n’a jamais été contrôlé. Mission : auditer la qualité des données sur les quatre dimensions clés et produire un rapport avec un score, exploitable par l’équipe.</p>

<h3>La démarche, étape par étape</h3>
<ol>
  <li><strong>Charger</strong> les données brutes dans des tableaux manipulables.</li>
  <li><strong>Complétude</strong> : compter les valeurs manquantes sur les colonnes critiques.</li>
  <li><strong>Validité</strong> : repérer les valeurs hors règles (montants négatifs, devises inconnues).</li>
  <li><strong>Unicité</strong> : détecter les identifiants en double.</li>
  <li><strong>Intégrité référentielle</strong> : vérifier que chaque commande référence un client existant.</li>
  <li><strong>Synthétiser</strong> en un score global, puis <strong>trier</strong> les problèmes par gravité.</li>
</ol>

<h3>Le code complet, commenté</h3>
<pre><code>import pandas as pd

# 1. Chargement des données brutes (deux tables exportées du pipeline)
orders    = pd.read_csv("orders.csv")
customers = pd.read_csv("customers.csv")

rapport = {}   # on accumule ici le nombre de problèmes par règle

# 2. COMPLÉTUDE — des colonnes critiques ne doivent jamais être vides
for col in ["order_id", "customer_id", "amount_ttc"]:
    rapport["completude_" + col] = int(orders[col].isna().sum())

# 3. VALIDITÉ — les valeurs respectent-elles les règles métier ?
rapport["montants_negatifs"]  = int((orders["amount_ttc"] &lt; 0).sum())
devises_autorisees            = {"EUR", "USD", "GBP"}
rapport["devises_invalides"]  = int((~orders["currency"].isin(devises_autorisees)).sum())

# 4. UNICITÉ — un order_id ne doit apparaître qu'une seule fois
rapport["order_id_dupliques"] = int(orders["order_id"].duplicated().sum())

# 5. INTÉGRITÉ RÉFÉRENTIELLE — chaque commande pointe vers un client existant
clients_connus = set(customers["customer_id"])
rapport["commandes_orphelines"] = int((~orders["customer_id"].isin(clients_connus)).sum())

# 6. SCORE GLOBAL — proportion de lignes saines (indicateur simple)
total     = len(orders)
problemes = sum(rapport.values())
score     = round(100 * (1 - problemes / max(total, 1)), 1)

# 7. RAPPORT lisible, trié du plus grave au moins grave
print("=== Rapport d'audit qualite ===")
for regle, n in sorted(rapport.items(), key=lambda kv: kv[1], reverse=True):
    statut = "OK" if n == 0 else "A CORRIGER"
    print("[" + statut + "] " + regle + ": " + str(n))
print("Score qualite: " + str(score) + "/100 sur " + str(total) + " commandes")</code></pre>

<h3>Explication ligne par ligne</h3>
<ol>
  <li><code>import pandas as pd</code> charge pandas, la bibliothèque de référence pour manipuler des tableaux de données en Python.</li>
  <li><code>pd.read_csv(...)</code> lit chaque fichier CSV et le transforme en <em>DataFrame</em> (un tableau en mémoire, avec colonnes nommées).</li>
  <li><code>rapport = {}</code> crée un dictionnaire vide où l’on stockera, pour chaque règle, le nombre de lignes en faute.</li>
  <li>La boucle <code>for col in [...]</code> parcourt les colonnes obligatoires ; <code>orders[col].isna()</code> renvoie True là où la valeur est manquante, et <code>.sum()</code> compte ces True.</li>
  <li><code>(orders["amount_ttc"] &lt; 0).sum()</code> compte les commandes au montant négatif — clairement aberrant.</li>
  <li><code>~orders["currency"].isin(devises_autorisees)</code> : <code>isin</code> teste l’appartenance à l’ensemble autorisé, et le <code>~</code> inverse le résultat pour garder les devises <em>non</em> autorisées.</li>
  <li><code>orders["order_id"].duplicated().sum()</code> marque chaque order_id déjà vu comme doublon, puis les compte (dimension unicité).</li>
  <li><code>set(customers["customer_id"])</code> construit l’ensemble des clients existants ; on garde les commandes dont le <code>customer_id</code> n’y figure pas : ce sont les commandes orphelines.</li>
  <li>Le <strong>score</strong> rapporte le total de problèmes au nombre de commandes : <code>100 * (1 - problemes / total)</code>, arrondi à une décimale.</li>
  <li>La boucle finale trie le dictionnaire par valeur décroissante (<code>key=lambda kv: kv[1]</code>) pour afficher d’abord les anomalies les plus nombreuses.</li>
</ol>

<div class="callout"><strong>Bonnes pratiques.</strong> Transforme ces vérifications en <em>tests automatisés</em> (avec un seuil, ex. « échec si complétude &lt; 99 % »), planifie-les à chaque exécution du pipeline, et envoie une alerte en cas de dépassement. Versionne les règles avec le code : un contrôle de qualité est lui aussi du logiciel.</div>

          theory:`
<p><strong>Contexte.</strong> Un entrepôt en étoile tourne sous dbt depuis six mois, en production, mais <em>sans aucun test</em>. Objectif : ajouter un filet de sécurité qualité directement dans les transformations, pour bloquer les données défectueuses avant qu’elles n’atteignent les tableaux de bord.</p>

<h3>La démarche, étape par étape</h3>
<ol>
  <li>Déclarer des <strong>tests natifs</strong> (génériques) sur les colonnes clés : non-nullité, unicité, valeurs autorisées, relations.</li>
  <li>Ajouter un <strong>test singulier</strong> (une requête SQL) pour une règle métier précise.</li>
  <li>Factoriser une règle récurrente en <strong>macro</strong> (test générique réutilisable).</li>
  <li>Exécuter et <strong>industrialiser</strong> (intégration continue, documentation, contrats de données).</li>
</ol>

<h3>1) Les tests natifs — fichier <code>schema.yml</code></h3>
<pre><code>version: 2

models:
  - name: stg_orders
    description: "Commandes nettoyees, une ligne par commande."
    columns:
      - name: order_id
        description: "Identifiant unique de la commande."
        tests:
          - not_null        # aucune commande sans identifiant
          - unique          # pas de doublon d'order_id

      - name: customer_id
        tests:
          - not_null
          - relationships:                 # integrite referentielle
              to: ref('stg_customers')     # la table de reference
              field: customer_id           # la cle a retrouver

      - name: currency
        tests:
          - accepted_values:               # validite : liste fermee
              values: ['EUR', 'USD', 'GBP']

      - name: amount_ttc
        tests:
          - not_negative                   # test generique maison (ci-dessous)</code></pre>

<h3>2) Un test singulier — une simple requête SQL</h3>
<pre><code>-- tests/assert_amount_positive.sql
-- Un test "singulier" : il ECHOUE s'il renvoie au moins une ligne.
select order_id, amount_ttc
from {{ ref('stg_orders') }}
where amount_ttc &lt; 0</code></pre>

<h3>3) Un test générique réutilisable — une macro</h3>
<pre><code>-- macros/not_negative.sql
-- Un test "generique" reutilisable sur n'importe quelle colonne.
{% test not_negative(model, column_name) %}
select *
from {{ model }}
where {{ column_name }} &lt; 0
{% endtest %}</code></pre>

<h3>4) Exécuter</h3>
<pre><code># Lancer tous les tests, puis construire + tester les modeles
dbt test
dbt build        # execute les modeles ET leurs tests, dans l'ordre des dependances</code></pre>

<h3>Explication ligne par ligne</h3>
<ol>
  <li><code>version: 2</code> indique la version du format de configuration dbt.</li>
  <li>Sous <code>models:</code>, chaque entrée décrit une table (ici <code>stg_orders</code>) et, colonne par colonne, les tests à appliquer.</li>
  <li><code>not_null</code> et <code>unique</code> garantissent qu’<code>order_id</code> est toujours présent et jamais dupliqué (complétude + unicité).</li>
  <li><code>relationships</code> vérifie l’intégrité référentielle : chaque <code>customer_id</code> doit exister dans <code>ref('stg_customers')</code>, sur le champ indiqué.</li>
  <li><code>accepted_values</code> impose une liste fermée de devises : toute autre valeur fait échouer le test (validité).</li>
  <li>Le test singulier est une requête qui sélectionne les lignes <em>fautives</em> (<code>amount_ttc &lt; 0</code>). Convention dbt : <strong>si la requête renvoie des lignes, le test échoue</strong> — un test au vert renvoie zéro ligne.</li>
  <li>La macro <code>{% test not_negative(...) %}</code> généralise cette règle : <code>{{ model }}</code> et <code>{{ column_name }}</code> sont remplacés par la table et la colonne sur lesquelles on l’applique dans <code>schema.yml</code>.</li>

retard_h = (datetime.now(timezone.utc) - derniere_maj).total_seconds() / 3600
if retard_h &gt; 6:
    alertes.append(("P0", "Donnee en retard de " + str(round(retard_h, 1)) + " h"))

# 2. VOLUME — chute anormale par rapport à la moyenne récente ?

if len(df) &lt; 0.5 * moyenne_vol:

z     = (df["amount_ttc"].mean() - mu) / sigma

 à chaque tour, note vaut l'élément courant. Le bloc indenté est ce qui se répète."}, {"q": "Comment calculer la moyenne d'une liste notes ?", "options": ["avg(notes)", "sum(notes) / len(notes)", "mean(notes)", "notes / len(notes)"], "answer": 1, "explain": "sum() additionne les éléments, len() les compte ; leur quotient est la moyenne. Il n'existe pas de fonction avg() native."}, {"q": "Accéder à une clé absente d'un dictionnaire (film[\"realisateur\"]) :", "options": ["renvoie None", "lève une erreur KeyError", "renvoie 0", "crée la clé"], "answer": 1, "explain": "L'accès direct à une clé inexistante lève KeyError. Pour éviter le plantage quand une info peut manquer, on utilise film.get(\"realisateur\") qui renvoie None."}, {"q": "Pour stock = {\"pomme\": 5, \"banane\": 0, \"poire\": 3}, que vaut sum(stock.values()) ?", "options": ["3", "8", "13", "Une erreur"], "answer": 1, "explain": ".values() donne les valeurs (5, 0, 3) ; sum les additionne : 8. Cela n'a de sens que si les valeurs sont des nombres."}, {"q": "Dans une suite if / elif / else, Python exécute :", "options": ["tous les blocs dont la condition est vraie", "le bloc de la PREMIÈRE condition vraie, puis s'arrête", "seulement le else", "le dernier elif"], "answer": 1, "explain": "Python évalue les conditions dans l'ordre et exécute le premier bloc vrai, en ignorant le reste. else couvre tous les autres cas."}, {"q": "Que produit range(1, 11) ?", "options": ["les nombres de 1 à 11 inclus", "les nombres de 1 à 10 (la fin est exclue)", "les nombres de 0 à 11", "seulement 1 et 11"], "answer": 1, "explain": "range(début, fin) s'arrête AVANT la borne de fin : range(1, 11) donne 1, 2, … 10."}, {"q": "Quelle est la différence entre return et print dans une fonction ?", "options": ["Aucune", "return renvoie une valeur réutilisable ; print ne fait qu'afficher", "print renvoie une valeur", "return affiche à l'écran"], "answer": 1, "explain": "return rend une valeur à l'appelant (on peut la stocker, la réutiliser) ; print se contente d'afficher. Sans return, une fonction renvoie None."}, {"q": "Avec def saluer(nom, fin=\"!\"), que fait l'appel saluer(\"Sofia\") ?", "options": ["Une erreur (fin manquant)", "Utilise la valeur par défaut : « Bonjour Sofia! »", "Affiche seulement Sofia", "Ignore le paramètre nom"], "answer": 1, "explain": "fin a une valeur par défaut (\"!\") : il devient optionnel. Non fourni, il prend sa valeur par défaut ; fourni, il la remplace."}, {"q": "On représente une « table » de films en Python pur par :", "options": ["une seule chaîne de caractères", "une liste de dictionnaires (un dict par enregistrement)", "un nombre", "une variable booléenne"], "answer": 1, "explain": "Une liste de dictionnaires = une table : chaque dict est une ligne, chaque clé une colonne. On la parcourt avec for, on la filtre avec if — la logique d'un WHERE."}]}};

  if (CURRICULUM.sqlSeed.indexOf('de_sales') === -1) CURRICULUM.sqlSeed = CURRICULUM.sqlSeed + "\n\nCREATE TABLE de_customers (customer_id INTEGER, name TEXT, country TEXT);\nINSERT INTO de_customers VALUES\n (1,'Alice','FR'),(2,'Bruno','BE'),(3,'Carla','FR'),(4,'Dino','IT'),(5,'Eva','FR');\n\nCREATE TABLE de_products (product_id INTEGER, name TEXT, category TEXT, unit_cost REAL);\nINSERT INTO de_products VALUES\n (1,'Clavier','Accessoires',15.0),(2,'Souris','Accessoires',8.0),\n (3,'Écran','Écrans',90.0),(4,'Casque','Audio',40.0),(5,'Webcam','Accessoires',25.0);\n\nCREATE TABLE de_sales (sale_id INTEGER, sale_date TEXT, customer_id INTEGER, product_id INTEGER, quantity INTEGER, unit_price REAL);\nINSERT INTO de_sales VALUES\n (1,'2024-01-05',1,3,1,129.0),(2,'2024-01-07',2,1,2,29.0),(3,'2024-01-12',1,2,1,15.0),\n (4,'2024-01-20',3,4,1,79.0),(5,'2024-01-28',4,1,1,29.0),(6,'2024-02-02',2,3,1,129.0),\n (7,'2024-02-09',5,5,2,39.0),(8,'2024-02-14',1,4,1,79.0),(9,'2024-02-18',3,2,3,15.0),\n (10,'2024-02-25',4,3,1,129.0),(11,'2024-02-27',2,5,1,39.0),(12,'2024-03-03',1,1,1,29.0),\n (13,'2024-03-08',5,3,1,129.0),(14,'2024-03-11',3,4,2,79.0),(15,'2024-03-15',2,2,2,15.0),\n (16,'2024-03-19',4,5,1,39.0),(17,'2024-03-22',1,3,1,129.0),(18,'2024-03-29',5,1,3,29.0);\n\nCREATE TABLE de_events (event_id INTEGER, user_id INTEGER, event_type TEXT, ts TEXT);\nINSERT INTO de_events VALUES\n (101,1,'view','2024-03-01 09:00'),(102,1,'click','2024-03-01 09:02'),(103,2,'view','2024-03-01 10:00'),\n (101,1,'view','2024-03-01 09:00'),(104,3,'view','2024-03-02 11:00'),(105,2,'purchase','2024-03-02 12:00'),\n (103,2,'view','2024-03-01 10:00'),(106,4,'view','2024-03-03 08:00');\n\nCREATE TABLE de_customer_scd (customer_id INTEGER, name TEXT, country TEXT, valid_from TEXT);\nINSERT INTO de_customer_scd VALUES\n (1,'Alice','FR','2023-01-01'),(2,'Bruno','BE','2023-01-01'),\n (3,'Carla','DE','2023-01-01'),(3,'Carla','FR','2024-02-15'),\n (4,'Dino','IT','2023-01-01'),(5,'Eva','FR','2023-01-01');\n";
  CURRICULUM.modules = CURRICULUM.modules.filter(function(m){ return m.formation !== 'de'; });
  var DE_MODULES = [{"formation": "de", "track": "de-db", "id": "de1", "title": "Fondamentaux des bases de données", "desc": "Modèle relationnel, SGBD, clés, transactions ACID et index.", "lessons": [{"id": "de1l1", "title": "Le modèle relationnel & le SGBD", "minutes": 10, "theory": "<p>Une <b>base de données</b> organise l'information ; un <b>SGBD</b> (système de gestion de base de données) la stocke, la sécurise et permet de l'interroger en <b>SQL</b>. Le modèle dominant reste le <b>relationnel</b> : des <b>tables</b> (lignes = enregistrements, colonnes = attributs) reliées par des <b>clés</b>.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 180\" width=\"560\" height=\"180\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"40\" y=\"40\" width=\"200\" height=\"40\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"140\" y=\"63.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">TABLE de_customers</text><rect x=\"40\" y=\"96\" width=\"200\" height=\"40\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"140\" y=\"119.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\">clé primaire : customer_id</text><rect x=\"320\" y=\"40\" width=\"200\" height=\"40\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"420\" y=\"63.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"700\">TABLE de_sales</text><rect x=\"320\" y=\"96\" width=\"200\" height=\"40\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"420\" y=\"119.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\">clé étrangère → customer_id</text><line x1=\"240\" y1=\"60\" x2=\"320\" y2=\"60\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">Le modèle relationnel : des tables reliées par des clés (primaire / étrangère). Un SGBD garantit l'intégrité.</div></div><div class=\"section-label\">Les briques</div><ul><li><b>Clé primaire</b> : identifie de façon unique chaque ligne (ex. <code>customer_id</code>).</li><li><b>Clé étrangère</b> : référence la clé primaire d'une autre table (ex. <code>de_sales.customer_id</code>) → garantit l'<b>intégrité référentielle</b>.</li><li><b>Schéma</b> : la structure (tables, colonnes, types, contraintes) imposée à l'écriture (<i>schema-on-write</i>).</li></ul><div class=\"section-label\">Le langage SQL</div><p>SQL se décline en familles : <b>DDL</b> (créer/modifier le schéma : <code>CREATE</code>, <code>ALTER</code>), <b>DML</b> (manipuler les données : <code>INSERT</code>, <code>UPDATE</code>, <code>SELECT</code>), <b>DCL</b> (droits). Pour un data engineer, le <code>SELECT</code> et la transformation sont le quotidien.</p><div class=\"note\">Le bac à sable est un petit entrepôt de ventes : <code>de_sales</code> (faits), <code>de_customers</code>/<code>de_products</code> (dimensions), <code>de_events</code> (flux), <code>de_customer_scd</code> (historique). Il sert de fil rouge à tout le cours.</div>", "quiz": [{"q": "À quoi sert une clé étrangère ?", "options": ["À trier les lignes", "À référencer la clé primaire d'une autre table et garantir l'intégrité référentielle", "À chiffrer une colonne", "À compter les lignes"], "answer": 1, "explain": "La clé étrangère relie deux tables et empêche, par exemple, une vente de pointer vers un client inexistant."}], "exercise": {"lang": "sql", "prompt": "Profile la table de faits : nombre de ventes, de clients distincts et de produits distincts. Colonnes : <code>nb_ventes</code>, <code>nb_clients</code>, <code>nb_produits</code>.", "starter": "SELECT COUNT(*) AS nb_ventes,\n       COUNT(DISTINCT customer_id) AS nb_clients,\n       COUNT(DISTINCT product_id)  AS nb_produits\nFROM de_sales;", "solution": "SELECT COUNT(*) AS nb_ventes, COUNT(DISTINCT customer_id) AS nb_clients, COUNT(DISTINCT product_id) AS nb_produits FROM de_sales;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [[18, 5, 5]]}}}, {"id": "de1l2", "title": "Transactions ACID & index", "minutes": 11, "theory": "<p>Au-delà du stockage, un SGBD relationnel offre deux garanties décisives : la <b>fiabilité des transactions</b> et la <b>rapidité d'accès</b> via les index.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 150\" width=\"560\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.6\"/><text x=\"105\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23036\" font-weight=\"700\">Sans index</text><text x=\"105\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23036\" font-weight=\"600\">scan complet (lent)</text><rect x=\"220\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"295\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Index (B-tree)</text><text x=\"295\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">accès direct (rapide)</text><rect x=\"410\" y=\"50\" width=\"130\" height=\"50\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"475\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">ACID</text><text x=\"475\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">transactions sûres</text></svg><div class=\"cap\">Deux garanties d'un SGBD relationnel : les transactions ACID (fiabilité) et les index (rapidité de lecture).</div></div><div class=\"section-label\">Les propriétés ACID</div><table><tr><th>Propriété</th><th>Garantie</th></tr><tr><td>Atomicité</td><td>tout ou rien : une transaction réussit entièrement ou est annulée</td></tr><tr><td>Cohérence</td><td>la base passe d'un état valide à un autre (contraintes respectées)</td></tr><tr><td>Isolation</td><td>les transactions concurrentes ne se corrompent pas</td></tr><tr><td>Durabilité</td><td>une fois validée (COMMIT), la donnée survit aux pannes</td></tr></table><p>Exemple : un virement débite un compte et en crédite un autre — les deux écritures doivent être <b>atomiques</b>. C'est le socle de l'OLTP.</p><div class=\"section-label\">Les index</div><p>Un <b>index</b> (souvent un arbre <b>B-tree</b>) est une structure auxiliaire qui évite de parcourir toute la table : une recherche par clé indexée passe d'un <i>scan complet</i> à un accès quasi direct. On indexe les colonnes filtrées/jointes souvent — au prix d'un léger surcoût en écriture et en espace.</p><div class=\"note\">Un filtre comme <code>WHERE customer_id = 1</code> profite d'un index sur <code>customer_id</code> : c'est exactement le genre de requête qu'on optimise.</div>", "quiz": [{"q": "Que garantit l'« atomicité » d'une transaction ?", "options": ["Qu'elle est rapide", "Qu'elle s'exécute entièrement ou pas du tout", "Qu'elle utilise un index", "Qu'elle est lisible"], "answer": 1, "explain": "Atomicité = tout ou rien : si une étape échoue, toute la transaction est annulée (rollback), évitant les états incohérents."}], "exercise": {"lang": "sql", "prompt": "Comme le ferait une requête accélérée par un <b>index sur <code>customer_id</code></b>, affiche les ventes du <b>client 1</b> : <code>sale_id</code>, <code>sale_date</code>, triées par date.", "starter": "SELECT sale_id, sale_date\nFROM de_sales\nWHERE customer_id = 1\nORDER BY sale_date;", "solution": "SELECT sale_id, sale_date FROM de_sales WHERE customer_id = 1 ORDER BY sale_date;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [[1, "2024-01-05"], [3, "2024-01-12"], [8, "2024-02-14"], [12, "2024-03-03"], [17, "2024-03-22"]]}}}]}, {"formation": "de", "track": "de-db", "id": "de2", "title": "PostgreSQL", "desc": "Le SGBD open-source de référence : types riches, SQL avancé, vues matérialisées.", "lessons": [{"id": "de2l1", "title": "PostgreSQL : le couteau suisse relationnel", "minutes": 11, "theory": "<p><b>PostgreSQL</b> (« Postgres ») est le SGBD relationnel open-source de référence en data engineering : robuste, conforme au standard SQL, et extrêmement <b>extensible</b>. On l'utilise comme base applicative (OLTP), comme source à ingérer, et même pour de l'analytique légère.</p><div class=\"diagram\"><svg viewBox=\"0 0 600 140\" width=\"600\" height=\"140\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"28\" width=\"174.667\" height=\"84\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"107.333\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Conformité</text><text x=\"107.333\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">SQL standard</text><text x=\"107.333\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">contraintes riches</text><rect x=\"212.667\" y=\"28\" width=\"174.667\" height=\"84\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"300\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Types avancés</text><text x=\"300\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">JSONB, tableaux</text><text x=\"300\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">géo (PostGIS)</text><rect x=\"405.333\" y=\"28\" width=\"174.667\" height=\"84\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"492.667\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Extensible</text><text x=\"492.667\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">extensions</text><text x=\"492.667\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">fonctions, FDW</text></svg><div class=\"cap\">PostgreSQL : un SGBD open-source réputé pour sa conformité au standard, ses types riches (JSONB) et son extensibilité.</div></div><div class=\"section-label\">Ce qui le distingue</div><ul><li><b>Conformité & contraintes</b> : transactions ACID, contraintes <code>CHECK</code>, clés étrangères, vues, vues matérialisées.</li><li><b>Types riches</b> : <code>JSONB</code> (JSON indexable), tableaux, types géographiques (PostGIS), types personnalisés.</li><li><b>Extensions</b> : <code>pg_stat_statements</code>, <code>postgres_fdw</code> (interroger une autre base), TimescaleDB (séries temporelles), etc.</li><li><b>Outils</b> : <code>psql</code> (client en ligne de commande), réplication logique/physique, et un CDC via le WAL (Debezium).</li></ul><p>Pour l'ingénieur, Postgres est souvent <b>la source</b> : on en extrait en incrémental ou via CDC vers l'entrepôt analytique.</p><div class=\"note\">Postgres gère aussi très bien le SQL analytique (CTE, fenêtrage, GROUP BY avancé) : on peut prototyper des transformations avant de les porter dans l'entrepôt.</div>", "quiz": [{"q": "Quelle caractéristique distingue particulièrement PostgreSQL ?", "options": ["Il n'accepte que du JSON", "Son extensibilité et ses types riches (JSONB, tableaux, extensions)", "Il ne supporte pas les transactions", "Il est uniquement en mémoire"], "answer": 1, "explain": "Postgres est réputé pour sa conformité au standard ET son extensibilité : types avancés (JSONB), extensions, fonctions personnalisées."}], "exercise": {"lang": "sql", "prompt": "Calcule le <b>chiffre d'affaires par catégorie</b> de produit (<code>quantity*unit_price</code>), trié décroissant. Colonnes : <code>category</code>, <code>ca</code>.", "starter": "SELECT p.category, SUM(s.quantity*s.unit_price) AS ca\nFROM de_sales s JOIN de_products p ON p.product_id=s.product_id\nGROUP BY p.category ORDER BY ca DESC;", "solution": "SELECT p.category, SUM(s.quantity*s.unit_price) AS ca FROM de_sales s JOIN de_products p ON p.product_id=s.product_id GROUP BY p.category ORDER BY ca DESC;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["Écrans", 645.0], ["Accessoires", 449.0], ["Audio", 316.0]]}}}, {"id": "de2l2", "title": "PostgreSQL avancé : CTE, fenêtrage, performance", "minutes": 12, "theory": "<p>Postgres brille sur le SQL analytique. Trois leviers du quotidien : les <b>CTE</b>, les <b>fonctions de fenêtrage</b>, et l'analyse de performance avec <b>EXPLAIN</b>.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 160\" width=\"560\" height=\"160\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"60\" width=\"140\" height=\"44\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"100\" y=\"85.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#211F2A\" font-weight=\"700\">Requête SQL</text><rect x=\"210\" y=\"60\" width=\"150\" height=\"44\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"285\" y=\"78.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">EXPLAIN</text><text x=\"285\" y=\"92.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">→ plan d'exécution</text><rect x=\"400\" y=\"30\" width=\"140\" height=\"40\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"470\" y=\"53.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Index Scan ✓</text><rect x=\"400\" y=\"92\" width=\"140\" height=\"40\" rx=\"11\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.6\"/><text x=\"470\" y=\"115.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23036\" font-weight=\"700\">Seq Scan (lent)</text><line x1=\"170\" y1=\"82\" x2=\"210\" y2=\"82\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"360\" y1=\"76\" x2=\"400\" y2=\"52\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"360\" y1=\"88\" x2=\"400\" y2=\"110\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">EXPLAIN révèle le plan choisi par le moteur : on traque les Seq Scan coûteux pour ajouter l'index qui manque.</div></div><div class=\"section-label\">CTE & fenêtrage</div><p>Les <b>CTE</b> (<code>WITH</code>) nomment des étapes intermédiaires ; les <b>fonctions de fenêtrage</b> (<code>OVER</code>) calculent cumuls et rangs sans réduire les lignes. Combinées, elles expriment des transformations complexes de façon lisible.</p><pre><code>WITH m AS (\n  SELECT substr(sale_date,1,7) AS mois, SUM(quantity*unit_price) AS ca\n  FROM de_sales GROUP BY mois\n)\nSELECT mois, ca, SUM(ca) OVER (ORDER BY mois) AS ca_cumule FROM m;</code></pre><div class=\"section-label\">Performance : EXPLAIN & index</div><ul><li><code>EXPLAIN (ANALYZE)</code> montre le <b>plan d'exécution</b> réel et le temps passé.</li><li>Un <b>Seq Scan</b> (parcours complet) sur une grande table filtrée signale un index manquant.</li><li>Postgres propose plusieurs types d'index : <b>B-tree</b> (égalité/intervalle), <b>GIN</b> (JSONB, recherche plein texte), <b>BRIN</b> (grosses tables triées).</li></ul><div class=\"note\">Optimiser, c'est lire le plan : on ajoute l'index ou on réécrit la requête pour transformer un Seq Scan en Index Scan.</div>", "quiz": [{"q": "À quoi sert la commande EXPLAIN ?", "options": ["À exécuter plus vite", "À afficher le plan d'exécution choisi par le moteur (pour repérer les scans coûteux)", "À créer un index automatiquement", "À sauvegarder la base"], "answer": 1, "explain": "EXPLAIN révèle comment le moteur compte exécuter la requête : on y repère les Seq Scan et l'on décide d'ajouter un index ou de réécrire."}], "exercise": {"lang": "sql", "prompt": "Avec une <b>CTE</b> et une <b>fonction de fenêtrage</b>, calcule le <b>CA cumulé par mois</b>. Colonnes : <code>mois</code>, <code>ca</code> (arrondi 2), <code>ca_cumule</code>.", "starter": "WITH m AS (\n  SELECT substr(sale_date,1,7) AS mois, ROUND(SUM(quantity*unit_price),2) AS ca\n  FROM de_sales GROUP BY mois\n)\nSELECT mois, ca, SUM(ca) OVER (ORDER BY mois) AS ca_cumule FROM m;", "solution": "WITH m AS (SELECT substr(sale_date,1,7) AS mois, ROUND(SUM(quantity*unit_price),2) AS ca FROM de_sales GROUP BY mois) SELECT mois, ca, SUM(ca) OVER (ORDER BY mois) AS ca_cumule FROM m;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["2024-01", 310.0, 310.0], ["2024-02", 499.0, 809.0], ["2024-03", 601.0, 1410.0]]}}}, {"id": "de2l3", "title": "PostgreSQL : vues & vues matérialisées", "minutes": 11, "theory": "<p>Pour <b>industrialiser</b> une requête réutilisée, Postgres offre deux outils complémentaires : la <b>vue</b> et la <b>vue matérialisée</b>. Tous deux encapsulent une logique SQL sous un nom stable.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 160\" width=\"560\" height=\"160\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"55\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"105\" y=\"76.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">Requête</text><text x=\"105\" y=\"90.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"600\">réutilisée souvent</text><rect x=\"215\" y=\"25\" width=\"150\" height=\"40\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"290\" y=\"41.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">VUE</text><text x=\"290\" y=\"55.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">logique, recalculée</text><rect x=\"215\" y=\"95\" width=\"150\" height=\"40\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"290\" y=\"111.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">VUE MATÉRIALISÉE</text><text x=\"290\" y=\"125.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">stockée, à rafraîchir</text><line x1=\"180\" y1=\"70\" x2=\"215\" y2=\"48\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"180\" y1=\"90\" x2=\"215\" y2=\"112\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"470\" y=\"45\" text-anchor=\"middle\" font-size=\"10\" fill=\"#5B4BE8\">simple, toujours à jour</text><text x=\"470\" y=\"115\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0EA672\" font-weight=\"700\">lecture rapide</text></svg><div class=\"cap\">Une vue est une requête nommée (recalculée) ; une vue matérialisée stocke le résultat pour des lectures rapides.</div></div><div class=\"section-label\">Vue vs vue matérialisée</div><table><tr><th></th><th>Vue</th><th>Vue matérialisée</th></tr><tr><td>Stockage</td><td>aucune (logique)</td><td>résultat stocké sur disque</td></tr><tr><td>Fraîcheur</td><td>toujours à jour</td><td>figée jusqu'au REFRESH</td></tr><tr><td>Lecture</td><td>recalculée à chaque appel</td><td>instantanée</td></tr><tr><td>Usage</td><td>simplifier, sécuriser</td><td>pré-agréger un mart lourd</td></tr></table><p>Une <b>vue</b> est une requête sauvegardée : on l'interroge comme une table, mais elle est <b>recalculée</b> à chaque appel. Une <b>vue matérialisée</b> <b>stocke</b> le résultat : lecture instantanée, au prix d'un <b>rafraîchissement</b> (<code>REFRESH MATERIALIZED VIEW</code>, idéalement <code>CONCURRENTLY</code> pour ne pas bloquer les lectures).</p><pre><code>CREATE MATERIALIZED VIEW resume_client AS\nSELECT c.name AS client,\n       COUNT(*) AS nb_ventes,\n       ROUND(SUM(s.quantity*s.unit_price),2) AS ca\nFROM de_sales s JOIN de_customers c ON c.customer_id = s.customer_id\nGROUP BY c.name;</code></pre><div class=\"section-label\">Le lien avec l'entrepôt & dbt</div><p>C'est exactement la logique des <b>matérialisations dbt</b> : un modèle en <code>view</code> reste logique, en <code>table</code> il est matérialisé. La vue matérialisée est l'ancêtre de la couche <b>gold</b> pré-agrégée que la BI interroge.</p><div class=\"note\">Compromis clé : la vue matérialisée échange de la <b>fraîcheur</b> contre de la <b>vitesse</b>. On la rafraîchit via un job planifié (souvent orchestré par Airflow).</div>", "quiz": [{"q": "Qu'est-ce qu'une vue matérialisée ?", "options": ["Une requête recalculée à chaque appel", "Une requête dont le résultat est stocké (à rafraîchir) pour des lectures rapides", "Un index", "Une sauvegarde de la base"], "answer": 1, "explain": "Contrairement à une vue classique (logique, recalculée), la vue matérialisée stocke le résultat : lecture instantanée, mais à rafraîchir pour rester à jour."}], "exercise": {"lang": "sql", "prompt": "Écris la requête derrière la vue matérialisée <b>résumé par client</b> : par client (<code>name</code>), le <code>nb_ventes</code> et le <code>ca</code> (somme de <code>quantity*unit_price</code>, arrondi 2). Trié par <code>ca</code> décroissant. Colonnes : <code>client</code>, <code>nb_ventes</code>, <code>ca</code>.", "starter": "SELECT c.name AS client,\n       COUNT(*) AS nb_ventes,\n       ROUND(SUM(s.quantity*s.unit_price),2) AS ca\nFROM de_sales s JOIN de_customers c ON c.customer_id = s.customer_id\nGROUP BY c.name\nORDER BY ca DESC;", "solution": "SELECT c.name AS client, COUNT(*) AS nb_ventes, ROUND(SUM(s.quantity*s.unit_price),2) AS ca FROM de_sales s JOIN de_customers c ON c.customer_id=s.customer_id GROUP BY c.name ORDER BY ca DESC;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["Alice", 5, 381.0], ["Eva", 3, 294.0], ["Carla", 3, 282.0], ["Bruno", 4, 256.0], ["Dino", 3, 197.0]]}}}]}, {"formation": "de", "track": "de-db", "id": "de3", "title": "MySQL", "desc": "Moteurs (InnoDB), réplication et SQL en pratique.", "lessons": [{"id": "de3l1", "title": "MySQL : le standard du web", "minutes": 10, "theory": "<p><b>MySQL</b> est l'un des SGBD relationnels les plus déployés au monde, historiquement au cœur des applications web (pile LAMP). Pour l'ingénieur, c'est une <b>source</b> fréquente à ingérer.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 150\" width=\"560\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"50\" width=\"160\" height=\"50\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"110\" y=\"64.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">InnoDB</text><text x=\"110\" y=\"78.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">ACID, transactions</text><text x=\"110\" y=\"92.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">clés étrangères</text><rect x=\"220\" y=\"50\" width=\"160\" height=\"50\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"300\" y=\"64.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Réplication</text><text x=\"300\" y=\"78.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">primaire → réplicas</text><text x=\"300\" y=\"92.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">lecture scalable</text><rect x=\"410\" y=\"50\" width=\"130\" height=\"50\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"475\" y=\"64.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Usage web</text><text x=\"475\" y=\"78.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">LAMP, OLTP</text><text x=\"475\" y=\"92.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">très répandu</text></svg><div class=\"cap\">MySQL : SGBD relationnel très répandu (web), moteur InnoDB transactionnel et réplication primaire/réplicas.</div></div><div class=\"section-label\">Moteurs de stockage</div><p>Particularité de MySQL : le <b>moteur de stockage</b> est pluggable. <b>InnoDB</b> (par défaut) apporte les transactions <b>ACID</b>, les clés étrangères et le verrouillage par ligne ; <b>MyISAM</b> (ancien) est plus rapide en lecture pure mais sans transactions. En data engineering, on s'appuie sur InnoDB.</p><div class=\"section-label\">Réplication & extraction</div><ul><li><b>Réplication</b> primaire → réplicas : on lit les analyses sur un réplica pour ne pas charger la base de production.</li><li><b>Binlog</b> : le journal binaire des changements → base du <b>CDC</b> (Debezium) pour répliquer vers l'entrepôt.</li><li><b>Extraction</b> : full ou incrémental (sur une colonne <code>updated_at</code> ou un id croissant).</li></ul><div class=\"section-label\">MySQL vs PostgreSQL</div><table><tr><th></th><th>MySQL</th><th>PostgreSQL</th></tr><tr><td>Réputation</td><td>simplicité, web, lecture</td><td>richesse fonctionnelle, conformité</td></tr><tr><td>Types avancés</td><td>plus limités</td><td>JSONB, tableaux, extensions</td></tr><tr><td>Usage DE</td><td>source OLTP fréquente</td><td>source + analytique légère</td></tr></table><div class=\"note\">Le SQL reste très proche d'un moteur à l'autre ; les différences portent surtout sur les types, les fonctions et l'administration.</div>", "quiz": [{"q": "Quel moteur de stockage MySQL apporte les transactions ACID ?", "options": ["MyISAM", "InnoDB", "CSV", "Memory"], "answer": 1, "explain": "InnoDB (moteur par défaut) fournit l'ACID, les clés étrangères et le verrouillage par ligne ; MyISAM, plus ancien, n'a pas de transactions."}], "exercise": {"lang": "sql", "prompt": "Compte le nombre de ventes <b>par client</b> et ne garde que les clients ayant <b>au moins 4 ventes</b>. Colonnes : <code>customer_id</code>, <code>nb</code>, triées par <code>nb</code> décroissant.", "starter": "SELECT customer_id, COUNT(*) AS nb\nFROM de_sales\nGROUP BY customer_id\nHAVING COUNT(*) >= 4\nORDER BY nb DESC;", "solution": "SELECT customer_id, COUNT(*) AS nb FROM de_sales GROUP BY customer_id HAVING COUNT(*) >= 4 ORDER BY nb DESC;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [[1, 5], [2, 4]]}}}, {"id": "de3l2", "title": "MySQL en pratique : agrégats & top N", "minutes": 10, "theory": "<p>Le quotidien d'une source MySQL : agréger, trier, limiter. Les patterns sont identiques au SQL standard, avec quelques spécificités de syntaxe (<code>LIMIT</code>, <code>AUTO_INCREMENT</code>, back-ticks pour les identifiants).</p><div class=\"diagram\"><svg viewBox=\"0 0 540 130\" width=\"540\" height=\"130\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"45\" width=\"150\" height=\"44\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"105\" y=\"70.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Tri par CA</text><rect x=\"210\" y=\"45\" width=\"150\" height=\"44\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"285\" y=\"70.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"700\">LIMIT 3</text><rect x=\"390\" y=\"45\" width=\"120\" height=\"44\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"450\" y=\"70.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"700\">Top 3</text><line x1=\"180\" y1=\"67\" x2=\"210\" y2=\"67\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"360\" y1=\"67\" x2=\"390\" y2=\"67\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">Un « top N » classique : trier puis LIMIT — un pattern omniprésent dans les rapports et les marts.</div></div><div class=\"section-label\">Agréger et classer</div><p><code>GROUP BY</code> résume par groupe, <code>ORDER BY</code> trie, <code>LIMIT n</code> ne garde que les n premières lignes : la recette d'un « top N » (meilleurs produits, plus gros clients…).</p><pre><code>SELECT p.name AS produit, SUM(s.quantity*s.unit_price) AS ca\nFROM de_sales s JOIN de_products p ON p.product_id=s.product_id\nGROUP BY p.name\nORDER BY ca DESC\nLIMIT 3;</code></pre><div class=\"section-label\">Bonnes pratiques d'extraction</div><ul><li>Extraire par <b>fenêtres temporelles</b> (incrémental) pour ne pas relire toute la table.</li><li>Lire sur un <b>réplica</b> pour préserver la base de production.</li><li>Typer correctement à l'arrivée dans l'entrepôt (dates, décimaux).</li></ul><div class=\"note\">Le « top N par groupe » (un top 3 par catégorie, par mois…) nécessite, lui, les fonctions de fenêtrage — on le verra dans les modules avancés.</div>", "quiz": [{"q": "Que fait LIMIT 3 après un ORDER BY décroissant ?", "options": ["Garde 3 colonnes", "Renvoie les 3 premières lignes (le top 3)", "Supprime 3 lignes", "Trie par 3"], "answer": 1, "explain": "ORDER BY ... DESC + LIMIT 3 renvoie les trois plus grandes valeurs : le pattern « top N »."}], "exercise": {"lang": "sql", "prompt": "Affiche les <b>3 produits</b> au plus gros chiffre d'affaires (<code>quantity*unit_price</code>). Colonnes : <code>produit</code> (nom), <code>ca</code>.", "starter": "SELECT p.name AS produit, SUM(s.quantity*s.unit_price) AS ca\nFROM de_sales s JOIN de_products p ON p.product_id=s.product_id\nGROUP BY p.name ORDER BY ca DESC LIMIT 3;", "solution": "SELECT p.name AS produit, SUM(s.quantity*s.unit_price) AS ca FROM de_sales s JOIN de_products p ON p.product_id=s.product_id GROUP BY p.name ORDER BY ca DESC LIMIT 3;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["Écran", 645.0], ["Casque", 316.0], ["Clavier", 203.0]]}}}]}, {"formation": "de", "track": "de-db", "id": "de4", "title": "MongoDB & NoSQL", "desc": "Familles NoSQL, CAP/BASE, documents et pipeline d'agrégation.", "lessons": [{"id": "de4l1", "title": "NoSQL : familles, CAP & BASE", "minutes": 11, "theory": "<p><b>NoSQL</b> (« not only SQL ») regroupe des bases qui s'écartent du modèle relationnel strict pour gagner en <b>flexibilité de schéma</b> et en <b>scalabilité horizontale</b>. Ce n'est pas « mieux » que le relationnel : c'est un autre compromis.</p><div class=\"diagram\"><svg viewBox=\"0 0 620 140\" width=\"620\" height=\"140\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"28\" width=\"131.5\" height=\"84\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"85.75\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Document</text><text x=\"85.75\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">JSON imbriqué</text><text x=\"85.75\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">MongoDB</text><rect x=\"169.5\" y=\"28\" width=\"131.5\" height=\"84\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"235.25\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Clé-valeur</text><text x=\"235.25\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">cache, sessions</text><text x=\"235.25\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">Redis</text><rect x=\"319\" y=\"28\" width=\"131.5\" height=\"84\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"384.75\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Colonne large</text><text x=\"384.75\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">très gros volume</text><text x=\"384.75\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">Cassandra</text><rect x=\"468.5\" y=\"28\" width=\"131.5\" height=\"84\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"534.25\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23E22\" font-weight=\"700\">Graphe</text><text x=\"534.25\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23E22\" font-weight=\"600\">relations</text><text x=\"534.25\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23E22\" font-weight=\"600\">Neo4j</text></svg><div class=\"cap\">Les familles NoSQL : document, clé-valeur, colonne large, graphe. Chacune répond à un besoin d'accès précis.</div></div><div class=\"section-label\">Quatre familles</div><table><tr><th>Famille</th><th>Idée</th><th>Exemple</th></tr><tr><td>Document</td><td>enregistrements JSON imbriqués</td><td>MongoDB</td></tr><tr><td>Clé-valeur</td><td>accès ultra-rapide par clé</td><td>Redis, DynamoDB</td></tr><tr><td>Colonne large</td><td>écriture massive distribuée</td><td>Cassandra, HBase</td></tr><tr><td>Graphe</td><td>parcours de relations</td><td>Neo4j</td></tr></table><div class=\"section-label\">Le théorème CAP</div><p>Un système distribué ne peut garantir simultanément que <b>deux</b> des trois propriétés <b>Cohérence, Disponibilité, tolérance au Partitionnement</b>. Comme le réseau partitionne fatalement, on arbitre surtout entre <b>cohérence</b> et <b>disponibilité</b>.</p><div class=\"section-label\">ACID vs BASE</div><p>Là où le relationnel vise <b>ACID</b>, beaucoup de bases NoSQL adoptent <b>BASE</b> (<i>Basically Available, Soft state, Eventual consistency</i>) : la donnée devient cohérente <b>à terme</b>, en échange de disponibilité et de scalabilité.</p><div class=\"note\">Choix d'ingénieur : relationnel pour des données structurées et transactionnelles ; NoSQL pour des documents flexibles, du cache, ou un très gros volume distribué.</div>", "quiz": [{"q": "Que dit le théorème CAP ?", "options": ["Une base NoSQL est toujours plus rapide", "Un système distribué ne peut garantir que 2 des 3 propriétés : Cohérence, Disponibilité, tolérance au Partitionnement", "Le SQL est obligatoire", "La cohérence est impossible"], "answer": 1, "explain": "Face aux partitions réseau (inévitables), on arbitre entre cohérence forte et disponibilité — c'est le cœur des choix NoSQL."}]}, {"id": "de4l2", "title": "MongoDB : documents & agrégation", "minutes": 11, "theory": "<p><b>MongoDB</b> stocke des <b>documents</b> de type JSON (BSON) dans des <b>collections</b>. Un document peut imbriquer des sous-structures (un client <i>contenant</i> ses adresses) : on évite des jointures au prix d'une certaine redondance.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 150\" width=\"560\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"105\" y=\"71.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">$match</text><text x=\"105\" y=\"86.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">(WHERE)</text><rect x=\"210\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"285\" y=\"71.24\" text-anchor=\"middl
