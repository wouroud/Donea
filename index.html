ibué), MapReduce (calcul) et YARN (orchestration des ressources).</div></div><div class=\"section-label\">HDFS — stockage distribué</div><p>Le <b>Hadoop Distributed File System</b> découpe les fichiers en <b>blocs</b> répartis sur les nœuds, <b>répliqués</b> (typiquement ×3) pour tolérer les pannes. Un <i>NameNode</i> gère les métadonnées, les <i>DataNodes</i> stockent les blocs. Idée maîtresse : <b>amener le calcul à la donnée</b>.</p><div class=\"section-label\">MapReduce — le calcul</div><p><b>MapReduce</b> exprime un traitement en deux phases : <b>Map</b> (transformer chaque morceau en paires clé-valeur) puis <b>Reduce</b> (agréger par clé), avec un <b>Shuffle</b> intermédiaire qui regroupe les clés. Puissant mais verbeux et lent (tout passe par le disque) — d'où l'essor de Spark (en mémoire).</p><table><tr><th></th><th>MapReduce</th><th>Spark</th></tr><tr><td>Exécution</td><td>sur disque, par étapes</td><td>en mémoire, optimisé</td></tr><tr><td>Vitesse</td><td>lent</td><td>beaucoup plus rapide</td></tr><tr><td>Écriture</td><td>verbeux</td><td>SQL/DataFrame concis</td></tr></table><div class=\"note\">On rencontre encore Hadoop dans des socles historiques (on-premise) ; les nouveaux projets vont vers le cloud (S3 + Spark/lakehouse).</div>", "quiz": [{"q": "Quel est le principe de HDFS ?", "options": ["Stocker en mémoire vive uniquement", "Découper les fichiers en blocs répartis et répliqués sur les nœuds du cluster", "Une base relationnelle", "Un format de compression"], "answer": 1, "explain": "HDFS distribue des blocs de fichiers (répliqués pour la tolérance aux pannes) et amène le calcul au plus près de la donnée."}]}, {"id": "de12l2", "title": "L'écosystème & l'héritage Hadoop", "minutes": 11, "theory": "<p>Autour du noyau HDFS/MapReduce/YARN s'est construit un <b>écosystème</b> riche, dont plusieurs idées survivent aujourd'hui.</p><div class=\"diagram\"><svg viewBox=\"0 0 620 150\" width=\"620\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"14\" y=\"58\" width=\"182.667\" height=\"52\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"105.333\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Hive (SQL)</text><text x=\"105.333\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">sur Hadoop</text><line x1=\"196.667\" y1=\"84\" x2=\"218.667\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"218.667\" y=\"58\" width=\"182.667\" height=\"52\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"310\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Spark</text><text x=\"310\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">en mémoire</text><line x1=\"401.333\" y1=\"84\" x2=\"423.333\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"423.333\" y=\"58\" width=\"182.667\" height=\"52\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"514.667\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Cloud</text><text x=\"514.667\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">S3 + lakehouse</text></svg><div class=\"cap\">L'héritage Hadoop : Hive a apporté le SQL ; Spark puis le cloud/lakehouse ont pris le relais pour la performance.</div></div><div class=\"section-label\">Les briques marquantes</div><ul><li><b>Hive</b> : un moteur <b>SQL</b> sur Hadoop (HiveQL) — il a démocratisé l'analytique sur Big Data sans écrire de MapReduce. Le <b>Hive Metastore</b> (catalogue de tables) reste utilisé, y compris par Spark.</li><li><b>YARN</b> : le gestionnaire de ressources qui alloue le calcul du cluster.</li><li><b>HBase</b> : base NoSQL colonne large sur HDFS ; <b>Pig</b> : langage de flux de données (historique).</li></ul><div class=\"section-label\">Pourquoi la transition</div><p>MapReduce sur disque était lent ; <b>Spark</b> (en mémoire) l'a supplanté pour la performance. Et l'<b>élasticité du cloud</b> (stockage objet S3/GCS + calcul à la demande) a remplacé les clusters Hadoop on-premise difficiles à dimensionner. Le <b>lakehouse</b> est l'héritier direct : stockage objet + table format + moteur distribué.</p><p>L'esprit « SQL sur de gros fichiers » de Hive se retrouve aujourd'hui dans tout entrepôt/lakehouse — par exemple un agrégat de volume par période.</p><pre><code>SELECT substr(sale_date,1,7) AS mois, COUNT(*) AS volume\nFROM de_sales GROUP BY mois ORDER BY mois;</code></pre><div class=\"callout\">À retenir : Hadoop a inventé le calcul distribué de masse ; ses idées (stockage distribué, SQL sur Big Data, catalogue de tables) vivent désormais dans Spark, le cloud et le lakehouse.</div>", "quiz": [{"q": "Qu'a principalement apporté Hive à l'écosystème Hadoop ?", "options": ["Le stockage en mémoire", "La possibilité d'interroger le Big Data en SQL (sans coder MapReduce)", "Le chiffrement", "La réplication des blocs"], "answer": 1, "explain": "Hive a apporté une couche SQL (HiveQL) sur Hadoop et un metastore de tables — encore utilisé aujourd'hui, notamment par Spark."}], "exercise": {"lang": "sql", "prompt": "Dans l'esprit « SQL sur Big Data » (Hive) : calcule le <b>volume de ventes par mois</b> (<code>substr(sale_date,1,7)</code>). Colonnes : <code>mois</code>, <code>volume</code>, triées par mois.", "starter": "SELECT substr(sale_date,1,7) AS mois, COUNT(*) AS volume\nFROM de_sales GROUP BY mois ORDER BY mois;", "solution": "SELECT substr(sale_date,1,7) AS mois, COUNT(*) AS volume FROM de_sales GROUP BY mois ORDER BY mois;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["2024-01", 5], ["2024-02", 6], ["2024-03", 7]]}}}]}];

  CURRICULUM.exams['de'] = {"id": "exam-de", "formation": "de", "formationLabel": "Data Engineering — construire les pipelines", "title": "Examen final — Data Engineering", "subtitle": "24 questions couvrant les 12 modules (bases de données, PostgreSQL/MySQL, NoSQL/MongoDB, data warehousing, data lake/lakehouse, ETL/ELT, Airflow, dbt, Spark, Kafka, Hadoop). Seuil de réussite : 80 %.", "passMark": 0.8, "criteria": ["Maîtrise des bases de données (relationnel, PostgreSQL, MySQL, NoSQL).", "Compréhension du stockage analytique (entrepôt, data lake, lakehouse) et de la modélisation.", "Connaissance des pipelines (ETL/ELT, Airflow, dbt) et du Big Data (Spark, Kafka, Hadoop).", "Seuil de réussite élevé : score minimum de 80 %."], "questions": [{"q": "À quoi sert une clé étrangère ?", "options": ["À trier", "À référencer la clé primaire d'une autre table (intégrité référentielle)", "À chiffrer", "À compter"], "answer": 1, "explain": "Elle relie deux tables et empêche une référence vers une ligne inexistante."}, {"q": "Que garantit l'atomicité d'une transaction ?", "options": ["La rapidité", "Tout ou rien : elle s'exécute entièrement ou est annulée", "L'usage d'un index", "La lisibilité"], "answer": 1, "explain": "Atomicité = exécution complète ou rollback, pour éviter les états incohérents."}, {"q": "Quelle caractéristique distingue PostgreSQL ?", "options": ["Seulement du JSON", "Son extensibilité et ses types riches (JSONB, extensions)", "Pas de transactions", "En mémoire uniquement"], "answer": 1, "explain": "Postgres est réputé pour sa conformité au standard et son extensibilité."}, {"q": "À quoi sert EXPLAIN ?", "options": ["Exécuter plus vite", "Afficher le plan d'exécution pour repérer les scans coûteux", "Créer un index", "Sauvegarder"], "answer": 1, "explain": "EXPLAIN montre comment le moteur exécute la requête ; on y repère les Seq Scan."}, {"q": "Quel moteur MySQL apporte les transactions ACID ?", "options": ["MyISAM", "InnoDB", "CSV", "Memory"], "answer": 1, "explain": "InnoDB fournit l'ACID, les clés étrangères et le verrouillage par ligne."}, {"q": "Que dit le théorème CAP ?", "options": ["NoSQL est plus rapide", "Un système distribué ne garantit que 2 de : Cohérence, Disponibilité, tolérance au Partitionnement", "SQL obligatoire", "Cohérence impossible"], "answer": 1, "explain": "Face aux partitions réseau, on arbitre entre cohérence et disponibilité."}, {"q": "Le pipeline d'agrégation MongoDB correspond à :", "options": ["Une transaction", "Un enchaînement équivalent à SELECT/WHERE/GROUP BY/ORDER BY", "Un index", "Une réplication"], "answer": 1, "explain": "$match/$group/$sort enchaînent filtrage, regroupement et tri — comme une requête SQL agrégée."}, {"q": "Qu'est-ce qui caractérise un entrepôt (OLAP) ?", "options": ["Normalisé, orienté lignes", "Dimensionnel, colonnaire, optimisé pour scans/agrégats", "Interdit le SQL", "Stocke du JSON"], "answer": 1, "explain": "L'entrepôt privilégie le modèle dimensionnel, le colonnaire et le parallélisme massif."}, {"q": "La décision la plus structurante d'une table de faits est :", "options": ["Son nom", "Son grain (ce que représente une ligne)", "Sa couleur", "Le nombre d'index"], "answer": 1, "explain": "Le grain fixe le niveau de détail et conditionne toutes les analyses."}, {"q": "Une dimension SCD de type 2 :", "options": ["Écrase l'ancienne valeur", "Conserve l'historique : 1 ligne par version (valid_from/valid_to, is_current)", "Garde la valeur courante", "Garde la précédente"], "answer": 1, "explain": "Le type 2 versionne chaque changement, permettant l'analyse historique."}, {"q": "Qu'appelle-t-on schema-on-read ?", "options": ["Schéma imposé à l'écriture", "Le schéma est appliqué à la lecture (donnée stockée brute)", "Aucun schéma", "Schéma chiffré"], "answer": 1, "explain": "Le data lake stocke le brut ; la structure est interprétée à la lecture."}, {"q": "Qu'apporte un lakehouse (Delta/Iceberg) à un data lake ?", "options": ["Rien", "Transactions ACID, time travel et évolution de schéma", "Supprime le SQL", "Le rend OLTP"], "answer": 1, "explain": "Le lakehouse ajoute une couche transactionnelle sur le stockage objet."}, {"q": "Qu'est-ce qui caractérise l'ELT ?", "options": ["Transformer avant de charger", "Charger le brut puis transformer dans l'entrepôt", "Pas de SQL", "Pas de brut conservé"], "answer": 1, "explain": "ELT = Extract, Load, puis Transform ; on garde le brut et on raffine par couches."}, {"q": "Quel mécanisme capte aussi les suppressions en quasi temps réel ?", "options": ["Full load", "Incrémental par requête", "CDC (journal de transactions)", "Partitionnement"], "answer": 2, "explain": "Le CDC lit le binlog/WAL et propage insert/update/delete."}, {"q": "Qu'est-ce qu'un DAG dans Airflow ?", "options": ["Une base", "Un graphe orienté sans cycle de tâches et dépendances", "Un index", "Un format de fichier"], "answer": 1, "explain": "Le DAG décrit le pipeline ; le scheduler le planifie et le ré-exécute."}, {"q": "Pourquoi des tâches idempotentes et découpées par intervalle ?", "options": ["Pour rallonger", "Pour rejouer (backfill, réessais) sans doublons", "Éviter le SQL", "Supprimer le scheduler"], "answer": 1, "explain": "Réécrire la partition de l'intervalle rend chaque run rejouable à l'identique."}, {"q": "À quoi sert ref() dans dbt ?", "options": ["Supprimer des doublons", "Déclarer la dépendance entre modèles et construire le DAG", "Partitionner", "Chiffrer"], "answer": 1, "explain": "ref() relie les modèles ; dbt en déduit l'ordre, les tests et le lineage."}, {"q": "Que fournit un snapshot dbt ?", "options": ["Une sauvegarde", "Un SCD type 2 matérialisé automatiquement", "Un index", "Un cache"], "answer": 1, "explain": "Les snapshots détectent les changements et les versionnent (SCD2) sans code manuel."}, {"q": "Qu'est-ce qu'un shuffle dans Spark ?", "options": ["Lecture négligeable", "Échange de données entre nœuds (groupBy/join), très coûteux", "Compression", "Chiffrement"], "answer": 1, "explain": "Les transformations « wide » redistribuent les données ; c'est le premier levier d'optimisation."}, {"q": "Dans Kafka, l'offset est :", "options": ["La taille d'un message", "La position d'un message dans une partition, suivie par le consommateur", "Le nombre de topics", "Une clé de chiffrement"], "answer": 1, "explain": "Le consommateur mémorise son offset et peut rejouer depuis un point donné."}, {"q": "Pourquoi distinguer event time et processing time ?", "options": ["Synonymes", "Les événements arrivent en retard : on agrège en event time avec des watermarks", "Pour chiffrer", "Pour compresser"], "answer": 1, "explain": "Les watermarks bornent l'attente des retardataires pour fermer les fenêtres."}, {"q": "Quel est le principe de HDFS ?", "options": ["En mémoire uniquement", "Découper les fichiers en blocs répartis et répliqués sur le cluster", "Une base relationnelle", "Un format de compression"], "answer": 1, "explain": "HDFS distribue des blocs répliqués et amène le calcul au plus près de la donnée."}, {"q": "Qu'est-ce qu'une vue matérialisée (PostgreSQL) ?", "options": ["Une requête recalculée à chaque appel", "Une requête dont le résultat est stocké, à rafraîchir, pour des lectures rapides", "Un index B-tree", "Une sauvegarde"], "answer": 1, "explain": "Contrairement à une vue classique (recalculée), la vue matérialisée stocke le résultat : lecture instantanée, mais à rafraîchir pour rester à jour."}, {"q": "À quoi sert Kafka Connect ?", "options": ["À chiffrer les topics", "À fournir des connecteurs source/sink sans code (ex. CDC Debezium vers des topics)", "À supprimer des partitions", "À remplacer SQL"], "answer": 1, "explain": "Kafka Connect industrialise l'entrée/sortie des données via des connecteurs prêts à l'emploi, dont le CDC (Debezium)."}]};

<script>
/* ============================================================
   Approfondissement du contenu Data QA (modules m2 à m6)

(function(){
  if (typeof CURRICULUM === 'undefined' || !CURRICULUM.modules) return;
  var ENR = {"m2l1": {"theory": "<p>En Data QA, SQL n'est pas seulement un langage de lecture : c'est l'<strong>outil de mesure</strong>. La plupart des contrôles de qualité s'expriment comme une requête qui interroge les données et compte ce qui ne va pas.</p><h3>Le contrôle = une requête</h3><p>L'idée centrale, qu'on retrouvera partout : un test de qualité est une requête qui <strong>renvoie les lignes fautives</strong>. Si elle renvoie zéro ligne, le contrôle passe ; sinon, le nombre de lignes mesure la gravité.</p><pre><code>-- Y a-t-il des commandes au montant négatif ? (doit renvoyer 0 ligne)\nSELECT order_id, amount_ttc\nFROM orders\nWHERE amount_ttc &lt; 0;</code></pre><p>Ce schéma « anti-jointure / lignes en erreur » est exactement ce que des outils comme dbt ou Great Expectations automatisent : ils exécutent une requête et vérifient qu'elle ne remonte rien.</p><h3>Les 4 briques qu'on combine sans cesse</h3><ul><li><strong>SELECT … FROM</strong> : ce qu'on veut voir.</li><li><strong>WHERE</strong> : la condition d'erreur (ou de sélection).</li><li><strong>GROUP BY</strong> : regrouper pour compter par catégorie, repérer les doublons, profiler.</li><li><strong>Fonctions d'agrégation</strong> : <code>COUNT</code>, <code>SUM</code>, <code>AVG</code>, <code>MIN</code>, <code>MAX</code> pour résumer.</li></ul><h3>Mesurer un taux, pas seulement un nombre</h3><p>Un bon contrôle exprime souvent un <strong>taux</strong> : c'est comparable dans le temps et entre tables, indépendamment du volume.</p><pre><code>-- Taux de complétude de la colonne email (en %)\nSELECT ROUND(100.0 * COUNT(email) / COUNT(*), 1) AS pct_email_rempli\nFROM customers;</code></pre><div class=\"note\">À retenir : <strong>COUNT(*)</strong> compte toutes les lignes ; <strong>COUNT(colonne)</strong> ignore les NULL. La différence entre les deux donne directement le nombre de valeurs manquantes.</div>", "minutes": 6}, "m2l2": {"theory": "<p>Les deux problèmes de qualité les plus fréquents — et les plus faciles à détecter en SQL — sont les <strong>valeurs manquantes</strong> (complétude) et les <strong>doublons</strong> (unicité).</p><h3>1. Les valeurs manquantes (NULL)</h3><p><code>NULL</code> signifie « absence de valeur ». On ne le teste jamais avec <code>=</code> mais avec <code>IS NULL</code> / <code>IS NOT NULL</code>.</p><pre><code>-- Nombre et taux de valeurs manquantes, colonne par colonne\nSELECT\n  COUNT(*)                                   AS total,\n  COUNT(*) - COUNT(email)                    AS email_manquants,\n  ROUND(100.0*(COUNT(*)-COUNT(email))/COUNT(*),1) AS pct_manquants\nFROM customers;</code></pre><div class=\"callout\">⚠️ Attention aux faux vides : une chaîne vide <code>''</code> ou un <code>'N/A'</code> ne sont pas des NULL. Pense à les traiter : <code>WHERE email IS NULL OR email = '' OR email = 'N/A'</code>.</div><h3>2. Les doublons</h3><p>Un doublon, c'est une valeur (ou combinaison de valeurs) censée être unique qui apparaît plusieurs fois. On les débusque avec <code>GROUP BY</code> + <code>HAVING</code>.</p><pre><code>-- Quels emails apparaissent plus d'une fois ?\nSELECT email, COUNT(*) AS occurrences\nFROM customers\nWHERE email IS NOT NULL\nGROUP BY email\nHAVING COUNT(*) &gt; 1;</code></pre><h3>Clé composite : l'unicité sur plusieurs colonnes</h3><p>Souvent l'unicité porte sur une <em>combinaison</em> (ex. un même client ne devrait pas avoir deux commandes le même jour pour le même produit). On regroupe alors sur plusieurs colonnes.</p><pre><code>SELECT customer_id, order_date, COUNT(*) AS n\nFROM orders\nGROUP BY customer_id, order_date\nHAVING COUNT(*) &gt; 1;</code></pre><h3>Doublons exacts vs approchants</h3><p>Les doublons <strong>exacts</strong> (mêmes valeurs) sont faciles. Les doublons <strong>approchants</strong> (« Jean Dupont » vs « jean dupont », espaces, accents) demandent de normaliser avant de comparer : <code>LOWER(TRIM(nom))</code>. C'est un piège classique en audit.</p><div class=\"note\">Méthode : pour <em>quantifier</em> on compte les groupes en double ; pour <em>corriger</em> on garde une ligne par groupe (la plus complète ou la plus récente).</div>", "minutes": 12}, "m2l3": {"theory": "<p>Le <strong>profiling</strong> (ou profilage) consiste à dresser la « carte d'identité » statistique d'une table <em>avant</em> d'écrire des contrôles. On ne peut pas définir ce qui est anormal sans connaître le normal.</p><h3>Ce qu'on regarde, colonne par colonne</h3><ul><li><strong>Volume</strong> : combien de lignes ? (point de référence pour tout le reste)</li><li><strong>Complétude</strong> : taux de NULL par colonne.</li><li><strong>Cardinalité</strong> : nombre de valeurs distinctes (<code>COUNT(DISTINCT …)</code>) — révèle clés, catégories, colonnes constantes.</li><li><strong>Étendue</strong> : min / max / moyenne pour les nombres et les dates (valeurs aberrantes, dates dans le futur…).</li><li><strong>Valeurs fréquentes</strong> : top des valeurs pour repérer les catégories inattendues.</li></ul><h3>Un profil en une requête</h3><pre><code>SELECT\n  COUNT(*)                         AS lignes,\n  COUNT(DISTINCT categorie)        AS nb_categories,\n  ROUND(100.0*(COUNT(*)-COUNT(prix))/COUNT(*),1) AS pct_prix_manquant,\n  MIN(prix) AS prix_min,\n  MAX(prix) AS prix_max,\n  ROUND(AVG(prix),2) AS prix_moyen\nFROM produits;</code></pre><h3>Repérer les catégories suspectes</h3><pre><code>SELECT categorie, COUNT(*) AS n\nFROM produits\nGROUP BY categorie\nORDER BY n DESC;</code></pre><p>Une catégorie écrite « Légumes » et « legumes », un pays « XX », un prix à 0 ou négatif : le profiling fait remonter ces signaux faibles que l'œil ne voit pas dans 100 000 lignes.</p><div class=\"callout\">Le profiling transforme des intuitions (« je crois que cette colonne est sale ») en <strong>chiffres</strong> qui deviennent ensuite des seuils de tests.</div>", "minutes": 10}, "m2l4": {"theory": "<p>Beaucoup de problèmes ne se voient qu'<strong>au fil du temps</strong> : une table qui se remplit deux fois moins qu'hier, un pic de doublons, une colonne qui dérive. Les <strong>fonctions de fenêtrage</strong> permettent de comparer chaque ligne (ou chaque jour) à son contexte.</p><h3>Une fonction de fenêtre, c'est quoi ?</h3><p>Comme une agrégation, mais <em>sans réduire le nombre de lignes</em> : elle calcule une valeur « par groupe » tout en gardant le détail, grâce à <code>OVER (…)</code>.</p><pre><code>-- Cumul et moyenne mobile par jour\nSELECT\n  jour,\n  nb_commandes,\n  AVG(nb_commandes) OVER (\n    ORDER BY jour ROWS BETWEEN 6 PRECEDING AND 1 PRECEDING\n  ) AS moyenne_7j_precedents\nFROM volumes_quotidiens;</code></pre><h3>Détecter une anomalie de volume</h3><p>Le principe : comparer la valeur du jour à une <strong>référence</strong> (moyenne des jours précédents) et alerter si l'écart est trop grand. C'est l'idée du <em>z-score</em> : « à combien d'écarts-types suis-je de la normale ? ».</p><pre><code>WITH ref AS (\n  SELECT jour, nb_commandes,\n         AVG(nb_commandes)  OVER w AS moy,\n         /* écart-type glissant */\n         (MAX(nb_commandes) OVER w - MIN(nb_commandes) OVER w) AS amplitude\n  FROM volumes_quotidiens\n  WINDOW w AS (ORDER BY jour ROWS BETWEEN 7 PRECEDING AND 1 PRECEDING)\n)\nSELECT * FROM ref\nWHERE nb_commandes &lt; moy * 0.5;   -- chute de plus de 50 %</code></pre><h3>Autres usages utiles</h3><ul><li><strong>ROW_NUMBER()</strong> pour dédupliquer en gardant « la 1re ligne par clé ».</li><li><strong>LAG() / LEAD()</strong> pour comparer une ligne à la précédente (variation jour à jour).</li><li><strong>RANK()</strong> pour repérer les valeurs extrêmes par groupe.</li></ul><div class=\"note\">Le monitoring de volume (cette leçon) annonce le module Observabilité : on passe de « la donnée est-elle correcte ? » à « son comportement est-il normal dans le temps ? ».</div>", "minutes": 10}, "m3l1": {"theory": "<p>SQL excelle pour interroger la base ; <strong>Python + pandas</strong> brille pour explorer un fichier, croiser des sources, et automatiser un rapport de qualité reproductible.</p><h3>Le DataFrame</h3><p>Un <strong>DataFrame</strong> est un tableau en mémoire (lignes × colonnes typées). On le charge depuis un CSV, une base, un Excel…</p><pre><code>import pandas as pd\ndf = pd.read_csv('clients.csv')\ndf.head()          # aperçu\ndf.shape           # (lignes, colonnes)\ndf.info()          # types + non-nuls par colonne</code></pre><h3>Profiling express</h3><pre><code>df.describe()                 # min/max/moyenne/quartiles (numériques)\ndf.isna().mean().round(3)     # taux de valeurs manquantes par colonne\ndf['pays'].value_counts()     # fréquence des catégories\ndf.duplicated().sum()         # nombre de lignes en double</code></pre><p>En quelques lignes, on obtient l'équivalent d'une batterie de requêtes SQL — et on peut le rejouer sur n'importe quel fichier.</p><h3>Transformer une mesure en contrôle</h3><pre><code>taux_manquant = df['email'].isna().mean()\nassert taux_manquant &lt; 0.05, f\"Trop d'emails manquants : {taux_manquant:.1%}\"</code></pre><p>L'<code>assert</code> fait échouer le script si la règle n'est pas respectée : c'est la brique d'un test automatisé.</p><h3>Quand préférer Python à SQL ?</h3><ul><li>Données <strong>hors base</strong> (CSV, API, Excel) ou multi-sources à rapprocher.</li><li>Contrôles <strong>complexes</strong> (expressions régulières, distributions, rapprochements flous).</li><li><strong>Rapports</strong> et graphiques de qualité automatisés.</li></ul><div class=\"note\">Règle de bon sens : ce qui est simple en SQL, fais-le en SQL (au plus près des données). Réserve Python à ce qui le dépasse.</div>", "minutes": 12}, "m3l2": {"theory": "<p><strong>Great Expectations</strong> (GX) est une bibliothèque Python qui permet de déclarer des « <em>attentes</em> » (expectations) sur les données, de les valider, et de générer une documentation lisible.</p><h3>Le vocabulaire</h3><ul><li>Une <strong>Expectation</strong> = une règle vérifiable (ex. « cette colonne ne doit pas contenir de NULL »).</li><li>Une <strong>Suite</strong> = un ensemble d'attentes pour une table.</li><li>Une <strong>Validation</strong> = l'exécution de la suite sur des données, qui produit un résultat <em>réussi/échoué</em>.</li><li>Les <strong>Data Docs</strong> = un rapport HTML auto-généré, partageable.</li></ul><h3>Des attentes parlantes</h3><pre><code>validator.expect_column_values_to_not_be_null('email')\nvalidator.expect_column_values_to_be_unique('customer_id')\nvalidator.expect_column_values_to_be_between('amount_ttc', min_value=0, max_value=10000)\nvalidator.expect_column_values_to_be_in_set('country_code', ['FR','BE','DE','IT'])</code></pre><p>Les noms se lisent comme des phrases : c'est volontaire — la suite d'attentes devient une <strong>spécification</strong> de la qualité, compréhensible par des non-techniques.</p><h3>Comment ça s'intègre</h3><p>Un <strong>Checkpoint</strong> exécute la suite à un moment clé du pipeline (après chargement, avant publication) et peut bloquer la suite ou alerter. Les Data Docs gardent un historique visuel des validations.</p><div class=\"callout\">Force de GX : la <strong>documentation vivante</strong>. Chaque validation met à jour un rapport qui montre, attente par attente, ce qui passe et ce qui casse.</div>", "minutes": 10}, "m3l3": {"theory": "<p><strong>Soda</strong> (Soda Core) adopte une approche <em>déclarative</em> : on écrit des contrôles lisibles dans un fichier YAML (le langage <strong>SodaCL</strong>), puis on lance un <em>scan</em>.</p><h3>Des contrôles en YAML</h3><pre><code>checks for customers:\n  - row_count &gt; 0\n  - missing_count(email) = 0\n  - duplicate_count(email) = 0\n  - invalid_percent(country_code) &lt; 1%:\n      valid values: [FR, BE, DE, IT]</code></pre><p>On lance ensuite&nbsp;:</p><pre><code>soda scan -d ma_source -c configuration.yml checks.yml</code></pre><h3>Métriques et seuils</h3><p>Soda fournit des métriques prêtes à l'emploi — <code>row_count</code>, <code>missing_count</code>, <code>duplicate_count</code>, <code>min</code>, <code>max</code>, <code>avg</code> — qu'on compare à des seuils. On peut aussi détecter des <strong>anomalies</strong> automatiquement sur des séries temporelles.</p><h3>GX ou Soda ?</h3><table><tr><th>&nbsp;</th><th>Great Expectations</th><th>Soda</th></tr><tr><td>Écriture</td><td>Python (ou config)</td><td>YAML déclaratif</td></tr><tr><td>Point fort</td><td>Data Docs riches, extensible</td><td>Simplicité, lisibilité, anomalies</td></tr><tr><td>Pour qui</td><td>Équipes Python</td><td>Analystes / mixte</td></tr></table><div class=\"note\">Les deux résolvent le même besoin — formaliser et automatiser des contrôles — avec des philosophies différentes. Choisis selon l'équipe et l'écosystème, pas selon la mode.</div>", "minutes": 8}, "m4l1": {"theory": "<p>« Tester ses données » recouvre plusieurs familles de contrôles. Les connaître évite les angles morts : on teste souvent ce qui est facile (NULL) et on oublie le reste.</p><h3>Les grandes familles</h3><ul><li><strong>Schéma</strong> : la colonne existe, du bon type, dans le bon ordre. Le socle.</li><li><strong>Non-nullité</strong> : les colonnes obligatoires sont remplies.</li><li><strong>Unicité</strong> : pas de doublon sur la clé.</li><li><strong>Valeurs admises</strong> (accepted values) : un statut ∈ {'payée','annulée',…}.</li><li><strong>Plages</strong> : un montant ≥ 0, une note entre 0 et 10.</li><li><strong>Intégrité référentielle</strong> (relationships) : toute clé étrangère pointe vers une ligne existante.</li><li><strong>Fraîcheur</strong> : la donnée la plus récente n'a pas plus de X heures.</li><li><strong>Volume</strong> : le nombre de lignes reste dans une fourchette attendue.</li><li><strong>Réconciliation</strong> : les totaux concordent entre deux systèmes (ex. somme des commandes = chiffre comptable).</li></ul><h3>Génériques vs spécifiques</h3><p>Un test <strong>générique</strong> est réutilisable (not_null, unique…). Un test <strong>spécifique</strong> (singular) encode une règle métier propre à une table, souvent en SQL « qui renvoie les lignes fautives ».</p><h3>Où placer les tests ?</h3><p>À la <strong>source</strong> (détecter tôt les problèmes d'entrée) et sur les tables <strong>transformées</strong> (garantir le résultat livré). Mieux vaut peu de tests bien placés que cent tests redondants.</p><div class=\"callout\">Boussole : <em>shift-left</em> — déplacer les contrôles le plus en amont possible. Une erreur attrapée à l'ingestion coûte dix fois moins cher qu'au niveau d'un tableau de bord.</div>", "minutes": 9}, "m4l2": {"theory": "<p><strong>dbt</strong> (data build tool) transforme les données en SQL et permet d'attacher des <strong>tests</strong> et de la documentation directement à côté des modèles. C'est aujourd'hui un standard de la transformation analytique.</p><h3>Tests génériques (dans un .yml)</h3><pre><code>models:\n  - name: orders\n    columns:\n      - name: order_id\n        tests: [unique, not_null]\n      - name: status\n        tests:\n          - accepted_values:\n              values: ['payee','annulee','remboursee']\n      - name: customer_id\n        tests:\n          - relationships:\n              to: ref('customers')\n              field: customer_id</code></pre><p>En une dizaine de lignes : unicité, non-nullité, valeurs admises et intégrité référentielle sont déclarées et versionnées avec le code.</p><h3>Tests spécifiques (singular)</h3><p>Pour une règle métier, on écrit une requête qui <strong>remonte les lignes en erreur</strong> dans <code>tests/</code> ; le test échoue si elle renvoie des lignes.</p><pre><code>-- tests/montants_positifs.sql\nSELECT order_id, amount_ttc\nFROM {{ ref('orders') }}\nWHERE amount_ttc &lt; 0</code></pre><h3>Exécuter et investiguer</h3><pre><code>dbt test                          # tous les tests\ndbt test --select orders          # un modèle\n# store_failures: true  -&gt; garde les lignes fautives dans une table dédiée</code></pre><h3>Aller plus loin</h3><p>Les packages <strong>dbt_utils</strong> et <strong>dbt_expectations</strong> ajoutent des dizaines de tests prêts à l'emploi (unicité combinée, fraîcheur, distribution, expressions). On précise une <strong>sévérité</strong> par test (voir leçon suivante).</p><div class=\"note\">L'atout de dbt : tests, transformation et documentation vivent dans le <strong>même dépôt Git</strong>, relus en pull request comme du code.</div>", "minutes": 12}, "m4l3": {"theory": "<p>Avoir des tests ne suffit pas : il faut une <strong>stratégie</strong>. Trop de tests bruyants et l'équipe finit par les ignorer (l'<em>alert fatigue</em>) ; trop peu et les incidents passent.</p><h3>Sévérité : warn vs error</h3><p>Tout test n'a pas la même criticité. On distingue&nbsp;:</p><ul><li><strong>error</strong> : bloque le pipeline (ex. clé primaire en double). On <em>ne livre pas</em> des données fausses.</li><li><strong>warn</strong> : signale sans bloquer (ex. légère hausse des NULL sur une colonne secondaire).</li></ul><pre><code># dbt : seuils de sévérité\ntests:\n  - not_null:\n      config:\n        severity: warn\n        warn_if: \"&gt;10\"\n        error_if: \"&gt;100\"</code></pre><h3>SLA et SLO de données</h3><p>On formalise des engagements&nbsp;: un <strong>SLA</strong> est une promesse (« la table commandes est fraîche chaque matin avant 8h »), un <strong>SLO</strong> l'objectif chiffré associé (« &lt; 1 % de lignes invalides », « fraîcheur &lt; 3 h dans 99 % des cas »).</p><table><tr><th>Notion</th><th>Exemple</th></tr><tr><td>SLA</td><td>Données disponibles et valides chaque jour ouvré</td></tr><tr><td>SLO</td><td>≤ 0,5 % de valeurs manquantes sur email</td></tr><tr><td>Seuil error</td><td>Doublon de clé primaire ⇒ blocage</td></tr></table><h3>Prioriser</h3><p>Concentre les tests bloquants sur ce qui a le plus d'<strong>impact</strong> : clés, jointures, colonnes financières, tables consommées par des décisions. Le reste peut rester en avertissement.</p><div class=\"callout\">Un test qui ne déclenche jamais d'action est du bruit. Chaque test bloquant doit avoir un <strong>propriétaire</strong> et une conduite à tenir quand il casse.</div>", "minutes": 10}, "m4l4": {"theory": "<p>La qualité se joue aussi dans l'<strong>intégration continue</strong> (CI/CD) : on vérifie les données et les transformations <em>avant</em> qu'un changement n'arrive en production.</p><h3>Tester à chaque changement</h3><p>À chaque <strong>pull request</strong>, un pipeline d'intégration reconstruit les modèles impactés et lance les tests. Si un test bloquant échoue, la fusion est refusée.</p><pre><code># Exemple d'étape CI (pseudo-YAML)\nsteps:\n  - run: dbt build --select state:modified+   # modèles modifiés + leurs descendants\n  - run: dbt test  --select state:modified+</code></pre><h3>Slim CI</h3><p>Rejouer tout le projet à chaque PR est lent. Le <strong>slim CI</strong> ne reconstruit/teste que ce qui a changé (et ses dépendances) en comparant à l'état de production — rapide et ciblé.</p><h3>Deux moments, deux objectifs</h3><ul><li><strong>CI (avant fusion)</strong> : empêcher d'introduire une régression. Tests bloquants stricts.</li><li><strong>Production (planifié)</strong> : surveiller les données réelles qui changent chaque jour, même sans modification de code. C'est le rôle de l'observabilité.</li></ul><h3>Environnements</h3><p>On sépare <strong>dev</strong> (bac à sable), <strong>staging</strong> (pré-production, proche du réel) et <strong>prod</strong>. Les contrôles montent en exigence à mesure qu'on se rapproche de la prod.</p><div class=\"note\">CI = « le code ne casse pas les données ». Monitoring = « les données ne se cassent pas toutes seules ». Les deux sont complémentaires.</div>", "minutes": 9}, "m5l1": {"theory": "<p>Les tests vérifient ce qu'on <strong>sait</strong> devoir contrôler. Mais beaucoup de pannes viennent de l'<em>inconnu</em> : une source qui se tarit, un schéma qui change en amont, une distribution qui dérive. C'est le rôle de l'<strong>observabilité</strong> : surveiller en continu la <em>santé</em> des données pour détecter les surprises.</p><h3>Tests vs observabilité</h3><table><tr><th>&nbsp;</th><th>Tests</th><th>Observabilité</th></tr><tr><td>Couvre</td><td>les <em>connus</em> (règles explicites)</td><td>les <em>inconnus</em> (comportement anormal)</td></tr><tr><td>Question</td><td>« Est-ce conforme ? »</td><td>« Est-ce normal par rapport à d'habitude ? »</td></tr><tr><td>Quand</td><td>à chaque exécution / PR</td><td>en continu, en production</td></tr></table><h3>Le data downtime</h3><p>On appelle <strong>data downtime</strong> toute période où des données sont manquantes, erronées ou en retard — et donc non fiables. L'objectif de l'observabilité est de le réduire : détecter vite, comprendre, réparer.</p><h3>Les 5 piliers</h3><ul><li><strong>Fraîcheur (freshness)</strong> : les données sont-elles à jour ?</li><li><strong>Volume</strong> : le nombre de lignes est-il cohérent ?</li><li><strong>Schéma</strong> : la structure (colonnes, types) a-t-elle changé ?</li><li><strong>Distribution</strong> : les valeurs ressemblent-elles à d'habitude (NULL, plages, catégories) ?</li><li><strong>Lineage</strong> : d'où viennent les données et qu'est-ce qui dépend d'elles ?</li></ul><div class=\"callout\">Image utile : les tests sont des <em>garde-fous</em> placés à des endroits précis ; l'observabilité est une <em>caméra de surveillance</em> qui filme tout et signale ce qui sort de l'ordinaire.</div>", "minutes": 9}, "m5l2": {"theory": "<p>Voyons concrètement comment surveiller chacun des piliers — souvent avec de simples requêtes exécutées régulièrement et comparées à une référence.</p><h3>Fraîcheur</h3><p>On mesure l'âge de la donnée la plus récente et on alerte au-delà d'un seuil.</p><pre><code>SELECT (julianday('now') - julianday(MAX(updated_at))) * 24 AS heures_depuis_maj\nFROM orders;            -- alerte si &gt; 6 h, par exemple</code></pre><h3>Volume</h3><p>On compte les lignes par jour et on compare à la moyenne récente (cf. fenêtres) : une chute de 50 % ou un doublement sont suspects.</p><h3>Distribution</h3><p>On suit dans le temps quelques métriques par colonne : taux de NULL, moyenne, part de chaque catégorie. Une dérive (le taux de NULL passe de 1 % à 30 %) signale un problème en amont, même si aucune règle stricte n'est violée.</p><pre><code>SELECT\n  ROUND(100.0*(COUNT(*)-COUNT(email))/COUNT(*),1) AS pct_email_null,\n  ROUND(AVG(amount_ttc),2)                        AS panier_moyen\nFROM orders;            -- historiser ces valeurs jour après jour</code></pre><h3>Schéma</h3><p>On compare la structure courante (noms et types de colonnes) à une référence. Une colonne supprimée ou renommée en amont casse les pipelines en aval — il faut le savoir <em>avant</em> les utilisateurs.</p><h3>Seuils : fixes ou appris ?</h3><ul><li><strong>Seuils fixes</strong> : simples, explicites (« &lt; 6 h »). Idéals quand la règle est connue.</li><li><strong>Détection d'anomalies</strong> : un modèle apprend la normale (saisonnalité incluse) et alerte sur l'écart. Plus souple, moins de réglage manuel, mais demande un historique.</li></ul><div class=\"note\">Commence simple : quelques seuils fixes bien choisis sur la fraîcheur et le volume couvrent déjà la majorité des incidents réels.</div>", "minutes": 12}, "m5l3": {"theory": "<p>Détecter un incident n'est que le début. Ce qui distingue une équipe mûre, c'est sa façon de <strong>réagir</strong> : trier, communiquer, réparer, puis apprendre.</p><h3>Le cycle de vie d'un incident</h3><ol><li><strong>Détection</strong> : une alerte se déclenche (monitoring ou utilisateur).</li><li><strong>Triage</strong> : évaluer la gravité et l'impact (qui/quoi est touché ?).</li><li><strong>Communication</strong> : prévenir les consommateurs des données concernés.</li><li><strong>Résolution</strong> : corriger la cause, rejouer/réparer les données.</li><li><strong>Post-mortem</strong> : comprendre et éviter la récidive.</li></ol><h3>Mesurer pour s'améliorer</h3><table><tr><th>Indicateur</th><th>Signification</th></tr><tr><td>MTTD</td><td>temps moyen de <em>détection</em></td></tr><tr><td>MTTR</td><td>temps moyen de <em>résolution</em></td></tr></table><p>Réduire le MTTD, c'est mieux surveiller ; réduire le MTTR, c'est mieux outiller (lineage pour trouver la cause, runbooks pour agir).</p><h3>Le post-mortem « sans blâme »</h3><p>Un bon post-mortem cherche les <strong>causes systémiques</strong>, pas un coupable. On y consigne : chronologie, impact, cause racine, et surtout des <strong>actions concrètes</strong> (un nouveau test, une alerte, une doc) pour que l'incident ne se reproduise pas.</p><h3>Runbooks</h3><p>Un <strong>runbook</strong> est une fiche d'action : « si l'alerte X se déclenche, vérifier A, puis B, contacter C ». Il transforme l'expérience en procédure reproductible et accélère la résolution sous pression.</p><div class=\"callout\">La qualité n'est pas l'absence d'incident, mais la capacité à le détecter vite, à limiter son impact et à en tirer une amélioration durable.</div>", "minutes": 11}, "m6l1": {"theory": "<p>Au-delà des contrôles techniques, la <strong>gouvernance</strong> organise la confiance : qui possède quelle donnée, ce qu'elle signifie, d'où elle vient et qui en dépend. Deux outils en sont le socle : le <strong>catalogue</strong> et le <strong>lineage</strong>.</p><h3>Le catalogue de données</h3><p>Un <strong>data catalog</strong> est l'inventaire documenté des jeux de données de l'organisation. Pour chaque table, on y trouve idéalement&nbsp;:</p><ul><li>une <strong>description</strong> et la définition métier des colonnes ;</li><li>un <strong>propriétaire</strong> (data owner) responsable ;</li><li>le <strong>schéma</strong>, la fraîcheur, des indicateurs de qualité ;</li><li>un <strong>glossaire</strong> partagé (qu'appelle-t-on « client actif » ?).</li></ul><p>Bénéfice : la <strong>découvrabilité</strong>. On trouve la bonne table, on en comprend le sens, on évite les ressaisies et les contresens.</p><h3>Le lineage</h3><p>Le <strong>lineage</strong> (traçabilité) cartographie les dépendances : quelle source alimente quelle transformation, qui alimente quel tableau de bord. Il existe au niveau table et, plus fin, au niveau colonne.</p><pre><code>source: commandes_brutes\n   └─ modèle: orders (nettoyé)\n        ├─ modèle: ca_mensuel\n        │     └─ dashboard: \"Revenus\"\n        └─ modèle: clients_actifs</code></pre><p>Deux usages clés : l'<strong>analyse d'impact</strong> (« si je change cette colonne, qu'est-ce qui casse en aval ? ») et le <strong>diagnostic</strong> (« d'où vient cette valeur fausse en amont ? »).</p><h3>Des outils</h3><p>DataHub, OpenMetadata ou Amundsen (open source) centralisent catalogue, lineage et indicateurs de qualité. dbt génère aussi documentation et lineage à partir des modèles.</p><div class=\"note\">Catalogue = <em>quoi et qui</em> ; lineage = <em>d'où et vers où</em>. Ensemble, ils rendent les données compréhensibles et traçables.</div>", "minutes": 10}, "m6l2": {"theory": "<p>Beaucoup d'incidents naissent d'un changement <strong>silencieux</strong> côté producteur : une colonne renommée, un type modifié, un champ qui devient parfois nul. Les <strong>contrats de données</strong> rendent ces attentes explicites et opposables.</p><h3>Qu'est-ce qu'un data contract ?</h3><p>Un <strong>contrat de données</strong> est un accord formel entre le <em>producteur</em> et les <em>consommateurs</em> d'un jeu de données. Il décrit&nbsp;:</p><ul><li>le <strong>schéma</strong> (colonnes, types, obligatoires) ;</li><li>la <strong>sémantique</strong> (ce que signifie chaque champ, ses valeurs admises) ;</li><li>les <strong>garanties de qualité et de service</strong> (unicité, fraîcheur, SLA) ;</li><li>la <strong>politique d'évolution</strong> (comment et avec quel préavis le schéma peut changer).</li></ul><pre><code># contrat (extrait, format YAML)\ndataset: orders\nowner: equipe-commandes\nschema:\n  - name: order_id   type: integer  required: true  unique: true\n  - name: amount_ttc type: number   required: true  min: 0\n  - name: status     type: string   allowed: [payee, annulee, remboursee]\nsla:\n  freshness: \"&lt; 3h\"\n  max_null_rate: { email: 0.05 }</code></pre><h3>L'évolution de schéma</h3><p>On distingue les changements <strong>rétro-compatibles</strong> (ajouter une colonne optionnelle) des changements <strong>cassants</strong> (supprimer/renommer une colonne, changer un type). Les seconds exigent versionnage et préavis.</p><h3>Faire respecter le contrat</h3><p>Un contrat n'a de valeur que s'il est <strong>vérifié automatiquement</strong> : à l'entrée du pipeline, on valide les données entrantes contre le contrat (souvent via les mêmes outils de tests). C'est l'esprit <em>shift-left</em> appliqué aux interfaces entre équipes.</p><div class=\"callout\">Un data contract transforme une attente implicite (« j'espère que la colonne ne disparaîtra pas ») en engagement vérifié, qui casse <em>chez le producteur</em> plutôt que dans un tableau de bord trois étages plus bas.</div>", "minutes": 10}, "m6l3": {"theory": "<p>Travailler la donnée, c'est aussi la traiter de façon <strong>responsable et conforme</strong>. En Europe, le <strong>RGPD</strong> encadre les <em>données à caractère personnel</em> — celles qui identifient une personne, directement ou indirectement.</p><h3>Qu'est-ce qu'une donnée personnelle (PII) ?</h3><p>Nom, email, téléphone, adresse IP, identifiant client… Certaines sont <strong>sensibles</strong> (santé, opinions, biométrie) et plus strictement protégées. Dans nos exemples, <code>email</code> est une donnée personnelle.</p><h3>Les grands principes</h3><ul><li><strong>Base légale</strong> : un traitement doit être justifié (consentement, contrat, obligation légale…).</li><li><strong>Minimisation</strong> : ne collecter que le nécessaire.</li><li><strong>Limitation de finalité</strong> : utiliser les données pour l'usage annoncé, pas un autre.</li><li><strong>Limitation de conservation</strong> : définir une durée de rétention et purger ensuite.</li><li><strong>Droits des personnes</strong> : accès, rectification, et <strong>droit à l'effacement</strong>.</li></ul><h3>Techniques de protection</h3><table><tr><th>Technique</th><th>Idée</th><th>Réversible ?</th></tr><tr><td>Pseudonymisation</td><td>remplacer l'identifiant par un jeton (clé conservée à part)</td><td>oui</td></tr><tr><td>Anonymisation</td><td>rendre la ré-identification impossible</td><td>non</td></tr><tr><td>Chiffrement</td><td>illisible sans la clé</td><td>oui</td></tr><tr><td>Masquage</td><td>n'afficher qu'une partie (j***@mail.com)</td><td>selon le cas</td></tr></table><h3>Le lien avec la qualité</h3><p>Gouvernance, sécurité et qualité se rejoignent : le <strong>contrôle d'accès</strong> (qui voit quoi) limite les risques ; la <strong>traçabilité</strong> (lineage) aide à honorer un droit à l'effacement ; et des données exactes et à jour sont une exigence… réglementaire autant que technique.</p><div class=\"callout\">Le Data QA n'est pas juriste, mais il manipule des données personnelles : reconnaître une PII, appliquer la minimisation et le masquage, et savoir tracer une donnée font partie du métier.</div>", "minutes": 11}};
  CURRICULUM.modules.forEach(function(m){
    m.lessons.forEach(function(l){ if (ENR[l.id]) { l.theory = ENR[l.id].theory; if (ENR[l.id].minutes) l.minutes = ENR[l.id].minutes; } });
  });
})();

<script>
/* ============================================================
   Data QA — niveau parcours professionnel (m1, m2, m3)
   Surcouche chargée après dataqa_enrich.js (écrase m2/m3, ajoute m1).
   ============================================================ */
(function(){
  if (typeof CURRICULUM === 'undefined' || !CURRICULUM.modules) return;
  var ENR = {"m1l1": {"theory": "<p>Avant les outils et les requêtes, une conviction : <strong>une décision ne vaut que ce que valent les données qui la nourrissent</strong>. Un tableau de bord impeccable bâti sur des données fausses produit des décisions fausses, avec une confiance trompeuse. C'est tout l'enjeu du métier.</p><h3>Ce que « mauvaise qualité » veut dire concrètement</h3><p>Quelques situations que tu rencontreras réellement :</p><ul><li>un même client présent <strong>deux fois</strong> sous des orthographes différentes ⇒ chiffre d'affaires gonflé, double facturation ;</li><li>une colonne <code>montant</code> parfois en euros, parfois en centimes ⇒ totaux absurdes ;</li><li>un export quotidien qui arrive <strong>à moitié vide</strong> certains matins ⇒ rapports trompeurs sans alerte ;</li><li>un changement de schéma en amont (colonne renommée) ⇒ pipeline cassé en silence.</li></ul><h3>Le coût se paie en aval (règle du 1-10-100)</h3><p>Une règle empirique bien connue en qualité : prévenir une erreur coûte <strong>1</strong>, la corriger plus tard coûte <strong>10</strong>, et la subir (mauvaise décision, client perdu, audit) coûte <strong>100</strong>. D'où le principe directeur de tout le parcours : <em>déplacer les contrôles le plus en amont possible</em> (<strong>shift-left</strong>).</p><table><tr><th>Moment</th><th>Action</th><th>Coût relatif</th></tr><tr><td>À la source</td><td>Prévenir / valider en entrée</td><td>1</td></tr><tr><td>Dans le pipeline</td><td>Corriger après coup</td><td>10</td></tr><tr><td>Chez l'utilisateur</td><td>Subir l'erreur (décision, image)</td><td>100</td></tr></table><h3>La confiance, actif central</h3><p>Le vrai produit d'une équipe data, ce n'est pas un tableau de bord : c'est la <strong>confiance</strong> qu'on peut lui accorder. Une seule donnée fausse repérée par un dirigeant peut décrédibiliser des mois de travail. La qualité n'est donc pas une tâche annexe : c'est ce qui rend les données <em>utilisables</em>.</p><div class=\"callout\">Mantra du métier : <strong>« garbage in, garbage out »</strong>. Aucun modèle, aucun dashboard, aucune IA ne rattrape des données d'entrée fausses. La qualité est la fondation, pas la finition.</div>", "minutes": 10}, "m1l2": {"theory": "<p>« Qualité » est un mot flou tant qu'on ne le décompose pas. La pratique professionnelle s'appuie sur <strong>6 dimensions</strong> mesurables. Pour chacune, retiens une définition <em>et</em> une façon de la mesurer — c'est ce qui transforme un ressenti en indicateur.</p><table><tr><th>Dimension</th><th>Question</th><th>Mesure typique</th></tr><tr><td><strong>Complétude</strong></td><td>Les valeurs attendues sont-elles présentes ?</td><td>% de non-NULL par colonne</td></tr><tr><td><strong>Exactitude</strong></td><td>La valeur reflète-t-elle le réel ?</td><td>% conforme à une source de vérité</td></tr><tr><td><strong>Validité</strong></td><td>Respecte-t-elle le format / les règles ?</td><td>% de valeurs au bon format ou dans la liste admise</td></tr><tr><td><strong>Unicité</strong></td><td>Pas de doublon indu ?</td><td>nb de doublons sur la clé</td></tr><tr><td><strong>Cohérence</strong></td><td>Concorde entre tables / systèmes ?</td><td>écarts de réconciliation</td></tr><tr><td><strong>Fraîcheur</strong></td><td>Assez récente pour l'usage ?</td><td>délai depuis la dernière mise à jour</td></tr></table><h3>Exactitude vs validité : le piège classique</h3><p>Une donnée peut être <strong>valide mais inexacte</strong> : <code>1990-01-01</code> est une date de naissance valide (bon format), mais fausse si la personne est née en 1985. La validité se vérifie <em>sans source externe</em> (règle de format) ; l'exactitude exige une <em>référence</em> (la réalité). On contrôle facilement la validité, rarement l'exactitude — d'où son importance.</p><h3>Choisir ses dimensions selon l'usage</h3><p>Toutes les dimensions ne comptent pas autant partout. Pour un envoi d'e-mails marketing, la <strong>validité</strong> des adresses prime ; pour un reporting financier, l'<strong>exactitude</strong> et la <strong>cohérence</strong> ; pour un dashboard temps réel, la <strong>fraîcheur</strong>. Définir la qualité, c'est d'abord se demander : <em>pour quel usage ?</em></p><div class=\"note\">Bonne pratique : pour chaque table critique, écris une phrase par dimension (« email : complétude ≥ 95 %, validité format ≥ 99 % »). Ces phrases deviendront directement tes tests et tes SLO.</div>", "minutes": 11}, "m1l3": {"theory": "<p>Le <strong>Data QA</strong> (ou Data Quality Engineer / Analytics Engineer orienté qualité) se tient à la charnière : entre ceux qui <em>produisent</em> la donnée (sources, data engineers) et ceux qui la <em>consomment</em> (analystes, métiers, dirigeants, modèles). Sa mission : garantir que ce qui circule est digne de confiance.</p><h3>Responsabilités concrètes</h3><ul><li><strong>Définir</strong> les attentes de qualité avec le métier (les SLO par table) ;</li><li><strong>Mesurer</strong> l'état réel (profiling, monitoring) ;</li><li><strong>Automatiser</strong> les contrôles (tests dans le pipeline, CI) ;</li><li><strong>Surveiller</strong> en production (observabilité, alertes) ;</li><li><strong>Réagir</strong> aux incidents (triage, correction, post-mortem) ;</li><li><strong>Documenter</strong> et diffuser (catalogue, contrats de données).</li></ul><h3>Où se situe-t-il par rapport aux autres rôles ?</h3><table><tr><th>Rôle</th><th>Cœur de métier</th></tr><tr><td>Data Engineer</td><td>construit les pipelines et l'infrastructure</td></tr><tr><td><strong>Data QA</strong></td><td>garantit la fiabilité de ce qui y circule</td></tr><tr><td>Data Analyst</td><td>exploite la donnée pour répondre à des questions</td></tr></table><p>Dans les faits, ces rôles se chevauchent : dans une petite équipe, la même personne porte les trois casquettes. La compétence « qualité » est donc précieuse quel que soit ton intitulé.</p><h3>Le bon état d'esprit</h3><p>Un bon Data QA est <strong>sceptique mais constructif</strong> : il doute des données (« d'où vient ce chiffre ? est-il à jour ? »), mais il propose des garde-fous plutôt que de pointer des coupables. Il pense en <strong>systèmes</strong> : un incident n'est pas une faute individuelle, c'est un contrôle manquant.</p><div class=\"callout\">Une phrase qui résume le métier : <em>« faire en sorte que la même question donne toujours la même réponse fiable, quel que soit qui la pose. »</em> Sans cela, on n'a pas un moteur d'analyse, mais une loterie.</div>", "minutes": 9}, "m1l4": {"theory": "<p>La donnée suit un <strong>cycle de vie</strong>, de la source jusqu'à l'usage. À chaque étape, des problèmes différents apparaissent — et donc des <strong>points de contrôle</strong> différents. Cartographier ce cycle, c'est savoir où placer ses tests.</p><h3>Le parcours type</h3><pre><code>Sources           -&gt;  Ingestion (EL)   -&gt;  Stockage (entrepot)\n(apps, fichiers,        chargement brut       tables brutes\n APIs, bases)                                       |\n                                                    v\n                         Transformation (dbt)  -&gt;  Tables propres / metiers\n                                                    |\n                                                    v\n                                       Consommation (BI, modeles, exports)</code></pre><h3>Quels contrôles à quelle étape ?</h3><table><tr><th>Étape</th><th>Risques typiques</th><th>Contrôles</th></tr><tr><td>Ingestion</td><td>fichier vide, schéma changé, retard</td><td>volume, fraîcheur, schéma, contrat de données</td></tr><tr><td>Transformation</td><td>jointure qui duplique, filtre trop large</td><td>unicité, non-nullité, réconciliation des totaux</td></tr><tr><td>Consommation</td><td>chiffres incohérents pour l'utilisateur</td><td>tests métier, monitoring, validation finale</td></tr></table><h3>Le principe shift-left appliqué</h3><p>Plus on attrape tôt, moins ça coûte (cf. règle du 1-10-100). En pratique : un contrôle de schéma et de volume <strong>dès l'ingestion</strong> évite qu'une donnée corrompue se propage dans dix tables en aval. Les contrôles finaux restent utiles, mais ils sont le <em>dernier</em> filet, pas le premier.</p><h3>Lots vs flux</h3><p>En traitement par <strong>lots</strong> (batch, ex. chaque nuit), on contrôle après chaque exécution. En <strong>flux</strong> (streaming, temps réel), on contrôle en continu sur des fenêtres de temps. Le parcours se concentre sur le batch, de loin le plus répandu.</p><div class=\"note\">Réflexe pro : devant une table à fiabiliser, demande-toi d'abord « d'où vient-elle et qui la consomme ? ». Le lineage (module 6) répond précisément à cette question.</div>", "minutes": 10}, "m1l5": {"theory": "<p>Le Data QA n'invente pas ses outils : il s'insère dans une <strong>stack de données</strong> moderne. En connaître les briques permet de savoir où brancher les contrôles.</p><h3>La « modern data stack » en 5 couches</h3><ol><li><strong>Sources</strong> : applications, bases transactionnelles, fichiers, APIs.</li><li><strong>Ingestion (EL)</strong> : outils qui extraient et chargent (Fivetran, Airbyte, scripts).</li><li><strong>Entrepôt</strong> : la base analytique centrale (BigQuery, Snowflake, PostgreSQL…).</li><li><strong>Transformation</strong> : modélisation en SQL versionné, le plus souvent avec <strong>dbt</strong>.</li><li><strong>Restitution</strong> : BI (Looker, Metabase, Power BI), exports, modèles ML.</li></ol><h3>Où la qualité se branche</h3><ul><li><strong>SQL</strong> : le langage transversal pour interroger et contrôler partout.</li><li><strong>Python / pandas</strong> : profiling, contrôles complexes, automatisation.</li><li><strong>dbt tests</strong> : contrôles versionnés à côté des transformations.</li><li><strong>Great Expectations / Soda</strong> : suites de contrôles et rapports.</li><li><strong>Observabilité</strong> (Monte Carlo, Soda, open source) : surveillance en prod.</li><li><strong>Catalogue / lineage</strong> (DataHub, OpenMetadata) : gouvernance et traçabilité.</li></ul><h3>Ce que tu apprends ici, et pourquoi</h3><p>Ce parcours suit cette logique : d'abord <strong>SQL</strong> (la base de tout contrôle), puis <strong>Python</strong> (pour ce que SQL ne fait pas), puis les <strong>frameworks de tests</strong>, l'<strong>observabilité</strong> et la <strong>gouvernance</strong>. Les outils changent ; les principes (mesurer, automatiser, surveiller, tracer) restent.</p><div class=\"callout\">Ne te disperse pas sur les outils : maîtrise les <strong>principes</strong> et un outil par catégorie. Un bon Data QA apprend un nouvel outil en une journée parce qu'il sait déjà <em>ce qu'il cherche</em>.</div>", "minutes": 8}, "m2l1": {"theory": "<p>SQL est l'outil de mesure n°1 du Data QA, pour une raison simple : les données vivent dans des bases, et SQL parle directement aux bases, sans étape intermédiaire. La quasi-totalité des contrôles peut s'écrire comme une requête.</p><h3>Le patron fondamental : « le contrôle = une requête qui ne doit rien renvoyer »</h3><p>C'est le réflexe le plus important du parcours. On écrit une requête qui <strong>remonte exactement les lignes fautives</strong>. Zéro ligne = contrôle vert. C'est précisément le mécanisme qu'automatisent dbt, Great Expectations et Soda.</p><pre><code>-- Anti-pattern : aucune commande ne doit avoir un montant negatif\nSELECT order_id, amount_ttc\nFROM orders\nWHERE amount_ttc &lt; 0;          -- 0 ligne attendue</code></pre><h3>Mesurer un taux, pas seulement compter</h3><p>Un nombre brut (« 1 200 NULL ») n'est pas comparable d'une table à l'autre. Un <strong>taux</strong> l'est, et se compare dans le temps.</p><pre><code>SELECT ROUND(100.0 * COUNT(email) / COUNT(*), 2) AS pct_email_rempli\nFROM customers;</code></pre><h3>Les 4 briques à combiner sans fin</h3><ul><li><strong>SELECT … FROM</strong> : ce qu'on regarde ;</li><li><strong>WHERE</strong> : la condition d'erreur ;</li><li><strong>GROUP BY + HAVING</strong> : compter par catégorie, traquer les doublons ;</li><li><strong>agrégats</strong> <code>COUNT/SUM/AVG/MIN/MAX</code> : résumer.</li></ul><div class=\"note\"><strong>COUNT(*)</strong> compte les lignes ; <strong>COUNT(col)</strong> ignore les NULL. Leur différence = le nombre de valeurs manquantes. C'est la mesure de complétude la plus utilisée.</div><p class=\"hp-foot\">Tu veux aller plus loin sur SQL lui-même ? La formation <strong>SQL — de zéro à l'aisance</strong> (sur l'accueil) reprend tout depuis le début, avec exercices auto-corrigés.</p>", "minutes": 8}, "m2l2": {"theory": "<p>Complétude et unicité sont les deux contrôles les plus fréquents — et les plus rentables. Voici comment un pro les traite, pièges compris.</p><h3>1. Complétude : au-delà du NULL</h3><p>On teste les manquants avec <code>IS NULL</code>. Mais en production, le « vide » prend des formes déguisées qu'un débutant rate :</p><pre><code>-- Completude reelle : NULL + chaines vides + sentinelles\nSELECT\n  COUNT(*)                                                   AS total,\n  SUM(CASE WHEN email IS NULL OR TRIM(email) = ''\n           OR email IN ('N/A','-','null') THEN 1 ELSE 0 END) AS vides_reels\nFROM customers;</code></pre><div class=\"callout\">Piège n°1 du métier : confondre « rempli » et « non-NULL ». Une colonne à 0 % de NULL peut être à 40 % de <code>''</code> ou de <code>'N/A'</code>. Profilage avant tout (leçon suivante).</div><h3>2. Unicité : trouver ET quantifier</h3><pre><code>-- Quelles cles sont en double, et combien de fois ?\nSELECT email, COUNT(*) AS n\nFROM customers\nWHERE email IS NOT NULL\nGROUP BY email\nHAVING COUNT(*) &gt; 1\nORDER BY n DESC;</code></pre><p>Pour <strong>compter les lignes en trop</strong> (et non les groupes), on soustrait le nombre de valeurs distinctes au total :</p><pre><code>SELECT COUNT(*) - COUNT(DISTINCT email) AS lignes_en_trop\nFROM customers\nWHERE email IS NOT NULL;</code></pre><h3>Clé composite</h3><p>Souvent l'unicité porte sur une combinaison (un client ne devrait pas avoir deux lignes pour le même produit le même jour) :</p><pre><code>SELECT customer_id, order_date, COUNT(*) AS n\nFROM orders\nGROUP BY customer_id, order_date\nHAVING COUNT(*) &gt; 1;</code></pre><h3>Doublons approchants</h3><p>« Jean Dupont » vs « jean  dupont » : exacts pour l'humain, distincts pour la machine. On <strong>normalise avant de comparer</strong>.</p><pre><code>SELECT LOWER(TRIM(nom)) AS nom_norm, COUNT(*) AS n\nFROM clients\nGROUP BY LOWER(TRIM(nom))\nHAVING COUNT(*) &gt; 1;</code></pre><div class=\"note\">Check-list dédoublonnage : 1) définir la clé d'unicité ; 2) normaliser (casse, espaces, accents) ; 3) quantifier ; 4) décider quelle ligne garder (la plus complète ou la plus récente, via <code>ROW_NUMBER()</code>).</div>", "minutes": 12}, "m2l3": {"theory": "<p>Le <strong>profiling</strong> dresse la carte d'identité statistique d'une table <em>avant</em> d'écrire le moindre test. Règle d'or : <strong>on ne peut pas définir l'anormal sans connaître le normal</strong>. C'est la première chose qu'un pro fait devant une table inconnue.</p><h3>Les 5 mesures à regarder, colonne par colonne</h3><ul><li><strong>Volume</strong> : nombre de lignes (référence pour tout le reste) ;</li><li><strong>Complétude</strong> : taux de manquants ;</li><li><strong>Cardinalité</strong> : <code>COUNT(DISTINCT)</code> — révèle clés, catégories, colonnes constantes ;</li><li><strong>Étendue</strong> : min / max / moyenne (dates futures ? négatifs ? aberrations ?) ;</li><li><strong>Top valeurs</strong> : catégories inattendues, fautes de frappe.</li></ul><h3>Un profil de colonne numérique en une requête</h3><pre><code>SELECT\n  COUNT(*)                       AS lignes,\n  COUNT(prix)                    AS prix_renseignes,\n  COUNT(DISTINCT prix)           AS valeurs_distinctes,\n  MIN(prix) AS min_, MAX(prix) AS max_,\n  ROUND(AVG(prix), 2) AS moyenne,\n  SUM(CASE WHEN prix &lt;= 0 THEN 1 ELSE 0 END) AS prix_non_positifs\nFROM produits;</code></pre><h3>Catégories suspectes</h3><pre><code>SELECT categorie, COUNT(*) AS n\nFROM produits\nGROUP BY categorie\nORDER BY n DESC;</code></pre><p>« Légumes » et « legumes » côte à côte, un pays « XX », un prix à 0 : le profiling fait remonter ces signaux qu'aucun œil ne voit dans 100 000 lignes.</p><h3>Du profil aux seuils</h3><p>Le profiling n'est pas qu'un constat : ses chiffres deviennent les <strong>seuils de tes tests</strong>. « Le prix va de 0,30 à 1,20 € » ⇒ test <code>prix BETWEEN 0 AND 50</code>. « 5 catégories connues » ⇒ test <code>accepted_values</code>.</p><div class=\"callout\">En mission, consacre toujours tes premières heures au profiling. C'est ce qui transforme « je crois que c'est sale » en chiffres défendables — et ce qui impressionne un client.</div>", "minutes": 11}, "m2l4": {"theory": "<p>Certains problèmes ne se voient qu'<strong>au fil du temps</strong> : une table qui se remplit deux fois moins qu'hier, une moyenne qui dérive. Les <strong>fonctions de fenêtrage</strong> comparent chaque ligne (ou jour) à son contexte, sans perdre le détail.</p><h3>Fenêtre = agrégat qui ne réduit pas les lignes</h3><p>La clause <code>OVER (…)</code> calcule « par groupe » tout en gardant chaque ligne. <code>PARTITION BY</code> définit les groupes, <code>ORDER BY</code> l'ordre, et la <em>fenêtre glissante</em> (<code>ROWS BETWEEN …</code>) la portée.</p><pre><code>-- Moyenne mobile des 7 jours precedents (reference \"normale\")\nSELECT jour, nb_commandes,\n  AVG(nb_commandes) OVER (\n    ORDER BY jour ROWS BETWEEN 7 PRECEDING AND 1 PRECEDING\n  ) AS moyenne_7j\nFROM volumes_quotidiens;</code></pre><h3>Détecter une chute de volume</h3><pre><code>WITH ref AS (\n  SELECT jour, nb_commandes,\n         AVG(nb_commandes) OVER w AS moy\n  FROM volumes_quotidiens\n  WINDOW w AS (ORDER BY jour ROWS BETWEEN 7 PRECEDING AND 1 PRECEDING)\n)\nSELECT jour, nb_commandes, moy\nFROM ref\nWHERE nb_commandes &lt; moy * 0.5;   -- chute &gt; 50 % vs la normale</code></pre><h3>Trois fonctions à connaître par cœur</h3><table><tr><th>Fonction</th><th>Usage qualité</th></tr><tr><td><code>ROW_NUMBER()</code></td><td>dédoublonner en gardant 1 ligne par clé</td></tr><tr><td><code>LAG()</code> / <code>LEAD()</code></td><td>comparer une ligne à la précédente (variation)</td></tr><tr><td><code>RANK()</code></td><td>repérer les extrêmes par groupe</td></tr></table><pre><code>-- Garder la ligne la plus recente par client (deduplication)\nWITH num AS (\n  SELECT *, ROW_NUMBER() OVER (\n    PARTITION BY customer_id ORDER BY updated_at DESC) AS rn\n  FROM clients\n)\nSELECT * FROM num WHERE rn = 1;</code></pre><div class=\"note\">Cette leçon est le pont vers l'<strong>observabilité</strong> (module 5) : on passe de « la donnée est-elle correcte ? » à « son comportement est-il normal dans le temps ? ».</div>", "minutes": 10}, "m3l1": {"theory": "<p>SQL interroge la base ; <strong>Python + pandas</strong> prend le relais dès qu'on sort de la base (fichiers, APIs), qu'on croise des sources, ou qu'on automatise un rapport reproductible. Les deux sont complémentaires, pas concurrents.</p><h3>Le DataFrame, table en mémoire</h3><pre><code>import pandas as pd\ndf = pd.read_csv('clients.csv')\ndf.shape            # (lignes, colonnes)\ndf.info()           # types + non-nuls par colonne\ndf.head()           # apercu</code></pre><h3>Profiling express (l'équivalent d'une batterie de requêtes)</h3><pre><code>df.describe(include='all')      # stats par colonne\ndf.isna().mean().round(3)       # taux de manquants par colonne\ndf['pays'].value_counts()       # frequence des categories\ndf.duplicated(subset=['email']).sum()   # doublons sur une cle</code></pre><h3>Transformer une mesure en contrôle automatisé</h3><pre><code>taux = df['email'].isna().mean()\nassert taux &lt; 0.05, f\"Trop d'emails manquants : {taux:.1%}\"</code></pre><p>L'<code>assert</code> fait <strong>échouer le script</strong> si la règle est violée : c'est la brique d'un test qu'on lancera en CI (module 4).</p><h3>Quand préférer Python à SQL ?</h3><table><tr><th>Plutôt SQL</th><th>Plutôt Python</th></tr><tr><td>la donnée est déjà en base</td><td>fichiers, APIs, multi-sources</td></tr><tr><td>contrôle simple (NULL, doublon)</td><td>regex, distributions, rapprochement flou</td></tr><tr><td>au plus près des données</td><td>rapports, graphiques, orchestration</td></tr></table><div class=\"callout\">Règle de bon sens : ce qui est simple en SQL, fais-le en SQL (moins de données déplacées, plus rapide). Réserve Python à ce que SQL ne sait pas faire élégamment.</div>", "minutes": 12}, "m3l2": {"theory": "<p><strong>Great Expectations</strong> (GX) formalise des « attentes » sur les données, les valide, et génère une documentation lisible. C'est le standard pour faire de la qualité une <em>spécification vivante</em>, pas un script jetable.</p><h3>Le vocabulaire (à connaître en entretien)</h3><ul><li><strong>Expectation</strong> : une règle vérifiable (ex. « pas de NULL ici ») ;</li><li><strong>Suite</strong> : l'ensemble des attentes d'une table ;</li><li><strong>Validation</strong> : l'exécution de la suite sur des données → réussi/échoué ;</li><li><strong>Checkpoint</strong> : déclencheur de validation à un point du pipeline ;</li><li><strong>Data Docs</strong> : rapport HTML auto-généré, partageable.</li></ul><h3>Des attentes qui se lisent comme des phrases</h3><pre><code>validator.expect_column_values_to_not_be_null('email')\nvalidator.expect_column_values_to_be_unique('customer_id')\nvalidator.expect_column_values_to_be_between('amount_ttc', 0, 10000)\nvalidator.expect_column_values_to_be_in_set('country_code', ['FR','BE','DE','IT'])\nvalidator.expect_column_values_to_match_regex('email', r'^[^@]+@[^@]+\\.[^@]+$')</code></pre><p>Les noms se lisent en anglais courant : c'est volontaire. La suite devient une <strong>spécification</strong> que même un non-technicien relit et valide.</p><h3>Comment ça s'intègre en production</h3><p>Un <strong>Checkpoint</strong> exécute la suite à un moment clé (après chargement, avant publication) et peut <em>bloquer</em> la suite ou alerter. Les <strong>Data Docs</strong> gardent l'historique visuel : on voit, attente par attente, ce qui passe et ce qui casse, dans le temps.</p><div class=\"callout\">Force de GX : la documentation <em>vivante</em>. Chaque exécution met à jour un rapport partageable — la qualité devient visible et auditable, pas un secret enfoui dans un script.</div>", "minutes": 11}, "m3l3": {"theory": "<p><strong>Soda</strong> adopte l'approche inverse de GX : <em>déclarative</em>. On écrit des contrôles lisibles en YAML (le langage <strong>SodaCL</strong>), puis on lance un <em>scan</em>. Idéal quand on veut que des analystes — pas seulement des devs Python — écrivent des contrôles.</p><h3>Des contrôles en YAML</h3><pre><code>checks for customers:\n  - row_count &gt; 0\n  - missing_count(email) = 0\n  - duplicate_count(email) = 0\n  - invalid_percent(country_code) &lt; 1%:\n      valid values: [FR, BE, DE, IT]\n  - freshness(updated_at) &lt; 1d</code></pre><pre><code>soda scan -d mon_entrepot -c configuration.yml checks.yml</code></pre><h3>Métriques prêtes à l'emploi</h3><p><code>row_count</code>, <code>missing_count</code>, <code>duplicate_count</code>, <code>min/max/avg</code>, <code>freshness</code>… qu'on compare à des seuils. Soda sait aussi détecter des <strong>anomalies</strong> automatiquement sur des séries temporelles (utile pour le module Observabilité).</p><h3>GX, Soda ou dbt tests ? Le tableau de décision</h3><table><tr><th>&nbsp;</th><th>dbt tests</th><th>Great Expectations</th><th>Soda</th></tr><tr><td>Écriture</td><td>YAML + SQL</td><td>Python / config</td><td>YAML déclaratif</td></tr><tr><td>Vit avec</td><td>les modèles dbt</td><td>du code Python</td><td>une config légère</td></tr><tr><td>Point fort</td><td>intégré au pipeline</td><td>Data Docs riches</td><td>simplicité, anomalies</td></tr><tr><td>Pour qui</td><td>équipe dbt</td><td>équipe Python</td><td>analystes / mixte</td></tr></table><div class=\"note\">Il n'y a pas de « meilleur » outil dans l'absolu : le bon choix dépend de ta stack et de qui écrit les contrôles. En entretien, savoir <em>justifier</em> ce choix vaut mieux que réciter une préférence.</div>", "minutes": 9}};
