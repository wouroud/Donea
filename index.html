e\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"700\">$group</text><text x=\"285\" y=\"86.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"600\">(GROUP BY)</text><rect x=\"390\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"465\" y=\"71.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"700\">$sort</text><text x=\"465\" y=\"86.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"600\">(ORDER BY)</text><line x1=\"180\" y1=\"75\" x2=\"210\" y2=\"75\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"360\" y1=\"75\" x2=\"390\" y2=\"75\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">Le pipeline d'agrégation MongoDB enchaîne des étapes ($match, $group, $sort) — l'équivalent conceptuel d'une requête SQL.</div></div><div class=\"section-label\">Documents & collections</div><pre><code>{\n  \"_id\": 1,\n  \"name\": \"Alice\",\n  \"country\": \"FR\",\n  \"orders\": [ {\"sku\": \"ECRAN\", \"qty\": 1} ]\n}</code></pre><p>Le <b>schéma est flexible</b> : deux documents d'une même collection peuvent différer. Pratique pour des données hétérogènes ou évolutives, mais la <b>discipline de modélisation</b> reste nécessaire.</p><div class=\"section-label\">Le pipeline d'agrégation</div><p>MongoDB agrège via un <b>pipeline</b> d'étapes : <code>$match</code> (filtrer), <code>$group</code> (regrouper/agréger), <code>$sort</code>, <code>$project</code>. C'est l'équivalent conceptuel d'un <code>SELECT ... WHERE ... GROUP BY ... ORDER BY</code>.</p><pre><code>db.sales.aggregate([\n  { $group: { _id: \"$category\", ca: { $sum: \"$revenu\" } } },\n  { $sort: { ca: -1 } }\n])</code></pre><div class=\"note\">L'exercice ci-contre est l'équivalent SQL d'un pipeline <code>$group</code> : compter par catégorie.</div>", "quiz": [{"q": "Le pipeline d'agrégation de MongoDB correspond conceptuellement à :", "options": ["Une transaction ACID", "Un enchaînement d'étapes équivalent à SELECT/WHERE/GROUP BY/ORDER BY", "Un index B-tree", "Une réplication"], "answer": 1, "explain": "$match/$group/$sort/$project enchaînent filtrage, regroupement, tri et projection — l'équivalent d'une requête SQL agrégée."}], "exercise": {"lang": "sql", "prompt": "Comme un pipeline <code>$group</code> par catégorie : compte le <b>nombre de ventes par catégorie</b> de produit. Colonnes : <code>category</code>, <code>nb</code>, triées par <code>nb</code> décroissant.", "starter": "SELECT p.category, COUNT(*) AS nb\nFROM de_sales s JOIN de_products p ON p.product_id=s.product_id\nGROUP BY p.category ORDER BY nb DESC;", "solution": "SELECT p.category, COUNT(*) AS nb FROM de_sales s JOIN de_products p ON p.product_id=s.product_id GROUP BY p.category ORDER BY nb DESC;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["Accessoires", 10], ["Écrans", 5], ["Audio", 3]]}}}]}, {"formation": "de", "track": "de-warehouse", "id": "de5", "title": "Data Warehousing", "desc": "OLTP/OLAP, modélisation dimensionnelle (Kimball) et SCD.", "lessons": [{"id": "de5l1", "title": "Data Warehousing : OLTP vs OLAP", "minutes": 11, "theory": "<p>Un <b>data warehouse</b> est une base optimisée pour l'<b>analyse</b> : il centralise la donnée de plusieurs sources et la sert à la BI. Il s'oppose aux bases <b>OLTP</b> (transactionnelles) par sa conception même.</p><div class=\"diagram\"><svg viewBox=\"0 0 720 150\" width=\"720\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"14\" y=\"58\" width=\"156.5\" height=\"52\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"92.25\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">OLTP</text><text x=\"92.25\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">appli, normalisé</text><line x1=\"170.5\" y1=\"84\" x2=\"192.5\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"192.5\" y=\"58\" width=\"156.5\" height=\"52\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"270.75\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">Extraction</text><text x=\"270.75\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"600\">ELT/ETL</text><line x1=\"349\" y1=\"84\" x2=\"371\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"371\" y=\"58\" width=\"156.5\" height=\"52\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"449.25\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Entrepôt OLAP</text><text x=\"449.25\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">colonnaire, MPP</text><line x1=\"527.5\" y1=\"84\" x2=\"549.5\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"549.5\" y=\"58\" width=\"156.5\" height=\"52\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"627.75\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23E22\" font-weight=\"700\">BI</text><text x=\"627.75\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23E22\" font-weight=\"600\">dashboards</text></svg><div class=\"cap\">L'entrepôt (OLAP) recopie et réorganise la donnée des systèmes transactionnels (OLTP) pour l'analyse à grande échelle.</div></div><table><tr><th></th><th>OLTP</th><th>OLAP (entrepôt)</th></tr><tr><td>But</td><td>transactions</td><td>analyses massives</td></tr><tr><td>Modèle</td><td>normalisé (3NF)</td><td>dimensionnel (étoile)</td></tr><tr><td>Stockage</td><td>par lignes</td><td>par colonnes</td></tr><tr><td>Charge</td><td>beaucoup d'écritures</td><td>scans & agrégats</td></tr></table><div class=\"section-label\">Ce qui rend un entrepôt rapide</div><ul><li><b>Stockage colonnaire</b> : ne lire que les colonnes utiles.</li><li><b>MPP</b> (Massively Parallel Processing) : la requête est distribuée sur de nombreux nœuds.</li><li><b>Séparation stockage / calcul</b> (Snowflake, BigQuery) : dimensionner le compute à la demande.</li></ul><p>Le data engineer construit les pipelines qui <b>alimentent</b> l'entrepôt (ELT) et y modélisent des tables prêtes à analyser.</p><div class=\"note\">Acteurs typiques : Snowflake, BigQuery, Amazon Redshift, Databricks SQL.</div>", "quiz": [{"q": "Qu'est-ce qui caractérise un entrepôt analytique (OLAP) vs une base OLTP ?", "options": ["Il est normalisé et orienté lignes", "Il est dimensionnel, colonnaire et optimisé pour les scans/agrégats", "Il interdit le SQL", "Il ne stocke que du JSON"], "answer": 1, "explain": "L'entrepôt privilégie le modèle dimensionnel, le stockage colonnaire et le parallélisme massif pour des analyses sur de gros volumes."}], "exercise": {"lang": "sql", "prompt": "Couche <b>gold</b> de l'entrepôt : calcule le <b>chiffre d'affaires total</b> (<code>quantity*unit_price</code>), arrondi 2. Colonne : <code>ca_total</code>.", "starter": "SELECT ROUND(SUM(quantity*unit_price),2) AS ca_total\nFROM de_sales;", "solution": "SELECT ROUND(SUM(quantity*unit_price),2) AS ca_total FROM de_sales;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [[1410.0]]}}}, {"id": "de5l2", "title": "Modélisation dimensionnelle (Kimball)", "minutes": 12, "theory": "<p>Dans l'entrepôt, on adopte la modélisation <b>dimensionnelle</b> de Kimball : une table de <b>faits</b> entourée de <b>dimensions</b>, volontairement <b>dénormalisée</b> pour des requêtes simples et rapides.</p><div class=\"diagram\"><svg viewBox=\"0 0 600 210\" width=\"600\" height=\"210\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"225\" y=\"84\" width=\"160\" height=\"48\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"305\" y=\"104.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"700\">FAITS — de_sales</text><text x=\"305\" y=\"119.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"600\">(grain : 1 vente)</text><rect x=\"40\" y=\"22\" width=\"140\" height=\"40\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"110\" y=\"45.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Dim Client</text><rect x=\"420\" y=\"22\" width=\"140\" height=\"40\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"490\" y=\"45.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Dim Produit</text><rect x=\"40\" y=\"150\" width=\"140\" height=\"40\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"110\" y=\"173.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Dim Date</text><rect x=\"420\" y=\"150\" width=\"140\" height=\"40\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"490\" y=\"173.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Dim Catégorie</text><line x1=\"165\" y1=\"62\" x2=\"252\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"435\" y1=\"62\" x2=\"358\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"165\" y1=\"150\" x2=\"252\" y2=\"132\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"435\" y1=\"150\" x2=\"358\" y2=\"132\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">Le schéma en étoile : une table de faits (mesures + clés) entourée de dimensions (contexte).</div></div><div class=\"section-label\">Faits, dimensions, grain</div><ul><li>La <b>table de faits</b> porte les <b>mesures</b> (quantité, montant) + les clés de dimensions. Son <b>grain</b> (ce que représente une ligne) est la décision-clé.</li><li>Les <b>dimensions</b> portent le contexte (client, produit, date) pour filtrer/regrouper.</li><li>Les <b>dimensions conformes</b> sont partagées entre plusieurs faits → cohérence d'entreprise.</li></ul><div class=\"section-label\">Étoile vs flocon</div><p>En <b>étoile</b>, les dimensions sont dénormalisées (une table par dimension). En <b>flocon</b>, on re-normalise les dimensions en sous-tables : plus propre mais plus de jointures. L'étoile est le défaut analytique.</p><pre><code>SELECT p.name AS produit, SUM(s.quantity*s.unit_price) AS ca\nFROM de_sales s JOIN de_products p ON p.product_id=s.product_id\nGROUP BY p.name ORDER BY ca DESC;</code></pre>", "quiz": [{"q": "Quelle est la décision de modélisation la plus structurante d'une table de faits ?", "options": ["Son nom", "Son grain (ce que représente une ligne)", "Sa couleur", "Le nombre d'index"], "answer": 1, "explain": "Le grain fixe le niveau de détail (ex. une vente) ; il conditionne toutes les analyses possibles et la taille de la table."}], "exercise": {"lang": "sql", "prompt": "Calcule le <b>chiffre d'affaires par produit</b> (<code>quantity*unit_price</code>), trié décroissant. Colonnes : <code>produit</code> (nom), <code>ca</code>.", "starter": "SELECT p.name AS produit, SUM(s.quantity*s.unit_price) AS ca\nFROM de_sales s JOIN de_products p ON p.product_id=s.product_id\nGROUP BY p.name ORDER BY ca DESC;", "solution": "SELECT p.name AS produit, SUM(s.quantity*s.unit_price) AS ca FROM de_sales s JOIN de_products p ON p.product_id=s.product_id GROUP BY p.name ORDER BY ca DESC;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["Écran", 645.0], ["Casque", 316.0], ["Clavier", 203.0], ["Webcam", 156.0], ["Souris", 90.0]]}}}, {"id": "de5l3", "title": "Dimensions à évolution lente (SCD type 2)", "minutes": 13, "theory": "<p>Les dimensions <b>changent</b> (un client déménage). Comment historiser ? C'est le problème des <b>Slowly Changing Dimensions</b> — un grand classique de l'entrepôt et des entretiens.</p><div class=\"diagram\"><svg viewBox=\"0 0 620 170\" width=\"620\" height=\"170\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"60\" width=\"150\" height=\"44\" rx=\"11\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.6\"/><text x=\"105\" y=\"78.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23036\" font-weight=\"700\">Carla — DE</text><text x=\"105\" y=\"92.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23036\" font-weight=\"600\">valide dès 2023-01-01</text><rect x=\"230\" y=\"30\" width=\"160\" height=\"44\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"310\" y=\"48.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">v1 : DE</text><text x=\"310\" y=\"62.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"600\">2023-01-01 → 2024-02-15</text><rect x=\"230\" y=\"100\" width=\"160\" height=\"44\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"310\" y=\"118.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">v2 : FR (courante)</text><text x=\"310\" y=\"132.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">2024-02-15 → ∞</text><line x1=\"180\" y1=\"82\" x2=\"230\" y2=\"52\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"180\" y1=\"82\" x2=\"230\" y2=\"122\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"520\" y=\"70\" text-anchor=\"middle\" font-size=\"10\" fill=\"#56535F\" font-weight=\"700\">on garde l'HISTORIQUE</text><text x=\"520\" y=\"90\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8C8995\">(1 ligne / version)</text></svg><div class=\"cap\">SCD type 2 : à chaque changement, on clôt l'ancienne version (valid_to) et on ouvre la nouvelle (is_current).</div></div><div class=\"section-label\">Les types de SCD</div><table><tr><th>Type</th><th>Comportement</th></tr><tr><td>Type 1</td><td>écrasement : on perd l'historique</td></tr><tr><td>Type 2</td><td>versionnage : 1 ligne/version (valid_from/valid_to, is_current)</td></tr><tr><td>Type 3</td><td>une colonne « valeur précédente »</td></tr></table><p>Le <b>type 2</b> domine en entrepôt : il <b>préserve l'historique</b>, indispensable pour analyser « le CA par pays <i>au moment</i> de la vente ». On y ajoute des dates de validité, un drapeau <code>is_current</code> et une <b>clé de substitution</b>.</p><div class=\"section-label\">Construire le SCD2 en SQL</div><p>La fin de validité = le début de la version suivante (<code>LEAD</code>) ; la dernière version est courante.</p><pre><code>SELECT customer_id, country, valid_from,\n  IFNULL(LEAD(valid_from) OVER (PARTITION BY customer_id ORDER BY valid_from),'9999-12-31') AS valid_to,\n  CASE WHEN LEAD(valid_from) OVER (PARTITION BY customer_id ORDER BY valid_from) IS NULL THEN 1 ELSE 0 END AS is_current\nFROM de_customer_scd;</code></pre><div class=\"note\">dbt fournit des <b>snapshots</b> qui matérialisent automatiquement un SCD type 2 — on le verra au module dbt.</div>", "quiz": [{"q": "Que préserve une dimension SCD de type 2 ?", "options": ["Rien, elle écrase", "L'historique : une ligne par version avec dates de validité", "Seulement la valeur courante", "Seulement la précédente"], "answer": 1, "explain": "Le type 2 versionne chaque changement (valid_from/valid_to, is_current), permettant l'analyse historique."}], "exercise": {"lang": "sql", "prompt": "Construis le <b>SCD type 2</b> du client <b>3</b> (Carla, qui a déménagé) : <code>valid_from</code>, <code>valid_to</code> (début de la version suivante, sinon <code>'9999-12-31'</code>), <code>is_current</code> (1 pour la dernière). Utilise <code>LEAD</code>.", "starter": "SELECT valid_from,\n  IFNULL(LEAD(valid_from) OVER (PARTITION BY customer_id ORDER BY valid_from),'9999-12-31') AS valid_to,\n  CASE WHEN LEAD(valid_from) OVER (PARTITION BY customer_id ORDER BY valid_from) IS NULL THEN 1 ELSE 0 END AS is_current\nFROM de_customer_scd WHERE customer_id=3 ORDER BY valid_from;", "solution": "SELECT valid_from, IFNULL(LEAD(valid_from) OVER (PARTITION BY customer_id ORDER BY valid_from),'9999-12-31') AS valid_to, CASE WHEN LEAD(valid_from) OVER (PARTITION BY customer_id ORDER BY valid_from) IS NULL THEN 1 ELSE 0 END AS is_current FROM de_customer_scd WHERE customer_id=3 ORDER BY valid_from;", "dataset": "de_customer_scd(customer_id, name, country, valid_from)", "datasetTitle": "Tables disponibles", "expected": {"values": [["2023-01-01", "2024-02-15", 0], ["2024-02-15", "9999-12-31", 1]]}}}]}, {"formation": "de", "track": "de-warehouse", "id": "de6", "title": "Architecture Data Lake", "desc": "Stockage objet, zones, formats et lakehouse (Delta/Iceberg).", "lessons": [{"id": "de6l1", "title": "Data Lake : stockage objet & zones", "minutes": 11, "theory": "<p>Un <b>data lake</b> est un dépôt central qui accueille <b>tous types de données</b> (structurées ou non) sur du <b>stockage objet</b> bon marché (Amazon S3, Google Cloud Storage, Azure Blob). Le schéma s'applique à la <b>lecture</b> (<i>schema-on-read</i>), à l'inverse de l'entrepôt.</p><div class=\"diagram\"><svg viewBox=\"0 0 600 150\" width=\"600\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"14\" y=\"58\" width=\"176\" height=\"52\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"102\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23E22\" font-weight=\"700\">Bronze</text><text x=\"102\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23E22\" font-weight=\"600\">brut (objet)</text><line x1=\"190\" y1=\"84\" x2=\"212\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"212\" y=\"58\" width=\"176\" height=\"52\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"300\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Silver</text><text x=\"300\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">nettoyé/typé</text><line x1=\"388\" y1=\"84\" x2=\"410\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"410\" y=\"58\" width=\"176\" height=\"52\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"498\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Gold</text><text x=\"498\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">agrégé/métier</text></svg><div class=\"cap\">Un data lake organisé en zones : bronze (brut) → silver (raffiné) → gold (métier), sur stockage objet.</div></div><div class=\"section-label\">Formats & organisation</div><ul><li>On stocke en fichiers, idéalement <b>Parquet</b> (colonnaire, compressé) pour l'analytique.</li><li>On <b>partitionne</b> par date pour ne lire que l'utile.</li><li>On organise en <b>zones</b> : <b>bronze</b> (brut), <b>silver</b> (nettoyé/typé), <b>gold</b> (agrégé métier).</li></ul><div class=\"section-label\">Forces & risques</div><table><tr><th>Atout</th><th>Risque</th></tr><tr><td>coût faible, tout format</td><td>« data swamp » sans gouvernance</td></tr><tr><td>souplesse (schema-on-read)</td><td>qualité à valider à la lecture</td></tr><tr><td>scalabilité</td><td>multiplication de petits fichiers</td></tr></table><p>Le lake stocke le <b>brut</b> à grande échelle ; on transforme ensuite vers des couches exploitables — la base de l'ELT moderne.</p><div class=\"note\">L'exercice illustre le réflexe colonnaire : ne produire/lire que les colonnes utiles (projection).</div>", "quiz": [{"q": "Qu'appelle-t-on schema-on-read dans un data lake ?", "options": ["Le schéma est imposé à l'écriture", "Le schéma est appliqué au moment de lire la donnée (stockée brute)", "Il n'y a jamais de schéma", "Le schéma est chiffré"], "answer": 1, "explain": "Le lake stocke le brut sans schéma strict ; c'est à la lecture qu'on interprète la structure — souple, mais la qualité est à valider."}], "exercise": {"lang": "sql", "prompt": "Réflexe <b>colonnaire</b> (projection) : ne produis que les 2 colonnes utiles — <code>sale_id</code> et le <code>revenu</code> (<code>quantity*unit_price</code>, arrondi 2).", "starter": "SELECT sale_id, ROUND(quantity*unit_price,2) AS revenu\nFROM de_sales;", "solution": "SELECT sale_id, ROUND(quantity*unit_price,2) AS revenu FROM de_sales;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [[1, 129.0], [2, 58.0], [3, 15.0], [4, 79.0], [5, 29.0], [6, 129.0], [7, 78.0], [8, 79.0], [9, 45.0], [10, 129.0], [11, 39.0], [12, 29.0], [13, 129.0], [14, 158.0], [15, 30.0], [16, 39.0], [17, 129.0], [18, 87.0]]}}}, {"id": "de6l2", "title": "Lakehouse : Delta, Iceberg, Hudi", "minutes": 11, "theory": "<p>Le <b>lakehouse</b> pose une <b>couche de table transactionnelle</b> sur le data lake. Les formats <b>Delta Lake</b>, <b>Apache Iceberg</b> et <b>Apache Hudi</b> apportent au lac ce qui lui manquait : des garanties d'entrepôt.</p><div class=\"diagram\"><svg viewBox=\"0 0 600 140\" width=\"600\" height=\"140\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"28\" width=\"174.667\" height=\"84\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"107.333\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Data Lake</text><text x=\"107.333\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">brut, objet</text><text x=\"107.333\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">schema-on-read</text><rect x=\"212.667\" y=\"28\" width=\"174.667\" height=\"84\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"300\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Lakehouse</text><text x=\"300\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">lac + transactions</text><text x=\"300\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">ACID, time travel</text><rect x=\"405.333\" y=\"28\" width=\"174.667\" height=\"84\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"492.667\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Warehouse</text><text x=\"492.667\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">structuré, SQL</text><text x=\"492.667\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">schéma strict</text></svg><div class=\"cap\">Le lakehouse réunit le coût et l'ouverture du lac avec la fiabilité (ACID, time travel) de l'entrepôt.</div></div><div class=\"section-label\">Ce que le lakehouse ajoute</div><ul><li><b>Transactions ACID</b> sur des fichiers objets : plus de demi-écritures corrompues.</li><li><b>Time travel</b> : interroger une <b>version passée</b> de la table (audit, rollback).</li><li><b>Évolution de schéma</b> contrôlée (ajouter/renommer des colonnes proprement).</li><li><b>Compaction</b> & <i>vacuum</i> : régler le « <b>small files problem</b> » et nettoyer les versions obsolètes.</li></ul><p>Résultat : on fait de l'ELT fiable <b>directement sur le lac</b>, sans recopier dans un entrepôt séparé. C'est l'architecture de Databricks et, de plus en plus, le standard.</p><div class=\"callout\">Lakehouse = un seul stockage ouvert pour l'ingénierie ET l'analytique, avec la fiabilité transactionnelle de l'entrepôt.</div>", "quiz": [{"q": "Qu'apporte un format de table comme Delta/Iceberg au-dessus d'un data lake ?", "options": ["Rien de plus", "Transactions ACID, time travel et évolution de schéma sur le stockage objet", "Il supprime le SQL", "Il le transforme en base OLTP"], "answer": 1, "explain": "Le lakehouse ajoute une couche transactionnelle (ACID, time travel, schema evolution) sur le stockage objet bon marché du lac."}]}]}, {"formation": "de", "track": "de-pipe", "id": "de7", "title": "Pipelines ETL/ELT", "desc": "ETL vs ELT, médaillon, incrémental, CDC et idempotence.", "lessons": [{"id": "de7l1", "title": "Pipelines ETL vs ELT & médaillon", "minutes": 11, "theory": "<p>Un <b>pipeline</b> déplace et transforme la donnée des sources vers les usages. Trois opérations — Extract, Load, Transform — dans deux ordres possibles.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 160\" width=\"560\" height=\"160\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"30\" width=\"230\" height=\"42\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"145\" y=\"54.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">ETL : Transform AVANT load</text><rect x=\"30\" y=\"96\" width=\"230\" height=\"42\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"145\" y=\"120.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">ELT : Load PUIS transform</text><rect x=\"320\" y=\"30\" width=\"210\" height=\"42\" rx=\"11\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.6\"/><text x=\"425\" y=\"54.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#B23036\">outil dédié, rigide</text><rect x=\"320\" y=\"96\" width=\"210\" height=\"42\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"425\" y=\"120.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">puissance de l'entrepôt</text><line x1=\"260\" y1=\"51\" x2=\"320\" y2=\"51\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"260\" y1=\"117\" x2=\"320\" y2=\"117\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">ETL vs ELT : transformer avant de charger, ou charger le brut puis transformer dans l'entrepôt (approche moderne).</div></div><div class=\"section-label\">ETL ou ELT ?</div><ul><li><b>ETL</b> : on transforme <i>avant</i> de charger (héritage des outils dédiés ; utile si la cible est contrainte).</li><li><b>ELT</b> : on <b>charge le brut</b>, puis on transforme <i>dans</i> l'entrepôt/lakehouse en SQL — l'approche moderne, car le stockage est bon marché et le moteur puissant.</li></ul><div class=\"section-label\">L'architecture en médaillon</div><p>On raffine par couches : <b>bronze</b> (brut, rejouable) → <b>silver</b> (nettoyé, typé, dédupliqué) → <b>gold</b> (agrégé métier). Garder le bronze permet de <b>tout recalculer</b> si une règle change.</p><pre><code>WITH r AS (SELECT sale_date, quantity*unit_price AS revenu FROM de_sales)\nSELECT substr(sale_date,1,7) AS mois, ROUND(SUM(revenu),2) AS ca\nFROM r GROUP BY mois ORDER BY mois;</code></pre><div class=\"note\">ELT + médaillon est le socle de la « modern data stack » (Fivetran/Airbyte pour l'ingestion, dbt pour la transformation, entrepôt/lakehouse pour le stockage).</div>", "quiz": [{"q": "Qu'est-ce qui caractérise l'ELT ?", "options": ["Transformer avant de charger", "Charger le brut puis transformer dans l'entrepôt (bronze/silver/gold)", "Ne pas utiliser SQL", "Ne pas garder le brut"], "answer": 1, "explain": "ELT = Extract, Load, puis Transform dans l'entrepôt ; on conserve le brut et on raffine par couches."}], "exercise": {"lang": "sql", "prompt": "Transformation <b>silver→gold</b> : avec une <b>CTE</b>, calcule le <b>CA par mois</b> (<code>substr(sale_date,1,7)</code>). Colonnes : <code>mois</code>, <code>ca</code> (arrondi 2), triées par mois.", "starter": "WITH r AS (\n  SELECT sale_date, quantity*unit_price AS revenu FROM de_sales\n)\nSELECT substr(sale_date,1,7) AS mois, ROUND(SUM(revenu),2) AS ca\nFROM r GROUP BY mois ORDER BY mois;", "solution": "WITH r AS (SELECT sale_date, quantity*unit_price AS revenu FROM de_sales) SELECT substr(sale_date,1,7) AS mois, ROUND(SUM(revenu),2) AS ca FROM r GROUP BY mois ORDER BY mois;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["2024-01", 310.0], ["2024-02", 499.0], ["2024-03", 601.0]]}}}, {"id": "de7l2", "title": "Ingestion incrémentale, CDC & idempotence", "minutes": 12, "theory": "<p>À l'échelle, on ne relit pas tout à chaque run. Deux mécanismes : l'<b>incrémental</b> (ne charger que le nouveau) et le <b>CDC</b> (capter les changements).</p><div class=\"diagram\"><svg viewBox=\"0 0 560 160\" width=\"560\" height=\"160\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"55\" width=\"160\" height=\"50\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"110\" y=\"76.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Source</text><text x=\"110\" y=\"90.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">binlog / updated_at</text><rect x=\"220\" y=\"30\" width=\"150\" height=\"40\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"295\" y=\"46.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Incrémental</text><text x=\"295\" y=\"60.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">WHERE date &gt; repère</text><rect x=\"220\" y=\"95\" width=\"150\" height=\"40\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"295\" y=\"111.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">CDC</text><text x=\"295\" y=\"125.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">insert/update/delete</text><rect x=\"410\" y=\"55\" width=\"130\" height=\"50\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"475\" y=\"76.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Cible</text><text x=\"475\" y=\"90.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">idempotente</text><line x1=\"190\" y1=\"70\" x2=\"220\" y2=\"55\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"190\" y1=\"90\" x2=\"220\" y2=\"110\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"370\" y1=\"55\" x2=\"410\" y2=\"72\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"370\" y1=\"115\" x2=\"410\" y2=\"90\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">Ingestion incrémentale & CDC : ne charger que le nouveau / les changements, vers une cible idempotente.</div></div><div class=\"section-label\">Incrémental & CDC</div><ul><li><b>Incrémental</b> : on s'appuie sur un <b>repère</b> (date de modification, id croissant) — <code>WHERE updated_at &gt; dernier_run</code> — qu'on mémorise pour le prochain run.</li><li><b>CDC</b> (Change Data Capture) : on lit le <b>journal des transactions</b> (binlog MySQL, WAL Postgres) pour propager <i>insert/update/delete</i> en quasi temps réel. L'incrémental par requête, lui, rate souvent les <b>suppressions</b>.</li></ul><div class=\"section-label\">Idempotence</div><p>Un pipeline doit être <b>idempotent</b> : rejouer un run (réessai, backfill, doublon de livraison) ne doit pas fausser le résultat. En pratique : <b>réécrire la partition</b> traitée, ou faire un <b>MERGE</b>/upsert sur la clé. On détecte les doublons en regroupant par clé.</p><pre><code>SELECT event_id, COUNT(*) AS occurrences\nFROM de_events GROUP BY event_id HAVING COUNT(*) &gt; 1;</code></pre><div class=\"note\">L'exercice montre l'extraction incrémentale : ne charger que les ventes postérieures au dernier repère.</div>", "quiz": [{"q": "Pourquoi un pipeline doit-il être idempotent ?", "options": ["Pour aller plus vite", "Pour que le rejouer (réessai, backfill, doublon) ne fausse pas les résultats", "Pour éviter les clés", "Pour compresser"], "answer": 1, "explain": "Les ré-exécutions sont inévitables ; l'idempotence (réécriture de partition, MERGE) garantit le même état final, sans doublon."}], "exercise": {"lang": "sql", "prompt": "<b>Extraction incrémentale</b> : un run du 2024-02-01 ne charge que les ventes <b>postérieures</b> à cette date. Colonnes : <code>sale_id</code>, <code>sale_date</code>.", "starter": "SELECT sale_id, sale_date\nFROM de_sales\nWHERE sale_date > '2024-02-01';", "solution": "SELECT sale_id, sale_date FROM de_sales WHERE sale_date > '2024-02-01';", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [[6, "2024-02-02"], [7, "2024-02-09"], [8, "2024-02-14"], [9, "2024-02-18"], [10, "2024-02-25"], [11, "2024-02-27"], [12, "2024-03-03"], [13, "2024-03-08"], [14, "2024-03-11"], [15, "2024-03-15"], [16, "2024-03-19"], [17, "2024-03-22"], [18, "2024-03-29"]]}}}]}, {"formation": "de", "track": "de-pipe", "id": "de8", "title": "Apache Airflow", "desc": "Orchestration en DAG, planification, idempotence et backfill.", "lessons": [{"id": "de8l1", "title": "Apache Airflow : orchestrer en DAG", "minutes": 12, "theory": "<p><b>Apache Airflow</b> est l'orchestrateur de référence : il planifie et supervise des pipelines décrits comme des <b>DAG</b> (graphes orientés sans cycle) — des tâches reliées par leurs <b>dépendances</b>, écrites en Python.</p><div class=\"diagram\"><svg viewBox=\"0 0 620 170\" width=\"620\" height=\"170\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"70\" width=\"110\" height=\"40\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"85\" y=\"93.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">extract</text><rect x=\"230\" y=\"30\" width=\"120\" height=\"40\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"290\" y=\"53.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"700\">transform_a</text><rect x=\"230\" y=\"110\" width=\"120\" height=\"40\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"290\" y=\"133.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"700\">transform_b</text><rect x=\"430\" y=\"70\" width=\"130\" height=\"40\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"495\" y=\"93.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">load / publish</text><line x1=\"140\" y1=\"86\" x2=\"230\" y2=\"52\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"140\" y1=\"94\" x2=\"230\" y2=\"128\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"350\" y1=\"50\" x2=\"430\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"350\" y1=\"130\" x2=\"430\" y2=\"96\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">Un DAG Airflow : des tâches reliées par leurs dépendances, planifiées, ré-exécutables (réessais, backfill).</div></div><div class=\"section-label\">Les concepts</div><ul><li><b>DAG</b> : le pipeline ; <b>Task</b> : une étape ; les dépendances définissent l'ordre et le parallélisme.</li><li><b>Operators</b> : que fait une tâche (exécuter du SQL, lancer un job Spark, appeler une API).</li><li><b>Sensors</b> : attendre une condition (un fichier arrive, une table est fraîche) avant de continuer.</li><li><b>Scheduler</b> : déclenche les DAG selon un planning (cron) ; gère <b>réessais</b> et <b>SLA</b>.</li></ul><div class=\"section-label\">Idempotence & backfill</div><p>Airflow exécute par <b>intervalle</b> (une « run » par fenêtre temporelle). Pour qu'un <b>backfill</b> (rejouer le passé) soit sûr, chaque tâche doit être <b>idempotente</b> : réécrire la partition de l'intervalle, pas insérer en aveugle.</p><pre><code>-- Périmètre qu'un backfill de février retraiterait\nSELECT COUNT(*) AS lignes FROM de_sales WHERE sale_date LIKE '2024-02%';</code></pre><div class=\"note\">On découpe les tâches par fenêtre temporelle : c'est ce qui rend backfill et réessais sans danger.</div>", "quiz": [{"q": "Qu'est-ce qu'un DAG dans Airflow ?", "options": ["Une base de données", "Un graphe orienté sans cycle décrivant des tâches et leurs dépendances", "Un type d'index", "Un format de fichier"], "answer": 1, "explain": "Le DAG décrit le pipeline : des tâches reliées par leurs dépendances, que le scheduler planifie et ré-exécute."}], "exercise": {"lang": "sql", "prompt": "<b>Périmètre d'un backfill</b> : combien de ventes un re-traitement de <b>février 2024</b> recalculerait-il ? (<code>sale_date LIKE '2024-02%'</code>). Colonne : <code>lignes</code>.", "starter": "SELECT COUNT(*) AS lignes\nFROM de_sales\nWHERE sale_date LIKE '2024-02%';", "solution": "SELECT COUNT(*) AS lignes FROM de_sales WHERE sale_date LIKE '2024-02%';", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [[6]]}}}, {"id": "de8l2", "title": "Airflow en pratique : planification & fiabilité", "minutes": 11, "theory": "<p>Au-delà du DAG, opérer Airflow demande quelques disciplines pour des pipelines fiables et maintenables.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 150\" width=\"560\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"105\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">@daily</text><text x=\"105\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">intervalle</text><rect x=\"210\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"285\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">réessais</text><text x=\"285\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">+ alertes SLA</text><rect x=\"390\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"465\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">idempotent</text><text x=\"465\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">→ backfill sûr</text></svg><div class=\"cap\">Bonnes pratiques Airflow : tâches courtes et idempotentes, réessais configurés, alertes sur les SLA.</div></div><div class=\"section-label\">Planifier</div><ul><li><b>Intervalle de planification</b> (<code>@daily</code>, cron) : chaque run traite une fenêtre temporelle précise.</li><li><b>Dépendances de données</b> via sensors : ne pas démarrer tant que la source n'est pas prête.</li><li><b>Catchup / backfill</b> : rejouer automatiquement les intervalles manqués.</li></ul><div class=\"section-label\">Fiabiliser</div><ul><li><b>Réessais</b> avec back-off sur les tâches faillibles (réseau, API).</li><li><b>Idempotence</b> : réécrire la partition de l'intervalle (pattern delete-insert).</li><li><b>Alertes & SLA</b> : être prévenu si une tâche échoue ou dépasse son délai.</li><li><b>Tâches courtes et atomiques</b> : plus faciles à rejouer et à diagnostiquer.</li></ul><p>Une requête typique pilotée par Airflow : (re)calculer un agrégat sur la partition d'un mois.</p><pre><code>SELECT ROUND(SUM(quantity*unit_price),2) AS ca\nFROM de_sales WHERE sale_date LIKE '2024-02%';</code></pre><div class=\"note\">Alternatives modernes : Dagster, Prefect (orientés « assets » et développement local). Les principes (DAG, idempotence, backfill) restent les mêmes.</div>", "quiz": [{"q": "Pourquoi privilégier des tâches Airflow idempotentes et découpées par intervalle ?", "options": ["Pour les rendre plus longues", "Pour pouvoir les rejouer (backfill, réessais) sans créer de doublons", "Pour éviter le SQL", "Pour supprimer le scheduler"], "answer": 1, "explain": "Découper par fenêtre + réécrire la partition rend chaque run rejouable à l'identique : backfills et réessais deviennent sûrs."}], "exercise": {"lang": "sql", "prompt": "Tâche planifiée typique : (re)calcule le <b>CA de la partition 2024-02</b> (<code>sale_date LIKE '2024-02%'</code>), arrondi 2. Colonne : <code>ca</code>.", "starter": "SELECT ROUND(SUM(quantity*unit_price),2) AS ca\nFROM de_sales\nWHERE sale_date LIKE '2024-02%';", "solution": "SELECT ROUND(SUM(quantity*unit_price),2) AS ca FROM de_sales WHERE sale_date LIKE '2024-02%';", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [[499.0]]}}}]}, {"formation": "de", "track": "de-pipe", "id": "de9", "title": "dbt (Data Build Tool)", "desc": "Modèles, ref/sources, tests, snapshots (SCD2) et incrémental.", "lessons": [{"id": "de9l1", "title": "dbt : la transformation comme du code", "minutes": 12, "theory": "<p><b>dbt</b> (data build tool) est devenu le standard de la couche <b>Transform</b> de l'ELT. Le principe : chaque transformation est un <b>modèle</b> — un simple fichier <code>SELECT</code> — que dbt matérialise en table ou vue dans l'entrepôt.</p><div class=\"diagram\"><svg viewBox=\"0 0 620 160\" width=\"620\" height=\"160\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"70\" width=\"110\" height=\"40\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"75\" y=\"93.74\" text-anchor=\"middle\" font-size=\"11\" fill=\"#211F2A\" font-weight=\"700\">sources</text><rect x=\"165\" y=\"70\" width=\"120\" height=\"40\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"225\" y=\"86.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">stg_sales</text><text x=\"225\" y=\"100.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">ref()</text><rect x=\"320\" y=\"70\" width=\"130\" height=\"40\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"385\" y=\"86.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">fct_revenu</text><text x=\"385\" y=\"100.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">ref()</text><rect x=\"485\" y=\"70\" width=\"120\" height=\"40\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"545\" y=\"93.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">mart mensuel</text><line x1=\"130\" y1=\"90\" x2=\"165\" y2=\"90\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"285\" y1=\"90\" x2=\"320\" y2=\"90\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"450\" y1=\"90\" x2=\"485\" y2=\"90\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">dbt : des modèles SQL nommés, reliés par ref(), formant un DAG versionné, testé et documenté.</div></div><div class=\"section-label\">Modèles & DAG</div><ul><li>Un <b>modèle</b> = un <code>SELECT</code> ; <code>ref('autre_modele')</code> déclare une dépendance → dbt construit le <b>DAG</b> automatiquement et l'exécute dans le bon ordre.</li><li><b>Sources</b> : on déclare les tables brutes ; <code>source()</code> les référence et permet de tester leur fraîcheur.</li><li><b>Matérialisations</b> : <code>view</code>, <code>table</code>, <code>incremental</code> (ne recalculer que le nouveau), <code>ephemeral</code> (CTE).</li></ul><p>Concrètement, un modèle ressemble à une CTE nommée et réutilisable — exactement le style de transformation qu'on écrit en couche silver/gold.</p><pre><code>-- models/mart_mensuel.sql\nSELECT substr(sale_date,1,7) AS mois,\n       COUNT(*) AS nb_ventes,\n       ROUND(SUM(quantity*unit_price),2) AS ca\nFROM {{ ref('stg_sales') }}\nGROUP BY mois</code></pre><div class=\"note\">dbt apporte l'<b>analytics engineering</b> : Git, revue de code, CI, documentation et lineage générés automatiquement.</div>", "quiz": [{"q": "À quoi sert ref() dans dbt ?", "options": ["À supprimer des doublons", "À déclarer la dépendance entre modèles et construire le DAG automatiquement", "À partitionner", "À chiffrer"], "answer": 1, "explain": "ref('modele') relie les modèles : dbt en déduit l'ordre d'exécution (DAG), les tests, le lineage et les matérialisations."}], "exercise": {"lang": "sql", "prompt": "Écris le modèle <b>mart mensuel</b> : par <code>mois</code> (<code>substr(sale_date,1,7)</code>), le <code>nb_ventes</code> et le <code>ca</code> (somme de <code>quantity*unit_price</code>, arrondi 2), trié par mois.", "starter": "SELECT substr(sale_date,1,7) AS mois,\n       COUNT(*) AS nb_ventes,\n       ROUND(SUM(quantity*unit_price),2) AS ca\nFROM de_sales GROUP BY mois ORDER BY mois;", "solution": "SELECT substr(sale_date,1,7) AS mois, COUNT(*) AS nb_ventes, ROUND(SUM(quantity*unit_price),2) AS ca FROM de_sales GROUP BY mois ORDER BY mois;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["2024-01", 5, 310.0], ["2024-02", 6, 499.0], ["2024-03", 7, 601.0]]}}}, {"id": "de9l2", "title": "dbt avancé : tests, snapshots, incrémental", "minutes": 12, "theory": "<p>dbt ne se limite pas à exécuter du SQL : il <b>fiabilise</b> et <b>documente</b> la transformation.</p><div class=\"diagram\"><svg viewBox=\"0 0 600 140\" width=\"600\" height=\"140\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"28\" width=\"174.667\" height=\"84\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"107.333\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Tests</text><text x=\"107.333\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">unique, not_null</text><text x=\"107.333\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">relationships</text><rect x=\"212.667\" y=\"28\" width=\"174.667\" height=\"84\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"300\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Snapshots</text><text x=\"300\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">SCD type 2</text><text x=\"300\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">automatique</text><rect x=\"405.333\" y=\"28\" width=\"174.667\" height=\"84\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"492.667\" y=\"59.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Docs &amp; lineage</text><text x=\"492.667\" y=\"73.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">doc générée</text><text x=\"492.667\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">graphe de dépendances</text></svg><div class=\"cap\">dbt outille la fiabilité : tests de données, snapshots (SCD2), documentation et lineage générés depuis le code.</div></div><div class=\"section-label\">Tests de données</div><p>On déclare des tests par colonne : <code>unique</code>, <code>not_null</code>, <code>accepted_values</code>, <code>relationships</code> (intégrité référentielle). Ils tournent à chaque build et en CI — on attrape les régressions <b>avant</b> la prod.</p><div class=\"section-label\">Snapshots = SCD type 2 automatique</div><p>Les <b>snapshots</b> dbt matérialisent un <b>SCD type 2</b> à partir d'une source : à chaque exécution, dbt détecte les changements et versionne (valid_from/valid_to). Le pattern d'historisation, sans le coder à la main.</p><div class=\"section-label\">Modèles incrémentaux</div><p>La matérialisation <code>incremental</code> ne recalcule que les <b>lignes nouvelles/modifiées</b> (via un filtre sur un repère) — indispensable sur de gros volumes.</p><p>Côté analytique, dbt sert souvent à produire des marts comme « le produit phare de chaque mois » :</p><pre><code>WITH rev AS (SELECT substr(sale_date,1,7) AS mois, product_id, SUM(quantity*unit_price) AS ca FROM de_sales GROUP BY mois, product_id),\n     ranked AS (SELECT *, ROW_NUMBER() OVER (PARTITION BY mois ORDER BY ca DESC, product_id) AS rn FROM rev)\nSELECT mois, product_id, ca FROM ranked WHERE rn = 1;</code></pre>", "quiz": [{"q": "Que fournit un snapshot dbt ?", "options": ["Une sauvegarde de la base", "Une dimension à évolution lente (SCD type 2) matérialisée automatiquement", "Un index", "Un cache en mémoire"], "answer": 1, "explain": "Les snapshots détectent les changements d'une source et les versionnent (valid_from/valid_to) : un SCD type 2 sans code manuel."}], "exercise": {"lang": "sql", "prompt": "Mart analytique : le <b>produit phare de chaque mois</b> (CA le plus élevé). CA par (mois, produit), numéroté par CA décroissant (départage par <code>product_id</code>), rang 1. Colonnes : <code>mois</code>, <code>produit</code> (nom), <code>ca</code>, triées par mois.", "starter": "WITH rev AS (\n  SELECT substr(sale_date,1,7) AS mois, product_id, SUM(quantity*unit_price) AS ca\n  FROM de_sales GROUP BY mois, product_id\n),\nranked AS (\n  SELECT *, ROW_NUMBER() OVER (PARTITION BY mois ORDER BY ca DESC, product_id) AS rn FROM rev\n)\nSELECT r.mois, p.name AS produit, r.ca\nFROM ranked r JOIN de_products p ON p.product_id=r.product_id\nWHERE r.rn=1 ORDER BY r.mois;", "solution": "WITH rev AS (SELECT substr(sale_date,1,7) AS mois, product_id, SUM(quantity*unit_price) AS ca FROM de_sales GROUP BY mois, product_id), ranked AS (SELECT *, ROW_NUMBER() OVER (PARTITION BY mois ORDER BY ca DESC, product_id) AS rn FROM rev) SELECT r.mois, p.name AS produit, r.ca FROM ranked r JOIN de_products p ON p.product_id=r.product_id WHERE r.rn=1 ORDER BY r.mois;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["2024-01", "Écran", 129.0], ["2024-02", "Écran", 258.0], ["2024-03", "Écran", 258.0]]}}}]}, {"formation": "de", "track": "de-big", "id": "de10", "title": "Apache Spark", "desc": "Traitement distribué, partitions/shuffle, Spark SQL et optimisation.", "lessons": [{"id": "de10l1", "title": "Apache Spark : le traitement distribué", "minutes": 12, "theory": "<p>Quand un jeu de données dépasse une machine, on <b>distribue</b> le calcul. <b>Apache Spark</b> est le moteur de référence : il traite en mémoire, en parallèle, sur un cluster.</p><div class=\"diagram\"><svg viewBox=\"0 0 620 180\" width=\"620\" height=\"180\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"40\" y=\"70\" width=\"120\" height=\"40\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"100\" y=\"86.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Driver</text><text x=\"100\" y=\"100.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">plan + coordination</text><rect x=\"240\" y=\"20\" width=\"150\" height=\"38\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"315\" y=\"35.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Executor 1</text><text x=\"315\" y=\"49.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">partitions A,B</text><rect x=\"240\" y=\"72\" width=\"150\" height=\"38\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"315\" y=\"87.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Executor 2</text><text x=\"315\" y=\"101.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">partitions C,D</text><rect x=\"240\" y=\"124\" width=\"150\" height=\"38\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"315\" y=\"139.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Executor 3</text><text x=\"315\" y=\"153.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">partitions E,F</text><line x1=\"160\" y1=\"80\" x2=\"240\" y2=\"40\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"160\" y1=\"90\" x2=\"240\" y2=\"91\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"160\" y1=\"100\" x2=\"240\" y2=\"142\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"520\" y=\"80\" text-anchor=\"middle\" font-size=\"10\" fill=\"#E5484D\" font-weight=\"700\">shuffle = échange</text><text x=\"520\" y=\"98\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8C8995\">coûteux entre nœuds</text></svg><div class=\"cap\">Spark : le driver planifie, les executors traitent des partitions en parallèle ; le shuffle est le coût clé.</div></div><div class=\"section-label\">Le modèle d'exécution</div><ul><li>La donnée est découpée en <b>partitions</b> ; des <b>executors</b> les traitent en parallèle, coordonnés par le <b>driver</b>.</li><li>API : <b>RDD</b> (bas niveau) puis surtout <b>DataFrame</b> / <b>Spark SQL</b> (optimisé par le moteur Catalyst).</li><li><b>Évaluation paresseuse</b> : Spark accumule les transformations et n'exécute qu'à une <b>action</b> (count, write) — il optimise alors tout le plan.</li></ul><div class=\"section-label\">Narrow, wide & shuffle</div><p>Les transformations <b>narrow</b> (map, filter) restent locales à une partition. Les <b>wide</b> (groupBy, join) exigent un <b>shuffle</b> : un échange de données entre nœuds — l'opération la plus coûteuse, à minimiser. Une clé déséquilibrée crée du <b>data skew</b> (goulot).</p><div class=\"section-label\">Spark ou entrepôt SQL ?</div><p>Beaucoup de transformations autrefois réservées à Spark se font désormais en <b>SQL dans l'entrepôt/lakehouse</b>. On garde Spark pour le très gros volume, le non-structuré et le ML.</p><div class=\"note\">Le bon réflexe vaut partout : partitionner, minimiser le shuffle, surveiller le skew.</div>", "quiz": [{"q": "Qu'est-ce qu'un « shuffle » dans Spark ?", "options": ["Une lecture de fichier négligeable", "Un échange de données entre nœuds (groupBy/join), l'opération la plus coûteuse", "Une compression", "Un chiffrement"], "answer": 1, "explain": "Les transformations « wide » redistribuent les données entre partitions/nœuds ; ce shuffle, coûteux, est le premier levier d'optimisation."}]}, {"id": "de10l2", "title": "Spark SQL & optimisation", "minutes": 12, "theory": "<p>En pratique, on écrit du <b>Spark SQL</b> (ou l'API DataFrame, équivalente). Le moteur <b>Catalyst</b> optimise la requête ; le travail de l'ingénieur est de <b>réduire les shuffles</b> et le volume traité.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 150\" width=\"560\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"105\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Spark SQL</text><text x=\"105\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">DataFrame API</text><rect x=\"210\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"285\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Catalyst</text><text x=\"285\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">optimise le plan</text><rect x=\"390\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"465\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">broadcast join</text><text x=\"465\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">évite le shuffle</text><line x1=\"180\" y1=\"75\" x2=\"210\" y2=\"75\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"360\" y1=\"75\" x2=\"390\" y2=\"75\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">Spark SQL exprime les transformations en SQL/DataFrame ; on optimise en limitant les shuffles (broadcast, partitionnement).</div></div><div class=\"section-label\">Leviers d'optimisation</div><ul><li><b>Broadcast join</b> : diffuser une petite table à tous les nœuds pour éviter un shuffle lors d'une jointure.</li><li><b>Partitionnement</b> adapté : ni trop peu (pas de parallélisme), ni trop (surcoût).</li><li><b>Filtrer & projeter tôt</b> : moins de données à brasser (predicate/column pruning).</li><li><b>Cache</b> : matérialiser en mémoire un résultat réutilisé plusieurs fois.</li><li><b>Gérer le skew</b> : repartitionner ou « salter » une clé trop concentrée.</li></ul><p>Spark SQL supporte les <b>fonctions de fenêtrage</b> : on peut, par exemple, calculer la part de chaque catégorie dans le CA total avec un <code>SUM(...) OVER ()</code>.</p><pre><code>SELECT category,\n       SUM(rev) AS ca,\n       ROUND(100.0*SUM(rev)/SUM(SUM(rev)) OVER (),1) AS pct\nFROM (...) GROUP BY category;</code></pre><div class=\"note\">Spark SQL et le SQL d'entrepôt partagent la même logique analytique (CTE, fenêtrage) : les compétences se transfèrent.</div>", "quiz": [{"q": "À quoi sert un broadcast join dans Spark ?", "options": ["À chiffrer la jointure", "À diffuser une petite table sur tous les nœuds pour éviter un shuffle coûteux", "À trier le résultat", "À supprimer les doublons"], "answer": 1, "explain": "Si une table est petite, on la diffuse (broadcast) à chaque nœud : la jointure se fait localement, sans redistribuer la grande table."}], "exercise": {"lang": "sql", "prompt": "Comme en Spark SQL avec fenêtrage : calcule la <b>part de chaque catégorie dans le CA total</b>. Colonnes : <code>category</code>, <code>ca</code> (somme de <code>quantity*unit_price</code>), <code>pct</code> (part en %, arrondie 1), triées par <code>ca</code> décroissant.", "starter": "SELECT p.category,\n       SUM(s.quantity*s.unit_price) AS ca,\n       ROUND(100.0*SUM(s.quantity*s.unit_price)/SUM(SUM(s.quantity*s.unit_price)) OVER (),1) AS pct\nFROM de_sales s JOIN de_products p ON p.product_id=s.product_id\nGROUP BY p.category ORDER BY ca DESC;", "solution": "SELECT p.category, SUM(s.quantity*s.unit_price) AS ca, ROUND(100.0*SUM(s.quantity*s.unit_price)/SUM(SUM(s.quantity*s.unit_price)) OVER (),1) AS pct FROM de_sales s JOIN de_products p ON p.product_id=s.product_id GROUP BY p.category ORDER BY ca DESC;", "dataset": "de_sales(sale_id, sale_date, customer_id, product_id, quantity, unit_price)\nde_customers(customer_id, name, country)\nde_products(product_id, name, category, unit_cost)", "datasetTitle": "Tables disponibles", "expected": {"values": [["Écrans", 645.0, 45.7], ["Accessoires", 449.0, 31.8], ["Audio", 316.0, 22.4]]}}}]}, {"formation": "de", "track": "de-big", "id": "de11", "title": "Apache Kafka", "desc": "Topics/partitions/offsets, livraison, fenêtrage, Connect/Streams.", "lessons": [{"id": "de11l1", "title": "Apache Kafka : le bus de streaming", "minutes": 12, "theory": "<p><b>Apache Kafka</b> est la plateforme de référence pour les données en <b>flux</b> : un <b>journal de messages</b> distribué, durable et performant, qui découple producteurs et consommateurs.</p><div class=\"diagram\"><svg viewBox=\"0 0 620 170\" width=\"620\" height=\"170\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"60\" width=\"120\" height=\"44\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"90\" y=\"78.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Producteurs</text><text x=\"90\" y=\"92.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">écrivent</text><rect x=\"210\" y=\"30\" width=\"200\" height=\"28\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"310\" y=\"47.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Topic — partition 0  ▸▸▸</text><rect x=\"210\" y=\"72\" width=\"200\" height=\"28\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"310\" y=\"89.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Topic — partition 1  ▸▸▸</text><rect x=\"210\" y=\"114\" width=\"200\" height=\"28\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"310\" y=\"131.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Topic — partition 2  ▸▸▸</text><rect x=\"460\" y=\"60\" width=\"130\" height=\"44\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"525\" y=\"78.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Consommateurs</text><text x=\"525\" y=\"92.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">lisent (offset)</text><line x1=\"150\" y1=\"82\" x2=\"210\" y2=\"44\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"150\" y1=\"82\" x2=\"210\" y2=\"86\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"150\" y1=\"82\" x2=\"210\" y2=\"128\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"410\" y1=\"44\" x2=\"460\" y2=\"78\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"410\" y1=\"128\" x2=\"460\" y2=\"86\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">Kafka : un journal de messages partitionné et ordonné ; les consommateurs suivent leur position (offset).</div></div><div class=\"section-label\">Le modèle</div><ul><li>Un <b>topic</b> est divisé en <b>partitions</b> ; chaque message reçoit un <b>offset</b> (sa position). L'ordre est garanti <i>au sein</i> d'une partition.</li><li>Les <b>producteurs</b> écrivent, les <b>consommateurs</b> lisent à leur rythme en mémorisant leur offset ; les messages sont <b>conservés</b> (rejouables) selon une politique de rétention.</li><li>Le <b>partitionnement</b> par clé garantit que les messages d'une même entité vont dans la même partition (ordre préservé).</li></ul><div class=\"section-label\">Garanties de livraison</div><table><tr><th>Garantie</th><th>Conséquence</th></tr><tr><td>at-most-once</td><td>perte possible, pas de doublon</td></tr><tr><td>at-least-once</td><td>pas de perte, doublons possibles → idempotence requise</td></tr><tr><td>exactly-once</td><td>ni perte ni doublon, mais plus coûteux</td></tr></table><div class=\"section-label\">L'écosystème</div><p><b>Kafka Connect</b> (connecteurs source/sink sans code), <b>Kafka Streams</b> / <b>ksqlDB</b> (traitement de flux), et les intégrations CDC (Debezium publie les changements de base dans Kafka).</p><div class=\"note\">Kafka est le « système nerveux » des architectures temps réel : ingestion d'événements, découplage des services, alimentation des pipelines streaming.</div>", "quiz": [{"q": "Dans Kafka, qu'est-ce que l'offset ?", "options": ["La taille d'un message", "La position d'un message dans une partition, suivie par le consommateur", "Le nombre de topics", "Une clé de chiffrement"], "answer": 1, "explain": "Chaque message a un offset dans sa partition ; le consommateur mémorise sa position et peut donc rejouer depuis un point donné."}]}, {"id": "de11l2", "title": "Streaming : sémantique du temps & fenêtrage", "minutes": 13, "theory": "<p>Traiter un flux impose de raisonner sur le <b>temps</b>. Distinction cruciale : l'<b>event time</b> (quand l'événement s'est produit) diffère du <b>processing time</b> (quand on le traite), à cause des retards réseau.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 150\" width=\"560\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"105\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Event time</text><text x=\"105\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">quand c'est arrivé</text><rect x=\"210\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"285\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Watermark</text><text x=\"285\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">limite d'attente</text><rect x=\"390\" y=\"50\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"465\" y=\"71.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Fenêtre</text><text x=\"465\" y=\"85.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">tumbling / sliding</text><line x1=\"180\" y1=\"75\" x2=\"210\" y2=\"75\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"360\" y1=\"75\" x2=\"390\" y2=\"75\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">Sémantique du temps : on agrège par event time, avec des watermarks pour fermer des fenêtres malgré les retards.</div></div><div class=\"section-label\">Watermarks & fenêtres</div><ul><li>Un <b>watermark</b> dit « on n'attend plus les événements en retard au-delà de X » → on peut fermer une fenêtre et émettre le résultat.</li><li><b>Tumbling</b> : fenêtres fixes et contiguës (chaque heure). <b>Sliding</b> : fenêtres glissantes qui se chevauchent. <b>Session</b> : regroupées par inactivité.</li></ul><div class=\"section-label\">L'équivalent SQL</div><p>Une agrégation fenêtrée par jour (tumbling) revient à regrouper par tranche de temps. En tenant compte des <b>doublons</b> (livraison at-least-once), on compte les événements <b>distincts</b>.</p><pre><code>SELECT substr(ts,1,10) AS jour, COUNT(DISTINCT event_id) AS evenements\nFROM de_events GROUP BY jour ORDER BY jour;</code></pre><div class=\"note\">Le streaming coûte plus cher à opérer (état, exactly-once, supervision) : on ne l'adopte que si la fraîcheur à la seconde a une vraie valeur métier.</div>", "quiz": [{"q": "Pourquoi distinguer event time et processing time ?", "options": ["Ce sont des synonymes", "Les événements arrivent souvent en retard : on agrège en event time avec des watermarks", "Pour chiffrer", "Pour compresser"], "answer": 1, "explain": "Les retards font diverger l'heure de l'événement et celle du traitement ; les watermarks bornent l'attente des retardataires pour fermer les fenêtres."}], "exercise": {"lang": "sql", "prompt": "<b>Fenêtre journalière (tumbling)</b> : compte les <b>événements distincts</b> (<code>event_id</code>) <b>par jour</b> (<code>substr(ts,1,10)</code>). Colonnes : <code>jour</code>, <code>evenements</code>, triées par jour.", "starter": "SELECT substr(ts,1,10) AS jour, COUNT(DISTINCT event_id) AS evenements\nFROM de_events GROUP BY jour ORDER BY jour;", "solution": "SELECT substr(ts,1,10) AS jour, COUNT(DISTINCT event_id) AS evenements FROM de_events GROUP BY jour ORDER BY jour;", "dataset": "de_events(event_id, user_id, event_type, ts)", "datasetTitle": "Tables disponibles", "expected": {"values": [["2024-03-01", 3], ["2024-03-02", 2], ["2024-03-03", 1]]}}}, {"id": "de11l3", "title": "Kafka en production : Connect, Streams & schemas", "minutes": 13, "theory": "<p>Kafka seul transporte des messages ; l'<b>écosystème</b> autour en fait une plateforme de données complète : ingérer sans code, transformer les flux, et garantir des schémas stables.</p><div class=\"diagram\"><svg viewBox=\"0 0 760 150\" width=\"760\" height=\"150\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"14\" y=\"58\" width=\"166.5\" height=\"52\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"97.25\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">Sources</text><text x=\"97.25\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"600\">DB, apps</text><line x1=\"180.5\" y1=\"84\" x2=\"202.5\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"202.5\" y=\"58\" width=\"166.5\" height=\"52\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"285.75\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">Connect (source)</text><text x=\"285.75\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">Debezium/CDC</text><line x1=\"369\" y1=\"84\" x2=\"391\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"391\" y=\"58\" width=\"166.5\" height=\"52\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"474.25\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">Streams/ksqlDB</text><text x=\"474.25\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">filtrer, agréger</text><line x1=\"557.5\" y1=\"84\" x2=\"579.5\" y2=\"84\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"579.5\" y=\"58\" width=\"166.5\" height=\"52\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"662.75\" y=\"80.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">Connect (sink)</text><text x=\"662.75\" y=\"94.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">→ entrepôt/lac</text></svg><div class=\"cap\">L'écosystème Kafka : Connect ingère et déverse sans code, Streams/ksqlDB transforment les flux, le tout typé par un schema registry.</div></div><div class=\"section-label\">Kafka Connect — ingérer & déverser</div><p><b>Kafka Connect</b> fournit des connecteurs <b>source</b> et <b>sink</b> prêts à l'emploi, sans écrire de code. Cas emblématique : <b>Debezium</b> (CDC) lit le journal d'une base et publie chaque <i>insert/update/delete</i> dans un topic ; un connecteur sink déverse ensuite vers l'entrepôt ou le lac. C'est la colonne vertébrale de l'ingestion temps réel.</p><div class=\"section-label\">Kafka Streams & ksqlDB — transformer</div><p>Pour traiter les flux en continu, <b>Kafka Streams</b> (bibliothèque) et <b>ksqlDB</b> (SQL sur flux) introduisent deux abstractions clés :</p><ul><li><b>KStream</b> : un flux d'événements (chaque message compte) — idéal pour filtrer/router.</li><li><b>KTable</b> : un <b>état agrégé par clé</b> (la dernière valeur par clé) — le résultat d'une agrégation continue, comme un « tableau de bord vivant ».</li><li><b>Jointures stream-table</b> : enrichir un flux d'événements avec une table de référence.</li></ul><div class=\"section-label\">Schema Registry — des contrats à l'échelle</div><p>Le <b>Schema Registry</b> enregistre les schémas (Avro, Protobuf) des messages et vérifie leur <b>compatibilité</b> (backward/forward) à chaque évolution. C'est le <b>contrat de données</b> appliqué au streaming : un producteur ne peut pas casser silencieusement ses consommateurs.</p><div class=\"section-label\">Exactly-once</div><p>Grâce au <b>producteur idempotent</b> et aux <b>transactions</b>, Kafka offre une sémantique <b>exactly-once</b> de bout en bout (lire-traiter-écrire) — ni perte ni doublon, au prix d'un surcoût qu'on n'active que si nécessaire.</p><div class=\"note\">L'exercice matérialise un <b>KTable</b> : agréger le flux par clé (ici, le nombre d'événements distincts par type).</div>", "quiz": [{"q": "À quoi sert principalement Kafka Connect ?", "options": ["À chiffrer les topics", "À fournir des connecteurs source/sink sans code (ex. CDC Debezium → topics, puis sink vers l'entrepôt)", "À supprimer les partitions", "À remplacer le SQL"], "answer": 1, "explain": "Kafka Connect industrialise l'entrée et la sortie des données (connecteurs prêts à l'emploi), dont le CDC via Debezium — sans développer de code d'intégration."}], "exercise": {"lang": "sql", "prompt": "Matérialise un <b>KTable</b> : le nombre d'<b>événements distincts</b> (<code>event_id</code>) <b>par type</b> (<code>event_type</code>). Colonnes : <code>event_type</code>, <code>nb</code>, triées par <code>nb</code> décroissant puis <code>event_type</code>.", "starter": "SELECT event_type, COUNT(DISTINCT event_id) AS nb\nFROM de_events\nGROUP BY event_type\nORDER BY nb DESC, event_type;", "solution": "SELECT event_type, COUNT(DISTINCT event_id) AS nb FROM de_events GROUP BY event_type ORDER BY nb DESC, event_type;", "dataset": "de_events(event_id, user_id, event_type, ts)", "datasetTitle": "Tables disponibles", "expected": {"values": [["view", 4], ["click", 1], ["purchase", 1]]}}}]}, {"formation": "de", "track": "de-big", "id": "de12", "title": "Apache Hadoop", "desc": "HDFS, MapReduce, YARN, Hive et l'héritage Big Data.", "lessons": [{"id": "de12l1", "title": "Apache Hadoop : HDFS & MapReduce", "minutes": 11, "theory": "<p><b>Apache Hadoop</b> a posé les bases du Big Data : stocker et traiter d'énormes volumes sur des <b>grappes de machines ordinaires</b>. Même si le cloud et Spark l'ont largement remplacé, ses concepts restent fondateurs.</p><div class=\"diagram\"><svg viewBox=\"0 0 600 160\" width=\"600\" height=\"160\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"55\" width=\"170\" height=\"50\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"115\" y=\"69.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"700\">HDFS</text><text x=\"115\" y=\"83.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">stockage distribué</text><text x=\"115\" y=\"97.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#3A2DB0\" font-weight=\"600\">réplication x3</text><rect x=\"230\" y=\"55\" width=\"170\" height=\"50\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"315\" y=\"76.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"700\">MapReduce</text><text x=\"315\" y=\"90.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8A6A1E\" font-weight=\"600\">Map → Shuffle → Reduce</text><rect x=\"430\" y=\"55\" width=\"150\" height=\"50\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"505\" y=\"76.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"700\">YARN</text><text x=\"505\" y=\"90.4\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0A7355\" font-weight=\"600\">gestion ressources</text><line x1=\"200\" y1=\"80\" x2=\"230\" y2=\"80\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"400\" y1=\"80\" x2=\"430\" y2=\"80\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">L'écosystème Hadoop : HDFS (stockage distr
