<script>
/* pj1 — Projet d'audit du catalogue (niveau professionnel + bac à sable). */
(function(){
  if (typeof CURRICULUM === 'undefined' || !CURRICULUM.modules) return;
  if (CURRICULUM.sqlSeed && CURRICULUM.sqlSeed.indexOf('CREATE TABLE catalogue') === -1) CURRICULUM.sqlSeed += "\nCREATE TABLE catalogue (sku TEXT, nom TEXT, categorie TEXT, prix REAL, stock INTEGER, actif INTEGER);\nINSERT INTO catalogue VALUES\n ('P001','Pomme Gala','Fruits',0.50,120,1),\n ('P002','Banane','Fruits',0.30,0,1),\n ('P003','Carotte','Légumes',0.40,80,1),\n ('P004','Carotte','Legumes',0.42,30,1),\n ('P005','Pain de campagne','Boulangerie',1.20,15,1),\n ('P006','Lait demi-écrémé','Crèmerie',0.95,40,1),\n ('P007','Yaourt nature','Crèmerie',NULL,30,1),\n ('P008','Croissant','Boulangerie',1.10,25,1),\n ('P009',NULL,'Épicerie',2.50,12,1),\n ('P010','Sel fin',NULL,0.80,60,1),\n ('P011','Filet mignon','Boucherie',-8.00,10,1),\n ('P012','Eau plate','Boissons',0.00,200,1),\n ('P013','Truffe noire','Épicerie',9999.00,1,1),\n ('P014','Chocolat noir','Épicerie',2.10,-5,1),\n ('P011','Steak haché','Boucherie',6.50,20,1),\n ('P015','Camembert','Crèmerie',3.20,18,2),\n ('P016','Jus orange','Boissons',1.90,0,0),\n ('P017','Baguette','Boulangerie',0.90,35,1);\n";
  var ENR = {"pj1l1": {"minutes": 12, "sandbox": {"starter": "-- Profil express du catalogue : on cherche le \"normal\" avant de juger l'anormal\nSELECT\n  COUNT(*)                  AS lignes,\n  COUNT(prix)               AS prix_renseignes,\n  COUNT(DISTINCT sku)       AS sku_distincts,\n  COUNT(DISTINCT categorie) AS categories,\n  MIN(prix) AS prix_min, MAX(prix) AS prix_max,\n  ROUND(AVG(prix),2)        AS prix_moyen\nFROM catalogue;"}, "theory": "<p><b>Le contexte.</b> Un distributeur s'apprête à mettre son catalogue en ligne. Avant la migration, on vous confie une mission claire : <b>auditer la qualité du catalogue produits</b> et produire un rapport sur lequel la direction décidera de publier — ou de corriger d'abord. C'est un livrable professionnel, pas un brouillon.</p><div class=\"diagram\"><svg viewBox=\"0 0 760 125\" width=\"760\" height=\"125\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"14\" y=\"55\" width=\"130\" height=\"48\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"79\" y=\"83.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">1. Brief</text><line x1=\"144\" y1=\"79\" x2=\"162\" y2=\"79\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"162\" y=\"55\" width=\"130\" height=\"48\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"227\" y=\"83.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0A7355\" font-weight=\"700\">2. Profiling</text><line x1=\"292\" y1=\"79\" x2=\"310\" y2=\"79\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"310\" y=\"55\" width=\"130\" height=\"48\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"375\" y=\"83.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#B23E22\" font-weight=\"700\">3. Détection</text><line x1=\"440\" y1=\"79\" x2=\"458\" y2=\"79\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"458\" y=\"55\" width=\"130\" height=\"48\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"523\" y=\"83.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#8A6A1E\" font-weight=\"700\">4. Analyse</text><line x1=\"588\" y1=\"79\" x2=\"606\" y2=\"79\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"606\" y=\"55\" width=\"130\" height=\"48\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"671\" y=\"83.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">5. Rapport</text></svg><div class=\"cap\">La démarche d'audit du projet, de bout en bout : brief → profiling → détection → analyse → rapport.</div></div><div class=\"section-label\">Cadrage du projet</div><ul><li><b>Mission</b> : évaluer la fiabilité du catalogue et chiffrer son état.</li><li><b>Parties prenantes</b> : l'équipe e-commerce (consommatrice), l'équipe data (productrice), la direction (décideuse).</li><li><b>Livrable attendu</b> : un <i>rapport de qualité</i> (constats par dimension + score + recommandations) et un <i>registre d'anomalies</i> reproductible.</li><li><b>Critère de succès</b> : chaque constat est mesuré, justifié et accompagné d'une action.</li></ul><div class=\"section-label\">Le jeu de données</div><p>La table à auditer est <code>catalogue</code>. Documenter le schéma et les <b>règles attendues</b> (le « contrat implicite ») est la première brique professionnelle : on ne peut juger que par rapport à une attente explicite.</p><table><tr><th>Colonne</th><th>Type</th><th>Règle attendue</th></tr><tr><td><code>sku</code></td><td>texte</td><td>identifiant <b>unique</b>, non nul</td></tr><tr><td><code>nom</code></td><td>texte</td><td>non nul</td></tr><tr><td><code>categorie</code></td><td>texte</td><td>non nul, issue d'un <b>référentiel</b> normalisé</td></tr><tr><td><code>prix</code></td><td>réel</td><td>non nul, <b>&gt; 0</b>, dans une plage plausible</td></tr><tr><td><code>stock</code></td><td>entier</td><td><b>≥ 0</b></td></tr><tr><td><code>actif</code></td><td>entier</td><td>∈ {0, 1}</td></tr></table><div class=\"section-label\">Pourquoi commencer par le profiling</div><p>Réflexe d'expert : <b>profiler avant de tester</b>. On ne peut pas définir l'anormal sans connaître le normal. Le profil (volume, complétude, cardinalité, étendue des prix) transforme une intuition (« c'est sale ») en chiffres défendables — et ses valeurs deviendront ensuite les <b>seuils</b> de nos contrôles.</p><pre><code>SELECT\n  COUNT(*)                  AS lignes,\n  COUNT(prix)               AS prix_renseignes,   -- COUNT ignore les NULL\n  COUNT(DISTINCT sku)       AS sku_distincts,     -- &lt; lignes =&gt; doublons de SKU\n  COUNT(DISTINCT categorie) AS categories,\n  MIN(prix) AS prix_min, MAX(prix) AS prix_max,    -- révèle négatifs / outliers\n  ROUND(AVG(prix),2)        AS prix_moyen\nFROM catalogue;</code></pre><div class=\"note\">Lis le profil comme un médecin lit un bilan : <code>sku_distincts &lt; lignes</code> ⇒ doublons ; un <code>prix_min</code> négatif ⇒ valeurs invalides ; un <code>prix_max</code> à 9999 ⇒ outlier. <b>Exécute la requête dans le bac à sable</b> et note ce qui t'alerte.</div>", "quiz": [{"q": "Pourquoi profiler la table AVANT d'écrire le moindre test de qualité ?", "options": ["Pour gagner du temps en évitant les tests", "Parce qu'on ne peut pas définir l'anormal sans connaître le normal (le profil fixe les seuils)", "Parce que le profiling corrige automatiquement les erreurs", "Parce que c'est plus rapide que d'écrire des tests"], "answer": 1, "explain": "Le profiling établit la référence (volume, plages, cardinalité) qui rend les anomalies mesurables et fournit les seuils des contrôles à venir."}]}, "pj1l2": {"minutes": 15, "sandbox": {"starter": "-- Détection multi-règles : on remonte TOUTES les lignes fautives et leur motif\nSELECT sku, nom, categorie, prix, stock, actif,\n  CASE\n    WHEN nom IS NULL THEN 'nom manquant'\n    WHEN categorie IS NULL THEN 'catégorie manquante'\n    WHEN prix IS NULL THEN 'prix manquant'\n    WHEN prix <= 0 THEN 'prix non positif'\n    WHEN prix > 1000 THEN 'prix aberrant (outlier)'\n    WHEN stock < 0 THEN 'stock négatif'\n    WHEN actif NOT IN (0,1) THEN 'actif hors {0,1}'\n  END AS anomalie\nFROM catalogue\nWHERE nom IS NULL OR categorie IS NULL OR prix IS NULL\n   OR prix <= 0 OR prix > 1000 OR stock < 0 OR actif NOT IN (0,1);"}, "theory": "<p>On passe à la <b>détection systématique</b>, dimension par dimension. La méthode professionnelle : pour chaque règle attendue, écrire une requête qui <b>remonte exactement les lignes en infraction</b> (zéro ligne = conforme), puis consigner le résultat dans un <b>registre d'anomalies</b>.</p><div class=\"diagram\"><svg viewBox=\"0 0 520 250\" width=\"520\" height=\"250\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"30\" width=\"180\" height=\"42\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"110\" y=\"55.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0A7355\" font-weight=\"700\">Complétude</text><line x1=\"200\" y1=\"51\" x2=\"250\" y2=\"120\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"20\" y=\"82\" width=\"180\" height=\"42\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"110\" y=\"107.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#B23E22\" font-weight=\"700\">Validité</text><line x1=\"200\" y1=\"103\" x2=\"250\" y2=\"120\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"20\" y=\"134\" width=\"180\" height=\"42\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"110\" y=\"159.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#8A6A1E\" font-weight=\"700\">Unicité</text><line x1=\"200\" y1=\"155\" x2=\"250\" y2=\"120\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"20\" y=\"186\" width=\"180\" height=\"42\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"110\" y=\"211.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">Plages / outliers</text><line x1=\"200\" y1=\"207\" x2=\"250\" y2=\"120\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"250\" y=\"92\" width=\"230\" height=\"60\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#56535F\" stroke-width=\"1.6\"/><text x=\"365\" y=\"118.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#211F2A\" font-weight=\"700\">Registre d'anomalies</text><text x=\"365\" y=\"133.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#211F2A\" font-weight=\"600\">(dimension · règle · lignes · sévérité)</text></svg><div class=\"cap\">On balaie chaque dimension de qualité, et chaque infraction alimente un registre d'anomalies horodaté et priorisé.</div></div><div class=\"section-label\">1 · Complétude — valeurs manquantes</div><pre><code>SELECT sku, nom, categorie, prix\nFROM catalogue\nWHERE nom IS NULL OR categorie IS NULL OR prix IS NULL;</code></pre><p>On rappelle le piège des <b>faux-vides</b> : un <code>''</code> ou un <code>'N/A'</code> passerait à travers un simple <code>IS NULL</code>. Sur ce catalogue, les manquants sont de vrais NULL — mais en production, on étend toujours la règle.</p><div class=\"section-label\">2 · Validité — règles de domaine</div><pre><code>-- Prix non positif, stock négatif, drapeau actif hors référentiel\nSELECT sku, nom, prix, stock, actif\nFROM catalogue\nWHERE prix &lt;= 0 OR stock &lt; 0 OR actif NOT IN (0,1);</code></pre><p>La <b>cohérence des libellés</b> est une validité souvent oubliée : <code>'Légumes'</code> et <code>'Legumes'</code> (sans accent) sont deux catégories <i>différentes</i> pour la machine. On les débusque en normalisant avant de comparer.</p><pre><code>SELECT LOWER(categorie) AS cat_norm, COUNT(DISTINCT categorie) AS variantes\nFROM catalogue WHERE categorie IS NOT NULL\nGROUP BY LOWER(categorie) HAVING COUNT(DISTINCT categorie) &gt; 1;</code></pre><div class=\"section-label\">3 · Unicité — doublons de clé</div><pre><code>-- Le sku doit être unique : on remonte les sku présents plusieurs fois\nSELECT sku, COUNT(*) AS occurrences\nFROM catalogue\nGROUP BY sku HAVING COUNT(*) &gt; 1;</code></pre><div class=\"section-label\">4 · Plages & valeurs aberrantes</div><pre><code>-- Outliers de prix : trier aux extrêmes fait surgir l'aberration\nSELECT sku, nom, prix FROM catalogue ORDER BY prix DESC LIMIT 3;</code></pre><div class=\"section-label\">Le registre d'anomalies</div><p>Chaque constat se consigne de façon <b>reproductible et priorisée</b>. La sévérité guide l'action (bloquant vs à surveiller).</p><table><tr><th>Dimension</th><th>Règle</th><th>Constat (dataset)</th><th>Sévérité</th></tr><tr><td>Unicité</td><td>sku unique</td><td>SKU <code>P011</code> en double</td><td>Critique</td></tr><tr><td>Validité</td><td>prix &gt; 0</td><td>prix négatif / nul</td><td>Critique</td></tr><tr><td>Complétude</td><td>nom, catégorie, prix non nuls</td><td>3 lignes incomplètes</td><td>Majeure</td></tr><tr><td>Validité</td><td>stock ≥ 0 ; actif ∈ {0,1}</td><td>stock négatif ; actif = 2</td><td>Majeure</td></tr><tr><td>Cohérence</td><td>catégorie normalisée</td><td>« Légumes » vs « Legumes »</td><td>Mineure</td></tr><tr><td>Plages</td><td>prix plausible</td><td>prix à 9999 (outlier)</td><td>À vérifier</td></tr></table><div class=\"callout\">Méthode d'expert : <b>une règle = une requête qui ne doit rien renvoyer</b>. C'est exactement le motif qu'industrialisent dbt, Great Expectations ou Soda. Ton registre d'aujourd'hui est le brouillon de ta suite de tests automatisés de demain.</div>", "quiz": [{"q": "Dans le catalogue, « Légumes » et « Legumes » (sans accent) coexistent. De quel défaut s'agit-il ?", "options": ["Un doublon de clé primaire", "Un défaut de cohérence/validité : la catégorie n'est pas normalisée selon un référentiel", "Une valeur manquante", "Un problème de fraîcheur"], "answer": 1, "explain": "Deux libellés distincts pour une même catégorie cassent les regroupements. C'est un défaut de validité/cohérence : la valeur n'est pas conforme à un référentiel normalisé."}]}, "pj1l3": {"minutes": 12, "sandbox": {"starter": "-- Le catalogue par catégorie : volume, prix moyen, ruptures de stock\n-- (observe l'effet du libellé 'Legumes' non normalisé sur le comptage)\nSELECT categorie,\n       COUNT(*)                                 AS nb_produits,\n       ROUND(AVG(prix),2)                        AS prix_moyen,\n       SUM(CASE WHEN stock = 0 THEN 1 ELSE 0 END) AS ruptures\nFROM catalogue\nGROUP BY categorie\nORDER BY nb_produits DESC;"}, "theory": "<p>Au-delà des anomalies, un audit professionnel <b>analyse</b> le catalogue : sa structure, ses prix, ses ruptures. L'objectif est double : éclairer la décision métier <i>et</i> faire ressortir des incohérences que la détection ligne-à-ligne ne voit pas.</p><div class=\"section-label\">Répartition et prix par catégorie</div><pre><code>SELECT categorie,\n       COUNT(*)                                 AS nb_produits,\n       ROUND(AVG(prix),2)                        AS prix_moyen,\n       SUM(CASE WHEN stock = 0 THEN 1 ELSE 0 END) AS ruptures\nFROM catalogue\nGROUP BY categorie\nORDER BY nb_produits DESC;</code></pre><div class=\"diagram\"><svg viewBox=\"0 0 660 205\" width=\"660\" height=\"205\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"40\" y=\"48\" width=\"58\" height=\"102\" rx=\"4\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.4\"/><text x=\"69\" y=\"165\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#56535F\">Boulang</text><text x=\"69\" y=\"42\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">3</text><rect x=\"112\" y=\"48\" width=\"58\" height=\"102\" rx=\"4\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.4\"/><text x=\"141\" y=\"165\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#56535F\">Crèmeri</text><text x=\"141\" y=\"42\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">3</text><rect x=\"184\" y=\"48\" width=\"58\" height=\"102\" rx=\"4\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.4\"/><text x=\"213\" y=\"165\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#56535F\">Épiceri</text><text x=\"213\" y=\"42\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">3</text><rect x=\"256\" y=\"82\" width=\"58\" height=\"68\" rx=\"4\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.4\"/><text x=\"285\" y=\"165\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#56535F\">Fruits</text><text x=\"285\" y=\"76\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">2</text><rect x=\"328\" y=\"82\" width=\"58\" height=\"68\" rx=\"4\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.4\"/><text x=\"357\" y=\"165\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#56535F\">Boisson</text><text x=\"357\" y=\"76\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">2</text><rect x=\"400\" y=\"116\" width=\"58\" height=\"34\" rx=\"4\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.4\"/><text x=\"429\" y=\"165\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#56535F\">Légumes</text><text x=\"429\" y=\"110\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">1</text><rect x=\"472\" y=\"116\" width=\"58\" height=\"34\" rx=\"4\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.4\"/><text x=\"501\" y=\"165\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#56535F\">Legumes</text><text x=\"501\" y=\"110\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">1</text><rect x=\"544\" y=\"82\" width=\"58\" height=\"68\" rx=\"4\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.4\"/><text x=\"573\" y=\"165\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#56535F\">Boucher</text><text x=\"573\" y=\"76\" text-anchor=\"middle\" font-size=\"10\" fill=\"#211F2A\" font-weight=\"700\">2</text><line x1=\"30\" y1=\"150\" x2=\"620\" y2=\"150\" stroke=\"#56535F\" stroke-width=\"1.6\"/><text x=\"330\" y=\"185\" text-anchor=\"middle\" font-size=\"10\" fill=\"#E5484D\" font-weight=\"700\">⚠ « Legumes » (sans accent) crée une fausse catégorie : la donnée propre serait fusionnée avec « Légumes »</text></svg><div class=\"cap\">La répartition par catégorie — et l'effet d'un libellé non normalisé qui scinde artificiellement une catégorie.</div></div><div class=\"section-label\">L'impact d'un défaut sur l'analyse</div><p>Point crucial et souvent sous-estimé : <b>une donnée sale fausse l'analyse, pas seulement les tests</b>. Le libellé <code>'Legumes'</code> non accentué crée une catégorie fantôme : un <code>GROUP BY categorie</code> compte « Légumes » et « Legumes » séparément. Une décision basée sur ce comptage serait erronée. C'est l'illustration concrète du principe : <i>garbage in, garbage out</i>.</p><div class=\"section-label\">Indicateurs métier utiles</div><ul><li><b>Taux de complétude du prix</b> : un produit sans prix ne peut pas être vendu en ligne.</li><li><b>Ruptures de stock</b> (<code>stock = 0</code>) parmi les produits <b>actifs</b> : incohérence « en vente mais indisponible ».</li><li><b>Dispersion des prix par catégorie</b> : min/max révèlent les outliers à expertiser.</li></ul><pre><code>-- Incohérence métier : actif mais en rupture\nSELECT sku, nom, stock, actif\nFROM catalogue\nWHERE actif = 1 AND stock = 0;</code></pre><div class=\"note\">Choisis tes indicateurs en fonction de la <b>décision</b> à éclairer. Ici, la mise en ligne : on priorise complétude du prix, validité, et disponibilité réelle. Un autre usage (reporting financier) appellerait d'autres métriques.</div>", "quiz": [{"q": "Quel est l'effet du libellé non normalisé « Legumes » sur un GROUP BY categorie ?", "options": ["Aucun, SQL ignore les accents", "Il scinde artificiellement une catégorie en deux, faussant les comptages et l'analyse", "Il supprime la ligne concernée", "Il déclenche une erreur SQL"], "answer": 1, "explain": "« Légumes » et « Legumes » étant distincts, le regroupement les compte séparément : l'analyse est faussée. Une donnée sale dégrade les décisions, pas seulement les tests."}]}, "pj1l4": {"minutes": 13, "sandbox": {"starter": "-- Score de qualité : taux de lignes conformes (sans anomalie ligne-à-ligne)\nWITH defauts AS (\n  SELECT sku,\n    (nom IS NULL OR categorie IS NULL OR prix IS NULL\n     OR prix <= 0 OR prix > 1000 OR stock < 0 OR actif NOT IN (0,1)) AS ko\n  FROM catalogue\n)\nSELECT\n  COUNT(*)                                          AS total,\n  SUM(CASE WHEN ko THEN 0 ELSE 1 END)               AS conformes,\n  ROUND(100.0*SUM(CASE WHEN ko THEN 0 ELSE 1 END)/COUNT(*),1) AS taux_conformite_pct\nFROM defauts;"}, "theory": "<p>Un audit ne vaut que par son <b>livrable</b>. On consolide tout dans un rapport de qualité clair, chiffré et actionnable — le document sur lequel la direction décidera.</p><div class=\"diagram\"><svg viewBox=\"0 0 660 240\" width=\"660\" height=\"240\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"150\" y=\"16\" width=\"360\" height=\"210\" rx=\"14\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"330\" y=\"125.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\"></text><text x=\"330\" y=\"42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">Rapport d'audit qualité — structure</text><line x1=\"175\" y1=\"52\" x2=\"485\" y2=\"52\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"180\" y=\"80\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">1 · Contexte &amp; périmètre</text><text x=\"180\" y=\"106\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">2 · Méthodologie</text><text x=\"180\" y=\"132\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">3 · Constats par dimension (+ sévérité)</text><text x=\"180\" y=\"158\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">4 · Score de qualité</text><text x=\"180\" y=\"184\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">5 · Recommandations &amp; remédiation</text><text x=\"180\" y=\"210\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">6 · Prévention (shift-left)</text></svg><div class=\"cap\">La structure professionnelle du rapport d'audit : du contexte aux mesures de prévention.</div></div><div class=\"section-label\">Chiffrer : le score de qualité</div><p>Un score rend l'état <b>comparable dans le temps</b> et entre tables. Une définition simple et défendable : le <b>taux de conformité</b> = part des lignes sans aucune anomalie ligne-à-ligne. On documente la formule, car un score sans définition n'a aucune valeur.</p><pre><code>WITH defauts AS (\n  SELECT sku,\n    (nom IS NULL OR categorie IS NULL OR prix IS NULL\n     OR prix &lt;= 0 OR prix &gt; 1000 OR stock &lt; 0 OR actif NOT IN (0,1)) AS ko\n  FROM catalogue\n)\nSELECT ROUND(100.0*SUM(CASE WHEN ko THEN 0 ELSE 1 END)/COUNT(*),1) AS taux_conformite_pct\nFROM defauts;</code></pre><div class=\"note\">Ce taux ne couvre que les défauts <i>ligne à ligne</i>. Les doublons de SKU (défaut de <b>groupe</b>) se mesurent à part — un score honnête précise toujours son périmètre.</div><div class=\"section-label\">Recommander & remédier</div><p>Chaque constat appelle une action, datée et priorisée par la sévérité :</p><table><tr><th>Sévérité</th><th>Action</th><th>Échéance</th></tr><tr><td>Critique</td><td>corriger SKU dupliqué & prix invalides ; <b>bloquer la mise en ligne</b></td><td>immédiat</td></tr><tr><td>Majeure</td><td>compléter prix/nom/catégorie manquants ; corriger stock/actif</td><td>court terme</td></tr><tr><td>Mineure</td><td>normaliser le référentiel de catégories</td><td>court terme</td></tr><tr><td>À vérifier</td><td>expertiser l'outlier de prix avec le métier</td><td>à confirmer</td></tr></table><div class=\"section-label\">Prévenir : industrialiser (shift-left)</div><p>Le vrai gain est de faire en sorte que ces anomalies <b>ne reviennent pas</b>. On transforme le registre en garde-fous automatiques :</p><ul><li><b>Tests automatisés</b> à la source : chaque règle du registre devient un test (dbt / Great Expectations / Soda) rejoué à chaque chargement.</li><li><b>Contrat de données</b> avec le producteur : schéma, valeurs admises, référentiel de catégories, prix &gt; 0.</li><li><b>Contrôle d'unicité</b> du SKU dès l'ingestion (clé).</li></ul><div class=\"section-label\">Bonnes pratiques & passage à l'échelle</div><ul><li><b>Reproductibilité</b> : des requêtes versionnées, des seuils paramétrés (pas de « nombres magiques » épars).</li><li><b>Lisibilité</b> : des CTE (<code>WITH</code>) nommées plutôt qu'une requête monolithique.</li><li><b>Performance / scalabilité</b> : sur des millions de lignes, indexer la clé, échantillonner pour l'exploration, et planifier les contrôles (batch nocturne) plutôt que tout recalculer à la demande.</li><li><b>Traçabilité</b> : un propriétaire par règle et une conduite à tenir quand elle casse.</li></ul><div class=\"callout\">Livrable final attendu : un rapport contexte → méthode → constats datés et priorisés → score → plan de remédiation → prévention. C'est ce niveau d'explicitation et de rigueur qui distingue un travail d'expert — et qui conditionne le certificat.</div>", "quiz": [{"q": "Parmi ces actions, laquelle relève de la PRÉVENTION (shift-left) plutôt que de la correction ponctuelle ?", "options": ["Corriger à la main les 3 lignes au prix manquant", "Ajouter un test automatisé « prix > 0 » rejoué à chaque chargement, via un contrat de données", "Supprimer la ligne à l'outlier de prix", "Trier le catalogue par prix pour vérifier"], "answer": 1, "explain": "Corriger les lignes traite le symptôme ; automatiser un contrôle à la source (test + contrat) empêche le défaut de revenir. C'est le principe du shift-left : prévenir coûte bien moins que subir."}]}};
  CURRICULUM.modules.forEach(function(m){ m.lessons.forEach(function(l){

})();

/* pj2 — Audit qualité clients & commandes (niveau professionnel + bac à sable). */
(function(){
  if (typeof CURRICULUM === 'undefined' || !CURRICULUM.modules) return;
  var ENR = {"pj2l1": {"minutes": 12, "sandbox": {"starter": "-- Complétude de la base clients : combien d'emails renseignés ?\nSELECT\n  COUNT(*)                                       AS clients,\n  COUNT(email)                                   AS email_renseignes,\n  ROUND(100.0*COUNT(email)/COUNT(*),1)           AS pct_email,\n  SUM(CASE WHEN email IS NULL THEN 1 ELSE 0 END) AS email_manquants\nFROM customers;"}, "theory": "<p><b>Le contexte.</b> Avant une campagne d'e-mailing et une migration CRM, on vous demande d'<b>auditer la base clients et leurs commandes</b>. Un email manquant ou faux, c'est un client injoignable ; une commande orpheline, c'est du chiffre d'affaires mal rattaché. Le livrable : un rapport de qualité chiffré et actionnable.</p><div class=\"section-label\">Le modèle de données</div><div class=\"diagram\"><svg viewBox=\"0 0 680 235\" width=\"680\" height=\"235\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"40\" width=\"210\" height=\"150\" rx=\"12\" fill=\"#FFFFFF\" stroke=\"#5B4BE8\" stroke-width=\"1.4\"/><rect x=\"30\" y=\"40\" width=\"210\" height=\"30\" rx=\"12\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.4\"/><text x=\"135\" y=\"60\" text-anchor=\"middle\" font-size=\"13\" fill=\"#3A2DB0\" font-weight=\"700\">customers</text><text x=\"46\" y=\"92\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">customer_id  (PK)</text><text x=\"46\" y=\"122\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">email</text><text x=\"46\" y=\"152\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">country_code</text><rect x=\"420\" y=\"40\" width=\"230\" height=\"180\" rx=\"12\" fill=\"#FFFFFF\" stroke=\"#C99A2E\" stroke-width=\"1.4\"/><rect x=\"420\" y=\"40\" width=\"230\" height=\"30\" rx=\"12\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.4\"/><text x=\"535\" y=\"60\" text-anchor=\"middle\" font-size=\"13\" fill=\"#8A6A1E\" font-weight=\"700\">orders</text><text x=\"436\" y=\"92\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">order_id  (PK)</text><text x=\"436\" y=\"122\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">customer_id  (FK)</text><text x=\"436\" y=\"152\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">amount_ttc</text><text x=\"436\" y=\"182\" text-anchor=\"start\" font-size=\"12\" fill=\"#211F2A\">currency</text><line x1=\"420\" y1=\"122\" x2=\"240\" y2=\"122\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"330\" y=\"112\" text-anchor=\"middle\" font-size=\"11\" fill=\"#56535F\" font-weight=\"700\">référence (FK)</text><text x=\"330\" y=\"138\" text-anchor=\"middle\" font-size=\"10\" fill=\"#8C8995\">chaque commande → 1 client</text></svg><div class=\"cap\">Deux tables reliées : chaque commande référence un client via customer_id (clé étrangère).</div></div><p>L'audit porte sur deux tables liées. Documenter le modèle — et la <b>relation</b> entre elles — est indispensable : une partie des contrôles (l'intégrité référentielle) ne vit que dans ce lien.</p><table><tr><th>Table</th><th>Colonne</th><th>Règle attendue</th></tr><tr><td rowspan=3><code>customers</code></td><td><code>customer_id</code></td><td>clé primaire, unique</td></tr><tr><td><code>email</code></td><td>présent, format valide, unique</td></tr><tr><td><code>country_code</code></td><td>∈ référentiel {FR, BE, DE, IT}</td></tr><tr><td rowspan=3><code>orders</code></td><td><code>customer_id</code></td><td>doit exister dans <code>customers</code></td></tr><tr><td><code>amount_ttc</code></td><td>&gt; 0</td></tr><tr><td><code>currency</code></td><td>devise autorisée (EUR)</td></tr></table><div class=\"section-label\">Premier contrôle : la complétude</div><p>On commence par le plus rentable : les valeurs manquantes. <code>COUNT(*)</code> compte les lignes, <code>COUNT(email)</code> ignore les NULL — leur différence donne les manquants, et le ratio le taux de complétude.</p><pre><code>SELECT\n  COUNT(*)                                       AS clients,\n  COUNT(email)                                   AS email_renseignes,  -- ignore les NULL\n  ROUND(100.0*COUNT(email)/COUNT(*),1)           AS pct_email,\n  SUM(CASE WHEN email IS NULL THEN 1 ELSE 0 END) AS email_manquants\nFROM customers;</code></pre><div class=\"note\">Exécute la requête : tu devrais lire <b>75 %</b> de complétude (2 emails manquants sur 8). En production, on étendrait la règle aux faux-vides (<code>''</code>, <code>'N/A'</code>) et on validerait aussi le <i>format</i> de l'email — sujet de la validité (étape 3).</div>", "quiz": [{"q": "Quelle expression mesure le nombre d'emails manquants dans customers ?", "options": ["COUNT(email)", "COUNT(*) - COUNT(email)", "COUNT(DISTINCT email)", "SUM(email)"], "answer": 1, "explain": "COUNT(*) compte toutes les lignes, COUNT(email) ignore les NULL : leur différence est exactement le nombre de valeurs manquantes."}]}, "pj2l2": {"minutes": 12, "sandbox": {"starter": "-- Emails en double : un même email rattaché à plusieurs clients\nSELECT email, COUNT(*) AS occurrences\nFROM customers\nWHERE email IS NOT NULL\nGROUP BY email\nHAVING COUNT(*) > 1\nORDER BY occurrences DESC;"}, "theory": "<p>Un même client présent deux fois, c'est un CA gonflé, des e-mails envoyés en double, des analyses faussées. On traque les <b>doublons</b> sur la clé métier : ici l'<code>email</code>, censé identifier un client de façon unique.</p><div class=\"diagram\"><svg viewBox=\"0 0 490 210\" width=\"490\" height=\"210\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"30\" width=\"150\" height=\"28\" rx=\"5\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"105\" y=\"48\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"700\">alice@…</text><rect x=\"30\" y=\"62\" width=\"150\" height=\"28\" rx=\"5\" fill=\"#FDECEC\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"105\" y=\"80\" text-anchor=\"middle\" font-size=\"12\" fill=\"#B23036\" font-weight=\"700\">bob@…</text><rect x=\"30\" y=\"94\" width=\"150\" height=\"28\" rx=\"5\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"105\" y=\"112\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"700\">carol@…</text><rect x=\"30\" y=\"126\" width=\"150\" height=\"28\" rx=\"5\" fill=\"#FDECEC\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"105\" y=\"144\" text-anchor=\"middle\" font-size=\"12\" fill=\"#B23036\" font-weight=\"700\">bob@…</text><rect x=\"30\" y=\"158\" width=\"150\" height=\"28\" rx=\"5\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"105\" y=\"176\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"700\">dan@…</text><line x1=\"185\" y1=\"110\" x2=\"250\" y2=\"110\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"217\" y=\"98\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5B4BE8\" font-weight=\"700\">GROUP BY email</text><text x=\"217\" y=\"124\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5B4BE8\">HAVING COUNT&gt;1</text><rect x=\"255\" y=\"90\" width=\"210\" height=\"44\" rx=\"11\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.6\"/><text x=\"360\" y=\"116.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#B23036\" font-weight=\"700\">bob@…  →  2 occurrences</text></svg><div class=\"cap\">On regroupe par email, puis on ne garde que les groupes de plus d'une ligne : ce sont les doublons.</div></div><div class=\"section-label\">Détecter les doublons</div><p>Le motif est universel : <code>GROUP BY</code> rassemble par valeur, <code>HAVING COUNT(*) &gt; 1</code> ne conserve que les groupes en double. (On exclut les NULL, qui relèvent de la complétude, pas de l'unicité.)</p><pre><code>SELECT email, COUNT(*) AS occurrences\nFROM customers\nWHERE email IS NOT NULL\nGROUP BY email\nHAVING COUNT(*) &gt; 1;</code></pre><div class=\"section-label\">WHERE ou HAVING ?</div><p>Distinction classique en entretien : <code>WHERE</code> filtre les lignes <i>avant</i> le regroupement ; <code>HAVING</code> filtre les groupes <i>après</i> (il peut donc porter sur un <code>COUNT</code>). Inverser les deux est une erreur fréquente.</p><div class=\"section-label\">Quantifier et décider</div><p>On chiffre les lignes en trop, puis on décide quelle ligne <b>conserver</b> (la plus complète, ou la plus récente s'il existe une date) :</p><pre><code>-- Nombre de lignes en trop dues aux doublons d'email\nSELECT COUNT(*) - COUNT(DISTINCT email) AS lignes_en_trop\nFROM customers WHERE email IS NOT NULL;</code></pre><p>En production, on normalise <b>avant</b> de comparer (casse, espaces) car « Bob@x.com » et « bob@x.com  » sont des doublons que l'égalité stricte rate :</p><pre><code>SELECT LOWER(TRIM(email)) AS email_norm, COUNT(*) AS n\nFROM customers WHERE email IS NOT NULL\nGROUP BY LOWER(TRIM(email)) HAVING COUNT(*) &gt; 1;</code></pre><div class=\"callout\">Check-list dédoublonnage : 1) définir la clé d'unicité ; 2) normaliser ; 3) quantifier ; 4) choisir la ligne survivante (la plus complète / la plus récente) ; 5) prévenir via une contrainte d'unicité à la source.</div>", "quiz": [{"q": "Pour ne garder que les emails apparaissant plus d'une fois, quelle clause utiliser ?", "options": ["WHERE COUNT(*) > 1", "HAVING COUNT(*) > 1 (après GROUP BY)", "DISTINCT email", "ORDER BY email"], "answer": 1, "explain": "WHERE filtre les lignes avant regroupement et ne peut pas porter sur un agrégat. HAVING filtre les groupes après GROUP BY et accepte COUNT(*)."}]}, "pj2l3": {"minutes": 14, "sandbox": {"starter": "-- Validité : pays hors référentiel, devise non autorisée, montant non positif\nSELECT 'pays invalide'  AS probleme, customer_id AS ref, country_code AS valeur\nFROM customers WHERE country_code NOT IN ('FR','BE','DE','IT')\nUNION ALL\nSELECT 'devise non EUR', order_id, currency\nFROM orders WHERE currency <> 'EUR'\nUNION ALL\nSELECT 'montant <= 0',   order_id, CAST(amount_ttc AS TEXT)\nFROM orders WHERE amount_ttc <= 0;"}, "theory": "<p>Une valeur peut être présente et unique… mais <b>invalide</b>. La validité vérifie qu'une donnée respecte ses règles de domaine : appartenance à un référentiel, format, plage. C'est l'un des contrôles les plus riches d'un audit.</p><div class=\"diagram\"><svg viewBox=\"0 0 560 170\" width=\"560\" height=\"170\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"40\" y=\"60\" width=\"230\" height=\"90\" rx=\"12\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.4\"/><text x=\"155\" y=\"84\" text-anchor=\"middle\" font-size=\"12\" fill=\"#0A7355\" font-weight=\"700\">Référentiel autorisé</text><text x=\"155\" y=\"112\" text-anchor=\"middle\" font-size=\"14\" fill=\"#0A7355\" font-weight=\"700\">FR · BE · DE · IT</text><rect x=\"360\" y=\"55\" width=\"140\" height=\"44\" rx=\"11\" fill=\"#FDECEC\" stroke=\"#E5484D\" stroke-width=\"1.6\"/><text x=\"430\" y=\"81.76\" text-anchor=\"middle\" font-size=\"14\" fill=\"#B23036\" font-weight=\"700\">'XX'</text><text x=\"430\" y=\"120\" text-anchor=\"middle\" font-size=\"11\" fill=\"#E5484D\" font-weight=\"700\">hors référentiel → invalide</text><line x1=\"355\" y1=\"77\" x2=\"275\" y2=\"100\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/></svg><div class=\"cap\">La validité catégorielle : une valeur est valide si elle appartient au référentiel autorisé.</div></div><div class=\"section-label\">Appartenance à un référentiel</div><p>Le pays doit faire partie d'une liste connue. <code>NOT IN</code> remonte les intrus.</p><pre><code>SELECT customer_id, country_code\nFROM customers\nWHERE country_code NOT IN ('FR','BE','DE','IT');   -- 'XX' n'est pas un pays valide</code></pre><div class=\"section-label\">Règles métier sur les commandes</div><p>Côté <code>orders</code>, deux règles de domaine : le montant doit être strictement positif, et la devise doit être autorisée (ici EUR pour une boutique en euros).</p><pre><code>-- Montants non valides (négatifs ou nuls)\nSELECT order_id, amount_ttc FROM orders WHERE amount_ttc &lt;= 0;\n\n-- Devises non autorisées (USD = étrangère ; XYZ = code inexistant)\nSELECT order_id, currency  FROM orders WHERE currency &lt;&gt; 'EUR';</code></pre><div class=\"section-label\">Validité ≠ exactitude</div><p>Rappel d'expert : la validité se vérifie <i>sans source externe</i> (la règle de format suffit). L'<b>exactitude</b> — la valeur reflète-t-elle le réel ? — exige une référence. Un email <code>jean@x.fr</code> bien formé peut être valide mais inexact (mauvaise personne). On contrôle facilement la validité, rarement l'exactitude.</p><div class=\"note\">Industrialisation : ces règles deviennent des tests <code>accepted_values</code> (pays, devise) et des tests de plage (<code>amount_ttc &gt; 0</code>) dans dbt/Great Expectations — rejoués à chaque chargement.</div>", "quiz": [{"q": "Le pays « XX » figure dans country_code. De quel type de défaut s'agit-il ?", "options": ["Complétude", "Validité : la valeur n'appartient pas au référentiel autorisé", "Unicité", "Intégrité référentielle"], "answer": 1, "explain": "La valeur est présente (pas un manquant) mais hors de la liste admise {FR,BE,DE,IT} : c'est un défaut de validité catégorielle, détecté par NOT IN."}]}, "pj2l4": {"minutes": 13, "sandbox": {"starter": "-- Commandes orphelines : un customer_id qui n'existe pas dans customers\nSELECT o.order_id, o.customer_id, o.amount_ttc\nFROM orders o\nLEFT JOIN customers c ON c.customer_id = o.customer_id\nWHERE c.customer_id IS NULL;"}, "theory": "<p>L'<b>intégrité référentielle</b> garantit qu'une référence pointe vers quelque chose d'existant. Une commande dont le <code>customer_id</code> n'existe pas dans <code>customers</code> est <b>orpheline</b> : son chiffre d'affaires est mal rattaché, et toute analyse par client la perd.</p><div class=\"diagram\"><svg viewBox=\"0 0 620 220\" width=\"620\" height=\"220\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"30\" y=\"40\" width=\"150\" height=\"40\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"105\" y=\"64.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">orders.customer_id</text><rect x=\"40\" y=\"95\" width=\"180\" height=\"30\" rx=\"5\" fill=\"#E7F7F0\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"130\" y=\"114\" text-anchor=\"middle\" font-size=\"12\" fill=\"#0A7355\" font-weight=\"700\">cmd → client 1</text><rect x=\"40\" y=\"131\" width=\"180\" height=\"30\" rx=\"5\" fill=\"#E7F7F0\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"130\" y=\"150\" text-anchor=\"middle\" font-size=\"12\" fill=\"#0A7355\" font-weight=\"700\">cmd → client 3</text><rect x=\"40\" y=\"167\" width=\"180\" height=\"30\" rx=\"5\" fill=\"#FDECEC\" stroke=\"#D7D2C4\" stroke-width=\"1.4\"/><text x=\"130\" y=\"186\" text-anchor=\"middle\" font-size=\"12\" fill=\"#B23036\" font-weight=\"700\">cmd → client 99</text><rect x=\"360\" y=\"40\" width=\"180\" height=\"40\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"450\" y=\"64.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#8A6A1E\" font-weight=\"700\">customers.customer_id</text><rect x=\"360\" y=\"95\" width=\"180\" height=\"80\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"450\" y=\"123.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"700\">1, 2, 3, 4, 5,</text><text x=\"450\" y=\"139.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"600\">6, 7, 8</text><text x=\"450\" y=\"155.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"600\">(pas de 99)</text><line x1=\"225\" y1=\"110\" x2=\"360\" y2=\"120\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"225\" y1=\"146\" x2=\"360\" y2=\"130\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><line x1=\"225\" y1=\"182\" x2=\"330\" y2=\"150\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"300\" y=\"200\" text-anchor=\"middle\" font-size=\"10\" fill=\"#E5484D\" font-weight=\"700\">99 introuvable → commande orpheline</text></svg><div class=\"cap\">Chaque commande doit pointer vers un client existant ; la commande vers le client 99 (inexistant) est orpheline.</div></div><div class=\"section-label\">Détecter les orphelines (LEFT JOIN)</div><p>On garde toutes les commandes (table de gauche) et on cherche celles <b>sans correspondance</b> côté clients : leurs colonnes client sont alors à NULL.</p><pre><code>SELECT o.order_id, o.customer_id, o.amount_ttc\nFROM orders o\nLEFT JOIN customers c ON c.customer_id = o.customer_id\nWHERE c.customer_id IS NULL;</code></pre><div class=\"section-label\">Pourquoi pas un INNER JOIN ?</div><p>Piège classique : un <code>INNER JOIN</code> ne renverrait que les commandes <i>avec</i> un client — il <b>masquerait</b> précisément les orphelines qu'on cherche. C'est le <code>LEFT JOIN … IS NULL</code> qui révèle l'absence.</p><p>Variante équivalente avec <code>NOT IN</code> (en veillant aux NULL) :</p><pre><code>SELECT order_id, customer_id FROM orders\nWHERE customer_id NOT IN (SELECT customer_id FROM customers WHERE customer_id IS NOT NULL);</code></pre><div class=\"section-label\">Mesurer l'impact</div><p>On chiffre toujours l'enjeu métier d'un défaut d'intégrité : combien de CA est concerné ?</p><pre><code>SELECT COUNT(*) AS commandes_orphelines, SUM(amount_ttc) AS ca_non_rattache\nFROM orders o\nLEFT JOIN customers c ON c.customer_id = o.customer_id\nWHERE c.customer_id IS NULL;</code></pre><div class=\"callout\">Prévention : à la source, une vraie <b>clé étrangère</b> (FOREIGN KEY) interdit d'insérer une commande sans client. Côté analytique, un test <code>relationships</code> (dbt) rejoue ce contrôle à chaque exécution.</div>", "quiz": [{"q": "Quelle approche détecte les commandes orphelines (client inexistant) ?", "options": ["INNER JOIN orders/customers", "LEFT JOIN orders→customers en gardant les lignes où customers.customer_id IS NULL", "COUNT(*) sur orders", "GROUP BY customer_id"], "answer": 1, "explain": "Le LEFT JOIN conserve toutes les commandes ; celles sans client correspondant ont des colonnes client à NULL. L'INNER JOIN, lui, masquerait justement les orphelines."}]}, "pj2l5": {"minutes": 14, "sandbox": {"starter": "-- Score de conformité des clients (email présent ET pays valide ET non dupliqué)\nWITH dup AS (\n  SELECT email FROM customers WHERE email IS NOT NULL\n  GROUP BY email HAVING COUNT(*) > 1\n),\nflag AS (\n  SELECT customer_id,\n    (email IS NULL\n     OR country_code NOT IN ('FR','BE','DE','IT')\n     OR email IN (SELECT email FROM dup)) AS ko\n  FROM customers\n)\nSELECT COUNT(*) AS clients,\n       SUM(CASE WHEN ko THEN 0 ELSE 1 END) AS conformes,\n       ROUND(100.0*SUM(CASE WHEN ko THEN 0 ELSE 1 END)/COUNT(*),1) AS taux_conformite_pct\nFROM flag;"}, "theory": "<p>On consolide l'audit en un <b>score</b> par dimension, puis en un indicateur global — le tableau de bord que lira la direction. Un score n'a de valeur que si sa <b>formule et son périmètre</b> sont explicités.</p><div class=\"section-label\">Le tableau de bord par dimension</div><div class=\"diagram\"><svg viewBox=\"0 0 560 270\" width=\"560\" height=\"270\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"40\" y=\"20\" width=\"460\" height=\"40\" rx=\"12\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"270\" y=\"44.42\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">Tableau de bord qualité — clients &amp; commandes</text><text x=\"60\" y=\"78\" text-anchor=\"start\" font-size=\"12\" fill=\"#56535F\">Complétude email</text><text x=\"480\" y=\"78\" text-anchor=\"end\" font-size=\"12\" fill=\"#C99A2E\" font-weight=\"700\">75 %</text><rect x=\"250\" y=\"66\" width=\"180\" height=\"8\" rx=\"4\" fill=\"#EFEDE4\"/><rect x=\"250\" y=\"66\" width=\"135\" height=\"8\" rx=\"4\" fill=\"#C99A2E\"/><text x=\"60\" y=\"108\" text-anchor=\"start\" font-size=\"12\" fill=\"#56535F\">Pays valides</text><text x=\"480\" y=\"108\" text-anchor=\"end\" font-size=\"12\" fill=\"#0EA672\" font-weight=\"700\">87,5 %</text><rect x=\"250\" y=\"96\" width=\"180\" height=\"8\" rx=\"4\" fill=\"#EFEDE4\"/><rect x=\"250\" y=\"96\" width=\"157.5\" height=\"8\" rx=\"4\" fill=\"#0EA672\"/><text x=\"60\" y=\"138\" text-anchor=\"start\" font-size=\"12\" fill=\"#56535F\">Emails uniques</text><text x=\"480\" y=\"138\" text-anchor=\"end\" font-size=\"12\" fill=\"#0EA672\" font-weight=\"700\">≈ 88 %</text><rect x=\"250\" y=\"126\" width=\"180\" height=\"8\" rx=\"4\" fill=\"#EFEDE4\"/><rect x=\"250\" y=\"126\" width=\"153\" height=\"8\" rx=\"4\" fill=\"#0EA672\"/><text x=\"60\" y=\"168\" text-anchor=\"start\" font-size=\"12\" fill=\"#56535F\">Montants &gt; 0</text><text x=\"480\" y=\"168\" text-anchor=\"end\" font-size=\"12\" fill=\"#C99A2E\" font-weight=\"700\">77,8 %</text><rect x=\"250\" y=\"156\" width=\"180\" height=\"8\" rx=\"4\" fill=\"#EFEDE4\"/><rect x=\"250\" y=\"156\" width=\"140.04\" height=\"8\" rx=\"4\" fill=\"#C99A2E\"/><text x=\"60\" y=\"198\" text-anchor=\"start\" font-size=\"12\" fill=\"#56535F\">Devise EUR</text><text x=\"480\" y=\"198\" text-anchor=\"end\" font-size=\"12\" fill=\"#C99A2E\" font-weight=\"700\">77,8 %</text><rect x=\"250\" y=\"186\" width=\"180\" height=\"8\" rx=\"4\" fill=\"#EFEDE4\"/><rect x=\"250\" y=\"186\" width=\"140.04\" height=\"8\" rx=\"4\" fill=\"#C99A2E\"/><text x=\"60\" y=\"228\" text-anchor=\"start\" font-size=\"12\" fill=\"#56535F\">Intégrité (non orphelin)</text><text x=\"480\" y=\"228\" text-anchor=\"end\" font-size=\"12\" fill=\"#0EA672\" font-weight=\"700\">88,9 %</text><rect x=\"250\" y=\"216\" width=\"180\" height=\"8\" rx=\"4\" fill=\"#EFEDE4\"/><rect x=\"250\" y=\"216\" width=\"160.02\" height=\"8\" rx=\"4\" fill=\"#0EA672\"/></svg><div class=\"cap\">Un score par dimension rend l'état lisible et comparable dans le temps — la base d'un suivi de la qualité.</div></div><p>Sur ce jeu de données, l'audit donne : complétude email 75 %, pays valides 87,5 %, montants positifs 77,8 %, devise EUR 77,8 %, intégrité 88,9 %. Chaque chiffre vient d'une requête de l'étape correspondante.</p><div class=\"section-label\">Un score global de conformité</div><p>Une définition simple et défendable : la part de clients <b>sans aucun défaut</b> (email présent, pays valide, email non dupliqué). On l'écrit avec des CTE nommées pour la lisibilité.</p><pre><code>WITH dup AS (\n  SELECT email FROM customers WHERE email IS NOT NULL\n  GROUP BY email HAVING COUNT(*) &gt; 1\n),\nflag AS (\n  SELECT customer_id,\n    (email IS NULL\n     OR country_code NOT IN ('FR','BE','DE','IT')\n     OR email IN (SELECT email FROM dup)) AS ko\n  FROM customers\n)\nSELECT ROUND(100.0*SUM(CASE WHEN ko THEN 0 ELSE 1 END)/COUNT(*),1) AS taux_conformite_pct\nFROM flag;</code></pre><div class=\"note\">Résultat : <b>37,5 %</b> de clients pleinement conformes (3 sur 8). Un score sévère, car cumulatif : il suffit d'un défaut pour qu'un client soit non conforme. C'est volontaire — il faut documenter ce choix de calcul.</div><div class=\"section-label\">Pondérer par la sévérité</div><p>Compter les défauts à l'unité traite une commande orpheline comme une coquille de libellé. En pratique, on <b>pondère</b> chaque type de défaut par sa gravité (impact métier × difficulté de correction), puis on additionne des <b>points de sévérité</b>.</p><table><tr><th>Défaut</th><th>Sévérité</th><th>Poids</th></tr><tr><td>Email manquant / dupliqué</td><td>Critique — client injoignable, double comptage</td><td>×3</td></tr><tr><td>Montant ≤ 0 · devise non autorisée</td><td>Majeure — chiffres faux</td><td>×2</td></tr><tr><td>Pays hors référentiel · libellé non normalisé</td><td>Mineure — corrigeable facilement</td><td>×1</td></tr></table><pre><code>-- Points de sévérité par type de défaut (clients)\nSELECT 'email manquant (x3)' AS defaut, 3*COUNT(*) AS points\nFROM customers WHERE email IS NULL\nUNION ALL\nSELECT 'email dupliqué (x3)', 3*COUNT(*)\nFROM customers WHERE email IN (\n  SELECT email FROM customers WHERE email IS NOT NULL GROUP BY email HAVING COUNT(*) &gt; 1)\nUNION ALL\nSELECT 'pays invalide (x1)', 1*COUNT(*)\nFROM customers WHERE country_code NOT IN ('FR','BE','DE','IT');</code></pre><div class=\"note\">Sur ce jeu : 6 + 6 + 1 = <b>13 points</b>, dont <b>12 dus aux emails</b>. Un simple décompte (« quelques défauts ») aurait noyé l'essentiel ; la pondération désigne sans ambiguïté la priorité n°1 — fiabiliser les emails — avant les corrections cosmétiques.</div><div class=\"section-label\">Recommandations & remédiation</div><table><tr><th>Sévérité</th><th>Action</th><th>Échéance</th></tr><tr><td>Critique</td><td>traiter les commandes orphelines (rattachement ou rejet)</td><td>immédiat</td></tr><tr><td>Majeure</td><td>compléter les emails manquants ; fusionner le doublon</td><td>court terme</td></tr><tr><td>Majeure</td><td>corriger pays invalide, montants ≤ 0, devises non autorisées</td><td>court terme</td></tr></table><div class=\"section-label\">Prévenir (shift-left)</div><ul><li><b>Clé étrangère</b> orders→customers et <b>unicité</b> de l'email à la source.</li><li><b>Tests automatisés</b> : <code>not_null</code>, <code>unique</code>, <code>accepted_values</code> (pays, devise), <code>relationships</code>, plage de montant.</li><li><b>Contrat de données</b> avec l'équipe applicative (schéma, référentiels, format email).</li></ul><div class=\"callout\">Livrable : un rapport contexte → méthode → constats par dimension (avec sévérité) → scores → remédiation → prévention. Reproductible, chiffré, justifié — le niveau attendu pour le certificat (et l'examen final à 80 %).</div>", "quiz": [{"q": "Le score global tombe à 37,5 % alors que chaque dimension dépasse 75 %. Pourquoi est-ce cohérent ?", "options": ["C'est une erreur de calcul", "Le score global est cumulatif : un seul défaut suffit à rendre un client non conforme", "Les pourcentages par dimension sont faux", "Il faut faire la moyenne des dimensions"], "answer": 1, "explain": "Le taux de conformité global compte les clients SANS AUCUN défaut. Comme les défauts se cumulent sur des clients différents, le « tout conforme » est bien plus rare que chaque dimension prise isolément. D'où l'importance de documenter la formule."}]}};
  CURRICULUM.modules.forEach(function(m){ m.lessons.forEach(function(l){

    if (e.sandbox) l.sandbox = e.sandbox; if (e.quiz) l.quiz = e.quiz;
  }); });
})();

<script>
/* m7 — Capstones (synthèse) niveau professionnel + schéma + bac à sable. */
(function(){
  if (typeof CURRICULUM === 'undefined' || !CURRICULUM.modules) return;
  var ENR = {"m7l1": {"minutes": 16, "sandbox": {"starter": "-- Synthèse d'audit du périmètre e-commerce : un compte par contrôle\nSELECT 'commandes orphelines' AS controle, COUNT(*) AS lignes_fautives\nFROM orders o LEFT JOIN customers c ON c.customer_id = o.customer_id\nWHERE c.customer_id IS NULL\nUNION ALL SELECT 'montant <= 0',   COUNT(*) FROM orders    WHERE amount_ttc <= 0\nUNION ALL SELECT 'devise != EUR',  COUNT(*) FROM orders    WHERE currency <> 'EUR'\nUNION ALL SELECT 'email manquant', COUNT(*) FROM customers WHERE email IS NULL\nUNION ALL SELECT 'pays invalide',  COUNT(*) FROM customers WHERE country_code NOT IN ('FR','BE','DE','IT');"}, "theory": "<p><b>Capstone 1.</b> On ne contrôle plus une table isolée : on <b>audite tout le périmètre e-commerce</b> (clients, commandes, catalogue) avant un comité de direction. C'est l'exercice de synthèse qui mobilise tout le parcours.</p><div class=\"section-label\">Le brief</div><ul><li><b>Mission</b> : produire un état de santé consolidé du périmètre, chiffré et priorisé.</li><li><b>Livrable</b> : un rapport unique + une synthèse exécutable (rejouable à la demande).</li><li><b>Décision en jeu</b> : peut-on s'appuyer sur ces données pour piloter, ou faut-il corriger d'abord ?</li></ul><div class=\"section-label\">L'architecture & les points de contrôle</div><div class=\"diagram\"><svg viewBox=\"0 0 740 170\" width=\"740\" height=\"170\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"14\" y=\"70\" width=\"150\" height=\"52\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#D7D2C4\" stroke-width=\"1.6\"/><text x=\"89\" y=\"92.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"700\">Boutique</text><text x=\"89\" y=\"108.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#211F2A\" font-weight=\"600\">(source)</text><line x1=\"164\" y1=\"96\" x2=\"192\" y2=\"96\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"178\" y=\"60\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0EA672\" font-weight=\"700\">✓</text><rect x=\"192\" y=\"70\" width=\"150\" height=\"52\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"267\" y=\"92.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"700\">orders · customers</text><text x=\"267\" y=\"108.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#3A2DB0\" font-weight=\"600\">produits (brut)</text><line x1=\"342\" y1=\"96\" x2=\"370\" y2=\"96\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"356\" y=\"60\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0EA672\" font-weight=\"700\">✓</text><rect x=\"370\" y=\"70\" width=\"150\" height=\"52\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"445\" y=\"92.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#0A7355\" font-weight=\"700\">Tables propres</text><text x=\"445\" y=\"108.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#0A7355\" font-weight=\"600\">(transformées)</text><line x1=\"520\" y1=\"96\" x2=\"548\" y2=\"96\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"534\" y=\"60\" text-anchor=\"middle\" font-size=\"13\" fill=\"#0EA672\" font-weight=\"700\">✓</text><rect x=\"548\" y=\"70\" width=\"150\" height=\"52\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"623\" y=\"92.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#8A6A1E\" font-weight=\"700\">Dashboard</text><text x=\"623\" y=\"108.08\" text-anchor=\"middle\" font-size=\"12\" fill=\"#8A6A1E\" font-weight=\"600\">direction</text><text x=\"330\" y=\"150\" text-anchor=\"middle\" font-size=\"11\" fill=\"#56535F\" font-weight=\"700\">Contrôles à chaque frontière : ingestion · transformation · consommation</text></svg><div class=\"cap\">L'audit suit la donnée de bout en bout et place un contrôle à chaque frontière (shift-left).</div></div><p>Un audit professionnel raisonne sur le <b>pipeline</b>, pas sur une table : où la donnée entre-t-elle, se transforme-t-elle, est-elle consommée ? On place les contrôles aux frontières, au plus tôt.</p><div class=\"section-label\">La matrice de couverture</div><p>Pour ne rien oublier, on croise <b>tables × dimensions</b>. C'est la check-list de l'auditeur.</p><table><tr><th>Table</th><th>Complétude</th><th>Validité</th><th>Unicité</th><th>Intégrité</th></tr><tr><td>customers</td><td>email</td><td>pays ∈ référentiel</td><td>email</td><td>—</td></tr><tr><td>orders</td><td>—</td><td>montant &gt; 0 ; devise</td><td>order_id</td><td>customer_id → customers</td></tr><tr><td>catalogue</td><td>nom, prix</td><td>prix &gt; 0 ; stock ≥ 0</td><td>sku</td><td>—</td></tr></table><div class=\"section-label\">La synthèse, en une requête</div><p>On consolide les contrôles en un <b>rapport unique</b> : un compte de lignes fautives par règle. C'est ce tableau qu'on présente — et qu'on rejoue à chaque exécution.</p><pre><code>SELECT 'commandes orphelines' AS controle, COUNT(*) AS lignes_fautives\nFROM orders o LEFT JOIN customers c ON c.customer_id = o.customer_id\nWHERE c.customer_id IS NULL\nUNION ALL SELECT 'montant &lt;= 0',   COUNT(*) FROM orders    WHERE amount_ttc &lt;= 0\nUNION ALL SELECT 'devise != EUR',  COUNT(*) FROM orders    WHERE currency &lt;&gt; 'EUR'\nUNION ALL SELECT 'email manquant', COUNT(*) FROM customers WHERE email IS NULL\nUNION ALL SELECT 'pays invalide',  COUNT(*) FROM customers WHERE country_code NOT IN ('FR','BE','DE','IT');</code></pre><div class=\"note\">Exécute la synthèse : tu obtiens un constat priorisable d'un coup d'œil (orphelines, montants ≤ 0, devises, emails, pays). C'est le cœur du rapport — chaque ligne devient une action et un test.</div><div class=\"section-label\">De l'audit à l'industrialisation</div><p>Un audit ponctuel ne suffit pas : on transforme chaque constat en garde-fou durable. C'est le fil rouge du parcours :</p><ul><li>chaque règle ⇒ un <b>test automatisé</b> rejoué à chaque chargement (module Tests, capstone 2) ;</li><li>les métriques clés ⇒ un <b>monitoring</b> en production (module Observabilité, capstone 3) ;</li><li>les frontières entre équipes ⇒ un <b>contrat de données</b> et un <b>lineage</b> (module Gouvernance).</li></ul><div class=\"section-label\">Bonnes pratiques & passage à l'échelle</div><ul><li>Requêtes <b>versionnées</b> et seuils <b>paramétrés</b> (pas de nombres magiques).</li><li><b>CTE</b> nommées pour la lisibilité ; un contrôle = une requête qui ne doit rien renvoyer.</li><li>Sur de gros volumes : indexer les clés, <b>planifier</b> l'audit (batch) plutôt que tout recalculer, échantillonner pour l'exploration.</li></ul><div class=\"callout\">Livrable attendu : contexte → architecture & couverture → synthèse chiffrée → priorisation par sévérité → plan d'industrialisation (tests, monitoring, contrats). C'est le niveau d'intégration qui distingue un capstone d'un exercice.</div>", "quiz": [{"q": "Le contrôle « chaque commande doit pointer vers un client existant » relève de quelle dimension ?", "options": ["Complétude", "Validité", "Intégrité référentielle", "Fraîcheur"], "answer": 2, "explain": "On vérifie qu'une référence (customer_id) pointe vers une ligne existante d'une autre table : c'est l'intégrité référentielle, détectée par un LEFT JOIN … IS NULL."}]}, "m7l2": {"minutes": 16, "sandbox": {"starter": "-- Ce que COMPILE le test dbt relationships(orders.customer_id -> customers.customer_id)\n-- Règle d'or dbt : un test qui RENVOIE des lignes = test en ÉCHEC.\nSELECT o.customer_id, COUNT(*) AS commandes_sans_client\nFROM orders o\nLEFT JOIN customers c ON c.customer_id = o.customer_id\nWHERE c.customer_id IS NULL\nGROUP BY o.customer_id;"}, "theory": "<p><b>Capstone 2.</b> On industrialise. À partir de l'audit, on construit un <b>framework de tests dbt</b> réutilisable, versionné et rejoué automatiquement — pour que les anomalies trouvées ne reviennent jamais en silence.</p><div class=\"section-label\">Le brief</div><p><b>Mission</b> : encadrer les modèles <code>orders</code> et <code>customers</code> par une suite de tests maintenable, intégrée au pipeline et à la CI. <b>Livrable</b> : la configuration dbt complète + la stratégie de sévérité.</p><div class=\"section-label\">L'architecture du framework</div><div class=\"diagram\"><svg viewBox=\"0 0 630 250\" width=\"630\" height=\"250\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"20\" y=\"30\" width=\"180\" height=\"44\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"110\" y=\"48.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"700\">schema.yml</text><text x=\"110\" y=\"63.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"600\">tests génériques</text><line x1=\"200\" y1=\"52\" x2=\"250\" y2=\"128\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"20\" y=\"82\" width=\"180\" height=\"44\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"110\" y=\"100.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#B23E22\" font-weight=\"700\">tests/*.sql</text><text x=\"110\" y=\"115.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#B23E22\" font-weight=\"600\">tests singuliers</text><line x1=\"200\" y1=\"104\" x2=\"250\" y2=\"128\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"20\" y=\"134\" width=\"180\" height=\"44\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"110\" y=\"152.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"700\">macros/</text><text x=\"110\" y=\"167.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"600\">tests sur-mesure</text><line x1=\"200\" y1=\"156\" x2=\"250\" y2=\"128\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"20\" y=\"186\" width=\"180\" height=\"44\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"110\" y=\"204.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">packages</text><text x=\"110\" y=\"219.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">dbt_utils, …</text><line x1=\"200\" y1=\"208\" x2=\"250\" y2=\"128\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"250\" y=\"104\" width=\"150\" height=\"52\" rx=\"11\" fill=\"#FFFFFF\" stroke=\"#56535F\" stroke-width=\"1.6\"/><text x=\"325\" y=\"125.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"700\">dbt test</text><text x=\"325\" y=\"142.92\" text-anchor=\"middle\" font-size=\"13\" fill=\"#211F2A\" font-weight=\"600\">/ build</text><line x1=\"400\" y1=\"130\" x2=\"455\" y2=\"130\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"455\" y=\"104\" width=\"150\" height=\"52\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"530\" y=\"126.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"700\">CI + Data Docs</text><text x=\"530\" y=\"141.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"600\">(rapport, blocage)</text></svg><div class=\"cap\">Quatre briques alimentent « dbt test » : tests génériques, tests singuliers, tests sur-mesure (macros) et packages — le tout relié à la CI et aux Data Docs.</div></div><div class=\"section-label\">1) Tests génériques (déclaratifs, en YAML)</div><pre><code>models:\n  - name: orders\n    columns:\n      - name: order_id\n        tests: [unique, not_null]\n      - name: customer_id\n        tests:\n          - relationships:           # intégrité référentielle\n              to: ref('customers')\n              field: customer_id\n      - name: currency\n        tests:\n          - accepted_values: { values: ['EUR'] }</code></pre><div class=\"section-label\">2) Test singulier (une règle métier en SQL)</div><p>On écrit, dans <code>tests/</code>, une requête qui <b>remonte les lignes fautives</b>. Le test échoue si elle renvoie au moins une ligne.</p><pre><code>-- tests/montant_positif.sql\nSELECT order_id, amount_ttc\nFROM {{ ref('orders') }}\nWHERE amount_ttc &lt;= 0</code></pre><div class=\"section-label\">3) Test générique sur-mesure (une macro réutilisable)</div><pre><code>-- macros/positive.sql\n{% test positive(model, column_name) %}\nSELECT {{ column_name }} FROM {{ model }} WHERE {{ column_name }} &lt;= 0\n{% endtest %}\n-- usage : tests: [positive] sur amount_ttc, prix, stock…</code></pre><div class=\"section-label\">4) Sévérité, exécution & CI</div><pre><code># sévérité : avertir vs bloquer\nconfig: { severity: error, error_if: \"&gt;0\" }\n\ndbt build                       # construit + teste\ndbt test --select state:modified+  # slim CI : seulement l'impacté</code></pre><div class=\"section-label\">Sous le capot : ce qu'exécute un test</div><p>Un test dbt n'est pas magique : il <b>compile en SQL</b>. Le test <code>relationships</code> ci-dessus devient exactement la requête d'orphelines de la détection. <b>Exécute-la dans le bac à sable</b> : une ligne renvoyée (client 99) = test en échec.</p><div class=\"section-label\">Bonnes pratiques & passage à l'échelle</div><ul><li><b>Génériques d'abord</b> (couverture rapide), <b>singuliers</b> pour le métier, <b>macros</b> pour factoriser.</li><li><b>Sévérité</b> calibrée : <code>error</code> sur clés/jointures/colonnes financières ; <code>warn</code> pour surveiller une dérive.</li><li><b>Slim CI</b> (<code>state:modified+</code>) pour des vérifications rapides ; <b>store_failures</b> pour analyser les lignes fautives.</li><li>Tests <b>à la source</b> (schéma, volume) et <b>sur les marts</b> (règles métier) : deux filets complémentaires.</li></ul><div class=\"callout\">La force du framework : la qualité devient du <b>code versionné, relu en pull request et rejoué automatiquement</b>. L'audit de la veille devient la suite de tests qui protège la production.</div>", "quiz": [{"q": "Dans dbt, que signifie un test qui renvoie des lignes ?", "options": ["Le test réussit", "Le test échoue : les lignes renvoyées sont précisément les enregistrements fautifs", "Le test est ignoré", "Cela recharge les données"], "answer": 1, "explain": "Le motif universel : un test = une requête qui ne doit rien renvoyer. Toute ligne remontée est une violation ; leur nombre mesure l'ampleur du problème."}]}, "m7l3": {"minutes": 16, "sandbox": {"starter": "-- Instantané de monitoring (à planifier, puis comparer à la veille / à la baseline)\nSELECT\n  COUNT(*)                                                          AS volume,\n  ROUND(AVG(amount_ttc),2)                                          AS panier_moyen,\n  ROUND(100.0*SUM(CASE WHEN amount_ttc <= 0 THEN 1 ELSE 0 END)/COUNT(*),1) AS pct_montant_invalide,\n  ROUND(100.0*SUM(CASE WHEN currency <> 'EUR' THEN 1 ELSE 0 END)/COUNT(*),1) AS pct_devise_anormale\nFROM orders;"}, "theory": "<p><b>Capstone 3.</b> Les tests attrapent le connu ; la production réserve l'inconnu. On met en place un <b>monitoring</b> pour surveiller en continu la santé des données et <b>réduire le data downtime</b> (le temps où la donnée n'est pas fiable).</p><div class=\"section-label\">Le brief</div><p><b>Mission</b> : instrumenter les tables de production pour détecter vite toute anomalie (retard, chute de volume, dérive). <b>Livrable</b> : un jeu de métriques planifiées + une politique d'alerte et un runbook d'incident.</p><div class=\"section-label\">La boucle de monitoring</div><div class=\"diagram\"><svg viewBox=\"0 0 740 140\" width=\"740\" height=\"140\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Manrope, system-ui, sans-serif\"><defs><marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7.5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7.5,3 L0,6 Z\" fill=\"#56535F\"/></marker></defs><rect x=\"16\" y=\"40\" width=\"160\" height=\"56\" rx=\"11\" fill=\"#E7F7F0\" stroke=\"#0EA672\" stroke-width=\"1.6\"/><text x=\"96\" y=\"64.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"700\">Mesure planifiée</text><text x=\"96\" y=\"79.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#0A7355\" font-weight=\"600\">(requête quotidienne)</text><line x1=\"176\" y1=\"68\" x2=\"194\" y2=\"68\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"194\" y=\"40\" width=\"160\" height=\"56\" rx=\"11\" fill=\"#ECEAFE\" stroke=\"#5B4BE8\" stroke-width=\"1.6\"/><text x=\"274\" y=\"64.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"700\">Métriques</text><text x=\"274\" y=\"79.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3A2DB0\" font-weight=\"600\">fraîcheur·volume·distrib.</text><line x1=\"354\" y1=\"68\" x2=\"372\" y2=\"68\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"372\" y=\"40\" width=\"160\" height=\"56\" rx=\"11\" fill=\"#FBF3DF\" stroke=\"#C99A2E\" stroke-width=\"1.6\"/><text x=\"452\" y=\"64.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"700\">Comparaison</text><text x=\"452\" y=\"79.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8A6A1E\" font-weight=\"600\">à la baseline</text><line x1=\"532\" y1=\"68\" x2=\"550\" y2=\"68\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><rect x=\"550\" y=\"40\" width=\"160\" height=\"56\" rx=\"11\" fill=\"#FDECE6\" stroke=\"#F0613F\" stroke-width=\"1.6\"/><text x=\"630\" y=\"64.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#B23E22\" font-weight=\"700\">Alerte → Triage</text><text x=\"630\" y=\"79.24\" text-anchor=\"middle\" font-size=\"11\" fill=\"#B23E22\" font-weight=\"600\">incident</text><line x1=\"700\" y1=\"100\" x2=\"40\" y2=\"108\" stroke=\"#56535F\" stroke-width=\"1.8\" marker-end=\"url(#ah)\"/><text x=\"370\" y=\"124\" text-anchor=\"middle\" font-size=\"11\" fill=\"#56535F\" font-weight=\"700\">boucle continue : on historise et on compare jour après jour</text></svg><div class=\"cap\">Le monitoring est une boucle : mesurer, comparer à la normale, alerter, traiter — en continu.</div></div><div class=\"section-label\">Les 5 piliers, en pratique</div><p>On instrumente chaque pilier par une <b>métrique historisée</b>, comparée à une référence.</p><ul><li><b>Fraîcheur</b> : âge de la donnée la plus récente (alerte si trop vieux) — le contrôle le plus rentable.</li><li><b>Volume</b> : nombre de lignes vs moyenne mobile (cf. fenêtres glissantes) — détecte les chutes.</li><li><b>Distribution</b> : taux de NULL, moyenne, parts de catégories — détecte les dérives silencieuses.</li><li><b>Schéma</b> : comparaison de la structure (colonnes, types) à une référence.</li><li><b>Lineage</b> : qui dépend de cette table — pour mesurer l'impact d'une panne.</li></ul><pre><code>-- Fraîcheur (si une colonne updated_at existe)\nSELECT (julianday('now') - julianday(MAX(updated_at))) * 24 AS heures_depuis_maj\nFROM orders;   -- alerte si &gt; seuil</code></pre><div class=\"section-label\">Un instantané de production</div><p>Sans colonne de date dans notre jeu, on instrumente <b>volume + distribution + validité</b> : la requête qu'on planifierait (quotidienne) et qu'on <b>comparerait à la veille</b>.</p><pre><code>SELECT\n  COUNT(*)                                                          AS volume,\n  ROUND(AVG(amount_ttc),2)                                          AS panier_moyen,\n  ROUND(100.0*SUM(CASE WHEN amount_ttc &lt;= 0 THEN 1 ELSE 0 END)/COUNT(*),1) AS pct_montant_invalide,\n  ROUND(100.0*SUM(CASE WHEN currency &lt;&gt; 'EUR' THEN 1 ELSE 0 END)/COUNT(*),1) AS pct_devise_anormale\nFROM orders;</code></pre><div class=\"note\">Exécute l'instantané : il faut le <b>répéter et historiser</b>. Une seule valeur ne dit rien ; c'est l'écart à la normale (hier, la moyenne des 7 jours) qui déclenche l'alerte.</div><div class=\"section-label\">Seuils fixes ou détection d'anomalies ?</div><p><b>Seuils fixes</b> quand la limite est connue (fraîcheur &lt; 3 h). <b>Détection d'anomalies</b> quand le « normal » varie (saisonnalité) : un modèle apprend la baseline et alerte sur l'écart.</p><div class=\"section-label\">Quand l'alerte sonne : le cycle d'incident</div><p>Détection → triage (gravité, impact) → <b>communication proactive</b> aux consommateurs → résolution → <b>post-mortem sans blâme</b>. On mesure le <b>MTTD</b> (détecter vite) et le <b>MTTR</b> (résoudre vite, via lineage + runbook).</p><div class=\"section-label\">Bonnes pratiques & passage à l'échelle</div><ul><li>Commencer <b>simple</b> : fraîcheur + volume attrapent déjà la majorité des incidents.</li><li>Combattre l'<b>alert fatigue</b> : une alerte qui ne déclenche jamais d'action est du bruit.</li><li>Un <b>propriétaire</b> et un <b>runbook</b> par alerte critique.</li><li>Sur de gros volumes : métriques incrémentales et échantillonnage plutôt que scans complets.</li></ul><div class=\"callout\">La qualité n'est pas l'absence d'incident — c'est la capacité à le détecter vite, en limiter l'impact, et en tirer une amélioration durable. C'est l'aboutissement du parcours : tests (prévenir) + monitoring (surveiller) + gouvernance (tracer).</div>", "quiz": [{"q": "Le contrôle de fraîcheur répond surtout à quelle question ?", "options": ["La valeur est-elle au bon format ?", "La donnée est-elle assez récente pour l'usage (pas en retard) ?", "Y a-t-il des doublons ?", "La référence existe-t-elle ?"], "answer": 1, "explain": "La fraîcheur mesure l'actualité : la donnée a-t-elle été mise à jour à temps ? Une table « en retard » est la panne de production la plus fréquente — d'où un contrôle très rentable."}]}};
  CURRICULUM.modules.forEach(function(m){ m.lessons.forEach(function(l){
    var e = ENR[l.id]; if (!e) return;
    l.theory = e.theory; if (e.minutes) l.minutes = e.minutes;
    if (e.sandbox) l.sandbox = e.sandbox; if (e.quiz) l.quiz = e.quiz;
  }); });
})();

</script>
